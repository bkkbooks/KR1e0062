body:
  text: 三傳辨疑卷六元程端學撰莊公十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋左氏曰齊請師于周夏單伯㑹之劉氏曰單伯者魯之孤也左氏見周有單子遂誤以單伯亦為周大夫凡王人出㑹諸侯無不序公侯之上者宰周公劉子之類是也既序公侯之上則是主㑹之人矣何必赴以單伯㑹諸侯乃成主㑹乎左氏既誤以單伯為周大夫杜氏因為之飾說欲證單伯使必為周人而委曲求合非解經之體也愚謂左氏既誤以單伯為周大夫又為說曰請師于周以實之可見左氏凡附㑹以售其說者非必魯史之文也公羊曰其言㑹伐宋何後㑹也劉氏曰非也伐宋之時魯本不預謀後聞乃遣大夫往㑹之耳與陳侯如㑹同意非後期也穀梁曰㑹事之成也經但言㑹伐宋何以㑹為事之成乎秋七月荆入蔡左氏曰蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡七月楚入蔡君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲滅者其如蔡哀侯乎使蔡侯實譽息媯以語楚子楚子信其言而滅息矣取息媯生二子矣豈肯又為息媯之言以伐蔡乎且既生二子矣而有未言之理乎其稱君子曰尤無意味其曰滅息經亦當書今經不書舉無足信榖梁曰荆者楚也其曰荆何也州舉之也州不如國國不如名名不如字劉氏曰案榖梁十年傳云其曰荆者狄之也今又云州舉之也若實狄之則非州舉之若實州舉之則非狄之而兩說並存不知果為狄之耶其亦州舉之耶若曰州舉之所以為狄之者凡在夷狄尚不州舉之况楚非真夷狄乎尋究二說似前說本出榖梁後說則掇取公羊之說例而續焉者也不然無為相異冬單伯㑹齊侯宋公衛侯鄭伯于鄄榖梁曰復同㑹也無益於經十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄榖梁曰復同㑹也同前夏夫人姜氏如齊榖梁曰婦人既嫁不踰竟踰竟非禮也辨見二年㑹于禚十有六年秋荆伐鄭左氏曰鄭伯自櫟入緩告于楚秋楚伐鄭及櫟為不禮故也夷狄聽命於中國禮也今中國不告夷狄為不禮豈禮也哉况鄭伯緩告楚之事未可信乎冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯滑伯滕子同盟于幽左氏曰同盟于幽鄭成也桓公假大義以令諸侯如天下翕然宗之不特鄭成而為此同盟也公羊曰同聖者何同欲也諸侯有不服者齊桓則伐之滅之故孟子曰以力假仁者霸未必皆同欲也榖梁曰同者有同也同尊周也不言公外內寮一疑之也趙氏曰何關內外寮也愚謂尊周而不朝又令自齊出其曰尊周特其名耳凡言同欲同尊周同外楚者皆以意解經而非當時所取之義也邾子克卒榖梁曰其曰子進之也不知孰進之與究其歸褒貶之說耳先儒謂邾從比杏之㑹而齊桓進之蓋意之也非有所考也十有七年春齊人執鄭詹左氏曰齊人執鄭詹鄭不朝也案去年十二月方同盟不可謂不朝也其左氏意之之辭與公羊曰鄭瞻者何鄭之微者也此鄭之微者何言乎齊人執之書甚佞也劉氏曰案春秋未有微者而得書於經若詹為大夫而未命又何别乎愚謂甚佞之說亦意之耳榖梁曰人者衆辭也以人執與之辭也鄭詹鄭之卑者卑者不志此其志何也以其逃來志之也逃來則何志焉將有其末不得不録其本也鄭詹鄭之佞人也劉氏曰人者衆辭也以人執與之辭也非也宋人執鄭祭仲邾人執鄫子亦可謂與之乎又曰鄭詹鄭之卑者不志其志何也以其逃來志之也亦非也紀履繻鄭宛之類亦同氏國豈卑者則不志乎且若所言卑者不志而鄭詹以逃來故得志也諸侯之國逋逃之臣不可勝紀何不盡書乎假令鄭詹就執於齊不逃來魯者春秋遂不書齊人執鄭詹乎然則書齊人執鄭詹不為鄭詹甚佞而書亦不與齊人執之而書為詹逃來書耳如此又安取書甚佞及與齊執之之義哉趙氏曰公榖皆言微者為佞書諸見執者豈無罪乎何獨特書此佞蓋不知未命大夫被執亦書之故造此義若經言自齊逃來足知見執何假先書夏齊人殱于遂公羊曰瀐者何瀐積也衆殺戍者也瀐當依左榖作殱瀐與殱皆不訓積榖梁曰殱者盡也然則何為不言遂人盡齊人無遂之辭也無遂則何為言遂其猶存遂也存遂奈何曰齊人滅遂使人戍之遂之因氏飲戍者酒而殺之齊人殱焉此謂狎敵也劉氏曰何以不言遂人盡齊人無遂之辭也非也春秋本責齊滅人之國而又戍之以自取死亡故其文如齊人自死于遂耳不以無遂故不言遂人盡齊人也又曰無遂則其言遂何其猶存遂也亦非也齊人實死于遂自當記其死所遂國雖滅遂地猶存理合必書豈强存遂乎若春秋不存遂者可云齊人殱于齊乎又曰此謂狎敵也亦非也滅人之國使兵戍之齊則無道矣令齊不滅人國不戍人地者安取此禍乎今榖梁譏其狎敵似惡齊人滅遂未盡戍遂未密不顧遂不可滅地不可戍也秋鄭詹自齊逃來公羊曰何以書書甚佞也曰佞人來矣佞人來矣陳嶽氏曰苟曰甚佞佞者國之私也諸侯曷以及之春秋曷以書之斯責不為國死難以懲執政明矣榖梁曰逃義曰逃凡人逃者不顧義而竊去也榖梁意則近矣語則未瑩十有八年春王三月日有食之榖梁曰不言日不言朔夜食也何以知其夜食也曰王者朝日故雖為天子必有尊也貴為諸侯必有長也故天子朝日諸侯朝朔劉氏曰尋榖梁氏意似云王者月朔朝日故日之始出有食之者得見之也案禮記天子朝日於東門之外聽朔於南門之外者明堂位也然則天子每朔先朝日而後聽朔諸侯每月先視朔而後朝廟乎古禮既已散亡今之說者不同未足怪也如榖梁之說以述朝日則是以解夜食則非愚謂日而夜食人所不見亦不為異春秋亦當不書設使書之獨不可言某月某日夜日有食之乎夏公追戎于濟西左氏曰不言其來諱之也啖氏曰書曰追明已去而逐之有何諱乎公羊曰此未有言伐者其言追何大其為中國追也此未有伐中國者則其言為中國追何大其未至而豫禦之也其言于濟西何大之也劉氏曰公羊以大其未至而豫禦之非也若未至而禦何得謂之追乎此不待攻而自破者雖多言煩說猶不可解也又曰于濟西者大之也此欲引追齊師至酅以立褒貶耳彼自以弗及故得書至何足據乎榖梁曰其不言戎之伐我何也以公追之不使戎邇於我也于濟西者大之也何大焉為公之追之也啖氏曰書濟西譏逺追也言大亦無義劉氏曰其不言戎之伐我何也以公之追之不使戎邇於我也非也戎若不來公則無追今以戎來故得追之先言戎伐後言追戎何害於義而必欲隱其一端之實事虛說不使戎邇於我之末節如此反為戎未嘗伐我公自妄追之也若不言戎之伐我欲以眀不使戎邇於我者則春秋所書伐我是皆使其邇於我乎又曰于濟西者大之也亦非也既不言戎之來又不言濟西則當但云公追戎矣未知追之於何所耶然則此理所必書何大之之有秋有􅈮榖梁曰一有一亡曰有􅈮射人者也此地本無而忽有之則為有一有一無之說未解也十有九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊曰媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶媵不書此何以書為其有遂事書大夫無遂事此其言遂何聘禮大夫受命不受辭出竟有可以安社稷利國家者則專之可也孫氏曰若以書鄄為出竟乃得專之則公子遂自京師遂如晉春秋安得譏之况冬齊與宋陳加兵于魯豈安社稷利國家也哉書者為遂起爾存耕趙氏曰受命不受辭謂聘禮耳豈有以媵陳出而可以遂盟哉既盟之後齊宋不至尚且不可况禍實在後耶石氏曰以此防人後世猶有出疆矯制為國生事者可朋許之哉劉氏曰公羊以為媵者諸侯娶一國則二國往媵之陳人者陳侯也非也云公子結以妾媵歸陳人之婦則文理不成又無故貶損陳侯使從人稱正名之義蓋媵者非送女也陳人者陳大夫不煩說矣榖梁曰媵淺事也不志此其志何也辟要盟也何以見其辟要盟也媵禮之輕者也盟國之重者也以輕事遂乎國重無說其曰陳人之婦略之也其不日數渝惡之也劉氏曰榖梁曰媵淺事不志此其志何也辟要盟也非也魯誠欲自託於大國者豈敢以媵婦之名而遣使者以取戾於伯主哉使者銜媵婦之命而遂要大國之盟是乃要盟矣何謂避要盟乎假令魯以專使參盟於大國雖不得盟而無怒今乃飾卑者之任而干大國之重魯何倒行逆施而為此哉且魯乃欲辟要盟故使者以媵婦往不以要盟往也其意欲持兩端若得盟則固曰吾來盟也不得盟則將曰吾非盟之求而婦是媵爾今結既得盟而春秋猶記其媵陳人之婦何哉且魯之為此謀者欲以誑齊宋乎則亦必誠有陳人之婦者乃可施其謀矣無陳人之婦則不成為媵而傳又言以輕事遂乎國重無說乃似虛為此名爾非實有陳人之婦也推其意無一可曉者豈誠魯人之事哉豈誠魯人之事哉夫人姜氏如莒榖梁曰婦人既嫁不踰竟踰竟非正也辨見二年姜氏㑹齊侯于禚冬齊人宋人陳人伐我西鄙榖梁曰其曰鄙逺之也其逺之何也不以難邇我國也國有都有鄙故伐鄙曰伐鄙深入曰伐我皆直書耳若曰不以難邇我國則是齊宋陳之兵本及國都而孔子私改魯史曰鄙以逺之也若止伐鄙者又何為辭乎二十年春王二月夫人姜氏如莒榖梁曰婦人既嫁不踰竟踰竟非正也辨見二年姜氏㑹齊侯于禚夏齊大災公羊曰大災者何大瘠也大瘠者何㾐也何以書記災也外災不書此何以書及我也為大瘠則新宫災亦是瘠乎劉氏曰春秋何以不言大瘠大㾐而亂火災之名乎其曰何以書及我也亦非也春秋豈其詳外而略內哉榖梁曰其志以甚也此說近之二十有一年秋七月戊戌夫人姜氏薨榖梁曰婦人弗目也鄭嗣曰弗目謂不目言其地愚案此義近之然施之丈姜則是知常而不知變者也二十有二年春王正月肆大眚公羊曰肆者何跌也大眚者何災眚也肆大眚何以書譏何譏爾始忌眚也啖氏曰肆者放也眚過也放大過耳如今之赦忌眚有何義乎劉氏曰經云肆大眚而傳謂之忌眚其文與其理不可訓解蓋不足難也榖梁曰肆失也眚災也災紀也失故也為嫌天子之葬也啖氏曰言不赦則似天子之微弱魯眚畏之乎若實有畏王之心則自赦以除母罪豈為得禮且魯莊未嘗有怨齊之心葬母豈有所忌赦自赦耳葬自葬耳事不相關劉氏曰若魯欲葬文姜而自為此者子固無赦母之道若仲尼嫌文姜之葬而書此以示義者則春秋之文無從而生若赦出於天子者何必緣丈姜之葬哉且文姜之存而莫之討也今死矣反待天子而葬乎此皆不然者愚謂莊公當時恐人之議其母故因而為赦以息人言亦未可知但為嫌天子之葬之語則不然也癸丑葬我小君丈姜榖梁曰小君非君也其曰君何也以其為公配可以言小君也案夫人者一國之母非君而何且小君者臣子稱君夫人之常春秋所書必有所指如此解經未之難矣陳人殺其公子禦寇左氏曰春陳人殺其太子禦寇經曰公子當以經為正榖梁曰言公子而不言大夫公子未命為大夫也其曰公子何也公子之重視大夫命以執公子劉氏曰然則榖梁謂凡公子未命為大夫皆得稱公子矣非也公子雖親然天下無生而貴者是以命為大夫則名氏得兩通未命為大夫則得稱名不得稱公子觀小白去疾亦可以見之矣秋七月丙申及齊髙傒盟于防公羊曰齊髙傒者何貴大夫也曷為就吾微者而盟公也公則曷為不言公諱與大夫盟也案公與大夫盟春秋未嘗不書如公及莒人盟于浮來之類是也何獨於此諱與大夫盟乎榖梁曰不言公髙傒伉也辨見公羊冬公如齊納幣公羊曰納幣不書此何以書譏何譏爾親納幣非禮也此其一義耳忘讎喪聘未論也榖梁曰納幣大夫之事也禮有納采有問名有納徴有告期四者備而後娶禮也公之親納幣非禮也故譏之案婚禮有六榖梁止言其五而納吉不言亦可見其語焉不詳之病餘見公羊二十有三年春公至自齊公羊曰桓之盟不日其㑹不致信之也此之桓國何以致危之也何危爾公一陳他也劉氏曰有致善有致不善皆妄說也不可以通愚案此著其踰年而返廢居喪告朔之禮何危之哉陳他之比亦無義祭叔來聘榖梁曰其不言使何也天子之內臣也不正其外交故不與使也趙氏曰非天子之命耳豈謂責其外交而去使字也愚謂春秋言使則受天子之命矣故言使則非外交不言使然後為外交也尋榖梁不與使之意乃似孔子去其使字以譏其外交豈春秋直書其事之義哉夏公如齊觀社公羊曰何以書譏何譏爾諸侯越竟觀社非禮也此說近之但未詳耳榖梁曰常事曰視非常曰觀觀無事之辭也以是為尸女也無事不出竟案易曰觀國之光觀我生觀其生孔子曰觀其所由若此類者豈皆非常與無事辭乎公至自齊榖梁曰公如往時正也致月故也如往月致月有懼焉爾日月例辨見綱領荆人來聘公羊曰荆何以稱人始能聘也啖氏曰言荆來聘則似舉州皆來故加人無他義劉氏曰稱人即大夫辭耳榖梁曰善纍而後進之其曰人何也舉道不待再黃氏曰荆入春秋三加兵中國今來聘稱人乃以為進之也木訥趙氏曰若進之聖人豈樂其僣聘問之禮哉憂之益甚也不然二十八年荆伐鄭何以復書荆僖十八年邢人狄人伐衛書人亦豈進之耶公及齊侯遇于榖蕭叔朝公榖梁曰及者內為志焉耳遇者志相得也蕭叔朝公微國之君未爵命者其不言來於外也朝於廟正也於外非正也諸侯不朝天子而朝魯侯雖於廟亦非正也及與遇辨見隱四年遇于清秋丹桓宫楹公羊曰何以書譏何譏爾丹桓宫楹非禮也此說近之但不言其所以非禮耳十有二月甲寅公㑹齊侯盟于扈公羊曰桓之盟不日此何以日危之也何危爾我二也魯子曰我二者非彼然我然也劉氏曰妄說耳二十有四年春王三月刻桓宫桷公羊曰何以書譏何譏爾刻桓宫桷非禮也不言所以非禮榖梁曰刻桓宫桷丹桓宫楹斥言桓宫以惡莊也案不言桓宫則所丹所刻者何宫故言桓宫者製言之體然也夫莊公之罪著矣不待斥言桓宫而後見其惡莊也夏公如齊逆女秋公至自齊公羊曰何以書親迎禮也案莊公逆讎人之女公羊蓋聞之矣反以為禮豈不悖哉况春秋常事不書公羊嘗自言之今親迎為禮則是常事也榖梁曰親迎恆事也不志此其志何也不正其親迎於齊也迎者行見諸舍見諸先至非正也此說近之而未詳八月丁丑夫人姜氏入公羊曰其言入何難也其言日何難也其難奈何夫人不僂不可使入與公有所約然後入僂疾也案先書公至自齊而後書入陳嶽氏所謂書其實者是也若姜氏難之與公有約然後入亦不在入字見意况有約後入之云本億之之辭與榖梁曰入者內弗受也曰入惡入者也何用不受也以宗廟弗受也其以宗廟弗受何也娶仇人之子弟以薦舍於前其義不可受也父見殺而子娶其女宗廟弗受宜也然不在入字見意誠能通上文納幣逆女公至及此姜氏入觀之義自見矣戊寅大夫宗婦覿用幣公羊曰宗婦者何大夫之妻也覿者何見也用者何用者不宜用也見用幣非禮也然則曷用棗栗云乎腶修云乎此說得之但訓宗婦不曰同姓大夫之妻為少不明耳以左氏既詳不得再録榖梁曰覿見也禮大夫不見夫人不言及不正其行婦道故列數之也男子之贄羔鴈雉腒婦人之贄棗栗腵修用幣非禮也用者不宜用者也大夫國體也而行婦道惡之故謹而日之也案經曰大夫宗婦乃同姓大夫之婦尋榖梁意一則似以大夫而用婦人之贄不然何以曰不正其行婦道與大夫國體也而行婦道一則又似大夫與宗婦同時以幣見夫人不然何以曰不言及不正其行婦道故列數之也如是則經中反多宗婦之辭輾轉求之皆不可曉假使大夫行婦道亦不在及字求義且經不可言大夫之婦故但言大夫宗婦則同姓大夫之妻其義自見故書法自不當言及榖梁又曰男子之贄羔鴈雉腒則書稱三帛二生一死贄者非與又曰大夫不見夫人則禮稱夫人至大夫郊迎明日執贄以見者非與且孔子何以見南子也榖梁種種失言矣冬戎侵曹曹羈出奔陳赤歸于曹公羊曰曹羈者何曹大夫也曹無大夫此何以書賢也何賢乎曹羈戎將侵曹曹羈諫曰戎衆以無義君請勿自敵也曹伯曰不可三諫不從遂去之故君子以為得君臣之義也劉氏曰曹無大夫非也經曰不敢遺小國之臣聖人作春秋豈遺之哉又曹伯伯也鄭伯亦伯也若以小國無大夫鄭亦宜無大夫豈獨曹哉今公羊不曰鄭無大夫而獨曰曹無大夫似見曹之大夫著於經者少耳非確語也赤歸于曹郭公案此一事推尋傳注初無義理不知先儒顛倒繆妄何乃至如此陳嶽氏曰國君出奔或不爵者與書大夫無異故公羊以為大夫也然國君出奔有無爵者如突歸于鄭鄭忽出奔衛詎可謂大夫與復有可以眀之經先書冬戎侵曹次書曹羈出奔陳次書赤歸于曹戎既侵曹而羈出奔是曹懼戎而出奔眀矣羈既出而赤乃入是君出而赤立亦眀矣愚謂設使曹羈為大夫當戎之侵曹正臣子見危授命之日非三諫不從而遂去之時也而遂去之可謂賢乎又使曹無大夫則二十六年何以書曹殺其大夫乎郭公公羊曰郭公赤者何曹無赤者蓋郭公也郭公者何失地之君也榖梁曰郭公赤蓋郭公也何為名也禮諸侯無外歸之義外歸非正也趙氏曰赤者曹公子也郭公自是闕文其文義都不相關公榖誤甚矣劉氏曰榖梁曰赤者郭公之名然則春秋何苦不曰郭公赤歸于曹乎言郭公赤足以見其為國君言歸足以見其外歸而顛倒迷錯乃如此何哉梁亡鄭棄其師紀侯大去其國雖指意卓佹然文義自眀未有改易首尾如此者也蓋有不知而作之者豈謂是耶二十有五年春陳侯使女叔來聘左氏曰嘉之故不名趙氏曰聘何可嘉故知榖梁言天子之命大夫是也劉氏曰若使諸侯其卿大夫來聘輒受一褒春秋之中來聘魯者不可勝紀則何不一一褒之也六月辛未朔日有食之鼓用牲于社左氏曰夏六月辛未朔日有食之鼓用牲于社非常也惟正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝孫氏曰案周禮夏書凡救日食皆鼓不書者常事也鼓用牲于社變常也變常則書若如左氏杜預說則孔子所書非正陽之月者皆空言也夏書亦不當言乃季秋月小雅亦不當言十月之交噫是說也啓庸君暗主荒怠不畏天戒之心甚矣劉氏曰夏書記日食之變季秋月朔亦有伐鼓之事豈必正陽之月哉日有食之變之大者人君當恐懼修省以答天意豈但非正陽之月則安而視之哉左氏之說繆矣春秋所以書者蓋譏其不鼓于朝乃鼓于社又用牲耳公羊曰日食則曷為鼓用牲于社求乎隂之道也以朱絲營社或曰脅之或曰為暗恐人犯之故營之趙氏曰凡此皆失禮乃書公羊言求隂之道乃是得禮據書禮無朱絲營之文榖梁曰言日言朔食正朔也鼓用牲于社鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也案天子救日伐鼓于社諸侯伐鼓于朝今諸侯鼓于社是僣天子之禮也榖梁但知鼓之可用而不知用鼓之所是以許之以禮耳如其鼓而得禮則春秋不必書鼓直曰日有食之用牲于社豈不簡潔也哉伯姬歸于杞榖梁曰其不言逆何也逆之道微無足道焉爾案春秋所以不書逆者以其得禮為常事而不書耳設使逆之道微正公榖所謂非常者也非常之事固當書之以示戒榖梁乃曰逆之道微而不書然則春秋反書常事不書非常也豈理也哉秋大水鼓用牲于社于門公羊曰其言于社于門何于社禮也于門非禮也劉氏曰非也若于社為禮春秋當不書矣榖梁曰髙下有水災曰大水既戒鼓而駭衆用牲可以已矣救日以鼓兵救水以鼓衆案鼓為得禮春秋不必書矣夫莊公用鼓之意本為充陽若日食然不然何以于社也今榖梁以為鼓駭衆不惟不解春秋書鼓之義亦不解莊公用鼓之意矣二十有六年曹殺其大夫公羊曰何以不名衆也曷為衆殺之不死於曹君者也君死乎位曰滅曷為不言其滅為曹羈諱也此蓋戰也何以不言戰為曹羈諱也趙氏曰曹小國唯有二卿何足為衆假如不死節豈有舉國卿盡殺之乎劉氏曰公羊曰不名衆也然則殺三郤何故名乎又云不死于曹君者也宋殺其大夫又何以辨哉凡公羊以大夫相殺稱人而君殺大夫稱國而不論大夫有辜無辜故使曹宋同文異義是皆臆斷也又曰此蓋戰也滅也亦非也曹羈雖賢何䏻掩君滅之禍乎以曹羈之賢遂諱曹伯之滅又何義乎晉之假道於虞也宫之奇諫推宫之奇之賢則無以異於曹羈矣春秋為曹羈諱曹伯不為宫之奇諱虞公何哉以曹羈為大夫辨見曹羈出奔榖梁曰言大夫而不稱名姓無命大夫也無命大夫而曰大夫賢也為曹羈崇也劉氏曰榖梁曰大夫而不稱名姓無命大夫也非也天子建國諸侯立家雖尊卑不同而豈無命哉諸侯大國三卿皆命於天子次國三卿二卿命於天子小國三卿一卿命於天子大國之卿三命次國之卿再命小國之卿一命其於王朝皆士也三命以名氏通再命名之一命略稱人周衰禮廢强弱相并卿大夫之制雖不能盡如古見於經者亦皆當時之實録也故隱桓之間其去西周未久制度頗有存者是以魯有無駭柔俠鄭有宛詹秦楚多稱人至其晚節無不名氏通矣而邾莒滕薛之等日已益削轉從小國之例稱人而已說者不知其故謂曹秦以下悉無大夫患其時有見者害其臆說因復搆架無端以飾其僞然此不足怪也彼固不知王者諸侯之制度班爵云爾其又足辨乎愚案曹臣雖賢聖人不應加其大夫之號而復泯其名姓也况未必賢乎二十有七年春公㑹杞伯姬于洮左氏曰非事也天子非展義不巡守諸侯非民事不舉卿非君命不越境此說得之夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽左氏曰陳鄭服也案齊桓用殷同之禮十二年而後盟經又不見陳人離二之跡左氏之說未詳信否榖梁曰同者有同也同尊周也於是而後授之諸侯也其授之諸侯何也齊侯得衆也桓㑹不致安之也桓盟不日信之也信其信仁其仁衣裳之㑹十有一未嘗有歃血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也案桓公以力假仁如黃人同盟而不救其亡救邢而次于聶此不信也滅談滅遂降鄣遷陽僣天子盟㑹征伐不仁也然則許桓公以仁信者過也秋公子友如陳葬原仲公羊曰原仲者何陳大夫也大夫不書葬此何以書通乎季子之私行也何通乎季子之私行辟內難也君子辟內難而不辟外難內難者何公子慶父公子牙公子友皆莊公之母弟也公子慶父公子牙通乎夫人以脅公季子起而治之則不得與于國政坐而視之則親親因不忍見也故於是復請至于陳而葬原仲也劉氏曰非也當是時內難未作何避之有若以季子見幾逺舉者是謂忘宗國之亂而貴一身之全非賢智也且季子於此奔陳亦見釁端已成乎則莊公既病而召季子其釁端宜益深矣季子何以得入而與國政夫莊公病季子羇旅在外一旦召至授之權柄人莫能禦者此眀公子牙之徒禍猶未覯也若彼之時禍猶未覯况去莊公沒尚數年而遂云避內難出奔乎且季子與其奔也孰若勿奔以銷解其謀察識其勢若孔父之禦亂也而胡為背君捐國使回皇於亂臣之手此皆事之不然者也愚謂內主恩外主義故異姓之卿道不行則去貴戚之卿無可去之理則死其位而已然則君子避外難而不避內難也公羊及其說矣榖梁曰言葬不言卒不葬者也不葬而曰葬諱出奔也啖氏曰書葬之意直譏季友之私行彼是陳國大夫安得書其卒乎愚謂經義本明因傳而晦者若此類也冬杞伯姬來左氏曰杞伯姬來歸寧也凡諸侯之女歸寧曰來出曰來歸夫人歸寧曰如某出曰歸于某趙氏曰譏無父而來又曰凡內女稱來不宜來也左氏謂歸寧曰來言禮當來也竊謂合禮者皆常事不書蓋知非禮而來故書云爾愚謂夫人姜氏如齊師如莒亦可曰夫人歸寧乎公羊曰直來曰來大歸曰來歸趙氏曰公羊曰直來蓋見無他事殊不知經意莒慶來逆叔姬公羊曰莒慶者莒大夫也莒無大夫莒子爵小國一卿安得無大夫哉榖梁曰諸侯之嫁子於大夫主大夫以與之來者接內也不正其接內故不與夫婦之稱也杜氏曰接內謂與君為禮也愚謂來來魯而已非以不主大夫直接內而書來也其曰叔姬者大夫自逆則稱字書法當然非不正其接內而不與夫婦之稱也二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績左氏曰初王姚嬖于莊王生子頽子頽有寵蒍國為之師及惠王即位取蒍國之圃以為囿邉伯之宫近於王宫王取之王奪子禽祝跪與詹父田而收膳夫之秩故蒍國邉伯石速詹父子禽祝跪作亂因蘇氏秋五大夫奉子頽以伐王不克出奔溫蘇子奉子頽以奔衛衛師燕師伐周冬立子頽二十年春鄭伯和王室不克執燕仲父夏鄭伯遂以王室歸王處于櫟二十一年夏鄭伯將王自圉門入虢叔自北門入殺子頽王使召伯廖賜齊侯命且請伐衛以其立子頽也齊侯伐衛戰敗衛師數之以王命取賂而還齊果以王命伐衛衛逆王命春秋當如書王人子突救衛而衛侯朔入于衛之意以著衛辜豈可但書衛人及齊人戰乎子頽作亂事或有之命齊伐衛則未可信也齊桓挾公行私事亦有之取賂而還亦不若是之甚也公羊曰伐不日此何以日至之日也戰不言伐此其言伐何至之日也春秋伐者為客見伐者為主故使衛主之也曷為使衛主之衛未有罪爾敗者稱師衛何以不稱師未得乎師也劉氏曰公羊曰曷為使衛主之衛未有罪爾非也荀林父帥師及楚子戰于邲當此之時公羊以晉師夷狄之不若則何以不使楚子主之豈晉師未有罪楚子有罪乎是何自相反也又曰敗者稱師衛何以不稱師未得乎師也亦非也茍衛未得成師則春秋曷為書以偏戰之辭此為不知春秋之文甚矣榖梁曰於伐與戰安戰也戰衛戰則是師也其曰人何也微之也何為微之也今授之諸侯而後有侵伐之事故微之也其人衛何也以其人齊不可以不人衛也衛小齊大其以衛及之何也以其微之可以言及也其稱人以敗何也不以師敗於人也劉氏曰榖梁曰戰則是師也其曰人何也微之也非也凡道春秋通例皆曰將卑師少稱人何忽至此而以為微之乎又曰其人衛何也以其人齊不可以不人衛也亦非也齊有罪則微齊衛有罪則微衛則可謂明矣今欲微齊因遂微衛齊則有罪矣衛則不知也而曰不可不人衛所謂不可者安在哉又曰衛小齊大其以衛及之何也以其微之可以言及也亦非也衛欲戰則衛及齊齊欲戰則齊及衛春秋惡戰故常分别禍之所從起耳不為國大小也又曰其稱人以敗何也不以師敗於人也亦非也設令齊將尊師衆而敗衛將卑師少而勝豈得不書師敗於人哉春秋之義王道也春秋之事史記也聖人豈必私以已意增損舊史而後見其道哉秋荆伐鄭公㑹齊人宋人救鄭榖梁曰荆者楚也其曰荆州舉之也善救鄭也齊能救鄭善矣然原其所由則有未善者孟子所謂久假不歸惡知其非真有者榖梁之謂矣其曰州舉之亦莊十年狄之之意但不眀言耳冬築郿左氏曰築郿非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城劉氏曰郿者何內之邑也築之者何始作邑也何以書非常也詩云築室百堵百堵皆興鼛鼓弗勝不謂城邑也邑之與都相較無幾欲差邑於都而殊築城之名則國亦當殊京師又當殊而都以上通以城名之何耶愚謂城郎城中丘城楚丘之類皆城邑也若如左氏說則皆為都矣此不待辨而眀者也榖梁曰山林藪澤之利所以與民共也虞之非正也啖氏曰榖梁之說當施之築囿下劉氏曰此自築邑爾非園囿也解之惑矣大無麥禾公羊曰冬既見無麥禾矣曷為先言築微而後言無麥禾諱以凶年造邑也劉氏曰非也築微在冬初五榖畢集然後制國用在冬末固有前後耳豈故諱哉愚謂公羊所謂諱者史氏諱之乎孔子諱之乎謂史氏諱之則築郿與無麥禾舉魯之人皆知之謂孔子諱之則後世之人亦知之夏無麥而秋無禾築郿固在於冬矣不可掩也且孔子正欲此事以示戒乃反顛倒其事以諱之乎榖梁曰大者有顧之辭也於無禾及無麥也聖人重民食若但無麥理亦當書非因無禾始書無麥也况大者非常之辭非以無禾無麥而書大也若嵗有麥何妨自書大無禾若嵗有禾何妨自書大無麥乎臧孫辰告糴于齊左氏曰冬饑臧孫辰告糴于齊禮也左氏知告糴之為禮而不知所以告糴之非禮公羊曰告糴者何請糴也何以不稱使以為臧孫辰之私行也曷為以臧孫辰之私行君子之為國也必有三年之委一年不熟告糴譏也春秋書法外大夫來稱使內通外但言如此不言如者存耕趙氏以為非聘是也且義在告糴于齊豈可以不稱使謂其私行哉夫國無麥禾而饑臧孫安得私行而告糴乎公羊以國無三年之委一年不熟而告糴為臧孫之私行則是臧孫辰本公行孔子責其無三年之委而奪其使以為私行也豈理也哉榖梁曰國無三年之蓄曰國非其國也一年不升告糴諸侯告請也糴糴也不正故舉臧孫辰以為私行也國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也諸侯無粟諸侯相歸粟正也臧孫辰告糴于齊告然後與之言內之無外交也古者稅什一豐年補敗不外求而上下皆足也雖纍凶年民弗病也一年不艾而百姓饑君子非之不言如為內諱也榖梁不責魯人之無預備而責齊之不歸粟與魯之無外交可謂失其輕重之權衡矣且時無眀王又無賢諸侯安能聞鄰國之饑不待告而即歸粟哉夫告糴于齊既眀書之何必去一如字為內諱也豈得公羊私行之說而演之與二十有九年春新延廏左氏曰新作延廏書不時也凡馬日中而出日中而入杜氏曰日中春秋分也治廏當以秋分因馬向入而修之今以春作故曰不時啖氏曰若新作不當云新也馬雖出入有時何妨農隙修之劉氏曰廏有壞爛及民閒暇之時修之是也何害於出入馬乎愚案新延廏有二不時而左氏之不時不與春月東作方興而興土木之功一不時也饑荒之餘上下困弊正勸耕助不給之時不務彼而務此二不時也若左氏所謂不時特言其不於秋分修之耳其於春秋所指邈乎其不相干矣公羊曰新延廏者何修舊也修舊不書此何以書譏何譏爾凶年不修此說近之但以新為修舊則未然耳謹案左氏解新為新作過也公羊解新為修舊不及也何則凡去其舊而一新之曰新延廏非創也因其舊而一新之耳左氏乃曰新作故曰過也凡因其舊而葺之曰修舊新延廏非修舊也去其舊而一新之耳公羊乃曰修舊故曰不及也一過一不及皆失新之之義一字義且然况本義乎榖梁曰延廏者法廏也其言新有故也有故則何為書也古之君人者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣冬築微春新延廏其用民力為已悉矣此說得之特少凶年一節耳夏鄭人侵許左氏曰凡師有鐘鼓曰伐無曰侵輕曰襲葉氏曰伐備鐘鼓聲其罪也襲侵密聲為暫事也則侵非無鐘鼓但備而不作耳愚案詩曰侵自阮疆書曰侵于之疆周官九伐負固不服則侵之皆為侵奪其疆之義左氏無鐘鼓之云非也先儒有潛師掠境之說蓋本於左氏云秋有蜚左氏曰秋有蜚為災也凡物不為災不書啖氏曰此非為災之物春秋記異多矣何必為災乃書莘老孫氏曰經曰有蜚非所宜有之為異故書也公羊曰記異是也左氏曰為災案蜚豈為災之物又曰凡物不為災不書案春秋災異悉書不必皆為災也鸜鵒豈能為災乎春秋何以記其來巢也榖梁曰一有一亡曰有辨見十八年有􅈮城諸及防左氏曰冬十有二月城諸及防書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢李氏曰凡書土功非善之也書於農隙猶言愈於非時也於春夏書譏可知矣其間亟興土功而亟書之者不繫乎時與不時皆譏也若此前年冬築微大饑而告糴此年春新延廏於是又城諸及防固非美其時豈不謂亟而譏之乎如僖二十年新作南門不止譏其非時又譏其加度榖梁曰凡城之志皆譏榖梁曰可城也以大及小也趙氏曰此但依先後次第何必大小乎劉氏曰若言城諸防則似一城故從所先城記之耳三十年夏師次于成榖梁曰次止也有畏也欲救鄣而不能也不言公恥不能救鄣也趙氏曰據齊伯已成魯為之弱何敢議救蓋欲㑹圍鄣至成待命聞鄣已降故不行耳然疑事無質但存而勿解愚謂若助齊圍鄣經當書之如師次于郎以俟陳人蔡人之類此必别有所為而弗果用故春秋責其無名輕次耳事雖不知而書法如此義自見矣夫經必待傳而後眀乎人自不察耳秋七月齊人降鄣公羊曰鄣者何紀之遺邑也降之者何取之也取之則曷為不言取之為桓公諱也外取邑不書此何以書盡也啖氏曰紀之全國猶不敵齊豈有一邑之民而能二十餘年猶拒齊乎故知鄣自小國耳劉氏曰公羊曰紀之遺邑也非也紀滅久矣猶存鄣乎又曰降之者取之也不言取之為桓公諱也亦非也取之固曰取之降之固曰降之遷之固曰遷之非可相假借為諱避也齊人降鄣猶曰宋人遷宿遷之不可諱為降也猶取之不可諱為遷也文如日月不可巧誣而猶云云多見其惑也愚謂桓公滅談滅遂且不為諱安得取鄣而諱之改為降乎榖梁曰降猶下也鄣紀之遺邑也辨見公羊八月癸亥葬紀叔姬公羊曰外夫人不書葬此何以書隱之也何隱爾其國亡矣徒葬乎叔爾獻可杜氏曰叔姬者紀侯之媵紀滅則當即歸於魯而又從紀季於酅非禮之甚卒葬固在於紀季矣春秋豈隱而閔之蓋惡惡在其中安可謂執節守義耶又安可謂隱之耶愚謂叔姬媵妾也公羊曰夫人誤矣自紀國已亡叔姬不歸于魯則死之而已豈可從叛紀之叔哉卒于叔葬于叔失節甚矣使聖人隱之則是姑息也豈為之哉榖梁曰不日卒而日葬閔紀之亡也辨見公羊冬公及齊侯遇于魯濟左氏曰冬遇于魯濟謀山戎也以其病燕故也案齊伐山戎魯不與焉豈有自伐人而謀於鄰國者乎左氏見此遇之後即伐山戎故附㑹耳其曰病燕故亦億辭也榖梁曰及者內為志焉耳遇者志相得也劉氏曰非也設若外為志又志相得者便云公㑹齊侯遇于魯濟乎辨又見隱四年齊人伐山戎公羊曰此齊侯也其稱人何貶曷為貶子司馬子曰蓋以操之為已蹙矣此蓋戰也何以不言戰春秋敵者言戰桓公之與戎狄驅之爾劉氏曰非也屬桓公取鄣諱之為降又近上滅談滅遂亦無所貶夫桓公滅中國而不貶今戰山戎而貶侯以人此可謂識輕重乎且誠春秋意者是開桓公得滅中國而不得戰山戎也此所謂小辨破道小說破義君子之所疾也韓中父曰僖十年齊侯許男伐北戎豈褒之乎榖梁曰齊人者齊侯也其曰人何也愛齊侯乎山戎也其愛之何也桓內無因國外無從諸侯而越千里之險北伐山戎危之也則非之乎善之也何善乎爾燕周之分子也貢識不至山戎為之伐矣劉氏曰貶則人之愛則人之誰能識其善惡哉愚謂愛齊侯者魯史乎孔子乎謂魯史也則桓非魯君史有直筆何必愛之哉謂孔子耶孔子去齊桓已百年已知齊桓全軀而歸何必改侯曰人以愛之哉果齊侯耶正當書之為後世冒險僥幸之戒若愛之危之而人之則後世何從而知之孔子豈逆料榖梁能發其意而改侯曰人以待之乎山戎病燕史記雖有其說蓋亦承左氏之誤耳吾未之信也貢職不至榖梁豈能知之乎三十有一年春築臺于郎公羊曰何以書譏何譏爾臨民之所漱浣也劉氏曰非也譏在築臺不在臨民若不臨民臺可為乎臺若不可為雖不臨民猶譏之也築臺于薛公羊曰何以書譏何譏爾譏逺也此說近之但未盡耳茍但譏逺則近而踰制將何為乎齊侯來獻戎捷公羊曰齊大國也曷為親來獻戎捷威我也其威我奈何旗獲而過我也案經直書齊侯來獻戎捷豈止建旗且來獻捷耳非齊侯之過魯也榖梁曰齊侯來獻捷者內齊侯也不言使內與同不言使也獻戎捷軍得曰捷戎菽也劉氏曰榖梁曰內齊侯也不言使內與同不言使使也非也去年齊人伐山戎榖梁所以知其當為齊侯者正以今年來獻捷者乃齊侯故也然則齊侯己伐山戎又來獻捷耳何以見其是使人乎魯雖欲內齊豈可便不殊齊侯之使假令稱齊侯使人來獻捷文何以異於齊侯來獻捷也若都不稱齊又不言來則信可謂內與同矣今既稱齊又曰來獻齊非吾國也來非不外也雖匿其使名猶是齊來獻捷也安見內乎又曰軍得曰捷戎菽也案菽者豆耳齊侯伐山戎乃取其豆與諸侯不近事理疑菽者此狄字也榖梁解此戎者即北狄也北字類草狄字類叔傳寫訛謬又并為一字不然無為如此妄解愚案管子曰出戎菽及冬葱布之天下榖梁豈據此以為義乎使齊侯負菽而獻魯不亦勞乎又案劉氏謂齊侯伐山戎者本順榖梁而為辭耳非實稱齊侯也秋築臺于秦公羊曰何以書譏何譏爾臨國也案郎薛秦皆魯逺地也公羊于郎則譏其臨民所漱浣于薛則譏其逺于秦則譏其臨國亦莫適主矣榖梁曰虞山林藪澤之利或曰倚諸桓也桓外無諸侯之變內無國事越千里之險北伐山戎為燕辟地魯外無諸侯之變內無國事一年罷民三時虞山林藪澤之利惡內也案榖梁於二十八年築郿亦曰虞山林藪澤之利啖氏謂其說當施之築囿之下此不過築臺耳非囿也而榖梁又以是言之亦見其言無所當矣且倚桓之說亦非也魯之三築臺乃自荒耳豈倚桓也哉三十有二年春城小穀左氏曰城小榖為管仲也趙氏曰不繫之齊非為齊也孫氏曰曲阜西北有小榖城康侯胡氏曰孫魯人也終身學春秋其考此事詳矣髙氏曰小榖魯邑也先儒以為齊邑魯為管仲城之若然亦當異其文而繫之齊矣且公雖感齊侯之私豈肯為管仲城邑乎彼殆見昭十一年申無宇曰齊桓公城榖而置管仲焉故有此說殊不知齊自有榖如文十七年公及齊侯盟于榖宣十四年公孫歸父㑹齊侯于榖此齊榖也非魯之小榖夏宋公齊侯遇于梁丘左氏曰齊侯為楚伐鄭之故請㑹于諸侯宋公請先見于齊侯夏遇于梁丘左氏見宋序齊上故為先見之說以附㑹之非實事也左氏附㑹大抵類此榖梁曰遇者志相得也梁丘在曹邾之間去齊八百里非不能從諸侯而往也辭所遇遇所不遇大齊桓也劉氏曰非也諸侯相遇何大之有愚案㑹盟侵伐有從諸侯者矣春秋未有以遇禮見而從諸侯者也安得謂辭所遇哉秋七月癸巳公子牙卒左氏曰公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏使針季鴆之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏邦衡胡氏曰內殺大夫皆書刺若季友以君命殺叔牙當亦書刺今不言刺而言卒則非殺眀矣若以為季友諱殺則周公誅管蔡不當諱耶叔牙之卒有不可知者髙氏曰此僖叔也左氏具載季友殺叔牙之事考之於經全不寓微意且公既有子何必問後正使問後而叔牙輒以慶父對若公以為不當立則自不立耳何至於殺叔牙耶殺叔牙而反使慶父執國政此又何耶况此去公薨尚逺豈公臨終之事耶公羊以為將弒莊公此又無謂之甚者以此言之公子牙蓋自卒耳牙卒其子乃公孫兹兹之後則有叔孫得臣叔孫僑如叔孫豹叔孫婼叔孫不敢叔孫州仇皆執魯國之政者是以謹而志其卒公羊曰何以不稱弟殺也殺則曷為不言刺為季子諱殺也曷為為季子諱殺季子之遏惡也不以為國獄緣季子之心而為之諱季子之遏惡奈何莊公病將死以病召季子季子至而授之以國政曰寡人即不起此病吾將焉致乎魯國季子曰般也存君何憂焉公曰庸得若是乎牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是將為亂乎夫何敢俄而牙弒械成季子和藥而飲之曰公子從吾言而飲此則必可以無為天下戮笑必有後乎魯國不從吾言而不飲此則必為天下戮笑必無後乎魯國於是乎從其言而飲之飲之無傫氏至乎王堤而死公子牙今將爾辭曷為與親弒者同君親無將將而誅焉然則善之與曰然殺世子母弟直稱君者甚之也季子殺母兄何善爾誅不得辟兄君臣之義也然則曷為不直誅而鴆之行誅乎兄隱而逃之使託若以疾死然親親之道也趙氏曰案書公子常法也叔肸書弟自别有為不得引以為義劉氏曰公羊云不稱弟殺也其意欲以不稱弟起牙見殺非也二十五年公子友如陳不稱弟又何故哉愚謂據公羊言公子牙不過對莊公曰魯一生一及薦慶父耳季子亦不過言夫何敢將為亂乎爾安得便弒械成乎使弒械成必不以季子一言飲鴆而即死也且經書公子牙卒與書大夫卒無異辭不見與親弒者同辭也公羊之言不近人情辨又見左氏八月癸亥公薨于路寢公羊曰路寢者何正寢也此訓詁得之義則未也冬己未子般卒公羊曰子卒云子卒此其稱子般卒何君存稱世子君薨稱子某既葬稱子踰年稱公子般卒何以不書葬未踰年之君也有子則廟廟則書葬無子不廟不廟則不書葬髙氏曰景王既葬王子猛卒何以名愚謂諸侯志葬必有義私諡與緩速是也此未踰年之君無私諡故不書葬爾非以有子則廟無子不廟也榖梁曰子卒日正也不日故也有所見則日劉氏曰非也若有所見又不日者豈不益眀乎何苦日之與正卒相亂哉用此觀之非聖人之意明矣公子慶父如齊榖梁曰此奔也其曰如何也諱莫如深深則隱茍有所見莫如深也啖氏曰若實奔而書曰如乃是掩其惡也豈其然乎劉氏曰閔公不書即位足以起子般之弒爾不足見慶父之賊也春秋記諸侯大夫之奔不必皆弒君也書慶父奔亦何不可哉且慶父親弒其君此魯國人人之讐奈何反掩匿蔽覆不明白其奔使弒君之賊不見乎又文十八年十月子卒其下則季孫行父如齊亦有所見也若以慶父之例推之則行父亦弒子赤者耶何謂書如齊莘老孫氏曰慶父如齊非魯人逐之故不言奔爾若春秋為之諱則閔公二年出奔又何以不為之諱哉三傳辨疑卷六
