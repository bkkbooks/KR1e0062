body:
  text: 三傳辨疑卷五元程端學撰莊公元年春王正月左氏曰不稱即位文姜出故也啖氏曰遇弒則嗣子廢即位之禮左氏不達其意而云文姜出故也且父為他國所弒其情君何不舉其大而舉其細非通論也且三月文姜方孫何妨正月即位乎葉氏曰繼故也凡死不以正皆曰故夫人以三月孫于齊則文姜當與桓公之喪同歸此未出也安得言不即位以文姜故乎杜預强云文姜以桓見殺不敢還感公意而還此非經意濟川何氏曰君親一旦橫尸不終夀人情必將大駭而傷其酷矧親則子弟哉左氏不達此理曲為解釋三月夫人孫于齊左氏曰不稱姜氏絶不為親禮也韓中甫曰此無姓氏說者以為貶春秋書夫人孫者二文姜之孫則去氏哀姜之孫則不去氏文姜弒其夫哀姜殺其子妻與母雖異而姦惡之跡同弒君之罪一曷為事同而貶異也矧褒貶非春秋之㫖歟故黃氏曰明年仍書姜氏可謂片言折之矣公羊曰孫者何孫猶孫也夫人固在齊矣其言孫于齊何念母也正月以存君念母以首事夫人何以不稱姜氏貶曷為貶與弒公也其與弒公奈何夫人譖公于齊侯公曰同非吾子齊侯之子也齊侯怒與之飲酒于其出也使公子彭生送之于其乘焉搚幹而殺之念母者所善也則曷為于其念母焉貶不與念母也啖氏曰豈有先在齊而今書孫乎公羊蓋以無夫人至處故云爾不知隨喪而歸且不告廟故不致劉氏曰正月以存君念母以首事非也夫人始與公俱如齊公薨喪歸則夫人固亦歸文不得特見爾非為念母乃貶之也愚謂如其念母何獨于三月而他時不念乎夫念母乃莊公之心而魯史亦書之乎且子同生在桓六年前此夫人未嘗歸齊亦未嘗與齊襄為㑹至桓十八年始與桓公如齊安得有同非吾子之事同非吾子之言乎公羊之說可謂愚且妄矣穀梁曰接練時録母之變始人之也不言氏姓貶之也人之于天也以道受命于人也以言受命不若於道者天絶之也不若于言者人絶之也臣子大受命劉氏曰接練時録母之變始人之也非也夫人前隨桓公之喪還國今復出奔耳豈録母之變橫生孫文乎如此是聖人率意作經不復記事實也朱子曰齊魯諸儒多質實當時或𫝊誦師說見理不明故其言多不備夏單伯逆王姬公羊曰何以不稱使天子召而使之也逆之者何使我主之也曷為使我主之天子嫁女乎諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之案魯主婚自當使卿逆之非天子召而使之也諸侯嫁女以下必古禮也但非本義不録耳穀梁曰其不言如何也其義不可受於京師也案春秋謹嚴既曰王姬矣自不必言京師既不言京師言如非不可受于京師而不言如也秋築王姬之館于外左氏曰為外禮也劉氏曰非也為讐主婚而不知辭乃以築外自誣曰我庶幾得禮哉是何足以言禮也公羊曰何以書譏何譏爾築之禮也于外非禮也于外何以非禮築于外非禮也其築之何以禮主王姬者必為之改築主王姬者則曷為必為之改築於路寢則不可小寢則嫌羣公子之舍則以卑矣其道必為之改築者也公羊冥然不知春秋所以書之㫖而以築為禮于外為非禮宜其繆之甚也穀梁曰築禮也于外非禮也築之為禮何也主王姬者必自公門出于廟則已尊于寢則已卑為之築節矣築之外變之正也築之外變之為正何也仇讐之人非所以接婚姻也衰麻非所以接辨冕也其不言齊侯之來逆何也不使齊侯得與吾為禮也劉氏曰穀梁以謂變之正非也魯本自當以仇讐不可接婚姻上告天子不當默默受命此乃春秋譏其舍大恤小以謂未盡臣子之道者也何謂變之正乎凡變之正者謂亡于禮者之禮若權死亡者也非謂可為而不為傷禮害義者也若莊公者可謂變于邪矣未見變于正也愚謂不使齊侯得與吾為禮正當書其事以見義而乃不言齊侯之來讀春秋者何從知之王使榮叔來錫桓公命公羊曰錫者何賜也命者何加我服也其言桓公何追命也趙氏曰桓公已葬命服何所施之劉氏曰周人雖愚豈以其衣食車馬而畀既葬之人哉且何以為儀愚謂公羊不知聖人所書之㫖而姑為是訓詁之辭而已穀梁曰禮有受命無來錫命錫命非正也生服之死行之禮也生不服死追錫之不正甚矣趙氏曰案錫命如漢以來就加爵秩何得謂無錫命乎王姬歸于齊公羊曰何以書我主之也穀梁曰為之中者歸之也二傳皆無所發明齊師遷紀郱鄑郚公羊曰遷之者何取之也取之則曷為不言取之也為襄公諱也外取邑不書此何以書大之也何大爾自是始滅也趙氏曰取人之邑如為之諱是掩惡也劉氏曰有遷而不取者有取而不遷者有且遷且取者春秋據實而書耳非諱也以遷邑為愈乎宋人遷宿公羊以謂當坐滅國然則齊師取邑諱從遷邑實言遷邑復坐滅邑安在諱也且襄公獨非懷惡而討不義者乎其何諱焉穀梁曰紀國也郱鄑郚國也或曰遷紀于郱鄑郚啖氏曰案下有紀侯大去其國故知此是紀之三邑爾劉氏曰計齊一師必不能並遷兩國又春秋自當分别以見滅兩國之惡不當合之也辛未取郜辛巳取防兩邑爾內小惡爾猶惡而謹之況兩國乎外大惡乎愚謂如穀梁上說齊當一遷四國也如下說紀下經當有于字而無紀季入齊紀侯去國之文然則上下所說皆非也二年公子慶父帥師伐于餘丘公羊曰于餘丘者何邾婁之邑也曷為不繫之邾婁國之也曷為國之君存焉爾啖氏曰案前後未有邑言伐者故依左氏舊說為國劉氏曰公羊見邑不繫國君可疑者悉附之邾婁爾穀梁曰國而曰伐于餘丘邾之邑也其曰伐何也公子貴矣師重矣而敵人之邑公子病矣病公子所以譏乎公也其一曰君在而重之也劉氏曰春秋之戰伐多何獨病此乎若伐人之國則勿病乎且必若云是果於伐國不果于伐邑也何以為懲且勸乎又曰其一曰君在而重之也此似晚見公羊之說而附益之者矣葉氏曰內有為公為辭者矣未有為公子為辭者也且伐邑亦必以其國之故其曰君在者亦竊取公羊之說而附之者也秋七月齊王姬卒公羊曰外夫人不卒此何以卒録焉爾曷為録焉爾我主之也穀梁曰為之主者卒之也如穀梁言常事而已矣豈春秋之㫖哉公羊亦然而録之本義者借其說以見公主其卒耳冬十有二月夫人姜氏㑹齊侯于禚穀梁曰婦人既嫁不踰竟踰竟非正也婦人不言㑹言㑹非正也饗甚矣趙氏曰婦人不出門何論踰竟哉愚謂婦人不出門自然不言㑹三年春王正月溺㑹齊師伐衛左氏曰疾之也疾之固然但不明言所疾者何事穀梁曰溺者何公子溺也其不稱公子何也惡其㑹仇讐而伐同姓故貶而名之也穀梁謂惡其㑹仇讐而伐同姓可謂辭約而理明但曰為是而不稱公子乃一字褒貶之弊夏四月葬宋莊公穀梁曰月葬故也五月葬桓王公羊曰此未有言崩者何以書葬蓋改葬也榖梁曰傳曰改葬也改葬之禮緦舉下緬也或曰郤尸以求諸侯天子志崩不志葬必其時也何必焉舉天下而葬一人其義不疑也志葬故也危不得葬也曰近不失崩不志崩失天下也獨陰不生獨陽不生獨天不生三合然後生故曰母之子也可天之子也可尊者取尊稱焉卑者取卑稱焉其曰王者民之所歸往也胡氏曰二𫝊皆為改葬于經不見此只是緩葬葉氏曰方周之衰禮不備于天子者固多安得必桓王如期而葬蓋𫝊為天子記崩不記葬必其時之說不得不云爾其實左氏言緩者是也若襄王以文八年八月崩九年二月書葬此不失時而非故者也何為志葬哉桓公十五年書天王崩即桓王也既曰改葬又曰郤尸以求諸侯而謂之不志葬可乎劉氏曰若改葬何以不言改乎謂改不可言改卜牛何以言改也陳嶽氏曰平王太子泄父蚤卒其子林為桓王王立二十三年桓十五年崩至此年方葬是時周室至微齊桓未伯諸侯無復勤王故緩葬且桓十五年後未見書葬豈非桓王耶茍改葬復何以明斯公穀之短秋紀季以酅入于齊酅户圭切公羊曰紀季者何紀侯之弟也何以不名賢也何賢乎紀季服罪也其服罪奈何魯子曰請後五廟以存姑姊妹當紀侯危懼之際季先以邑入齊使紀侯愈不能支而遂去其國則紀季之罪著矣何賢之有在禮諸侯之尊弟兄不得以屬通則五廟非紀季所得奉也左氏曰紀于是乎始判義雖未盡然近之矣穀梁曰酅紀之邑也入于齊者以酅事齊也入者內弗受也劉氏曰內弗受非也此自往入之入而非歸入之入若可受者遂云歸于齊乎其守文而不達理至如此冬公次于滑乎八切左氏曰將㑹鄭伯謀紀故也鄭伯辭以難凡師一宿為舍再宿為信過信為次趙氏曰經無信舍之文不要左氏之例愚謂使公次一宿亦書次而已可言公宿于滑乎公羊曰其言次于郎何欲救紀而後不能也穀梁曰有畏也欲救紀而不能也陸氏曰有畏非也刺其無王命而興師以懲亂耳若譏其怯當褒其勇春秋乃鼓亂之書也愚謂三𫝊皆謂救紀蓋見前有紀季入齊後有紀侯去國之事故意之耳經書次于滑正譏其無名而妄動耳夫齊雖欲滅紀而未以兵加紀公何故而救紀乎設欲救紀或以兵戌紀或與共伐齊今經傳皆無其事則三𫝊意之者明矣四年春王二月夫人姜氏享齊侯于祝丘穀梁曰饗甚矣饗齊侯所以病齊侯也啖氏曰此乃二國之恥豈獨病齊侯乎三月紀伯姬卒穀梁曰外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也如穀梁言則常事而已矣紀侯大去其國公羊曰大去者何滅也孰滅之齊滅之曷為不言齊滅之為襄公諱也春秋為賢者諱何賢乎襄公復讐也何讐爾逺祖也哀公亨乎周紀侯譖之以襄公之為于此焉者事祖禰之心盡矣盡者何襄公將復讐乎紀卜之曰師喪分焉寡人死之不為不吉也逺祖者幾乎九世矣九世猶可以復讐乎雖百世可也家亦可乎曰不可國何以可國君一體也先君之恥猶今君之恥也今君之恥猶先君之恥也國君何以為一體國君以國為體諸侯世故國君為一體也今紀無罪此非怒與曰非也古者有明天子則紀侯必誅必無紀者紀侯之不誅至今有紀者猶無明天子也古者諸侯必有㑹聚之事相朝聘之道號辭必稱先君以相接然則齊紀無說焉不可並立乎天下故將去紀侯者不得不去紀也有明天子則襄公得為若行乎曰不得也不得則襄公曷為為之上無天子下無方伯緣恩疾者可也趙氏曰公羊去之之義迂僻甚矣不復繁文高氏曰先儒以齊襄復九世之讐春秋大之害教甚矣復讐乃亂世之事況已九世乎陳嶽氏曰春秋肯屑屑曲意為諸侯諱乎劉氏曰文稱紀侯大去國何以謂之滅乎蔡侯弒父惡莫大焉楚子討之書曰楚子䖍誘蔡侯般者固惡其懷惡而討不義也紀侯九世之惡不深於蔡般齊襄懷惡而討不義不減于楚子而春秋深抑紀侯以難明之事專信齊侯以一偏之辭何哉且亨哀公者王也非紀侯也紀侯有罪罪在譖人不在亨人奈何滅紀以為賢哉以辨持之以曲通之公羊之義固勝以道觀之以義推之公羊之義未有一可也黃氏曰人殺其父子不與共戴天此復讐之說也設如公羊言襄九世祖見亨乎周是天王殺之也非紀公之鼻祖殺之也譖言無形非殺者比也九世矣無謂滅國以報言語之怨者也古者報怨不在其後後之人何罪公羊又曰雖百世可也此謬論也齊無此心不過滅小國耳愚謂是時尚有天子緣恩疾之說亦不可以訓穀梁曰大去者不遺一人之辭也言民之從者四年而後畢也紀侯賢而齊侯滅之不言滅而曰大去其國者不使小人加乎君子啖氏曰若如穀梁說則此乃舉國而行何名去國文義相反矣劉氏曰就令言滅滅人之國豈非不使小人加乎君子哉又變言大去其義不類愚謂如穀梁言民之從者不遺一人四年而後畢則紀當復興如太王之去邠也然自此之後紀無聞焉不知所從之民何所止乎且因不使小人加乎君子孔子遂改齊之滅紀為紀侯之自去則齊襄之惡得以匿矣後世何所懲乎公榖就大去二字生義故其繆妄如此殊不知大本紀侯之名苟以大去為盡去則伯姬不葬叔姬歸酅不可通矣六月乙丑齊侯葬紀伯姬公羊曰外夫人不書葬此何以書隱之也何隱爾其國亡矣徒葬于齊爾此復讐也曷為葬之滅其可滅葬其可葬此其為可葬奈何復讎者非殺之逐之也以為雖遇紀侯之殯亦將葬之也案公羊之說亦自矛盾如齊果當復讐則春秋何必隱之哉惟不當復讐也然後隱之耳如當復讐雖殺之可也如不當復讐紀乃天子所封雖但逐之亦不可也如當復讐雖不葬焉可也如不當復讐雖但逐而葬之亦不可也夫復讐者惟其父見殺于人其子不與共戴天者也據公羊言今已九世又非親殺之不過譖于天子耳使有是事亦不當復讐況無是事乎穀梁曰外夫人不書葬此其書葬何也吾女也失國故隱而葬之春秋垂戒之書也隱而葬之何益于世乎冬公及齊人狩于禚公羊曰公曷為與微者狩齊侯也齊侯則其稱人何諱與讐狩也前此者有事矣後此者有事矣則曷為獨于此焉譏于讐者將一譏而已故擇其重者而譏焉莫重乎其與讐狩也於讐者則曷為將一譏而已讐者無時焉可與通通則為大譏不可勝譏故將一譏而已其餘從同同苟如公羊論輕重莫重乎主齊之婚穀梁曰齊人者齊侯也其曰人何也卑公之敵所以卑公也何為卑公也不復讐而怨不釋刺釋怨也劉氏曰穀梁說與公羊相似非也春秋不待貶絶而見罪惡若實齊侯書之乃宜矣何更之乎五年夏夫人姜氏如齊師穀梁曰師而曰如衆也婦人既嫁不踰竟踰竟非禮也如往也姜氏往齊師而已以如為衆豈不反晦經㫖哉其曰婦人既嫁不踰竟辨見二年姜氏㑹齊侯于禚秋郳黎來來朝左氏曰名未王命也未詳是否公羊曰倪者何小邾婁也小邾婁則曷為謂之倪未能以其名通也案莊公時未有小邾之名襄二年經書小邾說者以為即郳國從齊桓尊周命為小邾子耳穀梁曰郳國也黎來微國之君未爵命者也此說得之而未詳冬公㑹齊人宋人陳人蔡人伐衛公羊曰此伐衛何納朔也曷為不言納衛侯朔辟王也案春秋比事見義先書伐衛繼書王人救衛繼書朔入衛又書公至自伐衛在朔入之後則其為納朔而拒王命也明矣何必于此先言納衛侯朔哉春秋書之正著諸侯抗王命之罪何必為此辟王之辭哉穀梁曰是齊侯宋公也其曰人何也人諸侯所以人公也其人公何也逆天王之命也劉氏曰非也安知其不是微者乎若實齊侯宋公而謂之人即實微者又何以書乎邦衡胡氏曰案經但書伐衛即不見天子廢朔之意明年方書王人救衛安可謂此年伐衛為逆天王命哉六年春王正月王人子突救衛公羊曰王人者何微者也子突者何貴也貴則其稱人何繫諸人也曷為繫諸人王人耳葉氏曰公羊以子突為王子突為其救衛不克故貶而繫諸人若微者然經未有以微者貶王子者也子突字也穀梁曰王人卑者也稱名貴之也善救衛也救者善則伐者不正矣案卿稱爵大夫稱字士稱名今王人士也苟稱名何貴之有救衛雖正然義則未盡也何善之有夏六月衛侯朔入于衛左氏曰君子以二公子之立黔牟為不度矣夫能固位者必度其本末而後立𠂻焉不知其本不謀知本之不枝弗强詩云本枝百世劉氏曰朔比衎黔牟比剽兩兩相似而左氏君剽而退黔牟存朔而絶衎賞罰無章莫此甚焉愚謂黔牟立七年矣未聞有大惡也特為朔所逼耳左氏豈以成敗論人乎公羊曰衛侯朔何以名絶曷為絶之犯命也其言入何篡辭也趙氏曰案失地之君例名公穀不可别為義也穀梁曰其不言伐衛納朔何也不逆天王之命也入者內弗受也何用弗受也為以王命絶之也朔之名惡也朔入逆則出順矣朔出入名以王命絶之也案前書齊宋蔡伐衛矣此書朔入于衛則伐衛納朔明矣此何必再言伐衛納朔乎且逆天王之命已明何在不言伐衛納朔而見逆天王之命乎又衛侯朔既入衛矣何言內弗受乎出順之說尤無意義秋公至自伐衛公羊曰曷為或言致㑹或言致伐得意致㑹不得意致伐衛侯朔入于衛何以致伐不敢勝天子也劉氏曰公羊曰得意致㑹不得意致伐何休又說二國一國之别皆詭亂不經有為而為非凡例之體故不詰也葉氏曰彼㑹而致伐者因伐而㑹伐在㑹前故致伐伐而致㑹者㑹而謀伐伐在㑹後故致㑹若有當致而或不告廟不書或史失之而不得書則經何以見之乎公穀每曲為生義直以意億之而卒無可通者可以知其言之無據也穀梁曰惡事不致此其致何也不致則無用見公之惡事之成也春秋所致皆惡事也特惡有輕重耳茍惡事不致則凡致者盡善乎況其下文自言不致則無以見公之惡事之成則惡事固當致也此其言自相反矣冬齊人來歸衛俘左氏曰齊人來歸衛寶文姜請之也葉氏曰經言衛俘傳作衛寶公穀亦作衛寶故杜預遂疑經誤案經書齊侯來獻戎捷楚宜申來獻捷傳以捷為俘則經蓋以俘為寶以捷為囚當從經不必改俘為寶也此安知文姜所請哉亦不足以為義齊氏曰左氏理甚迂公羊曰此衛寶也則齊人曷為來歸之衛人歸之也衛人歸之則其稱齊人何讓乎我也其讓乎我奈何齊侯曰此非寡人之力魯侯之力也啖氏曰春秋無有改其事實而為義者此乃覩文見意何煩公羊曲說乎劉氏曰齊人歸俘謂之衛俘俘本衛物也事類本明無足可疑豈以謂之衛寶則必衛人歸之且經書齊人來歸至明白矣又何云乎穀梁曰以齊首之分惡於齊也使之如下齊而來我然惡戰則殺矣陸氏曰穀梁以為以齊首之此乃直書其事有何分惡乎劉氏曰固齊人歸我耳何分之有愚謂穀梁不識其文則史之義遂謂孔子别立文辭本衛歸俘而加之于齊也此蓋公羊之餘論而穀梁竊之以演其辭者也七年春夫人姜氏㑹齊侯于防左氏曰文姜㑹齊侯于防齊志也淫亂之人誰為辨齊志乎魯志乎左氏蓋執㑹及二字之例以求經故為此言使此㑹為魯志經可書夫人姜氏及齊侯于防乎穀梁曰婦人不㑹㑹非正也齊侯姜氏之惡極罪大不待穀梁之說然後知其非正也夏四月辛卯夜恆星不見夜中星隕如雨左氏曰恆星不見夜明也星隕如雨與雨偕也啖氏曰星隕如雨奔流如雨之多詩曰有女如雲李陵曰謀臣如雨皆言多耳三傳不達此理故悉穿鑿陳嶽氏曰苟有雲雨則晦冥曷以辨其星歟雨歟是狀如雨非雨明矣公羊曰列星不見則何以知夜之中星反也如雨者何如雨者非雨也非雨則曷為謂之如雨不修春秋曰雨星不及地尺而復君子修之曰星霣如雨何以書記異也劉氏曰公羊說不修春秋曰雨星不及地尺而復君子修之曰星隕如雨此妄語也若令不修春秋其文如此仲尼何得改之乎若言雨星非必衆星也今言如雨則衆星必也是仲尼橫設不實之事以迷罔後人也又仲尼不書尺而復若實尺而復無為不書若尺而復不足書如雨亦不足書何者如何休之言以隕則為異耳穀梁曰恆星者經星也日入至于星出謂之昔不見者可以見也其隕也如雨是夜中與春秋著以傳著疑以傳疑中之幾也而曰夜中著焉爾何用見其中也失變而録其時則夜中矣其不曰恆星之隕何也我知恆星之不見而不知其隕也我見其隕而接于地者則是雨說也著于上見于下謂之雨著于下不見于上謂之隕豈雨說哉劉氏曰穀梁以如猶而也言星隕且雨也非也春秋記星隕為異耳夜中而雨何足記乎又曰著于上見于下謂之雨以言雨螽則可也以言雨說則何著于上之有又曰著于下不見于上謂之隕以言隕石可也以言星隕則何不見于上之有秋大水無麥苗左氏曰秋無麥苗不害嘉穀也劉氏曰大水無麥苗此聖人為記災而書耳言其不害嘉穀何益于世教乎且隱元年例曰凡物不為災不書今不害嘉穀是水不為災也水不為災不應書大水也大水矣無麥苗矣而猶謂不害嘉穀妄也貫道王氏曰麥者五穀之一詩曰貽我來牟謂之非嘉穀可乎公羊曰無苗則曷為先言無麥而後言無苗一災不書待無麥然後書無苗何以書記災也孫氏曰案傷一穀亦書定元年隕霜殺菽是也劉氏曰若春秋一災不書豈愛民之謂乎計公羊之意謂當是時麥强而苗弱苗當先敗麥當後敗不當先書無麥也審如公羊之言一災不書待無麥乃書無苗則何不曰無苗麥乎穀梁曰髙下有水災曰大水無麥苗麥苗同時也如穀梁言麥苗同時當在春末夏初是為三四月穀梁常以夏正言之春秋不應指春末夏初為秋也設如杜預輩稱秋七月為夏五月又未知春秋所書之秋定為七月否也若秋為八月九月則當為六七月而麥苗同時之說又有所不通矣況七月為七月八月為八月其數月未嘗改乎麥苗本一物乎高下有水辨見桓元年八年春王正月師次于郎以俟陳人蔡人公羊曰次不言俟此其言俟何託不得已也趙氏曰此直書其事有何託乎劉氏曰仲尼豈為不實無狀以迷人哉觀聖人諱國惡者有之矣亦不從而為之辭而已夫從而為之辭者小人之事也何以辱春秋甲午治兵左氏曰治兵于廟禮也劉氏曰非也治兵非其時何謂禮乎且若中禮則是常事亦何足書乎又言于廟夫廟中嚴矣非治兵之地若師之出先謀于廟是則可爾於是習號令鐘鼓丁寧旌旗不乃太瀆乎又郎者魯邑師次于邑則其無廟明矣是為己次于郎又復入城治兵于廟者乎公羊曰祠兵者何出曰祠兵入曰振旅其禮一也皆習戰也何言乎祠兵為久也曷為為久吾將以甲午之日然後祠兵于是劉氏曰非也魯欲以夏月與鄰國之齊共伐郕何至正月出師自取淹留乎穀梁曰出曰治兵習戰也入曰振旅習戰也治兵而陳蔡不至矣兵事以嚴終故曰善陳者不戰此之謂也善為國者不師善師者不陳善陳者不戰善戰者不死善死者不亡劉氏曰穀梁曰治兵而陳蔡不至矣兵事以嚴終其意謂春秋多之非也軍出必治兵自有常地矣魯人先出兵而後治治又非其常地故春秋記其非常耳春秋非教戰之書貴其善陳不戰也愚案經文本魯出師俟陳蔡與共伐他國耳今穀梁乃曰治兵而蔡不至又謂善陳者不戰則是治兵所以拒陳蔡也違經逺矣此蓋不顧下文有圍郕之事耳夏師及齊師圍郕郕降于齊師左氏曰夏師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德德乃降姑務修德以待時乎秋師還君子是以善魯莊公東萊吕氏曰齊魯同伐郕而齊專有其功人情之所必較也莊公斂兵不較罪已而不罪齊魯莊之視齊襄乃君父不戴天之讐義所必較者也反弱懦畏怯俯首為讐人之役坐視其取郕而不較者特畏其强而不較耳姑托罪已修德之辭以自解于衆豈其本心哉趙氏曰勞師㑹讐何善之有且齊强魯弱自當不敢爭也愚謂此舉師也非公也左氏謂仲慶父請伐齊師而公不可皆妄也公羊曰成者何盛也盛則曷為謂之成諱滅同姓也曷為不言降吾師辟之也啖氏曰案郕師實降于齊耳何諱滅乎迂僻甚矣陳嶽氏曰苟曰滅同姓改盛為成則春秋內諱多矣焉有易其地名而為諱邪劉氏曰實共圍盛改謂之成實滅其國改謂之降實降于魯又獨言齊皆非聖人之文也凡諱國惡亦在可諱之域不在不可諱之域如改白為黑以已為人豈獨非道亦不可傳世矣春秋之書要在無傳而自通非曲經以合傳也且所貴聖人之文者不貴其革易名字以惑人也如必革易名字而後可見褒貶諱避者誰不能為春秋哉穀梁曰其曰降于齊師何不使齊師加威于郕也劉氏曰穀梁曰不使齊師加威于郕故使若齊無武功而郕自降審如此春秋為縱失齊師之惡也秋師還公羊曰還者何善辭也此滅同姓何善爾病之也曰師病矣曷為病之非師之罪也劉氏曰凡春秋所譏茍滅國伐邑誰則非君之罪乎既曰君罪師則無罪何至于此獨以為非師之罪乎則彼不記師還者皆非君罪而師罪乎愚謂公羊不識聖人書師還之㫖遂以師還為善辭豈知言哉穀梁曰還者事未畢也遁也劉氏曰穀梁曰還者事未畢也遁也云欲避滅同姓之國示不卒事非也郕雖降齊國實未滅又穀梁曰云不使齊加威郕然則加威于郕者獨齊師耳魯故無罪豈可謂滅同姓哉愚謂郕降于齊矣何為事未畢邪無功而還何謂遁邪冬十有一月癸未齊無知弒其君諸兒穀梁曰大夫弒其君以國氏者嫌也弒而代之也趙氏曰未命之卿例不書氏既不書氏自然以名連國强說嫌理迂僻劉氏曰宋萬亦豈弒而代之者乎公子商人亦豈非弒而代之者乎九年春齊人殺無知左氏曰初公孫無知虐于雍廩春雍廩殺無知案經書齊人殺無知討賊之辭也弒君之賊人人欲殺之其幸而免者人力不足耳若但曰無知虐于雍廩雍廩殺無知則惡之者獨雍廩之人乎豈足以訓穀梁曰無知之挈失嫌也稱人以殺大夫殺有罪也劉氏曰非也無知弒君以代其位又上有齊人下有無知明無知者齊人之賊亦不煩再氏國爾非謂失嫌故挈之也而以殺大夫例解之似仍失指公及齊大夫盟于蔇公羊曰然則何以不名為其諱與大夫盟也使若衆然劉氏曰若諱與大夫盟沒公足矣今不沒公非諱與大夫盟也愚謂公羊既言齊無君自然與大夫盟矣乃曰使若衆然則是齊本有君以公諱與大夫盟而書大夫使若衆然不可曉也穀梁曰公不及大夫大夫不名無君也盟納子糾也不日其盟渝也當齊無君制在公矣當可納而不納故惡內也有父之讐而安其後嗣穀梁乃曰當可納而不納為惡內豈知言哉夏公伐齊納子糾齊小白入于齊公羊曰納者何入辭也其言伐之何伐而言納者猶不能納也糾者何公子糾也何以不稱公子君前臣名也齊小白入于齊曷為以國氏當國也劉氏曰公羊曰納者入辭也非也納者納辭耳得入不得入未可知也非入辭也又曰伐而言納者猶不能納也亦非也有伐而納者有圍而納者有未嘗伐未嘗圍而納者各據實書之耳又云糾不稱公子君前臣名也非也糾失國在魯本非魯臣何故責以君前臣名乎又曰以國氏者當國也非也況言當國之說皆無通例不可條貫吾于州吁弒其君既言之矣愚謂子糾不稱國者蒙上伐齊之文也小白不稱子故上書國而下書名國氏當國之說果何義乎穀梁曰當可納而不納齊變而後伐故乾時之戰不諱敗惡內也大夫出奔反以好曰歸以惡曰入齊公孫無知弒襄公公子糾公子小白不能存出亡齊人殺無知而迎公子糾于魯公子小白不讓公子糾先入又殺之于魯故曰小白入于齊惡之也案莊公忘父之讐以納其子為德其惡大矣乃不以為言而曰糾當可納而不納齊變而後伐乾時之戰故不諱敗惡內也如穀梁之說則是聖人但責其失機㑹耳他無大義也豈知言哉八月庚申及齊師戰于乾時我師敗績公羊曰內不言敗此其言敗何伐敗也曷為伐敗復讐也此復讐乎大國曷為使微者公也公則曷為不言公不與公復讐也曷為不與公復讐復讐者在下也劉氏曰非也若以復讐者在下故不言公春秋豈奪人子意哉臣有善君行之則君善也故書曰股肱良哉言一體也奈何以復讐者在下則不以其美歸公哉且謀之者臣也行之者君也臣謀而君不行譏君可也臣謀而君行之又欲何嫌黃氏曰小白已入公不知退以自取敗公羊反謂伐齊為復讐戴氏曰為齊主婚矣受齊送俘矣及齊圍郕矣豈今一旦背好而復讐且莊公所納者正讐人之子而名復讐可乎九月齊人取子糾殺之左氏曰鮑叔帥師來言曰子糾親也請君討之管召讐也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治于高傒使相可也公從之趙氏曰案論語云桓公殺公子糾召忽死之則知齊自殺之非魯殺之也若魯殺則當書云齊人使我殺子糾不應云取也公羊曰其取之何內辭也脅我使我殺之也其稱子糾何貴也其貴奈何宜為君者也取非內辭也直書曰取之于魯而殺之云爾于時魯師敗績懼之不暇故取子糾而魯與之也非脅我使我殺之也何以取證曰經文而已矣經書齊人取子糾殺之不曰使我殺子糾也趙氏之說足以破二傳之誤矣穀梁曰外不言取言取病內也取易辭也猶曰取其子糾而殺之云爾十室之邑可以逃難百室之邑可以隱死以千乘之魯而不能存子糾以公為病矣文當言取則曰取外不言取非義也魯納之而不能齊取而殺之魯固病矣然春秋大義則不專在魯不能存子糾也春秋上文則在于魯忘讐而納子糾此則在于齊桓之忍而殺子糾耳魯之不能存子糾其一小義也冬浚洙公羊曰洙者何水也浚之者何深之也曷為深之畏齊也曷為畏齊辭殺子糾也齊已取子糾殺之矣其曰辭殺子糾未解穀梁曰浚洙者深洙也著力不足也魯浚洙固為力不足以拒齊然春秋書之則不為此蓋治國者别有用力之地也十年春王正月公敗齊師于長勺穀梁曰不日疑戰也疑戰而曰敗勝內也穀梁見經不書齊師伐我而但言敗齊師故曰疑戰非也辨見或問二月公侵宋公羊曰曷為或言侵或言伐粗者曰侵精者曰伐戰不言伐圍不言戰入不言圍滅不言入書其重者也劉氏曰圍未必重于戰不可詳圍而略戰愚謂侵與伐各有義不可分精粗也且春秋書伐而書戰者有矣如桓十二年書及鄭師伐宋丁未戰于宋然則言戰不言伐者非也穀梁曰侵時此其月何也乃深其怨于齊又退侵宋以衆其敵惡之故謹而月之穀梁謂深其怨于齊齊退而衆其敵義雖未盡然近之矣惜乎其以時月為例也三月宋人遷宿公羊曰遷之者何不通也以地還之也子沈子曰不通者蓋因而臣之也劉氏曰公羊曰以地還之非也直宋人以其力遷宿無說還之與不還之愚案公羊解經言以地還之不識經㫖矣何氏解公羊還作繞為繞取其地又不識傳意矣其曰不通又代宋人釋所以遷宿之由其用心亦勞穀梁曰遷亡辭也其不地宿不復見也遷者猶未失其國家以往者也葉氏曰有自遷者有遷之者皆未失其國家以往者也自遷者必見其地故地遷之者以遷人為罪義不在地故不地今穀梁見宿不地遂以為失其國家而不復見謂之亡辭若然乃滅也安得為遷乎愚謂穀梁既曰未失其國家以往則非亡辭矣何為自相背哉夏六月齊師宋師次于郎公敗宋師于乘丘左氏曰公弗許自雩門竊出蒙臯比而先犯之公從之此左氏見經書公敗宋師之辭而為此詐戰之說者也辨又見長勺或問公羊曰其言次于郎何伐也伐則其言次何齊與伐而不與戰故言伐也我能敗之故言次也葉氏曰左氏言之近是矣公羊謂齊與伐而不與戰我能敗之故言次者此亦不知魯伐宋之實故也劉氏曰公羊曰我能敗之故言次也何休云二國才止次未成于伐不知二國之師進于乘丘而我能敗之邪抑又退至乘丘而我能敗之邪今推傳文及注意是自郎進至乘丘也然則郎非近邑桓十年來戰于郎何以謂之近乎圍邪彼時至郎則恐見圍此時至郎則猶未成于伐郎一地也何二三乃爾乎愚謂前書公敗齊師于長勺亦我能敗之也曷不言次乎經意本明因傳而晦此類是也穀梁曰次止也畏我也不日疑戰也疑戰而曰敗勝內也齊師宋師次于郎則是欲伐我也而曰畏我非也畏我則不與師矣疑戰敗見敗齊師于長勺秋九月荆敗蔡師于莘以蔡侯獻舞歸公羊曰荆者何州名也州不若國國不若氏氏不若人人不若名名不若字字不若子蔡侯獻舞何以名絶曷為絶之獲也曷為不言其獲不與夷狄之獲中國也劉氏曰公羊以謂荆者州名也非也楚之以荆號非一日也詩云撻彼殷武奮伐荆楚非孔子改之也且楚在荆州以其强大故抑而謂之荆若荆州之地復有一國强兵則楚當有兩荆不亦妄乎又徐亦夷也徐在徐州又聞以州名名之則徐猶荆也可得謂徐者州之名乎又曰國不若氏亦非也甲氏潞氏同為赤狄而國殊族異故分名耳譬如漢之西域乃有三十六國總而名之謂之西域析而名之自然分别有何怪而强云進稱氏乎又曰氏不若人假令赤狄治行益修者可云晉師滅赤狄甲人乎又曰蔡侯獻舞何以名絶曷為絶獲也曷為不言其獲不與夷狄之獲中國也亦非也案公羊云秦者夷也匿嫡之名然則僖十五年秦獲晉侯何故與夷狄獲中國邪凡春秋有獲某人者有以某人歸者文自不同非一物也以理言之獲蓋暫得之以歸蓋就禽而不恥者愚謂公羊謂荆者州名是也但謂州不若國則非矣其以荆稱以楚稱春秋皆因其自稱之非孔子抑之而以荆稱之也穀梁曰荆者楚也何為謂之荆秋之也何為狄之聖人立必後至天子弱必先叛故曰荆狄之也蔡侯何以名也絶之也何為絶之獲也中國不言敗此其言敗何也中國不言敗蔡侯其見獲乎其言敗何也釋蔡侯之獲也以歸猶愈乎執也劉氏曰蔡侯何以名絶之也何為絶之獲也非也秦獲晉侯何故不名又曰中國不言敗此其言敗何中國不言敗蔡侯其見獲乎亦非也但言敗蔡師何足以見其是獲乎設直言獲蔡侯何害于義而諱獲為敗乎欲絶蔡侯自合言獲無為諱其獲以匿其惡書其名以發其獲進不成諱退不成絶徒為此紛紛也又曰以歸猶愈乎執也亦非也有執者有獲者有以歸者非一物也獲不輕於執執不重於以歸案文觀指亦可見矣陳嶽氏曰茍曰荆州名楚國名漸進之義則秦當先書曰雍吳當先書曰揚何以書秦吳也苟曰荆者狄也秦吳亦其類也顧不狄之而獨狄楚乎矧荆乃禹貢九州之名也奚謂狄乎愚謂王師敗績于茅戎聖人猶書之豈有中國而不言敗之理哉冬十月齊師滅談談子奔莒左氏曰齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至冬齊師滅談談無禮也談子奔莒同盟故也齊桓滅人之國其罪大矣而左氏為之文其過曰無禮也不可以訓其曰同盟故奔莒亦億之而已然則于經何所發明乎十有一年夏五月戊寅公敗宋師于鄑左氏曰宋師未陳而薄之敗諸鄑凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績得俊曰克覆而敗之曰取某師京師敗曰王師敗績于某孫氏曰若如左氏說不惟異端滋甚則是諸侯得以自相侵伐圍戰取滅矣葉氏曰經書公敗某師于某此內勝外之辭也傳妄以未陳為辭且魯書敗某師于某無有一書戰者豈皆未陳而敗之乎愚謂春秋惟鄭伯克段于鄢書克而已于時段出奔共曷嘗得俊哉左氏既自為之例又撰其事以實之如師未陳曰敗某師則曰宋師未陳而薄之如此類者甚多讀左氏者詳之可也辨又見十年公敗齊師穀梁曰內事不言戰舉其大者其曰成敗之也宋萬之獲也春秋書敗其師者多矣何獨于此以獲宋萬而書曰無義甚矣況左氏公羊何氏言獲宋萬乃在乘丘之役亦非此時也秋宋大水左氏曰宋大水公使弔焉曰天作淫雨害于粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也悖焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御說之辭也臧孫達曰是宜為君有恤民之心未見列國有凶稱孤而為禮者餘非本義不録公羊曰何以書記災也外災不書此何以書及我也劉氏曰非也案春秋內其國而外諸夏若水災及魯自可記魯災而已無為詳宋而略我也公羊以百二十國寶書為據故云爾非可信也陳嶽氏曰宋魯里源流既異雖大水安得相及穀梁曰外災不書此何以書王者之後也髙下有水災曰大水劉氏曰王者之後非也把亦王者之後未嘗記其災何歟又曰髙下有水災曰大水亦非也嶽之顛亦有水乎陳嶽氏曰王者之後則三恪之外諸姬皆王之後何不書之又莊二十年書齊大災齊豈王者之後也趙氏曰案外災來告則書二傳不達此義故各穿鑿耳冬王姬歸于齊公羊曰何以書過我也劉氏曰非也元年所書逆王姬及築館者皆以非常書則知常逆王姬及築館不當書故此王姬書歸而已若以為過我而書者自周之齊何乃過魯穀梁曰其志過我也若但經過則魯史不必書仲尼尤不必書矣元年王姬歸齊公羊曰我主之穀梁曰為之中者歸之也何復于此言過我乎十有二年春王正月紀叔姬歸于酅公羊曰其言歸于酅何隱之也何隱爾其國亡矣徒歸于叔爾也穀梁曰國而曰歸此邑也其曰歸何也吾女也失國喜得其所故言歸焉耳趙氏曰公穀皆云隱其失國且春秋記教跡耳豈為憂喜生文乎秋八月甲午宋萬弒其君捷及其大夫仇牧公羊曰及者何纍也弒君多矣舍此無纍者乎孔父荀息皆纍也舍孔父荀息無纍者乎曰有有則此何以書賢也何賢乎仇牧仇牧可謂不畏强禦矣穀梁曰宋萬宋之卑者也卑者以國氏及其大夫仇牧以尊及卑也仇牧間也黃氏曰杜氏譏仇牧不知警公羊賢其不畏强禦穀梁嘉其衛君諸家或以書宋萬為國氏或以書及為壯其節又或以為纍議論紛紛蓋聖人不過書其實何有凡例若書萬而不書宋則為何國之事乎既弒其君又殺其大夫不書及則將何以為文弒逆如此尚待義例而後見其罪也哉冬十月宋萬出奔陳左氏曰羣公子奔蕭公子御說奔亳南宫牛猛獲帥師圍亳冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立桓公猛獲奔衛南宫萬奔陳以乘車輦其母一日而至宋人請猛獲于衛衛人欲勿與石祁子曰不可天下之惡一也惡于宋而保于我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之亦請南宫萬于陳以賂陳人使婦人飲之酒而犀革裹之比及宋手足皆見宋人皆醢之果醢萬經當書曰宋人殺萬宋之臣子特有緩討賊之罪可免逸賊之罪矣若殺之于陳經猶當書如衛人殺州吁于濮之法今經但書曰宋萬出奔陳則傳不合于經矣十有三年春齊侯宋人陳人蔡人邾人㑹于北杏左氏曰㑹于北杏以平宋亂存耕趙氏曰北杏之㑹齊欲圖伯也傳謂平宋亂是時宋萬已奔御說已立又何亂之可平哉愚謂左氏見經此後有伐宋事故附㑹耳穀梁曰是齊侯宋公也其曰人何也始疑之何疑焉桓非受命之伯也將以事授之者也曰可矣乎未乎舉人衆之辭也存耕趙氏曰案經書人𫝊或以為君信經可也愚謂人宋公以稱疑聖人肯為之乎不知陳蔡邾為君邪為臣邪夏六月齊人滅遂左氏曰㑹于北杏遂人不至北杏之㑹四國之人耳諸侯之不至者固多齊之滅遂未必以此蓋滅國作威求伯諸侯耳穀梁曰遂國也其不日微國也冬公㑹齊侯盟于柯公羊曰何以不日易也其易奈何桓之盟不日其㑹不致信之也其不日何以始乎此莊公將㑹乎桓曹子進曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾于是㑹乎桓莊公升壇曹子手劒而從之管子進曰君何求乎曹子曰城壞壓竟君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟已盟曹子摽劒而去之要盟可犯而桓公不欺曹子可讐而桓公不怨桓公之信著乎天下自柯之盟始焉趙氏曰案桓公未嘗侵魯地及盟後未嘗歸魯田其事既妄又不可訓陳嶽氏曰莊二十二年防之盟僖九年葵丘之盟皆方伯之際何為書日桓既卒僖二十八年溫之盟宣七年黑壤之盟又何不書日也則知盟㑹不以日為義例明矣存耕趙氏曰長勺之役劌與莊公言戰如彼詳緩觀社之行劌諫莊公之辭根據義理必非懷利以僥幸者且乾時敗績安有城壞壓竟之事汶陽之取何所據而云爾邪木訥趙氏曰經不書歸田況汶陽之田至鞍之戰而後能取此無足據者蘇氏亦嘗謂此春秋以後好事者之說也穀梁曰曹劌之盟也信齊侯也桓盟雖內與不日信也辨見公羊三傳辨疑卷五
