body:
  text: 三傳辨疑卷十六元程端學撰襄公十有七年宋人伐陳左氏曰宋莊朝伐陳獲司徒卬卑宋也獲司徒春秋當書今不書傳妄也夏衛石買帥師伐曹左氏曰取重丘取邑必書今不書傳妄也秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防左氏曰齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死獲臧堅不見於經此其可疑者也宋華臣出奔陳左氏曰宋華閲卒華臣弱臯比之室使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後左師懼曰老夫無罪賊曰臯比私有討於吳遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之左師為已短策苟過華臣之門必騁十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳按華臣使賊殺臯比之宰宋公怒矣左師懼矣不應無誅而遽舍之也既舍之則其事緩矣國人逐瘈狗未必敢入華臣氏使入華臣氏華臣豈不知其情而遽奔哉皆不近人情况經書華臣奔在九月而傳稱十一月當以經為正十有八年春白狄來左氏曰白狄始來莘老孫氏曰假令嘗來固亦書來爾何論始來乎公羊曰白狄者何夷狄之君也何以不言朝不能朝也劉氏曰似近之矣其實非也王者本不及夷狄豈責夷狄以行朝禮哉夏晉人執衛行人石買左氏曰執孫蒯于純留按執行人既書豈有執孫蒯而不書之理乎榖梁曰稱行人怨接於上也按石買伐曹衛之君臣皆有罪也但不當因其為使而執之爾非稱行人為怨接於上也冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊榖梁曰非圍而曰圍齊有大焉亦有病焉非大而足同與諸侯同罪之也亦病矣劉氏曰非也春秋之信史也其事則齊桓晉文其㑹則主㑹為之矣若未圍而言圍是豈得為信史哉曹伯負芻卒于師榖梁曰閔之也劉氏曰非也是亦記事而已矣何閔之有十有九年公至自伐齊公羊曰此同圍齊也何以致伐未圍齊也未圍齊則其言圍齊何抑齊也曷為抑齊為其亟伐也或曰為其驕蹇使其世子處乎諸侯之上也劉氏曰非也若諸侯實未嘗圍齊者春秋何得書之乎且春秋所謂記事之書而非記意之書豈得探意以為事哉榖梁曰春秋之義已伐而盟復伐者則以伐致盟不復伐者則以㑹致祝柯之盟盟復伐齊與曰非也然則何為以伐致也曰與人同事或執其君或取其地劉氏曰非也執君取地邾事也以伐齊致齊事也今欲以齊明邾以邾明齊乎無義以通之且書晉人執邾子責晉已明矣取邾田自漷水責魯已明矣又何不足而以齊起邾乎陳嶽氏曰伐則言伐圍則言圍各書其實既自圍至不書至自圍而曰至自伐者圍本於伐非伐何以得圍至不書圍而書伐如僖六年公㑹齊之諸侯伐鄭圍新城書公至自伐鄭不書盟而書㑹如成七年公㑹晉之諸侯救鄭盟于馬陵不書盟而書公至自㑹也存耕趙氏曰經嘗至圍矣此圍齊也何以致伐蓋始以伐齊出而終之以圍也公榖之辭求經太過取邾田自漷水公羊曰其言自漷水何以漷為竟也何言乎以漷為竟漷移也劉氏曰非也向者執邾子乃為此爾且如公羊言魯以漷自移而取田春秋乃坐其君以盜地乎何悖也榖梁曰軋辭也其不曰惡盟也按經書自漷水杜氏謂以漷水為界者得之水有委曲水勢之常無足論者榖梁以委曲為義非也夏衛孫林父帥師伐齊左氏曰晉欒魴帥師從衛孫文子伐齊晉欒魴果從孫文子伐齊經不應不書杜氏張氏以為兵并於林父亦不可據何則左氏曰欒魴帥師矣則非師少也不應晉為盟主而反并於衛晉士丐帥師侵齊至榖聞齊侯卒乃還左氏曰晉士丐侵齊及榖聞喪而還禮也按大夫帥師以侵人國不惟無王亦無諸侯也聞喪而還禮之小者也茍一以禮稱之所謂不能三年喪而緦麻是察之謂也公羊曰還者何善辭也何善爾大其不伐喪也此受命乎君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也按春秋不書常事茍大其不伐喪則春秋有不書者矣惟諸侯無王大夫無諸侯也然後書之不伐喪小善也聖人不沒人之善而書其實故并舉之以鑒後世而已榖梁曰還者事未畢之辭也受命而誅生死無所加其怒不伐喪善之也善之則何為未畢也君不尸小事臣不專大名善則稱君過則稱已則民作讓矣士丐外專君命故非之也然則為士丐者宜奈何宜墠帷而歸命乎介趙氏曰按不伐喪常禮也更待君命是詐讓小善非人臣盡忠之道也康侯胡氏使士丐未出境如是焉可也已至齊地則進退在士丐矣猶欲墠帷而歸命乎介則非古者命將不從中覆専制境外之意而況喪必不可伐非進退可疑而待請者張氏曰將在軍君命有所不受三軍之進退將實司之總殺伐之柄以臨有喪君子所不忍尚何墠帷請命以自纍其作止乎愚謂還者紀實事爾榖梁有善之則何為未畢之問其亦不達文義矣齊殺其大夫髙厚左氏曰光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市又曰書曰齊殺其大夫從君於昏也趙氏曰據左氏齊髙厚莒意恢楚郤宛等死並是兩下相殺而經以國討為文者蓋殺者皆承君命而殺之故經以纍上之辭書之傳則雜使之記意在專歸于殺者故不歸其君命耳且當據經文為正愚謂光不以大命為尊而爭位又殺父之愛姬其罪大矣而左氏但責尸諸朝為非禮失其輕重之權矣又髙厚固從君於昏然經書殺其大夫乃罪其不請於王而専殺爾非責厚從君於昏舍崔杼殺之而書國討也鄭殺其大夫公子嘉左氏曰書曰鄭殺其大夫専也此亦左氏所謂齊殺其大夫從君於昏之意叔孫豹㑹晉士丐于柯左氏曰齊及晉平盟于大隧故穆叔㑹范宣子于柯按齊及晉平經當書之如暨齊平之法今經無有左氏妄也二十年仲孫速帥師伐邾左氏曰邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之劉氏曰邾人驟至謂十五年十七年也至十九年盟于祝柯晉人執邾子又取邾田則亦既報舊怨矣何謂未報乎然則仲孫速自以他故伐邾不為報其驟至也蔡殺其大夫公子燮蔡公子履出奔楚左氏曰書曰蔡殺其大夫公子燮言不與民同欲也按為大夫而見殺於其君其為大夫可知矣然據左氏所言則是燮能棄夷即華春秋所與也安得責其不與民同欲也哉況春秋凡書殺其大夫者乃譏諸侯之無王而専殺未有責燮不與民同欲之意也陳侯之弟黃出奔楚左氏曰陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討公子黃出奔楚書曰陳侯之弟黃出奔楚言非其罪也公子黃將出奔呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也按實慶虎慶寅訴楚而楚討黃黃不應復奔楚然則左氏所叙皆妄也且兄弟無可去之義陳侯不道力諫俟死而已今棄之而逃之夷狄豈無罪哉況春秋凡書弟者譏其兄不兄弟不弟耳左氏以黃得稱弟之故而許其非罪非也且左氏自言虎寅畏黃之逼則黃亦専國者也未可以無罪言也榖梁曰諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也諸侯之尊弟兄雖不得以屬通然以情言則弟也先儒所謂以重書者是也非本疏之而今親之以見親而奔之之惡也叔老如齊左氏曰齊子初聘于齊禮也左氏妄以禮許人由不知非禮之禮故也季孫宿如宋左氏曰季武子如宋報向戍之聘也禇師段逆之以受享賦棠棣之七章以卒宋人重賂之歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也按向戍聘在十五年今五年矣若報向戍之聘何其遲之至今耶二十有一年春王正月公如晉左氏曰公如晉拜師及取邾田也按圍齊取邾田在十八年十九年至今三四年矣季孫宿嘗往拜師矣不應今復往拜師及取邾田也邾庶其以漆閭丘來奔左氏曰夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功將謂由已一也信由已一而後功可念也庶其非卿也以地來雖賤必書重地也趙氏曰按再命大夫接於魯者悉書名鄭宛莒慶秦術之類是也莘老孫氏曰邾小國其大夫未嘗見經而庶其得書也者以其以邑來奔不書其名則不知為誰也春秋小國大夫奔叛類皆書名左氏公羊以為重地按魯受叛人其罪大矣何謂重地而名之乎葉氏曰左氏以邾庶其及莒牟夷邾黑肱為三叛人書名邾莒雖小國再命之大夫自得以名見莒有慶有拏邾有畀我有快皆非以地叛者何謂而亦名也夫名不名春秋固有常法大夫而以其邑叛此與孫林父晉趙鞅荀寅士吉射何以異公羊曰邾婁庶其者何邾婁大夫也邾婁無大夫此何以書重地也劉氏曰邾婁無大夫非也即令賤竊邑來奔不可但云邾人故須著見其名示有以懲勸也辨又見左氏榖梁曰以者不以者也來奔者不言出舉其接我者也漆閭丘不言及大小敵也不言出不言及皆文法不得言爾非接我與小大敵也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任左氏曰錮欒氏也辨見沙隨之㑹公羊曰十有一月庚子孔子生何氏曰左氏經無此言則公羊從後記之榖梁曰庚子孔子生辨見公羊二十有二年冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨左氏曰秋欒盈自楚適齊晏平仲言於齊侯曰商任之㑹受命於晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣冬㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼邦衡胡氏曰欒盈之奔未甚於趙鞅之叛不錮趙鞅而再錮欒盈此左氏之可疑晉為伯主兩合十二國之君而制一奔臣此理之必不然者然則㑹于商任沙隨何為哉齊平故也自諸侯圍齊之後至澶淵之㑹而齊始平故商任沙隨齊侯與焉則諸侯之㑹以齊故爾愚謂若據左氏二十一年春商任之㑹嘗錮欒盈矣齊初服晉不應背盟納盈藉使納之不應但為㑹錮盈而無相責之事何不取盈而殺之乎今考之於經二十三年夏復入于晉而不言自齊亦不言自楚豈左氏見經不言自楚而疑其自齊故為此言以實之歟不可考矣及欒盈入于晉左氏又云齊侯媵晉女以藩載盈納諸曲沃復取之附於本義者以其叙此事頗詳也非自背其說也在采者擇焉楚殺其大夫公子追舒左氏曰楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南於朝轘觀起於四竟子南之臣謂棄疾請徙子尸於朝曰君臣有禮唯二三子三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾弗忍也遂縊而死使觀起有寵於子南有馬數十乘未有大罪未至於討也借使可討何為遽及令尹子南乎且殺其父而謀於其子子亦坐視其父之見殺此人情之不然者也使子南無罪棄疾當告於其父而逃之如其有罪而君殺之不可曰棄父事讎也舜殺鯀而禹臣之古有是事矣左氏之事揆之人情既不合質之理義又不安焉可遽信也哉二十有三年夏邾畀我來奔公羊曰邾婁畀我者何邾婁大夫也邾婁無大夫此何以書以近書也劉氏曰此文過飾非之辭非要言也陳殺其大夫慶虎及慶寅左氏曰陳侯如楚公子黃訴二慶於楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黃君子謂慶氏不義不可肆也故書曰惟命不于常劉氏曰慶氏以陳叛役人相命各殺其長然則何以不曰陳人殺慶虎邪愚謂果慶氏以陳叛又屈建從陳侯圍陳二者皆目之大者經何以不書而獨書陳殺慶虎慶寅之事乎如二慶果叛經當言陳人殺慶虎慶寅若晉人殺欒盈之類不得言殺其大夫也然則左氏未可據也榖梁曰稱國以殺罪纍上也及慶寅慶寅纍也稱及猶言城諸及防之類也非纍也其曰稱國以殺辨見僖十年晉欒盈復入于晉入于曲沃公羊曰曲沃者何晉之邑也其言入于晉入于曲沃何欒盈將入晉晉人不納由乎曲沃而入也劉氏曰非也若盈能入晉禍已亟矣且何能勿納乎夫盈之不單身入晉審也茍終不能入晉則雖由乎曲沃亦何能入乎然則曲沃之士衆以入者也春秋宜先明其復入曲沃乃後言其入于晉今何故反顛倒之乎按盈入于晉晉人不納盈為未嘗得入也春秋不當書入矣由乎曲沃而入是得入也春秋當書入矣不當書而書當書而不書是何謂春秋乎八月叔孫豹帥師救晉次于雍榆左氏曰叔孫豹帥師救晉次于雍榆禮也救晉可謂禮也次于雍榆而不進亦可謂之禮乎公羊曰曷為先言救而後言次先通君命也劉氏曰非也大夫受命而出豈有君命不通哉何必為此文乎葉氏曰救而言次者傳以先通君命為之說且大夫盟㑹征伐無非將其君命者尚不先通況救以赴急為義而待先通乎蓋傳誤以為惡其不果於救而意之也榖梁曰言救後次非救也意近似而辭未瑩冬十月乙亥臧孫紇出奔邾左氏曰初臧宣叔娶于鑄生賈及為而死繼室以其姪穆姜之姨子也生紇長於公宫而姜氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請茍守先祀無廢二勳敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰母或如東門遂不聽公命殺嫡立庶盟叔孫氏也曰母或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎非本義不録榖梁曰其日正臧孫紇之出也晉人殺欒盈左氏曰書曰晉人殺欒盈不言大夫言自外也凡書殺其大夫者譏其無天子之命而専殺股肱之臣也此則作亂之賊人得而殺之故曰晉人殺欒盈與州吁無知等爾左氏以自外而不言大夫末矣先儒謂欒盈出奔楚當絶又謂已非晉大夫者又謂絶其君臣之稱者皆習於左氏公羊之說不之審者也公羊曰曷為不言殺其大夫非其大夫也辨見左氏榖梁曰惡之弗有也此論類公羊而尤淺近二十有四年冬楚子蔡侯陳侯許男伐鄭左氏曰楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉子太叔戒之曰大國之人不可與也對曰無有衆寡其上一也太叔曰不然部婁無松柏二子在幄坐射犬于外既食而後食之使御廣車而行已皆乘乘車將及楚而後從之乘皆踞轉而鼓琴近不告而馳之皆取胄於櫜而胄入壘皆下搏人以投收禽挾囚弗待而出皆超乘抽弓而射既免復踞轉而鼓琴曰公孫同乘兄弟也胡再不謀對曰曩者志入而已今則怯也皆笑曰公孫之亟也楚子自棘澤還使薳啓疆帥師送陳無宇劉氏曰左氏曰諸侯還救鄭然則何以不書於經邪諸侯相㑹而救患者義也春秋豈諱之哉且必若云救許救徐何以得書也陳針宜咎出奔楚左氏曰陳人復討慶氏之黨針宜咎出奔楚以二十三年左氏書二慶事觀之此亦不可據也二十有五年夏五月乙亥齊崔杼弒其君光榖梁曰莊公失言淫於崔氏按春秋書崔杼専權莊公悖亂其事詳矣而榖梁以失言為說陋矣公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕伯薛伯杞伯小邾子于夷儀左氏曰晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之使叔向告於諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣劉氏曰左氏有晉侯伐齊慶封如師之文而經無之何邪又言齊人賂晉侯及其六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂是亂也亦不譏何邪杜氏曰不譏受賂者齊有喪師自宜退非也若齊侯以壽沒師退可也今弒其君為惡大矣何故退乎假使晉遂討齊破其城殺其賊汙其宫未可謂之伐喪也且夫弒君而謂之伐喪諸侯其無討賊者矣葉氏曰夷儀之㑹經本不言伐齊使果為報朝歌之役而以殺其君為解且以賂免則諸侯得無譏乎杜預以為齊有喪自宜退尤非是夫弒君不討而謂之不伐喪則凡弒者皆可以喪免之矣據十四年經書衛侯衎出奔齊此獻公為孫林父所逐而立剽也二十三年書齊侯伐衛遂伐晉是時衎猶在齊宜為伐剽而晉有黨焉故明年為夷儀之㑹衛侯亦與夷儀衛地則晉必有謀衛者而未成故至是又㑹傳言晉侯受齊賂使魏舒宛沒逆衛侯則晉復變而與衎矣後三月所以遂見衛侯衎入于夷儀此雖寧喜之志要之晉為再㑹皆為謀衛何朝歌之報哉崔杼自負弒君之罪聞㑹懼討因以許復衛侯而用賂此經所以但書㑹蓋本無伐事也崔杼之賂雖志在懼討而諸侯本不以討賊而㑹所以經亦不得而書也六月壬子鄭公孫舍之帥師入陳左氏曰陳侯扶其太子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待于朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還劉氏曰左氏曰陳侯免擁社使男女别而纍以待於朝子展執縶而見子美八數俘而出祝祓社司徒致民司馬致節司空致地乃還若是則陳已服罪矣何為其冬公孫夏復帥師而伐陳乎且數俘而出是無獲虜也則子産何用獻捷乎獻捷者俘獲也何以知之哉成二年傳曰蠻夷戎狄則有獻捷兄弟甥舅告事而已不獻其功今傳謂子産獻捷則非告事矣如曰數而出是安得捷而獻歟八月己巳諸侯同盟于重丘左氏曰秋七月同盟于重丘齊成故也按左氏言齊成而同盟固已過矣然猶未明言齊之與盟也及杜氏解傳則曰伐齊而稱同盟以明齊亦與盟也夫經於夷儀之㑹列序諸侯之名至此則書諸侯同盟于重丘前目後凡至明且約豈有齊人與盟之事哉伐齊之事左氏附㑹之言也而杜氏又增益之然杜氏解經則又曰夷儀之諸侯也何其自相悖哉衛侯入于夷儀左氏曰晉侯使魏舒宛沒逆衛侯將使衛與之夷儀崔子止其帑以求五鹿按寧喜弒剽納衎晉嘗執之矣使晉果迎衛侯不應執喜也公羊曰陳儀者何衛之邑也曷為不言入于衛諼君以弒也劉氏曰非也衎雖失位非剽臣也剽雖得國非衎君也春秋豈謂衎為諼君乎哉何休又謂衎不能自復遂詐為剽臣此非人之情何有此事哉入于陳儀者猶突入于櫟公在鄆爾不須多疑而更紛紛也十有二月吳子遏伐楚門于巢卒左氏曰十二月吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒莘老孫氏曰如吳子遏者蓋其行將以伐楚而道行過巢巢為楚之與國於是以巢之門而卒故曰門于巢卒也若吳實為巢人傷之死則經書之足以為戒見其輕身以侵伐而取死春秋惟魯事有諱於諸侯又何擇焉愚謂經言吳子門于巢而卒其義本明而傳以為射之而卒大凡左氏之妄必撰其事以實之人惡得不信若莘老道行過巢之說乃謂巢在淮西恐不若貫道所謂楚城門者為近似也公羊曰門于巢卒者何入巢之門而卒也吳子謁何以名傷而反至乎舍而卒也使傷而反至乎舍而卒不在書名而見義餘見榖梁榖梁曰以伐楚之事門于巢卒也于巢者外乎楚也門于巢乃伐楚也諸侯不生名取卒之名加之伐楚之上者見其以伐楚卒也見其以伐楚卒何也古者大國過小邑小邑必飾城而請罪禮也吳子謁伐楚至巢入其門門人射吳子有矢創反舍而卒古者雖有文事必有武備非巢之不飾城而請罪非吳子之自輕也趙氏曰此與七年鄭伯髠頑如㑹卒于操文義正同皆以便文耳公榖之說非也愚謂非巢之不飾城而請罪亦不在書名以見之且使大國過也國之小邑人名為其主守土豈可無罪而請罪哉二十有六年春王二月辛卯衛寧喜弒其君剽左氏曰書曰寧喜弒其君剽言罪之在寧氏也按寧喜實弒其君非歸罪於寧氏而加之弒也弒君之義大矣而左氏之言如此亦可謂不知言矣榖梁曰此不正其曰何也殖也立之喜也君之正也陳嶽氏曰夫臣弒君人倫之至惡凡稱國人弒君國人無道也稱臣稱子以弒臣子無道也榖梁謂為正不書日噫謂之弒君焉有正不正邪日不日邪愚謂以日月為例其弊至此讀者可以少悟矣衛孫林父入于戚以叛左氏曰孫林父以戚如晉書曰入于戚以叛罪孫氏也臣之祿君實有之義則進否則奉身而退専祿以周旋戮也使林父以戚如晉經當書曰孫林父以戚入于晉今惟傳書晉戍三百人亦無足信夫晉受叛人之邑其罪若何而經不書邪左氏本謂林父以戚如晉而春秋改其文曰入于戚以叛為専罪林父而不責晉夫盜人之物者盜固罪也其受盜之物者獨無罪歟左氏又曰臣之祿君實有之義則進否則奉身以退謂林父専祿以周旋此義施之常人則可林父逐衛侯衎而衎入林父畏誅而叛非特專祿而叛也甲午衛侯衎復歸于衛左氏曰甲午衛侯入書曰復歸國納之也假令非國納不書曰復歸乎此皆一字褒貶之弊而不究一句大旨一事大體者也公羊曰此諼君以弒也其言復歸何惡剽也曷為惡剽剽之立於是未有說也然則曷為不言剽之立不言剽之立者以惡衛侯也陳嶽氏曰三傳不考經意曲立其辭其理多失愚謂諼君以弒辨見衛侯入夷儀矣所謂復歸者復歸于衛紀實事也何惡剽之有篡立固可惡也然復歸二字豈足以見惡剽哉經不言剽之立或魯史所無聖人不得而益也夫衛侯不君固可惡也然不言剽之立豈足以見惡衛侯之實哉此皆推測之論榖梁曰日歸見知弒也按經明書衛侯入于夷儀而寧喜弒其君剽衛侯衎復歸于衛矣雖不日歸亦見知弒也不特知弒也實使之弒也夏晉侯使荀吳來聘左氏曰衛人侵戚東鄙孫氏訴于晉晉戍茅氏殖綽伐茅氏殺晉戍三百人孫蒯追之弗敢擊文子曰厲之不如遂從衛師敗之圉雍鉏獲殖綽復訴于晉晉人為孫氏故召諸侯將以討衛也夏中行穆子來聘召公也按左氏曰晉侯使魏舒宛沒逆衛侯將使衛與之夷儀則是晉主將衎也何為復戍衛茅氏而衛有殺晉戍三百人之事乎是其自相戾也公㑹晉人鄭良霄宋人曹人于澶淵左氏曰六月公㑹晉趙武宋向戍鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏趙武不書尊公也向戍不書後也鄭先宋不失所也啖氏曰蜀之㑹書楚公子嬰齊澶淵之㑹書鄭良霄左氏言澶淵之㑹趙武不書尊公也如若此良霄何以不尊公乎蓋時㑹者非趙武别是未命之卿耳而左氏曲解之劉氏曰此皆不足信於經無以見之愚謂經書㑹爾不書伐衛也不書取衛西鄙也夫取衛西鄙懿氏六十以與孫林父是黨叛也其罪若何而經不書邪鄭加宋上則鄭為卿宋為微者其義本明而左氏以為宋後至鄭不失所茍凡先至者即書于上則邾莒小國可以冠齊宋也晉人執衛寧喜左氏曰於是衛侯㑹之晉人執寧喜北宫遺使女齊以先歸衛侯如晉晉人執而囚之於士弱氏秋七月齊侯鄭伯為衛侯故如晉晉侯兼享之晉侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不二也國子使晏平仲私於叔向曰晉君宣其明德於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告晉侯晉侯言衛侯之罪使叔向告二君國子賦轡之柔矣子展賦將仲子兮晉侯乃許歸衛侯劉氏曰左氏云使女齊以先歸若實爾者經何故不云以歸乎愚謂經書晉執衛寧喜事在秋而傳為在夏傳謂北宫遺使女齊以先歸杜氏解女齊司馬侯歸晉而後告諸侯故經書在秋皆不通之論蓋告諸侯者必曰某月某日執衛寧喜豈有書告日之理哉且執君與執臣孰重孰輕今執君不書於經而執臣反書之則是舍重書輕也況寧喜為弒君之賊執之當也衛衎當復者也執之不當也今當執而書不當執者反不書春秋不如是之繆也又齊為大國與晉有隙必不為衛侯故適晉鄭與衛情亦不通亦未必為衛侯故而齊鄭二公適晉使二公適晉經亦當書此事舉不可信者矣公羊曰此執有罪何以不得為伯討不以其罪執之也何氏解曰寧喜弒君者稱人而執非伯討愚謂公羊謂不以其罪執之則得之矣乃不於是上見之而於稱人之一字見亦一字褒貶之弊也以稱人不得為伯討則稱爵者為伯討乎皆非的論也二十七年春齊侯使慶封來聘左氏曰齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也社氏曰為明年慶封來奔傳愚按皆非來聘來奔本義不録夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋左氏曰如齊齊人難之陳文子曰晉楚許之我焉得己且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告於秦秦亦許之六月丁未朔宋人享趙文子叔向為介司馬置折俎禮也仲尼使舉是禮也以為多文辭戊申叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈從趙武至丙辰邾悼公至戊辰滕成公至子木謂向戍請晉楚之從交相見也庚午向戍復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊壬申左師復言於子木子木使驛謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至是夜也趙孟及子晳盟以齊言庚辰子木至自陳存耕趙氏曰宋之盟諸夏之大變也南北兩霸之勢成矣晉侯明使諸侯聽命於楚而使大夫帥之以往春秋未有之事也左氏浮誇乃謂是㑹多文辭使聖人早生其不比趙武向戍而盡誅之乎愚按左氏言齊秦許之今經無齊秦又言邾悼公滕成公皆至此正楚王所謂他國請相見者也而經亦無之又經之㑹在夏而傳以為秋七月戊寅左師至是夜趙孟及子晳盟而後為㑹則是日月又不合於經矣且經但書夏是魯史元無日月也而左氏豈得日月如此其詳哉他如司馬置折俎而謂之禮又謂仲尼美其多文辭皆可笑之尤者又左氏見此㑹無齊秦則以為楚釋之見無邾滕又以為齊宋請之亦可謂善為誕辭矣故豫釋左氏之粗信者附于本義云衛殺其大夫寧喜榖梁曰稱國以殺罪纍上也寧喜弒君其以纍上之辭言之何也嘗為大夫與之涉公事矣寧喜由君弒君而不以弒君之罪罪之者惡獻公也稱殺其大夫寧喜非春秋惡獻公不以弒君之罪罪寧喜也乃獻公不以弒君之罪殺寧喜耳纍上之辭辨見僖十年衛侯之弟鱄出奔晉公羊曰衛殺其大夫寧喜則衛侯之弟鱄曷為出奔為殺寧喜出奔也曷為為殺寧喜出奔衛寧殖與孫林父逐衛侯而立公孫剽寧殖病將死謂喜曰黜公者非吾意也孫氏為之我即死汝能固納公乎喜曰諾寧殖死喜立為大夫使人謂獻公曰黜公者非寧氏也孫氏為之吾欲納公何如獻公曰子茍納我吾請與子盟喜曰無所用盟請使公子鱄約之獻公謂公子鱄曰寧氏將納我吾欲與之盟其言曰無所用盟請使公子鱄約之子固為我與之約矣公子鱄辭曰夫負羈縶執鈇鑕從君東西南北則是臣僕庶孽之事也若夫納言為信則非臣僕庶孽之所敢與也獻公怒曰黜我者非寧氏與孫氏凡在爾公子鱄不得已而與之約已約歸至殺寧喜公子鱄挈其妻子而去之將濟于河攜其妻子而與之盟曰茍有履衛地食衛粟者昧雉彼視劉氏曰公羊曰已納歸至殺寧喜然則喜非復有他罪矣衛侯以弒君誅之耳以弒君之罪誅之何為不以討賊之辭書之乎謂衛侯不當誅喜乎何以責定公不能討季氏也榖梁曰專喜之徒也專之為喜之徒何也已雖急納其兄與人之臣謀弒其君是亦弒君者也專其曰弟何也專有是信者君賂不入乎喜而殺喜是君不直乎喜也故出奔晉織絇邯鄲終身不言衛専之去合乎春秋兄弟無可去之義榖梁乃謂合乎春秋果合乎春秋則春秋以為常事而不書矣秋七月辛巳豹及諸侯之大夫盟于宋左氏曰季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟故不書其族言違命也書先晉晉有信也壬午宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也乙酉宋公及諸侯之大夫盟于蒙門之外晉荀寅遂如楚涖盟劉氏曰左氏曰不書其族言違命也非也蔡沈失位左氏貶之今魯欲自同人之私失位甚矣貢賦雖重所不得已也大夫出境有可以重社稷猶曰專之今命出季氏而以謂不可違何哉誠使豹徇季氏之命輕貢賦之數雖偷得一時之益而其貶魯國之秩已多矣反不當疾之邪又是㑹也楚先晉歃而經先書晉左氏以謂仲尼追正之也今此視邾滕之事仲尼亦必知其非公命審矣苟舊史不知而貶豹焉仲尼猶宜正之況知之乎夫知其非公命且辱國而猶責豹以不從命者是開强臣挾君以令於國而莫之亢也不亦悖乎愚按此盟之後二十九年邾人滕人城把三十年邾人滕人㑹于澶淵後凡㑹盟邾滕無不書於春秋則是齊未嘗請邾宋未嘗請滕也且叔孫豹不書族前見也若僑如以夫人至自齊婼至自晉之類而左氏乃曰違君命不書族足以見其曲解經文而撰事以實之故讀者不覺其妄爾又曰書先晉晉有信也亦妄也晉主夏盟久矣魯史必不以楚先晉也非楚本書晉上而以有信先晉也杜氏以為孔子追正之尤見其妄蓋孔子修春秋其文則史直書其事而善惡自見安得追正之哉又經書諸侯之大夫盟矣不書宋公也若宋公與盟春秋必曰宋公及諸侯之大夫盟矣又楚屈建既與諸侯之大夫盟矣必無晉荀寅如楚再涖盟之事若有之經亦當書之以見義故豫擇其近信者附于本義而猶未敢必其然也公羊曰曷為再言豹殆諸侯也曷為殆諸侯為衛石惡在是也曰惡人之徒在是矣劉氏曰非也此乃一事再見者前目而後凡爾何謂殆諸侯乎假令衛石惡實惡人者何至能變亂諸侯之盟乎衛比諸侯亦小國爾何至諸侯遂危懼之乎皆事之不然者愚謂設使諸侯殆石惡義亦不在再言豹也再言豹豈足以見諸侯之殆石惡乎且衛衎當復者也不過不能正名其義以殺寧喜耳何得遂為惡人與篡弒者同科乎況石惡乃其臣耳設使君惡臣亦未必俱惡也而諸侯殆之若是此繆之甚者且楚屈建夷狄也而同主夏盟乃不殆之而反殆一石惡乎衛孫林父親逐君者襄十四年㑹諸侯之大夫于戚豈不真可殆乎然未聞諸大夫之殆林父也而反殆惡人之徒歟公羊豈疑其名之惡而遂殆其惡乎榖梁曰溴梁之㑹諸侯在而不曰諸侯之大夫大夫不臣也晉趙武恥之豹云者恭也諸侯不在而曰諸侯之大夫大夫臣也其臣恭也晉趙武為之㑹也劉氏曰非也豹不氏亦前目後凡一事而再見卒名之爾不以是為恭也愚謂溴梁之盟不曰諸侯之大夫者以上既列諸侯之爵則不曰諸侯之大夫也且春秋者魯史也魯史既書魯侯之爵矣則不必再曰某大夫及諸侯之大夫盟故直曰大夫盟耳此宋之盟既無魯侯之爵則必須曰豹及諸侯之大夫盟若曰豹及大夫盟則文義又不明故必曰諸侯之大夫皆製言之體當然何必相比為例也且溴梁之盟諸侯在而大夫盟為不臣乎今大夫自為㑹又自為盟反以為臣乎又晉趙武為大夫而主夏盟又引夷狄亂中國反歸美於趙武豹云者蒙上文云爾而以豹為恭大夫自為㑹盟而又以臣為恭皆揣摩億度而不以理折之徒亂春秋而已凡此類者必屏絶之然後經之本義見矣冬十有二月乙亥朔日有食之左氏曰十一月乙亥朔日有食之辰在申司厯過也再失閏矣劉氏曰左氏曰於是辰在申司厯過也再失閏矣明年春無氷杜氏曰頓置兩閏以應天正故正月建子得以無氷為災皆不然也厯家之術求閏餘易求交朔難今司厯能正交朔反不能置閏乎此非人情也閏有常准率三十二月必一逢之如傳所言再失閏者則司厯廢閏殆七十月彌五年矣亦非人情矣頓置兩閏詭聽駭俗亦非人情也且必若所云其亂天時多矣春秋何能不譏乎故曰未然葉氏曰朔或有誤以十一月為十二月者若辰果在申而再失閏當自二十五年失一閏則二十六年與是嵗皆當以建亥為正月不惟遞失一月而四時易序且二年矣是月辰果在申為再失閏則明年當以建戍為正月經安得復以無氷為災乎杜預為頓置兩閏之說則是嵗當為十二月者乃合天正若然則前二年正月皆不正乎經不書閏此常法也茍有見焉則書故文公不告月葬齊景公獨著之頒朔王政之大前四時易序而失天正者二年既無見今頓置兩閏又無異文經果如是乎杜預之言既非傳所載則傳之為妄不待攻而破也二十八年春無氷左氏曰春無氷梓慎曰今兹宋鄭其饑乎嵗在星紀而淫於𤣥枵以有時菑隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必饑𤣥枵虛中也枵耗名也土虛而民耗不饑何為葉氏曰周官保章氏以星土辨九州之地所封封域皆有分星方周之盛時諸侯分布於天下不可遍數也所謂九州之地所封者非以九州為别言諸侯之域在九州之內者各有其土所主之星以觀其祅祥爾是時豈有十二諸侯之辨乎自春秋末列國大小相併姑舉其大者十有二謂之十二諸侯後世星家因以四方之宿配之以當天之十有二次星紀為吳越𤣥枵為齊娵訾為衛降婁為魯大梁為趙實沈為晉鶉首為秦鶉火為周鶉尾為楚壽星為鄭大火為宋析木為燕雖周亦與諸侯共列分晉趙於大梁實沈為二合吳越於星紀為一且三家分晉之後趙始别於晉昭之五年越始見而越亦安能當十二次之列乎左氏所記梓慎禆竈之徒以星次言吉凶若合符契皆後世星家假託之辭習其見而雜紀之愚謂魯國春無氷可藏則隂陽反常冬行春令月令所謂國其乃旱蟲蝗為敗胎夭多傷水潦敗國時雪不降氷凍消釋者也其年之秋果大雩則旱可知矣左氏乃釋本國而移之他邦豈使其君恤天災之道乎夏衛石惡出奔晉左氏曰衛人立其從子圃以守石氏之祀禮也出奔非去國之謂也石惡之罪不可知然其出奔則其人可知矣出奔而立其子安得為之禮哉邾子來朝左氏曰邾悼公來朝時事也葉氏曰前事載晉韓起聘周之言曰晉士起將歸時事於宰旅杜預以時事為四時貢職邾與魯列國非有屬於魯者何至其君自修其貢乎杜預謂非宋盟此蓋傳前誤載齊事故以邾為嫌而妄為之辭也仲孫羯如晉左氏曰孟孝伯如晉將告為宋之盟故如楚也葉氏曰宋盟晉楚既同㑹不爭諸侯則固不嫌兩並朝也若猶爭而各欲為主又何告焉十有二月甲寅天王崩左氏曰癸巳天王崩未來赴亦未書禮也王人來告喪問崩日以甲寅告故書之以徴過也甚哉左氏之繆也天王果以癸巳崩周去魯其地逺即可以癸巳日赴魯哉其未來赴固未可書其既來赴獨不可書癸巳之日而遂書甲寅之日哉又魯為人臣豈可責其君來赴之晚而徴過哉設使徴過亦不在改癸巳之日為期之日以見義也夫王人來告喪必曰天王以某日崩豈有問崩日以甲寅告之理哉若此類者徒亂春秋而已二十九年春王正月公在楚左氏曰釋不朝正于廟也楚人使公親禭公患之穆叔曰祓殯而禭則布幣也乃使巫以桃茢先祓殯楚人弗禁既而悔之夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公欲毋入榮成伯賦式微乃歸劉氏曰非也他日公在外不朝正多矣何為不悉書邪去年公如楚未有至之文也公之不朝正亦審矣雖不釋於此猶足知也曽何春秋之不憚煩愚謂不朝正於廟亦一義也然但言不朝正於廟則又有未盡耳自楚人使公親禭以下事之信否不可知以非本義不録公羊曰何言乎公在楚正月以存君也存君者聖人之心也然不在書公在楚以見義書公在楚正以見朝正之時而公在夷狄之廷耳劉氏胡氏張氏諸儒之說皆出於此蓋公羊有以啓之以其彌近理而後世莫之辨也榖梁曰閔公也按孔子魯之臣子固有閔公之意然孔子修春秋以明大義於天下則不以姑息而昧大義也夏五月公至自楚榖梁曰喜之也致君者殆其往而喜其反此致君之意義也劉氏曰非也公如齊如晉而致者多矣又何喜乎且春秋公出不必盡致也愚謂殆其往而喜其反此臣子忠君之心凡魯史書至者君歸告廟之常法孔子取之以見非常為後世戒豈榖梁之謂哉閽弒吳子餘祭左氏曰吳人伐楚獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之按經曰閽則門者也左氏亦自曰以為閽而又以為使守舟此其可疑者也其曰以刀弒之亦近乎贅若吳人伐越獲俘焉以為閽一語未知其必不然姑附於本義云仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人邾人滕人薛人小邾人城把榖梁曰古者天子封諸侯其地足以容其民其民足以滿城以自守也把危而不能自守故諸侯之大夫相帥以城之此變之正也按諸侯有土地有人民其力足以城其城今伯主城之已非所宜況諸侯之大夫當夏城之乎榖梁以為變之正誤矣晉侯使士鞅來聘左氏曰公享之展莊叔執幣射者三耦公臣不足取於家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦非本義不録把子來盟左氏曰把文公來盟書曰子賤之也義見桓二年滕子來朝吳子使札來聘左氏曰吳公子札來聘見叔孫穆子說之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此者矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘于齊說晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒髙之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子之為政慎之以禮不然鄭國將敗適衛說蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉說趙文子韓宣子魏獻子曰晉國其萃於三族乎說叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難存耕趙氏曰周王之喪未踰年豈得以請觀周樂為榮哉論樂則剽竊諸論妄加品藻如大雅有幽厲之詩而為文王之德小雅有成王之詩而以為周德之衰當時列國之卿如叔孫穆子晏平仲子産之徒駭於創見交稱其賢三傳從而夸大之公羊曰吳無君無大夫此何以有君有大夫賢季子也何賢乎季子讓國也其讓國奈何謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君謁曰今若是迮而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子皆曰諾故諸為君者皆輕死為勇飲食必祝曰天茍有吳國尚速有悔於豫身故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國宜之季子者也季子使而亡焉僚者長庶也即之季子使而反至而君之爾闔廬曰先君之所以不與子國而與弟者凡為季子故也將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚惡得為君乎於是使專諸刺僚而致國乎季子季子不受曰爾殺吾君吾受爾國是吾與爾為篡也爾殺吾兄吾又殺爾是父子兄弟相殺終身無已也去之延陵終身不入吳國故君子以其不受為義以其不殺為仁賢季子則吳何以有君有大夫以季子為臣則宜有君者也札者何吳季子之名也春秋賢者不名此何以名許夷狄者不一而足也季子者所賢也曷為不足乎季子許人臣者必使臣許人子者必使子也按經書閽弒吳子餘祭與札來聘同在今年之夏則是夷昧與僚未為君也經書吳弒其君僚乃在昭二十七年後此三十年之事也春秋不應未見讓國之事而預於三十年前褒之也又謁與餘祭夷昧雖甚愛季札亦不致輕死為勇自祝速悔以戕其身設使速死何不逃之他國又夷昧既死吳人當召季札於所使之國而立之不應立僚之後俟季札之偶自反國又弒之以與季札也又春秋明書吳弒其君僚則是弒逆之賊人人所當殺之者也果闔閭弒君而季子不殺之則是縱賊也惡得以不殺為仁且使兄弟相傳而及乎季札是不必讓也惡得以不受為義自古有賢臣無賢君多矣以伊尹為臣而有桀以箕子比干微子為臣而有紂而公羊以季子為臣而宜有君意謂春秋書札而稱吳子則是褒其臣而分美於其君也春秋命卿書字再命大夫書名微者書人皆史法之常而公羊又為賢者不名既名札矣既因臣以及君矣又以為許夷狄者不一而足又按左氏曰闔閭弒僚而自立未嘗讓季札也又左氏曰季札反國曰茍先君無廢祀民人無廢主乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之復位而待未嘗去之延陵終身不入吳國也是其叙事皆失實論理皆失當矣原其受病之處以公羊見吳突然稱子又稱使又稱大夫之名與春秋前書荆人來聘凡例不類求其說而不得故强為之辭殊不知吳自建國已有大夫特春秋之初夷夏之辨尚明故其來聘史氏書之略春秋之中夷狄漸同中國故史氏書之詳吳札來聘之前已有秦伯使術來聘楚子使椒來聘之文吳前未嘗通聘中國至此而始至史氏亦書之詳聖人因而不革以見夷夏莫辨之一端非専恃此以為春秋大義春秋大義乃在吳之聘魯爾今公羊意似指魯史但書吳人來聘而孔子追改曰吳子使札來聘者嗟乎此凡例褒貶之弊一至於此讀春秋者亦可少悟矣榖梁曰吳其稱子何也善使延陵季子故進之也身賢賢也使賢亦賢也延陵季子之賢尊君也其名成尊於上也莘老孫氏曰春秋之於夷狄書之有漸焉非進之也夷狄益進則中國益衰矣楚子使椒來聘書爵書名非進楚也所以見楚之盛也吳子使札來聘書爵書名非進吳也所以見吳之盛也楚始聘魯書曰荆人吳始聘魯遂書吳子春秋非厚吳而薄楚也荆初來聘中國猶可為者至於通好之久盟㑹侵伐同於諸侯則中國與之等矣故書曰楚子使椒來聘吳初來聘而遂稱子見其一來而遂同中國也公榖皆以季子賢而來聘故吳得以稱子季子雖賢而吳實夷狄安得以一季子而亂中華之法哉此皆不得其義而過為之說爾師氏曰吳子使札蓋與楚子使椒來聘同爾吳自成七年始見於經而稱吳襄五年㑹而稱人至此而稱子者以見其愈盛而通中國得與五等諸侯同列公榖皆以因使季札而進之故稱吳子然則楚子之使椒又孰因乎豈椒亦有季札之賢邪是其不然可知愚謂吳札來聘之先吳已稱子矣如曰吳子勝卒吳子遏伐楚閽弒吳子餘祭之類是也何待使賢而進之曰子乎且使賢者未必其君之皆賢也衛靈公用仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅孔子猶曰無道吳使季子而其君遂即賢焉斷無是理也齊髙止出奔北燕左氏曰秋九月齊公孫蠆公孫竈放其大夫髙止於北燕乙未出書曰出奔罪髙止也髙止好以事自為功且専故難及之葉氏曰放與奔異奔者避罪或避難自出放者宥而逺之或有罪或無罪然未有不出於君者今經書奔而傳謂之放又以蠆竈為言二氏雖専齊者豈有擅放其大臣而經以出奔書之乎愚謂使髙止有罪而見放於蠆竈經當書曰齊公孫蠆公孫竈放髙止於北燕其髙止之罪豈不明而蠆竈以大夫而放大夫其罪亦豈不著哉一事而二義見者經有之矣今髙止有罪而改放為奔後世惡能知其故邪且孔子幸左氏之有傳也使左氏不作則奔與放終無以明於後世春秋無乃其迂哉三十年春楚子使薳罷來聘左氏曰穆叔問王子之為政何如對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政固問焉不告穆叔告大夫曰楚令尹將有大事子蕩將與焉助之匿其情矣非本義不録夏四月蔡世子般弒其君固榖梁曰其不日子奪父政是謂夷之夷狄弒君父春秋必書者所以明雖夷狄必有君父也今般弒其君父而書於春秋反以不日而夷之乎五月甲午宋災宋伯姬卒左氏曰或叫于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也君子謂宋共姬女而不婦女待人婦義事也按經但書伯姬卒不言死于火也左氏見伯姬卒書于宋災之下故妄為之說耳夫火其身而曰待姆天下豈有如此愚婦哉不特婦也雖女子亦當避之且伯姬于斯時若以火驚而死則或有之矣古者烈女有寧死而守義者謂汚辱之纍身者父母之遺體遇火不避以待其姆卒喪其身不孝孰甚焉左氏譏其非女而待人固未盡其義榖梁又以為賢尤其可笑者也榖梁曰取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少避火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少避火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也按卒之日加於災上者伯姬之卒適同其日火在前而卒在後故火有日而伯姬蒙上之日經之所書本是兩事榖梁誤合為一故疑其逮火而死非實有所見也以火至不避為婦道之盡豈義也哉夫禮有經有權禮曰男婦不相授受又曰非祭非喪不相授器夫不相授受經也喪祭相授權也女子居內晝不遊庭禮之經也若火至而避獨不可用權乎伯姬之事蓋無有爾若有之而謂之盡婦之道吾不之信也子之事父也如若小杖則受大杖則走夫杖之而走豈其恭哉誠以子之身父母之遺體也一旦受大杖而死則壞父母之遺體不得以事其父母反傷父母之心故走之也以不避火為婦道猶以受大杖為子道也故曰非義也天王殺其弟佞夫左氏曰初王儋季卒其子括將見王而歎單公子愆期為靈王御士過諸庭聞其歎而言曰烏乎必有此夫入以告王且曰必殺之不戚而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子侫夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟侫夫罪在王也按景王已立三年矣儋括始欲立佞夫且春秋書天王殺其弟侫夫蓋天王使之殺爾左氏謂五大夫殺侫夫而歸罪於天王則不合於經矣五大夫殺侫夫則是兩下相殺耳聖人豈肯歸過於天王哉榖梁曰諸侯且不首惡况於天子乎君無忍親之義天子諸侯所親者唯長子母弟耳天王殺其弟侫夫甚之也此說近似然義亦未盡秋七月叔弓如宋葬宋共姬左氏曰叔弓如宋葬共姬也經旨已明不用復出公羊曰外夫人不書葬此何以書隱之也何隱爾宋災伯姬卒焉其稱諡何賢也何賢爾宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傅母不下堂傅至矣母未至也逮乎火而死義見本義辨見榖梁伯姬卒榖梁曰外夫人不書葬此其言葬何也吾女也卒災故隱而葬之也隱而葬之何補於教而書於春秋乎鄭良霄出奔許自許入于鄭鄭人殺良霄左氏曰書曰鄭人殺良霄不稱大夫言自外入也按良霄既奔又入鄭作亂不稱大夫乃討賊之辭非自外至也榖梁曰不言大夫惡之也良霄雖可惡然非以惡之而去其大夫之號彼既作亂則史法自當如此書爾冬十月葬蔡景公公羊曰賊未討何以書葬君子辭也按臣弒君子弒父其罪一也春秋弒君者多矣不書葬者亦多獨無君子辭為中國諱乎辨又見桓十八年榖梁曰不日卒而月葬不葬者也卒而葬之不忍使父失民於子也劉氏曰凡不書葬者其失民之謂乎茍為此言以應問可也已非所以明春秋者也晉人齊人宋人衛人曹人鄭人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故左氏曰為宋災故諸侯之大夫㑹以謀歸宋財冬十月叔孫豹㑹晉趙武齊公孫蠆宋向戍衛北宫他鄭罕虎及小邾之大夫㑹于澶淵既而無歸於宋故不書其人君子曰信其不可不慎乎澶淵之㑹卿不書不信也夫諸侯之上卿㑹而不信寵名皆棄不信之不可也如是詩曰文王陟降在帝左右信之謂也又曰淑慎爾止無載爾僞不信之謂也書曰某人某人㑹于澶淵宋災故尤之也不書魯大夫諱之也左氏曰謀歸宋財既而無歸故不書其人非也左氏見十二國皆稱人不書大夫之名又言其故又不書魯大夫求其說而不得故撰謀歸宋財既而無歸之言以解之又撰叔孫豹晉趙武齊公孫蠆宋向戍衛北宫他鄭罕虎之名以實之又撰諱魯大夫之說以完之嗚呼巧則巧矣而不知其失經旨也前書蔡世子弒其君次書葬蔡景公次書十二國之大夫㑹而謀宋災則是舍弒君父之大而謀宋災之小而左氏以為僅失信而已孫林父叛其君欒盈作亂春秋且書其人一不歸宋財而遂不書其人又魯桓成宋亂取宋大鼎春秋且不諱今乃為魯卿諱一失信而不書豈知言哉公羊曰宋災故者何諸侯㑹于澶淵凡為宋災故也㑹未有言其所為者此言其所為何録伯姬也諸侯相聚而更宋之所喪曰死者不可復生爾財復矣此大事也曷為使微者卿也卿則其稱人何貶曷為貶卿不得憂諸侯也劉氏曰公羊曰録伯姬也非也宋災故者豈善之乎又曰此大事也曷為使微者亦非也諸侯相聚而更宋之所喪何為大事之有又曰卿則其稱人何卿不得憂諸侯也大夫受君命出以為㑹是諸侯耳何用必其非諸侯之命乎愚謂經言其所為曰宋災故也公羊亦自曰㑹于澶淵宋災故也公羊又自曰死者不可復生則是無可奈何此㑹豈非謀宋之災可必謂録伯姬乎公羊既為録伯姬則是經之所書者善辭也而又稱人以貶豈不自失哉榖梁曰㑹不言所為其曰宋災故何也不言災故則無以見其善也其曰人何也救災以衆何救焉更宋之所喪財也澶淵之㑹中國不侵伐夷狄夷狄不入中國無侵伐八年善之也晉趙武楚屈建之力也劉氏曰非也一國失火自焚其財小事耳諸侯何至羣聚而謀之乎以此為善是春秋賞小惠而不知道也又曰其人何也救災以衆亦非也宋以五月失火諸侯以冬㑹澶淵是可謂救災乎愚謂澶淵之㑹本謀宋災無有中國謀夷狄之意也榖梁自為之言爾三十有一年夏六月辛巳公薨于楚宫榖梁曰楚宫非正也此說近之但不分明秋九月癸巳子野卒榖梁曰子卒日正也莘老孫氏曰春秋未踰年之君書卒者三赤子般以弒不地子野正卒又不地榖梁以日月為例以日為正又不可通趙子以子野卒為有地而疑脫之未可知爾十有一月莒人弒其君密州左氏曰莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弒之乃立去疾奔齊齊出也展輿吳出也書曰莒人弒其君買朱鉏言罪之在也劉氏曰展輿因國人以攻莒子弒之乃立如是則子弒父也子弒其父春秋不書乎又曰書曰莒人弒其君買朱鉏言罪之在也如是則父有罪子得而弒之也且經曰密州傳曰買朱鉏吾誰適從哉亂天地之性莫甚於斯言矣此固左氏不受經之弊也康侯胡氏曰傳以經為斷傳有乖繆則信經而棄傳可也若密州之事是矣趙匡謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾愚謂左氏明言書曰莒人弒其君買朱鉏言罪之在也則實為其子弒之非之字誤為以也使如趙氏之言亦其子與聞乎故也皆不可通三傳辨疑卷十六
