body:
  text: 三傳辨疑卷十一元陳端學撰文公九年春毛伯來求金左氏曰不書王命未葬也劉氏曰傳云王未葬也杜氏曰雖逾年而未葬故不稱王使非也諸侯逾年尚稱公王者逾年反不稱王毛伯求金非王命可知也書顧命曰伯相命士須材此則冢宰當國之文矣公羊曰何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王則何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子也踰年稱公矣則曷為於其封內三年稱子緣民臣之心不可一日無君緣終始之義一年不二君不可曠年無君緣孝子之心則三年不忍當也毛伯來求金何以書譏何譏爾王者無求求金非禮也然則是王者與曰非也非王者則曷為謂之王者王者無求曰是子也繼文王之體守文王之法度文王之法無求而求故譏之也趙氏曰案前後例踰年即成君公羊言三年非愚謂天子雖居諒暗三年百官總已以聽於冢宰然三年之內其臣民不謂之王而謂之何哉顧命曰王麻冕黼裳又曰王再拜興王答拜康王之誥曰王出在應門內王義嗣德今王敬之哉王若曰王釋冕反喪服則當時固稱王矣諸侯當喪稱子者以未見於天子而受命也諸侯三年喪畢以士服見於天子天子命之衮冕之服然後歸而臨其臣民乃稱職焉夫天子為太子受命於父三年喪畢見於廟而已公羊既不知經理又以意推之宜其多妄也其曰繼文王之體守文王之法度文王之法無求無理之甚夫理出於天而制作於伏羲神農黃帝堯舜禹湯文武周公豈特文王無求哉榖梁曰求車猶可求金甚矣案諸侯於天子各有常貢非常用之物則有錫貢求之之云豈天子臨諸侯之道哉而曰求車猶可求金甚矣過矣二月叔孫得臣如京師辛丑葬襄王左氏曰莊叔如周葬襄王公羊曰王者不書葬此何以書不及時書過時書我有往者則書案王者不書葬不知出何典乎其曰不及時過時書則有之矣然不可施之於此也若曰我有往則書此可施之魯史不可施之筆削之春秋何則凡春秋之書必有義也非我有往則書也榖梁曰京大也師衆也言周必以衆與大言之也天子志崩不志葬舉天下而葬一人其道不疑也志葬危不得葬也日之甚矣其不葬之辭也劉氏曰志葬危不得葬也日之甚矣其不葬之辭也非也上云得臣如京師者即會葬之人矣何謂不葬乎故以日月為例其膠固至此晉人殺其大夫先都左氏曰夷之搜晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田于堇陰故箕鄭父先都士縠梁益耳蒯得作亂正月己酉使賊殺先克乙丑晉人殺先都梁益耳三月甲戌晉人殺箕鄭父士穀蒯得案六年夷之搜左氏序事錯亂不可信先儒固已辨之矣且左氏於夷之搜既曰狐射姑將中軍以陽處父黨於趙盾謂趙盾能而使將中軍矣今又曰使士縠梁益耳將中軍以先克謂狐趙之勳不可廢而從之則是晉襄既用狐射姑而又欲用士縠又欲用梁益耳既用趙盾又用趙衰一中軍將耳既以為子又以為父何其自相背邪況先克見殺而經不書作亂見殺者五大夫而經於二月僅書一先都而士縠箕鄭父乃見殺於三月之間若同時作亂何不一時誅之皆不可曉者也左氏之不可盡信類如此而或者用傳以疑經其亦失是非之心矣三月夫人薑氏至自齊榖梁曰卑以尊致病文公也葉氏曰豈有夫人以為卑而不得與公俱致何哉何病文公之有魯臣被執而歸猶書夫人歸寧而歸告廟反不得書亦倒置矣此蓋傳見文薑哀薑出無有致者故以為例愚謂婦失其行夫之罪也固可以病文公矣然以為卑以尊致則非也晉人殺其大夫士縠及箕鄭父榖梁曰稱人以殺誅有罪也鄭父纍也案稱人以殺惟弒君者可以言其餘則否如齊人殺無知衛人殺州吁之類是也纍也之説惟君被弒者可以言之其餘則否如及其大夫荀息仇牧孔父之類是也是不可以執一論矣辨又見七年宋殺大夫楚人伐鄭公子遂會晉人宋人衛人許人救鄭左氏曰囚公子堅公子尨及樂耳鄭及楚平公子遂會晉趙盾宋華耦衛孔達許大夫救鄭不及楚師卿不書緩也以懲不恪葉氏曰楚人以三月伐鄭經繼書遂會晉人宋人衛人許人救鄭下言狄侵齊則諸國之救在一月之內計鄭以伐告五國會師而往未為後時設楚方來伐聞五國求救而退亦豈可以不及楚師罪之此皆設以人而貶卿也愚謂春秋書救而不及事者多矣曰狄伐邢齊師宋師曹師救邢邢遷于夷儀曰楚人圍江晉陽處父帥師伐楚以救江楚人滅江豈有楚囚鄭三大夫五國不及楚師而不舉形以見於所言者哉左氏之意欲解四國稱人而不得其説故從而為之辭九月癸酉地震公羊曰地震者何動地也何以書記異也言動地亦倒置榖梁曰地不震者也震故謹而日之也葉氏曰記異也陽伏而不能出陰迫而不能散於是有地震地震與山崩皆説異也地震在國中故史得詳其日山崩在他國史不得詳故或日或不日傳見地震皆書日故以為例梁山崩不日豈不謹之乎冬楚子使椒來聘左氏曰楚子越椒來聘執幣敖叔仲惠伯曰是必滅若敖氏之宗敖其先君神弗福也非本義不録公羊曰楚無大夫此何以書始有大夫也始有大夫則何以不氏許夷狄者不一而足也楚雖夷狄之國然先王所封其有大夫尚矣公羊見春秋先書荆後書荆又後書大夫之名遂謂楚至此始有大夫蓋童稚之識也榖梁曰楚無大夫其曰萩何也以其來我褒之也人必有名茍以名為褒則凡名者皆褒乎使凡來我者皆褒之則聖人之作春秋不以義而以恩也吾欲問榖梁氏聖人所以書此事者其意何謂秦人來歸僖公成風之禭左氏曰禮也諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好葉氏曰前惠公仲子及成風之賵含亦書者以其為妾母也故今秦人歸禭雖事在九年亦書傳誤分僖公成風為兩人故皆以不當事言之而以不忘舊好為禮僖公與秦穆公本未嘗通翟泉之盟大夫之會耳且贈死不及尸弔生不及哀傳固以為非禮今乃以為禮乎公羊曰其言僖公成風何兼之兼之非禮也曷為不言及成風成風尊也啖氏曰僖公成風與惠公仲子何殊傳謂兩人誤也若實禭兩人史家豈將子居母上乎愚謂妾母為夫人而受夷狄不及事之禭公羊但以兼之為非禮失其旨矣穀梁曰秦人弗夫人也即外之弗夫人而見正焉劉氏曰非也秦人唯以夫人之禮視成風故來禭之耳豈云弗夫人乎且榖梁謂魯人逼秦使來禭乎固秦人自來禭也若魯逼秦云秦弗夫人可矣若秦自來豈故欲慢魯君之祖母弗夫人哉愚謂穀梁見春秋云僖公成風而不言夫人故云然殊不知此皆本魯史之辭當秦之來禭將欲以此結魯之好安知其不稱夫人哉十年夏秦伐晉左氏曰春晉人伐秦取少梁夏秦伯伐晉取北徴果晉伐秦取少梁與秦取北徵春秋豈有不書者哉傳不足信矣自正月不雨至于秋七月穀梁曰厯時而言不雨文不閔雨也不閔雨者無志乎民也辨見二年及蘇子盟于女栗左氏曰秋七月及蘇子盟于女栗頃王立故也黃氏曰諸家多祖左氏欲謂頃王新立而盟戴氓隱曰僖公十年秋嘗滅溫溫子奔衛溫即蘇子也今與魯盟豈非既復其國而求與魯盟邪愚謂頃王立已三年左氏未可信也然氓隱謂蘇子復國既無事迹闕疑可也楚子蔡侯次于厥貉左氏曰陳侯鄭伯會楚子于息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以徇或謂子舟曰國君不可戮也子舟曰當官而行何強之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟強也敢愛死以亂官乎朴卿吕氏曰左氏之説恐非事實蓋楚自城濮之後不敢萌心於窺中國襄公沒靈公幼而後楚有伐鄭之舉召魯之事然則楚蔡之次正其窺中國之始也春秋獨書蔡侯而不及他國則可知矣愚案經無陳鄭會楚子于息之事亦無楚宋田孟諸之事宋雖畏楚恐不如是之甚也當是時晉伯雖衰猶有趙盾輩握持之故十四年魯宋陳衛鄭許曹趙盾同盟于新城至昭公時宋與申之會而楚始得志焉今觀經文但曰楚子蔡侯次于厥貉而已蓋見其踟躇觀望欲以勢臨中國而未能也何至紛紛為説乎十有一年春楚子伐麇左氏曰厥貉之會麇子逃歸十一年春楚子伐麇成大心敗麇師於防渚潘崇復伐麇至于錫穴案經厥貉之次無麇子亦未嘗為會其伐麇乃吞併鄰國未必因逃歸也若成大心果敗麇師經當曰楚人敗麇師于防渚果潘崇復伐麇至于錫穴經當書曰楚人伐麇今經不書傳未可信也或别是一時之事而魯史所無亦不當以解此經也秋曹伯來朝左氏曰曹文公來朝即位而來見也春秋諸侯踰年即位曹伯襄卒在十年八月至此二年矣此蓋喪畢來朝也左氏謂即位來朝語似未詳狄侵齊冬十月甲午叔孫得臣敗狄于鹹左氏曰鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔綿房甥為右富父終甥駟乘冬十月甲午敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首于子駒之門以命宣伯初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耐班御皇父充石公子榖甥為右司寇牛父駟乘以敗狄于長丘獲長狄緣斯皇父之二子死焉宋公於是以門賞耐班使食其征謂之耐門晉之滅潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟榮如埋其首於周首之北門衛人獲其季弟簡如鄋瞞由是遂亡劉氏曰傳以為長狄也案經無長安知是長狄哉赤狄也白狄也山戎也薑戎也陸渾戎也春秋書之未嘗略何至于長狄而獨不書哉傳又曰鄋瞞由是遂亡杜云長狄之種絶案外傳仲尼對吳使者云周為長狄今為大人今即孔子時也孔子之時長狄更為大人大人長狄一種也不得云亡亦不得云絶杜氏云絶據何見哉左氏云亡則自相反也康侯胡氏曰春秋正名之書其稱狄也或曰狄或曰白狄或曰赤狄其稱戎也或曰戎或曰山戎或曰薑戎或曰陸渾之戎不别其種類書之于策後亦無所考矣朴鄉吕氏曰書敗狄于鹹於狄侵齊之下則其為非長狄也亦明矣公羊曰狄者何長狄也兄弟三人一者之齊一者之魯一者之晉其之齊者王子成父殺之其之魯者叔孫得臣殺之則未知其之晉者也其言敗何大之也其日何大之也其地何大之也何以書記異也劉氏曰非也春秋有赤狄白狄山戎陸渾戎淮夷之類記夷狄如此之詳也苟有長狄如公羊所説蓋長百尺無為不言長狄也愚謂三大之説尤謬穀梁曰不言帥師而言敗何也直敗一人之辭也一人而曰敗何也以衆焉言之也傳曰長狄也兄弟三人佚宕中國瓦石不能害叔孫得臣最善射者也射其目身橫九畝斷其首而載之眉見於軾然則何為不言獲也曰古者不重創不禽二毛故不言獲為內諱也劉氏曰榖梁曰不言帥師而曰敗何也直敗一人之辭也非也不言帥師者將尊師少耳有何可疑哉又曰何為不言其獲古者不重創不禽二毛故不言獲為內諱也云魯既射長狄之目又斷其首是以諱之亦非也穀梁本意謂長狄一人力足敵衆故變獲言敗者起長狄之強也既變獲言敗敗即獲矣又安得不言獲為魯諱之説乎如何為文哉季子敗莒師獲莒拿穀梁以為春秋貶之今得臣獲長狄穀梁以為春秋諱之事相同也而是非不一誰能知之要知此非長狄吾既言於公羊矣十有二年春王正月郕伯來奔左氏曰郕太子朱儒自安於夫鍾國人弗徇十二年春郕伯卒郕人立君太子以夫鍾與郕邽來奔公以諸侯逆之非禮也故書曰郕伯來奔不書地尊諸侯也劉氏曰非也即實郕伯來奔又何以辨哉且魯但以諸侯逆之便謂之郕伯春秋又沒其專土叛君之罪反謂之諸侯而尊之則何以稱不登叛人哉意者郕伯以去年卒太子今即位而不能自安遂出奔此乃真郕伯矣若以其即位日淺或謂之太子左氏則誤以為太子出奔也戴氏曰誠如所言郕太子未嘗為君春秋豈容以郕伯書蓋必嘗為君迫於不得已而出奔也愚謂若郕太子未為君而以二邑出奔一叛賊耳安有虛尊其為諸侯而不書地之理哉左氏聞見雖博而昧理如此公羊曰盛伯者何失地之君也何以不名兄弟辭也趙氏曰若以為兄弟之國不書名曹伯陽衛侯衎何書乎劉氏曰邢遷於夷儀此自遷也宋人遷宿此亡國之文也或降於齊師此亦自降也齊人降鄣此亦亡國之文也此類分明理無可疑然則郕本未亡公羊強謂之亡此郕伯自來奔魯何休謂即莊公時所滅者且莊公至今七十餘年矣又曰與郜子相似亦可怪也杞伯來朝左氏曰杞桓公來朝始朝公也且請絶叔姬而無絶昏公許之以子叔姬卒之傳考之知左氏妄也二月庚子子叔姬卒左氏曰叔姬卒不言杞絶也書叔姬言非女也劉氏曰此事當在成九年而誤置此陸淳已言之矣邦衡胡氏曰子叔姬者魯未嫁之女若已嫁者各以國氏如紀伯姬紀叔姬宋伯姬之類是也左氏杜預皆以為已嫁於杞見絶而歸內女被黜而歸者經文則書曰來歸如成五年書杞叔姬來歸叔姬歸而卒於魯猶書曰杞叔姬今但書子叔姬而不繫於國誰謂嘗嫁於杞乎愚謂禮女子許嫁筓而字左氏謂凡字者即非女乎且莒慶來逆叔姬亦未嫁之女也公羊曰此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之其稱子何貴也其貴奈何母弟也劉氏曰公羊曰母弟也非也子叔姬者公之子也愚謂子者男子之通稱未聞女子亦以子稱而可以為貴之者也公羊謂母弟故以子稱禮孰自出乎榖梁曰子叔姬貴也公之母姊妹也其一傳曰許嫁以卒之也男子二十而冠冠而列丈夫三十而娶女子十五而許嫁二十而嫁案榖梁所引禮與經旨絶不相干且既曰子叔姬矣安得謂公之母姊妹乎秋滕子來朝左氏曰滕昭公來朝亦始朝公也事之信否未可知然於經無補秦伯使術來聘左氏曰襄仲曰不有君子其能國乎國無陋矣厚賄之非本義不録公羊曰遂者何秦大夫也秦無大夫此何以書賢繆公也何賢乎繆公以為能變也其為能變奈何惟諓諓善竫言俾君子易怠而况乎我多有之惟一介斷斷焉無他技其心休休能有容是難也胡氏曰秦非無大夫也蓋略之故稱人術不氏再命大夫也若謂賢秦伯則楚使椒來聘楚有何賢邪愚謂賢人之賢而誣其國之有大夫豈聖人譽人之道哉况此時穆公已死乎且穆公悔過在殽之戰距今已十有三年矣不應復褒於今日也况穆公僅有悔過之辭而無悔過之實故自殽之敗報怨者再三逮子孫不絶今其來聘不過將為伐晉之舉不知有何可賢而賢之冬十有二月戊午晉人秦人戰于河曲公羊曰此偏戰也何以不言師敗績敵也曷為以水地河曲疏矣河千里而一曲也劉氏曰非也河曲者亦地名爾豈謂千里一曲乎若千里一曲悉可名之河曲是三河之間無他地名直曰河曲而已不亦妄乎何休又曰明兩曲益非也戰于濆泉公羊曰濆泉者直泉也可謂兩直乎榖梁曰不言及秦晉之戰已亟故略之也案榖梁意謂秦晉六七戰故略之而稱人不言及夫春秋别是非明曲直故七戰之文罪各有指歸今因其亟而略之則是非亂曲直混矣何以為春秋季孫行父帥師城諸及鄆左氏曰書時也案左氏謂以得時書則大夫專兵擅改王制勞民毒衆皆所不罪而獨得時為可取耳陋哉斯言也然謂之時亦以夏正言也榖梁曰稱帥師言有難也案春秋書行父事甚明白不煩榖梁為其解釋也十有三年邾子蘧蒢卒左氏曰邾文公卜遷于繹史曰利於民而不利於君邾子曰茍利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命此事殊有益於世教但邾遷不見於經文非本義不録大室屋壞公羊曰世室者何魯公之廟也周公稱大廟魯公稱世室羣公稱宫此魯公之廟也曷為謂之世室世室猶世室也世世不毁也周公何以稱大廟于魯封魯公以為周公也周公拜乎前魯公拜乎後曰生以養周公死以為周公主然則周公之魯乎曰不之魯也封魯公以為周公主然則周公曷為不之魯欲天下之一乎周也魯祭周公何以為牲周公用白牡魯公用騂犅羣公不毛魯祭周公何以為盛周公盛魯公燾羣公廩趙氏曰魯宗廟牲色所尚當依周制不應有此數種之異公羊妄説也愚謂公羊經誤為世室故以為魯公之廟其所引制度於春秋之旨了不相干至曰曷為周公不之魯欲天下之一乎周尤其紕繆以其不關春秋不暇辨也餘見榖梁榖梁曰大室屋壞有壞道也譏不修也大室猶世室也周公曰大廟伯禽曰大室羣公曰宫禮宗廟之事君親割夫人親舂敬之至也葉氏曰大室壞公羊以為魯公廟曰世室者案明堂位言魯公之廟文世室也武公之廟武世室也蓋周存文武二祧不毁魯以得賜天子之禮故亦欲存伯禽武公廟世不毁遂稱世室此魯之僣禮而明堂位誤載之今經曰大室則非世室也大者始祖之稱也大室當為大廟之室謂其在中而藏主者洛誥王在新邑蒸祭入大室祼此其證也杜預獨得之榖梁言大室猶世室遂以伯禽為大室益可見其附會矣公還自晉鄭伯會公于棐左氏曰公皆成之鄭伯與公宴于棐子家賦鴻雁季文子曰寡君未免于此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜非本義不録公羊曰還者何善辭也何善爾往黨衛侯會公于沓至得與晉侯盟反黨鄭伯會公于棐故善之也獻可杜氏曰文公一出三為如晉朝也及晉侯盟也自往及還與二國會也據左氏皆畏晉為之然朝與盟會並非典禮之正安可謂善辭哉愚謂還自晉敘實事爾獨以還為善辭何歟榖梁曰還者事未畢也自晉事畢也案還自晉一意也何以為二義哉十有四年邾人伐我南鄙叔彭生帥師伐邾左氏曰邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾存耕趙氏曰邾與魯閧久矣邾之來未必以弔使之不敬也六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城左氏曰且謀邾也以納捷災之傳考之知此時非謀邾也其敘邾文公元妃齊薑等語當為納捷災之傳今録于後榖梁曰同者有同也同外楚也秋七月有星孛入于北斗左氏曰有星孛入于北斗周內史叔服曰不出七年宋齊晉之君皆將死亂就厯家之説理或有之然必指某事應某事則泥矣公羊曰孛者何彗星也其言入于北斗何北斗有中也何以書記異也案晏子曰君若不改孛星將出彗星何懼則孛與彗亦當有辨下句得之榖梁曰孛之為言猶茀也其曰入北斗斗有環域也下句得之晉人納捷災于邾弗克納左氏曰晉趙盾以諸侯之師八百乘納捷災于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還案新城之會諸侯已歸故書此事在公至自會之後若留師納捷災經當書曰晉趙盾以諸侯之師納捷災于邾今經曰晉人乃晉之微者也經曰弗克納則雖欲納而弗克之辭也三傳皆言趙盾以諸侯之師八百乘納捷災聞義而還夫春秋書納諸侯者五其四皆書其君之爵與其臣之帥師公伐齊納子糾楚子圍陳納頓子齊髙偃帥師納北燕伯晉趙鞅帥師納衛世子蒯聵何獨于此沒其實而稱人乎茍曰惡之正當書名以惡之茍曰善其還正當書名以善之春秋豈有善之之事哉此其微者明矣且以八百乘之衆而不書帥師此其師少可知矣又貜且為長捷災為次趙盾豈不知之至其以八百乘之師至其城下始聞貜且之長而即退師必無之理也設使能聞義退師猶不足以贖大夫納不正之罪何善之有哉或曰三傳同辭則固有所受豈皆不可信邪曰程子曰以經考傳之偽今經與傳異則信經可也傳或近理尤當從經况不然邪且晉人云者左氏曰趙盾公羊曰郤缺榖梁曰郤克又左氏曰八百乘榖梁曰五百乘其所受亦失其實矣公羊曰納者何入辭也其言弗克納何大其弗克納也何大乎其弗克納晉郤缺帥師革車八百乘以納捷災于邾婁力沛若有餘而納之邾婁人言曰接災晉出也貜且齊出也子以其指則接災也四貜且也六子以大國壓之則未知齊晉孰有之也貴則皆貴矣雖然貜且也長郤缺曰非吾力不能納也義實不爾克也引師而去之故君子大其弗克納也此晉郤缺也其稱人何貶曷為貶不與大夫專廢置君也曷為不與實與而文不與文曷為不與大夫之義不得專廢置君也趙氏曰此乃譏其不量其事而勞師耳何足道之哉縱令諸侯豈得專廢置他國君乎何但大夫也此乃譏辭又非實與而文不與也愚謂文與則實與文不與則實不與若文與而實不與文不與而實與豈聖人言顧行行顧言之謂哉况春秋之事皆不與者未有與之者也辨又見左氏榖梁曰是郤克也其曰人何也微之也何為微之也長轂五百乘綿地千里過宋鄭滕薛敻入千乘之國欲變人之主至城下然後知何知之晚也弗克納未伐而曰弗克何也弗克其義也捷災晉出也貜且齊出也貜且正也捷災不正也案弗克納而不得耳榖梁以為義弗克則求之過矣辨又見左氏九月甲申公孫敖卒於齊榖梁曰奔大夫不言卒而言卒何也為受其喪不可不卒也其地於外也案此義似是而實非蓋春秋此事見義將書齊歸其喪故於此書敖之卒於齊非為受其喪不可不卒也若曰不可不卒則書敖之卒於齊為得其義也故曰似是而實非也齊公子商人弒其君舍公羊曰此未踰年之君也其言弒其君舍何已立之已殺之成死者而賤生者也案諸侯卒世子居喪而稱子者人之心不敢幸其父之卒而即代之又一年不二君故不敢稱君若一日繼乎其位則固一國之君矣然天下不可一日無王亦不可一日無君舍齊昭公之嫡昭公卒舍為父後則齊之君也舉齊之臣不以君而何哉故不敢稱君者緣人子之心即以為君者定人臣之義此義與天地同有非自春秋而始有也因春秋而此義益明耳今商人弒舍是弒其君也舊史書之夫子因而録之以著商人弒君之罪則固無可疑者矣公羊泥未踰年之稱為孔子成死者以賤生者榖梁亦謂成舍之為君以重商人之弒諸説因之雖多為辭大抵不出二傳之意遂使正大之義反為迂曲之談悲夫曰晉奚齊亦未踰年而見殺於里克書曰里克弒其君之子奚齊何也曰舍嫡子也奚齊庶孽也當是時因奚齊而殺申生里克與諸大夫未必立之為君也故書里克弒其君之子亦舊史之文紀實事耳愚既辨之於彼矣不可與舍一槩論也曰商人稱公子何也曰亦紀實事也曰州吁無知何以不稱公子曰再命稱名三命稱氏常法也無氏者孔子不得而加有氏者孔子不得而損茍求其同則凡例興而春秋晦矣榖梁曰舍未踰年其曰君何也成舍之為君所以重商人之弒也商人其不以國氏何也不以嫌代嫌也舍之不日何也未成為君也案經言弒其君則真齊君也榖梁乃曰成舍之為君則是虛加之名也既曰成舍之為君矣而又曰未成為君何哉宋子哀來奔左氏曰宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也朴鄉吕氏曰既書來奔則何可貴之有獻可杜氏曰子哀為卿而來奔是大夫失守也黨昭公實為汚君當死於其位子哀以不義而來奔安得貴之韓中甫曰子哀果同姓死其位可也果異姓弗仕可也其君無道而來奔非臣節也諸説皆就子上生意故不取愚謂奔與去國其義不同去國者見其國有危亂之勢潔身以逺害奔者不得已於利害之私而逃奔他國以苟生者也春秋凡書奔者皆茍生者也若其可貴則春秋反不書矣何也春秋書變不書常也公羊曰宋子哀者何無聞焉爾無聞者即榖梁失之之云謂失其氏族不知其何人故但曰子哀云耳蓋已勝夫左氏謂貴之者矣然仲尼實依魯史而書魯史當時記其名氏豈可謂無聞焉也使無聞也仲尼將不書今書之必有其義公榖盍思其所以書之意哉榖梁曰其曰子哀失之也辨見公羊冬單伯如齊齊人執單伯齊人執子叔姬左氏曰襄仲使告于王請以王寵求昭姬于齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬啖氏曰單伯明書至自齊則是大夫益明矣豈周大夫有於魯書至者哉存耕趙氏曰單伯之為王使獨左氏耳然證之經書出會書如齊書至魯皆內辭也不得言王使也左氏楚人記事雜取傳聞乃曲為之説以魯請之周假寵於王雖巧辨無所施也周有單子無單伯一國不應二爵也辨又見莊元年公羊曰執者曷為或稱行人或不稱行人稱行人而執者以其事執也不稱行人而執者以已執也單伯之罪何道淫也惡乎淫淫乎子叔姬然則曷為不言齊人執單伯及子叔姬內辭也使若異罪然劉氏曰公羊曰道淫非也案齊舍未踰年魯人豈以女與之縱令世衰多居喪而娶者春秋猶應書子叔姬歸於齊愚謂公羊不知當時事迹而妄意其如此宜其多謬也稱行人稱單伯史氏辭也何足為義而有已執事執之説乎經但言單伯如齊不言單伯送子叔姬何得謂道淫乎且單伯魯大夫豈得與君之女同辭而言及公羊乃曰使若異罪然夫春秋記實事以見義者也豈肯泯其實以傳疑後世哉榖梁曰私罪也單伯淫于齊齊人執之叔姬同罪也葉氏曰單伯左氏以為王大夫而公榖以為魯大夫道淫子叔姬而見執左氏固失之二傳亦非也經書單伯至自齊且執王大夫而魯書至此尤理之不然者蓋傳事而不傳義也公榖雖以為魯大夫然求其執而不得見則意其為道淫不近人情愈甚蓋二氏傳義而不傳事也愚謂二傳不惟不傳事又不傳義者也且公羊為道淫榖梁為淫乎齊足見其無所據而妄為之辭十有五年三月宋司馬華孫來盟左氏曰三月宋華耦來盟其官皆從之書曰宋司馬華孫貴之也公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之策臣承其祀其敢辱君請承命於亞旅魯人以為敏葉氏曰諸侯相聘使介有常不聞官皆從也以此為貴豈春秋之意哉穀梁曰司馬官也其以官稱無君之辭也來盟者何前定也不言及者以國與之也趙氏曰案宋見有君不得稱無也又曰不言及以國與之也案若及又書內卿則文煩而重故從簡耳無他義劉氏曰有司馬矣何謂無君乎必無君者如齊大夫盟于蔇乃可通耳且華孫來不稱使以解無君猶可也指司馬而謂之無君不亦悖哉愚原榖梁之意曰無君者責其以官稱為無君猶言要君者無上與不如諸夏之亡蓋不知宋天子之後自當以官稱又稱之者魯史也何與於華孫哉夏曹伯來朝左氏曰夏曹伯來朝禮也諸侯五年再相朝以修王命古之制也趙氏曰案周禮諸侯猶各以嵗數朝天子若五年諸侯再相朝即須四面而往無停歇時矣劉氏曰案尚書周官六年五服一朝又六年王乃時巡則諸侯於天子五年一朝矣不得於諸侯亦五年一朝也在周禮大行人之職曰凡諸侯之邦交嵗相問也殷相聘也世相朝也此為得中焉葉氏曰諸侯再相朝此乃叔向所謂明王之制諸侯嵗聘以志業間朝以講禮再朝而會以示威者蓋伯王之令以為古制非也朴鄉吕氏曰且以春秋時考之曹小國也既當朝魯又當朝宋衛而楚鄭秦陳齊蔡滕又皆當朝之夫如是奔走於道朝何時而已也齊人歸公孫敖之喪左氏曰聲已不視帷堂而哭襄仲欲勿哭惠伯曰喪親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同母絶其愛親之道也子無失道何怨於人襄仲説帥兄弟以哭之他年其二子來孟獻子愛之聞于國或譛之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎遠禮不如死一人門于句鼆一人門于戾丘皆死非本義不録公羊曰何以不言來內辭也脅我而歸之筍將而來也劉氏曰案此言脅我則近矣其説不言來之意則謬矣有來者有不來者此其不來者也春秋據實而言耳非為內辭也且稱齊人歸公孫敖之喪其脅明矣可必云來也又曰筍將而來案敖死殆十月豈可置之編輿以行此又理之不然者單伯至自齊左氏曰齊人許單伯請而赦之使來致命書曰單伯至自齊貴之也存耕趙氏曰單伯命大夫也命大夫自不名單伯執于齊至自齊辭一如意如與婼使果為周大夫來魯何不書歸京師且無以明齊執王使之罪豈春秋辨上下之義哉愚謂單伯不能輔文公討賊而從令奉使賊庭以見辱何足貴哉榖梁曰大夫執則致致則名此其不名何也天子之命大夫也此魯之命大夫耳辨見左氏晉郤缺帥師伐蔡戊申入蔡左氏曰凡勝國曰滅之獲大城焉曰入之案滅者夷其社稷入者入其國都耳公羊曰入不言伐此其言伐何至之日也其日何至之日也案伐蔡偶不記日但記其入蔡之日史有詳略不得妄加也何必為義哉且經明書戊申入蔡安得為至之日也秋齊人侵我西鄙榖梁曰其曰鄙逺之也其逺之何也不以難介我國也書齊侵我西鄙記實事也若曰不以難介我國則是入我之國而強為之鄙也不識春秋書齊人伐我而不書鄙者聖人復不以難介我國乎冬十有一月諸侯盟于扈左氏曰晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不會書曰諸侯盟于扈無能為故也凡諸侯會公不與不書諱君惡也與而不書後也盟扈諸侯無能為固也然其他會盟而無能為者多矣未嘗不列序也何獨此盟書諸侯以見其無能為哉又諸侯會而公不與魯史固有不書者矣然所以不會必有其故或國有難或君有疾其故不一何必盡為君惡而諱之又如後期亦書其實若諱既不書後亦不書同一辭也則二者相亂誰能辨之十有二月齊人來歸子叔姬左氏曰齊人來歸子叔姬王故也左氏前既誤以單伯為周大夫故於此又為之辭夫商人既不畏王而執子叔姬與單伯矣何為復以王故而來歸子叔姬乎其妄可知也公羊曰其言來何閔之也此有罪何閔爾父母之於子雖有罪猶若其不欲服罪然劉氏曰非也加來何以為閔不加來何以為不閔此直來歸耳無強説也愚謂設使子叔姬有罪父母閔之不欲其服罪孔子修春秋亦閔之而不欲其服罪也乎榖梁曰其曰子叔姬貴之也其言來歸何也父母之於子雖有罪猶欲其免也劉氏曰非也郯伯姬來歸者此有罪見出者也齊人來歸子叔姬者此無罪齊人強出之者也曰齊人來歸子叔姬者猶曰齊人來歸子叔姬云爾春秋直云郯伯姬來歸者伯姬有罪父母當受之而辭不教者也愚謂榖梁於其執子叔姬也既曰淫同而同罪矣何獨於此復稱子以貴之乎齊侯侵我西鄙遂伐曹入其郛左氏曰季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣案如此等語及引詩疑左氏自為之如曰女何故行禮者可見矣夫曹不朝天子而朝魯何禮之有且季文子當時安得原齊侯之意而出言哉故愚擇其稍近理者取焉然亦未敢必其信也公羊曰郛者何恢郭也入郛書乎曰不書入郛不書此何以書動我也動我者何內辭也其實我動焉爾啖氏曰因其侵我遂入曹非其動我也劉氏曰入郛殆矣幾乎入矣勢不輕於圍豈得不書哉葉氏曰曹雖我鄰此自侵我而去矣何與於我以為我動而書者妄也十有六年春季孫行父會齊侯于陽榖齊侯弗及盟榖梁曰弗及者內辭也行父失命矣齊得內辭也榖梁上言內辭近之至謂行父失命而不明言失命之辭如何則亦億度而已至下言齊得內辭則不可解矣夏五月公四不視朔左氏曰疾也趙氏曰公若誠有疾則夫子不當譏之春秋十二公除文公之外餘未嘗書不視朔者豈皆無病而視朔常事不書也蓋公性寬緩怠於國務非疾也髙氏曰若有疾則亦常事不書也此特書者見公非有疾而然公羊曰公曷為四不視朔公有疾也何言乎公有疾不視朔自是公無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也蘇氏曰公羊曰自是公無疾不視朔也哀定之間子貢欲去告朔之餼羊蓋不復視朔矣此公羊之所以為此言也然而五月書四不視朔則六月視朔矣視朔之廢非始於此也愚謂疾病者聖賢所不能免若有疾而不視朔亦復何罪而春秋書之惟其無疾而不視朔也故書之今經不書疾而公羊自為有疾經本責其四不視朔而公羊求之四不視朔之外所謂舍實事而務揣摩者也榖梁曰天子告朔於諸侯諸侯受乎禰廟禮也此説得之六月戊辰公子遂及齊侯盟于師丘榖梁曰復行父之盟也無所發明毁泉臺公羊曰泉臺者何郎臺也郎臺則曷為謂之泉臺未成為郎臺既成為泉臺案以泉臺為郎臺亦無所考蓋國都自有臺耳且莊公又嘗築於薛於秦矣安知定為郎臺邪其曰未成為郎臺既成為泉臺理亦不安當時但曰築臺于郎而已安知未成已成而易其名乎榖梁曰緩喪也以文為多失道矣自古為之今毁之不如勿處而已矣劉氏曰非也但毁一泉臺何以令喪緩乎聲薑九月而葬所以緩者亦猶作僖公主矣豈為毁泉臺乎自古為之已毁之不如勿居而已矣案榖梁本以緩喪為機變出此者又似晚得公羊之説而附益之耳非一家學也冬十有一月宋人弒其君杵臼左氏曰宋公子鮑禮於國人宋飢竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自桓以下無不恤也公子鮑美而豔襄夫人欲通之而不可乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師公孫友為左師華耦為司馬鱗矔為司徒蕩意諸為司城公子朝為司寇初司城蕩卒公孫夀辭司城請使意諸為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之二也姑紓死焉雖亡子猶不亡族既夫人將使公田孟諸而殺之公知之盡以寶行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死盡以其寶賜左右而使行夫人使謂司城去公對曰臣之而逃其難若後君何冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之書曰宋人弒其君杵臼君無道也文公即位使母弟須為司城華耦卒而使蕩虺為司馬胡氏曰左氏大害教君雖無道臣可得而弒乎蓋稱人以弒微者也稱名以弒大夫也劉氏曰宋昭公無道國人奉公子鮑因夫人而殺之如傳所説則公子鮑為不臣襄夫人為不母而宋公未有無道之實也且公子鮑欲盜其國而先施於民襄夫人欲通於鮑而遂弒其君春秋宜推公子鮑為首惡不得輕此兩人之罪反專惡宋公也傳曰君雖不君臣不可以不臣於此何獨異哉晉靈公楚靈王皆極惡而貪殘然其弒也春秋明書趙盾公子比之名今鮑私為惠以結民偽為禮以事六卿如此而弒其君春秋忽其罪則亂臣賊子無所懼而勸矣存耕趙氏曰求昭公無道之實如春秋一二君者無有也特有去公族一事可以激衆怒爾左氏稱君無道大不可以訓謂之君而可弒乎愚謂豈有為一國之君知襄夫人使之田而殺之之謀不能備之而以寶行之理乎蓋左氏欲附會宋人之説而撰其事以實之耳由此觀之左氏之辭十信其一二可也公羊曰曷為或稱名氏或不稱名氏大夫弒君稱名氏賤者窮諸人大夫相殺稱人賤者窮諸盜劉氏曰非也大夫弒君有稱名氏者有獨稱名者有獨稱人者所謂賤者也至於盜則皆盜賊矣非所謂賤乎賤者也大夫相殺正當明其罪王札子殺召伯毛伯是也可不講而得又何紛紛乎凡弒君公羊或云當國或云不當國使春秋之例此可通也固足信也今當國者或不當國不當國者或當國例與文反豈可信乎且公羊分别當國以謂見輕重也夫弒君者何惑於輕重乎而固分别之哉十有七年春晉人衛人陳人鄭人伐宋左氏曰春晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還卿不書失其所也劉氏曰左氏曰失其所也案襄二十五年齊崔杼弒其君光公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子以伐齊齊人賂晉師遂還杜云不譏晉受賂者齊有喪師自宜退也與此相反矣夫宋齊俱弒君一以不伐喪雖受賂猶免於譏一以不伐喪雖不受賂不免於貶是受賂者賢乎何其頗哉葉氏曰推傳意謂林父等不能討昭公之賊故以為失其所經皆貶而稱人然崔杼親弒莊公傳言諸侯欲伐齊以報朝歌之役齊人以莊公説且自六正至巡守者皆有賂晉侯許之經猶厯序諸侯而不貶則昭公既無道宋獨不可以衆弒為辭以自免而經反貶林父等乎其輕重不倫矣若使四國以微者行則何以為貶則四國之稱人實微也夏四月癸亥葬我小君聲薑左氏曰有齊難是以緩劉氏曰案聲薑薨後無齊難聲薑既葬始有齊難耳六月癸未公及齊侯盟于榖左氏曰齊侯伐我北鄙襄仲請盟六月盟于榖經書西鄙當從經杜氏乃云經誤非也諸侯會于扈左氏曰晉侯搜于黃父遂復合諸侯于扈平宋也公不與會齊難故也書曰諸侯無功也諸侯無功與十五年無能為之説相類後又不見平宋之文皆非也冬公子遂如齊左氏曰襄仲復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死非本義不録十有八年秋公子遂叔孫得臣如齊左氏曰襄仲莊叔如齊惠公立故且拜葬也辨見公羊榖梁曰使舉上客而不稱介不正其同倫而相介故列而數之也莘老孫氏曰魯小國大夫有幾而兩大夫同時如齊國家之事無乃缺歟左氏以為惠公立且拜葬然則以二事行也以二事當再言如齊經一書之安知其為二事乎榖梁以為同倫而相介故列而數之案副介者不當見經就令同倫所譏亦淺爾惟其非禮故書之何用曲為之説愚謂春秋固有一事兼數義大義兼小義者矣然義有甚大則其義之尤小者有所不暇論也遂與得臣如齊是也是二卿如齊而赤弒則如齊之義可謂甚大矣設使同倫相介亦在所不暇論况當時或各有介而不可必其相介乎榖梁可謂緦麻之察而忘三年之喪者也冬十月子卒公羊曰子卒者孰謂謂子赤也何以不日隱之也何隱爾弒也弒則何以不日不忍言也案公羊謂不忍言弒可謂不忍言日不可茍凡弒者不忍言日則隱公何以書壬辰桓公何以書丙子閔公何以書辛丑子般何以書己未乎榖梁曰子卒不日故也辨見公羊夫人薑氏歸于齊榖梁曰惡宣公也有不待貶絶而罪惡見者有待貶絶而惡從之者姪娣者不孤子之意也一人有子三人緩帶一曰就賢也案春秋俱不待貶絶而罪惡見者也未有待貶絶而惡從之者謂待貶絶而惡從之者褒貶之説亂春秋者也况夫人之歸于齊不特惡宣公也夫禍亂之起必有其原而徒論其末不可以服人心夫文公暗而大夫專是禍亂之原也彼宣公者篡弒且為之豈可望其緩帶哉莒弒其君庶其左氏曰莒紀公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必達公問其故季文子使大史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟共子孝內平外成昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲很明德以亂天常天下之民謂之檮杌此三族也世濟其凶增其惡名以至於堯堯不能去縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦螭魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違教也曰納于百揆百揆時序無廢事也曰賔于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免于戾乎劉氏曰如傳所言則子弒父也父雖無道子可弒乎弒父可匿其罪乎宣公賴僕之賂則欲授之邑春秋亦豈賴僕之賂哉曷為蔽其惡名乎公羊曰稱國以弒何稱國以弒者衆弒君之辭衆弒其君必有主其事者焉主其事即首惡也春秋安得不書首惡之名哉或以為缺文者近之矣三傳辨疑卷十一
