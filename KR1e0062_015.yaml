body:
  text: 三傳辨疑卷十五元程端學撰襄公元年仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城左氏曰己亥圍宋彭城非宋地追書也於是為宋討魚石故稱宋且不登叛人也謂之宋志彭城降晉晉人以宋五大夫在彭城者歸置諸瓠丘齊人不會彭城晉人以為討二月齊太子光為質於晉劉氏曰由是言之則孔子作春秋所筆削多矣豈専用舊史者也葉氏曰若但謂楚已取之追書係之宋則何宋志之云乎城虎牢此亦諸侯取之鄭也若是則當追書而謂之鄭虎牢矣愚謂彭城雖為楚所據然猶宋之彭城也書宋彭城理也何必為孔子追書哉辨又見夲義齊質太子亦未可信蓋齊晉皆大國未必一討而即質其太子况晉討齊經所不見公羊曰宋華元曷為與諸侯圍宋彭城為宋誅也其為宋誅奈何魚石走之楚楚為之伐宋取彭城以封魚石魚石之罪奈何以入為罪也楚已取之矣曷為係之宋不與諸侯専封也此傳前一假經旨已明不煩重説後一假論彭城係之宋者本魯史之舊而孔子因之非特係之宋以見不與諸侯専封之意也豫於本義既言之矣榖梁曰係彭城於宋者不與魚石正也此亦公羊之意夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫左氏曰夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援按經書韓厥帥師伐鄭則是帥晉師而已也而傳言帥諸侯之師不知所謂諸侯者誰歟又既伐鄭而復侵楚則當書曰晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫晉帥諸侯之師遂侵楚若召陵之役先書侵蔡蔡潰遂伐楚之文則豈不功過明白何獨掩晉侵楚之事乎且此舉衛侯不見於經而晉侯不出何傳言之詳而經之率如是乎此其舉無可信者也秋楚公子壬夫帥師侵宋左氏曰秋楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘葉氏曰楚在鄭之南宋在鄭之北楚何以不直救鄭乃越鄭而侵宋乎誠或有之經當書與晉陽處父伐楚以救江同文不應無見也愚謂晉伐鄭在夏楚侵宋在秋安知非晉師已歸而楚遂侵宋乎又鄭方受晉兵又安敢侵宋取犬丘乎誠或取之經何以不書且晉悼之賢不應舍犬丘而不圖也邾子來朝左氏曰邾子來朝禮也獻可杜氏曰春秋之世小國朝大國凡書皆譏之豈可曰禮也愚謂天王崩魯襄在喪邾子來朝而曰禮乎冬衛侯使公孫剽來聘晉侯使荀罃來聘左氏曰冬衛子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也葉氏曰此春秋強弱相陵之習春朝以圖天下之之事夏宗以陳天下之謨天子之禮也諸侯相見何謀事補闕之云尤見其妄康侯胡氏曰簡王崩赴告已及藏在諸侯之策矣則宜以所聞先後而奔喪今邾子方來修朝禮衛晉方來修聘事于王喪若越人視秦人肥瘠而左氏以為禮乎存耕趙氏曰按禮諸侯相見不得終禮者六其一曰天王崩今簡王在殯而諸侯紛然相聘相賀不臣甚矣禮有大小舉其大則略其小可也天王在喪諸侯奔之禮之大者也諸侯即位遣使聘問禮之小者也簡其大而勤其小不能三年而緦小功此之謂矣二年夏五月庚寅夫人薑氏薨左氏曰夏齊薑薨初穆薑使擇薑檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉詩曰其維哲人告之話言順德之行季孫於是為不哲矣且薑氏君之妣也詩曰為酒為醴蒸畀祖妣以洽百禮降福孔偕非本義不録晉師宋師衛寧殖侵鄭榖梁曰其曰衛寧殖如是而稱于前事也劉氏曰説者曰初衛侯速卒鄭人侵之故舉寧殖之報以明稱其前事皆非也將尊師少書將書法然也何至于此獨為異乎孔子曰以直報怨以德報德若人伐已喪已亦伐人之喪是以怨報怨也豈以直報怨者乎春秋豈為此書之哉葉氏曰寧殖獨舉名氏此亦將尊師少為稱于前事其妄與前趙盾不正其敗前事同其事三傳皆無見范寧謂衛侯卒鄭人侵之故鄭伯卒寧殖復侵之伐喪非善事也春秋豈以是與人之報怨哉己丑葬我小君齊薑左氏曰齊侯使諸薑宗婦來送葬召萊子萊子不會故晏弱城東陽以逼之公羊曰齊薑者何齊薑與穆薑則未知其為宣夫人與成夫人與陳嶽氏曰書夫人自桓公之後至襄公之前書葬厯厯可數何惑之有莊二十二年書葬文薑則桓夫人也僖二年書葬哀薑則莊夫人也文五年書葬成風則莊公之妾僖公之母也文十七年書葬聲薑則僖公夫人也襄九年書葬穆薑則宣公夫人也齊薑婦也穆薑姑也婦先姑薨穆薑有美檟頌琴齊薑之薨文子取之以葬故有虧姑成婦非禮之嫌斯成公夫人明矣公羊不知婦先姑薨故疑之又曰齊薑穆薑者是不知齊為諡冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢公羊曰虎牢者何鄭之邑也其言城之何取之也取之則曷為不言取之為中國諱也曷為為中國諱諱伐喪也曷為不係乎鄭為中國諱也大夫無遂事此其言遂何歸惡乎大夫也葉氏曰此荀罃以鄭數叛城虎牢以逼之使懼而聽命非欲有其地也故不嫌於取而不係于鄭何中國之諱乎伐喪雖春秋所惡然義有輕重不得並譏鄭自是服遂為蕭魚之會此固遂之善者安得謂之惡榖梁曰若言中國焉內鄭也劉氏曰鄭不服晉諸侯伐之可謂外之矣反謂內之乎楚殺其大夫公子申左氏曰故書曰殺其大夫公子申左氏不知春秋書殺其大夫之義每妄為之辭矣三年六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤榖梁曰同者有同也同外楚也辨見莊十六年陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟公羊曰其言如會何後會也曷為殊及陳袁僑為其與袁僑盟也按上言及者內辭也下言及者及袁僑盟也曷殊及哉皆文法然耳榖梁曰如會外乎會也於會受命也及以及與之也諸侯以為可與則與之不可與則釋之諸侯盟又大夫相與私盟是大夫張也故雞澤之會諸侯始失正矣大夫執國權曰袁僑異之也劉氏曰此兩及者文當然耳何謂與之不與之哉袁僑則陳大夫大夫不敢與君盟故使大夫與之盟耳觀榖梁之説似解溴梁之會大夫盟非解此雞澤之會諸侯之大夫及袁僑盟也愚謂榖梁謂以及與之又謂可與則與之不可則釋之劉氏辨之是矣然原劉氏意謂與陳袁僑盟都無譏必如胡氏之説為平也四年夏叔孫豹如晉左氏曰晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周臣聞之訪於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜非本義不録秋七月戊子夫人弋氏薨左氏曰秋定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為已樹六檟於蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎啖氏曰如左氏所言即當不書薨葬其文當在定十五年姒氏卒下誤在此但諡曰定姒故知乖誤彼既言不成喪即不必更要此語故不取葉氏曰魯之有定姒哀公母也前定公葬而卒哀公未君故係之定公稱定姒而禮有不備焉則所謂不殯于廟無櫬不虞者是也定弋蓋襄公之妾母季文子為政初不欲以夫人之禮成之而亦有是馬故匠慶以為子為正卿而小君之喪不成然經書夫人弋氏薨葬我小君定弋則匠慶之言季文實行之也左氏榖梁不能辨二定乃以定姒之事言之遂誤以弋氏為姒氏審如左氏言不殯于廟無櫬不虞於其説不得稱夫人春秋何為以夫人稱之哉愚謂此既諡定姒矣不應哀公時復諡定姒也故知此當以公羊為正也葬我小君定弋公羊曰定弋者何襄公之母也妾母也五年叔孫豹鄫世子巫如晉左氏曰四年冬公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇於仇讎而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝褊小闕而為罪寡君是以願借助焉晉侯許之五年穆叔覿鄫太子于晉以成屬鄫書曰叔孫豹鄫太子巫如晉言比諸魯大夫也莘老孫氏曰鄫世子巫書如者以我大夫偕也左氏謂之比魯大夫蓋失之矣愚謂以理勢觀之莒欲滅鄫鄫欲依晉以固安故託魯以往觀戚之會鄫人與焉情可知矣若請屬鄫鄫遂為魯附庸則戚之會鄫不復與矣餘見五年戚之會公羊曰外相如不書此何以書為叔孫豹率而與之俱也叔孫豹則曷為率而與之俱蓋舅出也莒將滅之故相與往殆乎晉也莒將滅之則曷為相與往殆乎晉取後乎莒也其取後乎莒奈何莒女有為鄫夫人者蓋欲立其出也公羊言莒將滅之一句得之餘皆妄也夫既曰莒將滅鄫又曰莒女為鄫夫人欲立其出是自相戾也此即榖梁所謂莒非滅也立異姓蒞祭祀滅亡之道之意但不明言耳讀者不可不察也榖梁曰外不言如而言如為我事往也按齊侯鄭伯如紀外未嘗不言如也仲孫蔑衛孫林父會吳于善道榖梁曰吳謂善伊為稻緩號從中國名從主人吳人方言未嘗謂善伊為稻緩設使有之非為本義楚殺其大夫公子壬夫左氏曰書曰楚殺其大夫公子壬夫貪也君子謂楚共王于是不刑詩曰周道挺挺我心扄扄講事不令集人來定已則無信而殺人以逞不亦難乎夏書曰成允成功劉氏曰傳曰楚人討陳叛故曰由令尹子辛實侵欲馬乃殺之書曰楚殺其大夫公子壬夫貪也此傳解經言壬夫貪殺之當也又曰君子謂楚共王於是乎不刑夫共王殺壬夫謂之貪而當是共王之刑無失也傳指言貪以著其惡共王殺之可謂不刑乎解經若此取舍安從哉葉氏曰雞澤之盟傳言楚子辛為令尹侵欲小國陳成公使袁僑如會求成今以為貪當矣則安得復謂共王為不刑哉公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚左氏曰九月丙午盟于戚會吳且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命于會按經無月日而傳有之經曰會而傳曰盟舍傳信經可也其曰屬鄫不利左氏目為之言也蓋左氏見叔孫豹與鄫世子如晉而不係以事故妄意其屬鄫至此又見鄫人列于會故又妄意穆叔為不利而使鄫仍聽命于晉且四年冬公如晉時公與孟獻子既請于晉以屬鄫而晉已許之矣何必又使叔孫豹與鄫世子如晉以成屬鄫乎曽未踰年穆叔又以屬鄫為不利而還鄫于晉魯之拔來報往如此晉肯一聽魯之從違無是理也公羊曰吳何以稱人吳鄫人云則不辭劉氏曰公羊曰吳何以稱人吳鄫人云則不辭是也言不可以為文辭也然公羊問吳何以稱人者是謂吳不當稱人也則非矣各有所施此年會吳于善道其君在位也今會吳人于戚其臣來會也君臣異辭此所以不同非為欲抑鄫人故進吳子為人也愚謂春秋之初夷狄君臣同辭春秋之末夷狄漸同乎中國君始稱爵臣始稱名凡書會吳者未必皆君也冬戍陳公羊曰孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也按魯史書戍陳乃紀一國之事然以上下事觀之知諸侯之亦戍耳非離至不可得而序故言我也若當時晉侯命諸侯戍之魯史書諸侯戍陳夫亦何傷但魯史録內事書戍陳孔子因之不可得而加耳公至自救陳榖梁曰喜救陳也辨見莊二十八年辛未季孫行父卒左氏曰季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎存耕趙氏曰行父仕魯更三君矣専秉國政為三家之始禍以區區之儉而蓋其大不忠之過方仲遂殺適立庶行父為之如齊以成謀及宣公薨乃蔽罪於東門氏而逐歸父虧姑以成婦為正卿而不終其君左氏謂之忠君其將誰欺六年春王三月壬午杞伯姑容卒左氏曰杞桓公卒始赴以名同盟故也杞入春秋至此始名者史有詳略與闕文耳豈有前此赴而不以名至此以同盟而赴以名之理乎夏宋華弱來奔左氏曰宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱于朝平公見之曰司武而梏於朝難以勝矣遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也専戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初按華弱司馬也樂轡豈敢不告於君而自以弓梏之於朝乎不可信一也平公見司馬為同僚所梏不能正刑樂轡乃謂華弱懦而逐之不可信二也平公不能刑樂轡子罕乃逐樂轡不可信三也樂轡既為子罕所逐又射其門而子罕善之如初則是非逐也一試其強弱而已不可信四也蓋左氏因其弱之名而實以弱之事耳不可據也莒人滅鄫左氏曰鄫恃賂也葉氏曰叔孫豹與鄫世子巫如晉會復使鄫大夫聽命於會故經書吳人鄫人則鄫非魯所有矣其亡何責於魯哉鄫既為國則貢賦自不入于魯左氏乃言恃賂尤見其妄若季武子如晉見者是也此始為卿代父執政往見伯主而傳誤以鄫事附益之爾愚謂左氏自言屬鄫不利而歸鄫於晉矣至此又言恃賂其自戾如此則魯屬鄫還鄫之事妄矣榖梁曰非滅也中國日卑國月夷狄時繒中國也而時非滅也家有既亡國有既滅滅而不自知由别之而不别也莒人滅繒非滅也立異姓以蒞祭祀滅亡之道也陸氏曰定六年鄭滅許哀元年許復見于經則鄫之滅而再見亦何足怪若鄫人實娶外孫以為國嗣罪自在鄫非莒之過不得誣莒以滅鄫之罪莘老孫氏曰公羊於鄫世子如晉發傳曰莒女有為鄫夫人者欲立其出榖梁于此又曰立異姓以蒞祭祀然則鄫嘗立異姓為後而經遂書滅不惟于義不明亦何以為訓此蓋莒人因鄫不順立異姓之君而滅之耳非謂異姓為君而遂書滅也公榖皆得一偏耳黃氏曰莒之滅鄫春秋具有本末榖梁乃以鄫立莒之子為子神不歆異姓之祀為滅雖胡安國獨宗其説而劉氏孫氏戴氏皆嘗辨其非朴鄉吕氏曰此直是莒人滅鄫爾季孫宿如晉左氏曰晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命劉氏曰左氏曰五年夏叔孫豹鄫世子巫如晉鄫始屬魯其年秋穆叔以屬鄫為不利使鄫人聽命于會故經書吳人鄫人則是魯已辭鄫矣晉已知之矣今鄫之滅非魯責也晉人何以來討邪又曰莒人滅鄫鄫恃賂也若鄫于魯有屬無絶或恃賂慢莒以取滅亡今魯己絶鄫鄫無賦於魯矣尚何所恃而取滅邪然則傳所言皆不實也黃氏曰滅鄫者莒也晉不問莒而反問魯何邪朴鄉吕氏曰以經考之則莒與鄫同預戚之會莒之滅鄫正晉之所當討於莒也而反討于魯何哉十有二月齊侯滅萊左氏曰遷萊於郳髙厚崔杼定其田按經傳皆言滅萊則是夷社稷宗廟而不存矣左氏又言遷萊于郳則是萊猶存也特遷之耳春秋曷不書齊侯遷萊于郳而書齊侯滅萊乎七年夏四月三卜郊不從乃免牲左氏曰孟獻子曰吾乃今而後知有卜筮夫郊祀后稷所以祈農也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也葉氏曰以啓墊為當郊耕而後卜郊所以不從此獻子之妄也魯郊一上辛也魯雖以賜得郊而不得與周同故自建子之月卜之至建寅之月三卜而得吉適與周祈榖之祭同而魯郊非祈榖也亦何事於啓蟄乎蓋獻子嘗謂正月日至可以有事於上帝七月日至可以有事於祖矣其意蓋將僣周日至之郊故以是為啓蟄之莭殆欲兼周而多之歟記禮者不察遂以為魯君孟春祀帝于郊配以后稷季夏六月以禘禮祀周公於太廟左氏從而實之以啓蟄為經例其亦未嘗以周公得郊之故考之也愚謂葉氏辨獻子左氏之言是矣其曰自建子之月卜之至建寅之月則又惑於周正改月數之説也榖梁曰夏四月不時也三卜禮也乃者亡乎人之辭也三卜而不吉則神不歆非類可知矣榖梁乃曰禮邪餘見僖三十一年秋季孫宿如衛左氏曰秋季武子如衛報子叔之聘且辭緩報非二也黃氏曰子叔之聘七年矣宿初執政自締私交也鄭伯髠頑如會未見諸侯丙戍卒于鄵左氏曰鄭僖公之為太子也於成之十六年與子罕適晉不禮焉又與子豐適楚亦不禮焉及其元年朝于晉子豐欲訴諸晉而廢之子罕止之及將會于鄬子駟相又不禮焉侍者諌不聽又諌殺之及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯簡公生五年奉而立之趙氏曰諸侯死例書名此則為上文已言鄭伯如會下不可又云鄭伯髠頑卒又不可上言鄭伯如會下但言髠頑卒所以須于會時書名以便文也三傳不達此體見其文特異不能釋得遂妄云被殺若實見弒而以疾赴則從而書之邪諸國弒君豈有實告乎劉氏曰凡議春秋者必曰亂臣賊子懼亂臣賊子懼者以其書法不隱而善惡明也左氏亦云求名而亡欲蓋而彰善人勸焉淫人懼焉夫臣弒其君欲蓋者也春秋順其欲而不彰則何懼矣彼亂臣賊子知偽赴之可以免罪則又毋乃勸乎爾是由春秋啓之也奈何哉王氏曰諸侯方會其郊子駟其敢然乎黎氏曰若言實被弒以疾赴遂從而書之則弒君豈有實告乎木訥趙氏曰若實弒而書卒是春秋庇逆賊也存耕趙氏曰鄭自雞澤以來役從會至侵蔡以絶楚自子囊伐鄭子駟方倡從楚之謀觀戲之爭盟辭義甚正皆不敢爭必非敢為不義者使其樂於從楚何僖公未死之前安於從晉哉朴鄉吕氏曰諸侯不生名此其名之者以其卒也與吳子遏伐楚門于巢卒同從省文也諸侯卒於國都不地此其地以其不在於國都也為如會而卒也故地與宋公佐卒于曲棘同未見諸侯而卒與許男卒于師同而説者徒見其文之異又其去楚而復中國三年遂同諸侯盟于雞澤五年使大夫來聘又會諸侯于戚又會諸侯救陳數年之間未嘗有從楚之迹至是諸侯會于鄬而鄭伯如會而卒于鄵春秋諸侯不生名為其如會未見諸侯而卒春秋省文不可再言鄭故一書之於如會之上三傳不知春秋省文之義但見鄭伯書名於如會之上遂以為鄭之諸臣欲從楚而鄭伯不欲弒而書卒若如其説則是鄭之大夫無從中國之意而獨鄭伯欲之則數年之前鄭伯合諸侯而背楚其大夫何故從之至是而始弒之也實見弒焉春秋皆不沒其事以傳信何獨鄭伯而不然乎八年夏葬鄭僖公公羊曰賊未討何以書葬為中國諱也賊不討不書葬辨見桓十八年葬桓公彼以為讎在外此又云為中國諱亦見其無一定之見不過隨意遷就而已鄭人侵蔡獲蔡公子燮公羊曰此侵也其言獲何侵而言獲者適得之也按鄭侵蔡蔡禦之不勝而燮被獲此理易見何必意其適得之乎榖梁曰人微者也侵淺事也而獲公子公子病矣按公子燮為將而見獲固為公子病然不責鄭之越喪侵蔡獲大夫而責公子之病亦無輕重之權衡矣季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘左氏曰季孫宿齊髙厚宋向戌衛寧殖邾大夫會之鄭伯獻捷于會故親聽命大夫不書尊晉侯也按春秋稱人而不書大夫名者微者也若以為尊晉侯而不大夫則襄十四年晉士丐會吳于向齊宋衛曹莒邾滕薛杞小邾皆稱人晉荀偃會齊宋曹莒邾滕薛杞小邾伐秦亦皆稱人凡若此者何所尊而不書大夫名乎然則左氏厯書三國之卿亦未可據也榖梁曰見魯之失政也公在而大夫會也劉氏曰公反矣未至國令季孫復往會耳晉侯使士丐來聘左氏曰公享之宣子賦摽有梅季武子曰誰敢哉今譬於草木寡君在君君之臭味也歡以承命何時之有武子賦角弓賔將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍受彤弓于襄王以為子孫藏丐也先君守官之嗣也敢不承命君子以為知禮非本義不録九年春宋災左氏曰二師令四鄉正敬享祝宗用馬于四墉祀盤庚于西門之外晉侯問于士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食於心或食于咮以出內火是故咮為鶉火心為大火陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火是以日知其有天道也公曰可必乎對曰在道國亂無象不可知也如左氏言大火在商而商主火商人閲其禍敗之釁必始於火則商當以火災亡國也而史傳不載商災商之亡也以紂不道非以災也宋商之後其敗於楚以求伯諸侯見伐以不能君皆非以災也茍大火在商而商必以災則齊陳鄭災周宣榭魯宣公雉門兩觀災皆以大火乎此蓋左氏見宋三書災而為此附會之言耳且四鄉正享祝宗用馬于四墉祀盤庚于西門皆非禮經之正故今擇其所敘人事之稍近理者附之夲義云公羊曰曷為或言災或言火大者曰災小者曰火然則內何以不言火內不言火者甚之也何以書記災也外災不書此何以書為王者之後記災也葉氏曰左氏經無書火者惟一見于周宣榭而公羊榖梁皆作災則春秋固不書火也二傳獨以陳災為火及公羊又以此宋災為火二傳但以大小國邑為辨故一之而不復較愚謂公羊嘗自言春秋為親者諱為尊者諱為尊者諱何得內有小火反甚之而為災邪夫齊豈王者後而莊二十年記大災邪榖梁曰外災不志此其志何也故宋也劉氏曰非也齊大災又豈故齊乎秋八月癸未葬我小君穆薑左氏曰穆薑薨於東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出薑曰亡是於周易曰隨元亨利貞無咎元善之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然固不可誣也是以雖隨無咎今我婦人而與亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣葉氏曰杜預以為穆薑淫僑如欲廢成公故徙居東宫據例夫人薨于寢則弗致今穆薑書夫人薑氏薨又書葬我小君穆薑則是嘗致之為夫人矣安得謂薨於東宫乎凡公不薨于寢如臺下楚宫髙寢之類經必謹而書之以正終穆薑審徙居東宫是嘗貶於成公既貶其母又不得薨于寢經何反不自地而以常法書乎曰今我婦人而與於亂穆薑雖有淫僑如之罪不應自暴其過如此則亦不近人情此蓋卜筮家者流假託穆薑為筮者之言傳不能辨而妄信之也冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲左氏曰晉人不得志於鄭以諸侯復伐之十二月癸亥門其三門閏月戊寅濟于隂阪侵鄭次于隂口而還子孔曰晉師可擊也師老而勞且有歸志必大克之子展曰不可按經言伐鄭而同盟矣左氏亦言晉姑盟而退修德息師終必獲鄭乃盟而還矣無緣即於斯時再侵伐鄭也此左氏見公不致而附會云爾榖梁曰不異言鄭善得鄭也不致耻不能據鄭也按伐鄭而同盟則鄭在盟矣觀楚子伐鄭則鄭與晉成可知也何必異言鄭哉且春秋不致者多矣何必為公耻哉十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤左氏曰三月癸丑齊髙厚相太子光以先會諸侯于鍾離不敬士莊子曰高子相太子以會諸侯將社稷是衛而皆不敬棄社稷也其將不免乎夏四月戊午會于柤此傳與經不合而日月亦不合榖梁曰會又會外之也劉氏曰非也會于戚吳人亦在何不外之乎會于申淮夷亦在何不外之乎陳嶽氏曰荀曰以夷狄而外則楚亦夷秦亦夷奚不外而獨外吳歟斯書諸侯會吳者以吳子在柤晉侯以諸侯往會之也辨又見成十五年鍾離之會夏五月甲午遂滅逼陽左氏曰晉侯以逼陽子歸獻于武宫謂之夷俘逼陽妘姓也使周內史選其族嗣納諸霍人禮也劉氏曰夫逼陽子竟何罪乎欲取其國以封向戌耳既己擅滅諸侯又擅以其地豫人罪孰大焉謂之禮何哉即以選其族姓納諸霍人為禮者諸侯誰不樂滅國乎苟滅國矣取其子孫償以一邑誰不樂為此乎且經書滅逼陽君死其位也傳云以逼陽子歸安得此子乎逼陽一國有二君可爾榖梁曰遂直遂也其曰遂何也不以中國從夷狄也按諸侯因會吳道減逼陽故曰遂耳左氏杜氏得之榖梁謂不以中國從夷狄妄也公至自會榖梁曰會夷狄不致惡事不致此其致何也存中國也中國有善事則并焉無善事則異之存之也汲鄭伯逃歸陳侯致柤之會存中國也葉氏曰公會晉侯及吳于黃也亦此會夷狄而書公自京師遂會諸侯伐秦傳謂之叛京師此乃惡事而書公至自伐則會夷狄與惡事未嘗不致也中國有善事則并如侵蔡蔡潰遂伐楚此同時事不得不并如會于柤五月甲午遂滅逼陽此各日事不得不異豈經故為異文哉鄭伯非弒何以為之弒陳侯實逃安得不言逃榖梁所謂汲鄭伯逃歸陳侯致柤之會皆非經意不足以為義愚謂桓二年公及戎盟于唐書公至自唐莊六年拒王命納庶孽于衛書公至自伐衛其他以惡事致者不可勝紀榖梁繆妄甚矣楚公子貞鄭公孫輒帥師伐宋左氏曰庚午圍宋門于桐門經言伐不言圍公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭左氏曰諸侯伐鄭齊崔杼使太子光先至于師故長于滕已酉師于牛首春秋之時禮義不明以強弱為先後故光處于滕薛之上而左氏每以先至為辭不足信也冬盜殺鄭公子騑公子發公孫輒榖梁曰稱盜以殺大夫弗以上下道惡上也劉氏曰非也若以盜者指其君乎殺其臣而謂之盜是不正其名也若以盜者固盜盜賊乎稱盜乃宜矣又何云弗以上下道也如榖梁子之意以上下道則曰盜殺其大夫乎則是大夫為盜之臣盜為大夫之君乃可乎哉戍鄭虎牢左氏曰諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉鄭及晉平按此傳與經無一合者經但言戍而左氏兼言城夫虎牢城于八年之前未必據壞也焉用再城而戍之且城梧及制而又戍之經必書之今不書則傳妄也二年城虎牢不言鄭而此言鄭夲義見之矣而左氏以為將歸之鄭而先書鄭此又妄之尤者杜氏又加之辭以為夫子追書係之于鄭展轉生訛徒以惑世而已何益於經哉公羊曰孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也諸侯已取之矣曷為繫之鄭諸侯莫之主有故反繫之鄭按不言諸侯戍之者蒙上諸侯伐鄭之文耳當時諸侯之兵皆在受晉之會而戍之不可以離至言也設使離春秋槩言諸侯戍鄭亦何傷於文義不可得而序乎虎牢繫之鄭者諸侯今為鄭戍之也非諸侯莫之主有而反繫之鄭也諸侯莫之主有獨曰虎牢不可乎何用必繫之鄭非鄭為主邪榖梁曰其曰鄭虎牢決鄭乎虎牢也劉氏曰非也城人之邑戍人之都繫必其國如其繫國矣乃常文又何決哉愚謂諸侯恃虎牢以謀楚鄭安得決而出諸外哉十有一年春王三月作三軍公羊曰三軍者何三卿也作三軍何以書譏何譏爾古者上卿下卿上士下士按禮固有大國三卿次國二卿小國一卿之説然此夲言作二軍增中軍之兵不但增一卿而已公羊但以上下卿上下士言之其未得所書之意乎又如公羊不分國之小大而但以上卿下卿言之則五等之爵皆二卿皆二軍乎榖梁曰作為也古者天子六師諸侯一軍作三軍非正也莘老孫氏曰按五等之爵當有隆殺諸侯之國當有大小安得皆一軍乎范氏曰周禮司馬法曰萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍其將皆命卿二千五百人為師然則此言天子六師凡萬有五千人大國三軍則三萬七千五百人諸侯制踰天子非義也總云諸侯一軍又非制也昭五年經曰舍中軍傳曰貴復正也然則魯有二軍今云作三軍增置中軍而魯為次國于此為明夏四月四卜郊不從乃不郊榖梁曰夏四月不時也四卜非禮也辨見成十年公至自伐鄭榖梁曰不以後致盟後復伐鄭也葉氏曰前出而伐鄭者未知鄭服而盟也告伐鄭也今雖盟而非其出告之事故復以伐鄭致也此理之常也後復伐鄭者盟後鄭猶與楚伐宋在公歸之後今何害于致盟哉楚子鄭伯伐宋左氏曰楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋如左氏説經當書楚子鄭伯秦師伐宋今經不書秦則無秦師也杜氏乃謂秦師不書不與伐宋而還夫楚子伐鄭有餘力也乃乞師于秦至伐宋乃還秦師無是理也且杜氏無所考不過億度之辭耳啖氏曰按經文勢鄭元屬楚未屬晉自與楚子伐宋耳傳言鄭與晉平故特妄加將以伐鄭四字葉氏曰鄭既未嘗從晉則楚何為而伐之經但書楚子鄭伯伐宋則楚固未嘗先伐鄭也蓋傳既言鄭與盟故意以為楚伐鄭鄭伯逆之然經亦不書秦詹則其事皆無有也啖葉二説未詳是否公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭會于蕭魚左氏曰公使臧孫紇對曰凡我同盟小國有罪大國致討茍有以藉手鮮不赦宥寡君聞命矣鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備凡兵車百乘歌鍾二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂旨君子殿天子之邦樂旨君子福祿攸同便蕃左右亦是帥從夫樂以安德義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福祿來逺人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑微子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之魏絳於是乎始有金石之樂禮也按晉悼公賢君也三年之中大勞諸侯而晉獨受鄭賂恐無是理且君受人之賂而臣分之左氏以為有禮豈不悖哉又自公使臧孫紇以下至此亦非此事正傳姑綴於此云公羊曰此伐鄭也其言會于蕭魚何蓋鄭與會爾此説近之公至自會榖梁曰伐而後會不以伐鄭致得鄭伯之辭也葉氏曰據左氏諸侯之師觀兵于鄭東門鄭人行成遂會于蕭魚蓋伐夲謀服鄭鄭既服故不復伐而從會所以致會榖梁謂得鄭伯而不致伐非也楚人執鄭行人良霄榖梁曰行人者挈國之辭也解行人而不解執行人之義冬秦人伐晉左氏曰秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴禦之少秦師而弗設備壬千武濟自輔氏與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也葉氏曰庶長秦孝公爵名不應先見于此既言晉師敗績當書秦師晉師戰于櫟晉師敗績何為經但書秦人伐晉乎且是時鄭已服諸侯同為蕭魚之役而歸矣安得尚言救鄭則秦伐疑自以他事凡傳所書皆非實故亦誤其爵名十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆左氏曰莒人伐我東鄙季武子救台遂入鄆取其鍾以為公盤此傳於經無所發明公羊曰邑不言圍此其言圍何伐而言圍者取邑之辭也伐而不言圍者非取邑之辭也劉氏曰非也伐一事也圍一事也取一事也三者不相亂明矣而猶云云不亦惑乎又此下有季孫宿救台即莒人已取之者尚何救哉又十五年齊侯伐我北鄙圍成公救成至遇公羊曰其言至遇何不敢進也是謂齊已取成矣明年又有齊侯伐我北鄙圍成即已取之者安得又有一成而取之乎又十五年公救成至遇下季孫宿帥師城成郛即齊已取之魯安得郛之乎榖梁曰伐國不言圍邑舉重也取邑不書圍安足書也按春秋書伐又言圍者多矣如隱五年宋伐鄭圍長葛之類是也曷可謂伐國不言圍哉原榖梁意謂此但當書伐不當言圍因下季孫救台而言圍爾非也圍自圍救自救春秋豈為救書圍哉秋九月吳子乘卒左氏曰秋吳子夀夢卒臨於周廟禮也凡諸侯之喪異姓臨于外同姓于宗廟同宗於祖廟同族於禰廟是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟劉氏曰杜氏以為周廟文王之廟非也禮諸侯不祖天子大夫不祖諸侯則文王之廟魯何以得有之孔子曰公廟之設於私家非禮也自三桓始也然則魯君僣上而立周廟三桓僣魯而設公廟矣左氏不知遂真謂禮然豈不誤哉以實言之凡諸侯之喪異姓臨於外同姓於祖廟同族於禰廟于義為足矣愚按經書吳子乘左氏書吳子夀夢未詳冬楚公子貞帥師侵宋左氏曰冬楚子囊秦庶長無地伐宋師于楊梁以報晉之取鄭也葉氏曰經書楚公子貞帥師侵宋不言同秦庶長無地亦非實其誤與前同公如晉左氏曰公如晉朝且拜士魴之辱禮也趙氏曰大國使聘即須自往拜之是公無寧嵗也而云禮也一何繆乎葉氏曰諸侯相朝己非矣豈有以大國聘而國君自往拜者謂之禮乎十有三年春公至自晉左氏曰春公至自晉孟獻子書勞於廟禮也趙氏曰按從朝還非有軍戎險難之事何書勞之有夏取邿左氏曰夏邿亂分為三師救邿遂取之凡書取言易也用大師曰滅弗地曰入劉氏曰非也春秋之興所以示後世法非記難易而已也難易何足記乎葉氏曰邿國也取非易辭也傳例曰凡勝國曰滅之獲大城曰入又曰克邑不用師徒曰取今又以取言易用大師曰滅以弗地言入蓋傳不明經故為多岐以幸其中獲大城與弗地二義猶不相逺若勝國與用大師則不知所謂取者亦屬之為附庸與取邑同辭者也秋九月庚辰楚子審卒左氏曰楚子疾告大夫曰不榖不德少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不德而亡師于鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋楚共王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之非本義不録然亦可見大夫私諡其君也冬城防左氏曰冬城防書時事也於是將早城臧武仲請俟畢農事禮也按勞民重事故春秋書之曰時曰禮皆非春秋意也十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人會吳于向左氏曰十三年吳侵楚養由基奔命子庚以師繼之養叔曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師十四年吳告敗于晉會于向為吳謀楚故也范宣子數吳之不德也以退吳人執莒公子務婁以其通楚使也將執戎子駒支范宣子親數諸朝曰來薑戎氏昔秦人追逐乃祖吾離于瓜州乃祖吾離被苫蓋蒙荆棘以來歸我先君我先君惠公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者蓋言語漏泄則職女之由詰朝之事爾無與焉與將執女對曰昔秦人負恃其衆貪于土地逐我諸戎惠公蠲其大德謂我諸戎四嶽之裔胄也毋是翦棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不二昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉于是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之戎何以不免自是以來晉之百役與我諸戎相繼于時以從執政猶殽志也豈敢離逖今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不逹何惡之能為不與於會亦無瞢焉賦青蠅而退宣子辭焉使即事於會成愷悌也於是子叔齊子為季武子介以會自是晉人輕魯幣而益敬其使劉氏曰此皆不實也諸侯解體非此戎之過審矣范宣子豈不知邪何以誣之哉去年搜于綿上傳曰晉國由是大和諸侯遂睦至此一年爾何故遽有言語漏泄不如昔者之事邪言與事不相應矣又曰宣子辭焉使即於會以成愷悌然則是薑戎列於會矣經何以不序乎杜氏曰戎為晉屬不得特達非也今范宣子使戎子即事于會去私屬比諸侯矣何故不書乎即以薑戎微法不當書殽之戰何以書也或以殽之戰時薑戎未為屬故得書者按戎子自云為先君不侵不叛之臣乃在文公之前不得云殽戰時未屬晉也推此數者知傳所敘都非信實康侯胡氏曰使舉上客而叔老並書者以內卿行則不得不書矣季孫宿以卿為介而不使之免叔老介於宿而不避蓋兩失之雖晉人輕其幣而敬其使於君命使人之體豈為得哉葉氏以會所以存好也吳既告敗晉為之合諸侯謀楚是將以援吳則安得復數其不德而退之乎使舉上客春秋之法也今季孫宿與叔老並書叔老豈介者乎此蓋以二卿並會如公子遂叔孫得臣並使齊者也愚謂以左氏所敘後事之不實則會吳以吳敗故者亦未可信之也夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫曹人莒人邾人滕人薛人杞人小邾人伐秦蠆左氏曰樂針曰此役也報櫟之敗也役又無功晉之耻也吾有二位於戎路敢不耻乎與士鞅馳秦師死焉士鞅反欒黶謂士丐曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦於是齊崔杼宋華閲仲江會伐秦不書惰也向之會亦如之衛北宫括不書于向書于伐秦攝也秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實章將於是乎在秦伯以為知言為之請於晉而復之劉氏曰左氏曰齊宋大夫不書惰也北宫括書于伐秦攝也非也于春秋何以辨之且又無大體非春秋夲義也愚謂欒針馳秦師而死士鞅奔秦等事皆未詳信否楚公子貞帥師伐吳左氏曰秋楚子為庸浦之役故子貞師于棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能相救吳人敗之獲楚公子宜榖葉氏曰按經書楚公子貞伐吳而已據傳所言當書吳敗楚師于臯舟獲公子宜榖安得止記楚伐吳乎吳勝不應不告楚敗不應反告伐其説皆不足據愚謂庸浦之役以前事考之亦不足據季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚左氏曰史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也按所引書非書夲旨十有五年春宋公使向戍來聘二月己亥及向戌盟于劉左氏曰宋向戍來聘且尋盟見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間辨見成三年自孟獻子以下皆贅語也劉夏逆王后于齊左氏曰官師從單靖公逆王后于齊卿不行非禮也趙氏曰若有單子經不應不書故知妄也公羊曰劉夏者何天子之大夫也劉者何邑也其稱劉何以邑氏也外逆女不書此何以書過我也任氏曰天子之公當書公如宰周公是也卿當書伯如召伯毛伯是也大夫當書字如宰渠伯糾是也惟士則書名如宰咺之類是也劉夏書名士也榖梁曰過我故志之也設使過我也春秋當書曰劉夏來遂逆王后于齊如祭公逆后之法又使魯史以過我志之不知孔子修春秋亦但以過我書之乎此公榖之見局于一隅者也冬十有一月癸亥晉侯周卒左氏曰鄭公孫夏如晉奔喪子蟜送葬非夲義不録十有六年公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟左氏曰晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸於是叔孫豹晉荀偃宋向戍衛寧殖鄭公孫蠆小邾大夫盟曰同討不庭趙氏曰按髙厚若已在會乃渝盟而逃歸經文不合不書僖五年會于首戴鄭伯逃歸不盟襄七年會于鄬陳侯逃歸並書以明其罪何得此獨不書左氏此傳都不足憑也公羊曰何言乎信在大夫遍刺天下之大夫也此非獨刺大夫亦刺諸侯之失政也榖梁曰諸侯會而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也大夫固不臣然非以不書諸侯而始見直敘其事而大夫之不臣自可見也雞澤之盟書諸侯者以其中有陳侯使袁僑如會之事故不書諸侯則文不明此不書諸侯者無事故直曰大夫耳杜氏注得之不勞更為義例秋齊侯伐我北鄙圍成左氏曰秋齊侯圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還齊侯舉兵伐魯圍邑何暇成人好勇之名而去之叔老會鄭伯晉荀偃衛寧殖宋人伐許左氏曰許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師會晉荀偃書曰會鄭伯為夷故也夏六月次于棫林庚寅伐許次于函氏劉氏曰左氏曰書曰會鄭伯為夷故也言諸侯之卿可以會伯子男故示之義云爾非也主兵者居上自其班列同于諸侯與諸侯相從卿大夫與卿大夫相從若列名位卿雖主兵猶序諸侯之下貴王爵也去諸侯而言主兵者自可見爾何疑哉愚謂此傳俱未可信何則遷國大事也豈有不先謀諸大夫哉今許請遷國而晉合諸侯以遷矣而大夫始不可無是理也况諸侯果遷許許始不可春秋不應不書以示義叔孫豹如晉左氏曰以寡君之未禘祀與民之未息不然不敢忘此禘祀自吉禘于莊公年來可見左氏之附會矣然其敘事頗詳姑附于夲義而辨禘祀之説于此云三傳辨疑卷十五
