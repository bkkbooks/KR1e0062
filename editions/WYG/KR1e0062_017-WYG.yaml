body:
  text: 三傳辨疑卷十七元程端學撰昭公元年春王正月公即位榖梁曰繼正即位正也榖梁但知繼正之為正而不知不請於王之為非正也是以以正許昭公焉叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢左氏曰㑹于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志於晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉況不信之尤者乎楚重得志於晉晉之恥也子相晉國以為盟主於今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有饑饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已晉人許之三月甲辰盟經但言㑹而傳言盟當以經為正公羊曰此陳侯之弟招也何以不稱弟貶曷為貶為殺世子偃師貶曰陳侯之弟招殺陳世子偃師大夫相殺稱人此其稱名氏以殺何言將自是弑君也今將爾辭曷為與親弑者同君親無將將而必誅焉然則曷為不於其弑焉貶以親者弑然後其罪惡甚春秋不待貶絶而罪惡見者不貶絶以見罪惡也貶絶然後罪惡見者貶絶以見罪惡也今招之罪已重矣曷為復貶乎此著招之有罪也何著乎招之有罪言楚之托乎討招以滅陳也劉氏曰公羊曰此陳侯之弟招也何以不稱弟貶也非也公羊以母弟稱弟故云爾不知母弟可以稱弟而不可以常稱稱皆以重書也且招之罪在殺世子偃師不在㑹于漷也聖人豈有迎其未然之事探其且然之罪以為貶哉推此而言傳云母弟稱弟不可通也又曰招之罪已重矣何為復貶於此著招之有罪也言楚之托乎討招以滅陳也亦非也夫殺世子此招之罪也滅陳之國此則非招之罪也以楚討招而滅陳而遂移罪於招豈春秋之理哉三月取鄆左氏曰季武子伐莒取鄆莒人告於㑹楚告於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其踁曰貨以藩身子何愛焉叔孫曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之有人之有牆以蔽惡也牆之隙壊誰之咎也衛而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也若子之羣吏處不避汚出不逃難其何患之有患之所生汚而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪又賞其賢諸侯其誰不欣焉望楚而歸之視逺如邇疆場之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可一於是乎虞有三苗夏有觀扈商有姺邳周有徐奄自無令王諸侯逐進狎主齊盟其又可一乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辨焉吳濮有釁楚之執事豈其顧盟莒之疆事楚勿與知諸侯無煩不亦可乎莒魯争鄆為日乆矣茍無大害於其社稷可無亢也去煩宥善莫不競勸子其圖之固請諸楚楚人許之乃免叔孫葉氏曰莒鄆非邑附庸之國也固不得為莒邑矣㑹以正月取以三月左氏謂三月諸大夫嘗同盟莒子愬於㑹非是㑹而盟未有不志於春秋者何為畧而不書乎公羊曰運者何内之邑也其言取之何不聽也劉氏曰鄆常見於春秋皆與莒事相附此莒之附庸明矣愚案公羊曰不聽者謂鄆本内邑而叛者也然經傳皆無内邑叛之文盖公羊見文十二年成四年城鄆而此復取鄆求其說而不得故設言叛耳殊不知有莒附庸鄆有魯鄆本自不同也夏秦伯之弟鍼出奔晉左氏曰秦后子有寵於桓如二君於景其母曰弗去懼選癸夘鍼適晉其車千乗書曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見葉氏曰子太叔世叔游吉也公孫揮行人子羽也此盖因論語所謂命禆諶草創者不達禆諶草創之義鑿為謀野之說是猶誤承孔父正色立朝之言而謂華督見孔父之妻于路承秦伯以千乗之富不能容其弟之言而謂秦鍼出奔車千乗先儒有知之矣此雖無害於經義可見傳承舊聞之誤而妄實以事者每如是也劉氏曰出奔者勢不得以千乗行又一日之享取幣八反非朝夕所可望皆不近事實者也盖舊說秦伯以千乗之富不能容其母弟傳者不知則以為鍼以千乗出奔矣記者不辨又增取幣八反之事公羊曰秦無大夫此何以書仕諸晉也曷為仕諸晉有千乗之國而不能容其母弟故君子謂之出奔也劉氏曰今經言奔此罪在鍼不在秦伯明矣何以見秦伯仕之於晉乎由是言之所謂秦無大夫者直虚言爾愚按秦伯爵伯七十里為次國次國二卿安得無大夫乎況經但言秦伯之弟未嘗言大夫也又秦鍼出奔實事也非君子譏其不容母弟而謂之出奔也榖梁曰諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也經書其弟紀實事而義自見耳亦非親之而特書其弟也晉荀吳帥師敗狄于大鹵左氏曰晉中行穆子敗無終及羣狄于大原崇卒也將戰魏舒曰彼徒我車所遇又阨以什共車必克困諸阨又克請皆卒自我始乃毁車以為行五乗為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後専為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之凡左氏未陳而薄之之說皆不識敗某師之義而為之辭耳辨見莊十年公敗齊師于長勺或問公羊曰此大鹵也曷為謂之大原地物從中國邑人名從主人原者何上平曰原下平曰隰按此說無可考若依公榖說當作大原未詳信否榖梁曰傳曰中國曰大原夷狄曰大鹵號從中國名從主人見公羊秋莒去疾自齊入于莒莒展輿出奔吳左氏曰君子曰莒展之不立棄人也夫人可棄乎詩曰無競維人善矣凡左氏引君子曰雖不甚害理者亦無意義叔弓帥師疆鄆田左氏曰叔孫帥師疆鄆田因莒亂也謂取鄆因莒亂則可謂疆田因莒亂則不可盖魯乗莒之亂而不能争鄆也故取之既取之則自然疆其田矣然至帥師而疆田本畏莒耳非因莒亂也公羊曰疆運田者何與莒為境也與莒為境則曷為帥師而往畏莒也劉氏曰非也成九年楚人伐莒莒潰楚人入鄆襄十二年莒人伐我圍台季孫宿救台遂入鄆今又取鄆疆鄆田此明鄆為莒附庸明矣鄆本屬莒故取其邑未得其地故帥師而往分明疆土且以理言魯大莒小何為乃畏莒哉季孫宿帥師入鄆豈自入其邑哉愚謂劉氏謂鄆為莒附庸是也謂帥師為不畏莒亦未必然榖梁曰疆之為言猶竟也案疆字在鄆田下可以釋之曰竟疆字在鄆田上不可釋之曰竟盖字義有動静故也如榖梁說可云竟鄆田乎冬十有一月己酉楚子麇卒楚公子比出奔晉左氏曰楚公子圍使公子黒肱伯州犂城犨櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弑之遂殺其二子幕及平夏右尹子干出奔晉宫廐尹子晳出奔鄭殺大宰伯州犂于郟𦵏王于郟謂之郟敖使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長子干奔晉從車五乗叔向使與秦公子同食皆百人之餼趙文子曰秦公子富叔向曰底禄以徳徳鈞以年年同以尊公子以國不聞以富且夫以千乗去其國彊禦已甚詩曰不侮鰥寡不畏彊禦秦楚匹也使后子與子干齒辭曰鍼懼選楚公子不獲是以皆來亦唯命且臣與羇齒無乃不可乎史佚有言曰非羇何忌楚靈王即位薳罷為令尹薳啓疆為太宰鄭游吉如楚𦵏郟敖且聘立君歸謂子産曰具行器矣楚王汰侈而自說其事必合諸侯吾往無日矣子産曰不數年未能也劉氏曰左氏曰公子圍入問王疾縊而弑之杜云楚以瘧疾赴故不書弑也楚公子比出奔晉左氏曰遂殺其二子幕及平夏右尹子于出奔晉杜云書名罪之皆非也若臣弑君託于瘧疾而可以免則亂臣賊子何懼矣而公子比又奚罪哉彼君弑國亂不忍其惡而出奔者也方宜乎見褒又何貶焉且如傳言則是公子圍罪大而經為之諱公子比無罪而經致其貶輕重失序非仲尼意矣吕氏曰經書楚子麇卒而左氏以為公子圍弑之至誅慶封則左氏榖梁又載慶封稱國弑君之語後世縁楚王汰侈遂以為實甚矣三傳之為經害也趙盾弑其君曰非盾也穿也許止弑其君曰不嘗藥也鄭伯髠頑如㑹禾見諸侯而卒曰子駟弑之也凡若此類皆誣偽失實重為經害使聖人之㫖不明害之大者也陸淳以為榖梁所稱季孫行父秃晉郤克眇孫良夫跛曹公子首僂同時而聘于齊齊侯使秃者御秃者眇者御眇者跛者御跛者僂者御僂者以此語為街談巷議之説又以垂隴之㑹鄭公子賦詩左氏委曲誣辭為多此類是也淳之論盖有未盡大抵公榖之論多街談巷議之說而左氏之說多委曲誣辭也其可信盖鮮矣學者欲由是而求聖人之意則惑之甚也黄氏曰經書卒而左氏稱公子圍縊弑之經傳不同當以經為正愚謂公子比出奔書於春秋殺太宰伯州犂乃不以殺大夫書則左氏之事俱未可信也朴鄉吕氏曰使楚子實弑則經不應沒而不書經不書則楚子非弑也明矣學者孰信信經而已矣二年春晉侯使韓起來聘左氏曰晉侯使韓宣子來聘且告為政而來見禮也觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也公享之季武子賦緜之卒章韓子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴于季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公按韓宣子為政豈有自來告之理盖其君使之聘以修好爾左氏又曰禮也何其輕許人哉餘非本義不録冬公如晉至河乃復季孫宿如晉公羊曰其言至河乃復何不敢進也按左氏晉人止公而復爾非畏晉而不敢進也榖梁曰恥如晉故著有疾也公如晉而不得入季孫宿如晉而得入惡季孫宿也按晉人止公故復爾非恥如晉故著有疾也三年春王正月丁未滕子原卒左氏曰同盟故書名按春秋諸侯卒皆書名故秦伯未嘗同盟而書秦伯罃卒何待同盟而後書名哉秋小邾子來朝左氏曰小邾子穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉逆羣好也其如舊而加敬焉季孫從之非本義不録八月大雩左氏曰旱也北燕伯欵出奔齊左氏曰北燕伯欵出奔齊罪之也按諸侯不能治其國而至于出奔固不君矣然非書曰北燕伯欵出奔齊以罪之也此論似是而非四年春王正月大雨雹左氏曰大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固隂沍寒於是乎取之其出之也朝之禄位賔食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之禄氷皆與焉大夫命婦喪浴用氷祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受氷山人取之縣人傳之輿人納之𨽻人藏之夫氷以風壯而以風出其藏之也周其用之也徧則冬無愆陽夏無伏隂春無淒風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札今藏川池之氷棄而不用風不越而殺雷不發而震雹之為災誰能禦之七月之卒章藏氷之道也康侯胡氏曰隂陽之氣和而散則為霜雪雨露不和而散則為戾氣曀霾雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍専執兵權以弱公室故數月之間再有大變申豐者季氏之孚也不肯端言其事故暴揚於朝歸咎藏氷之失山谷之氷藏之也周用之也徧亦古者本末備舉燮調之一事耳謂能使四時無愆伏淒苦之變雷出不震無災霜雹則亦誤矣意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏氷之道合於豳風七月之詩其能已乎存耕趙氏曰季孫専魯于君是隂逼陽也申豐不能明指其奸乃託之七月卒章黨惡崇奸莫甚焉五季亂晉雹起西北石勒問之韋訣亦謂春秋藏氷失道勒聞而遷氷室申豐之誤後世多矣秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴左氏曰宋華費遂鄭大夫從使屈申圍朱方八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之以盟諸侯王使速殺之遂以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造於中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縛受其璧焚其櫬王從之遷賴於鄢楚欲遷許於賴使鬭韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其孰堪之不堪王命乃禍亂也劉氏曰遂滅賴左氏曰賴子面縛銜璧非也經所謂滅者固謂君死其位者矣既曰死其位尚能面縛乎愚謂左氏曰宋華費遂鄭大夫從非也如其實然經當書二大夫於沈子之下矣今經不書是宋鄭不與也且楚圍弑君之事經實無之左氏之誤既辨之矣今慶封不應有楚圍弑君之說也若遷賴于鄢經當書曰遷賴如齊人遷陽之類不應曰滅賴也公羊曰此伐吳也其言執齊慶封何為齊誅也其為齊誅奈何慶封走之吳吳封之於防然則曷為不言伐防不與諸侯専封也慶封之罪何脅齊君而亂齊國也按楚本伐吳道過慶封邑遂殺之耳豈可謂不言伐防為不與諸侯専封哉榖梁曰此入而殺其不言入何也慶封封乎吳鍾離其不言伐鍾離何也不與吳封也慶封其以齊氏何也為齊討也靈王使人以慶封令於軍中曰有若齊慶封弑其君者乎慶封曰子一息我亦且一言曰有若楚公子圍弑其兄之子而代之為君者乎軍人粲然皆笑慶封弑其君而不以弑君之罪罪之者慶封不為靈王服也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也孔子曰懐惡而討雖死不服其斯之謂與遂滅厲遂繼事也按楚伐吳而執慶封何必言入乎且國曰入邑不言入也慶封不係之齊則人不知為齊慶封也故以齊氏耳夫以齊氏何足見其為討乎又楚圍弑君事經實無之九月取鄫左氏曰九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取劉氏曰非也若鄫自來則非魯取不可書取鄫矣且鄫之叛者誰乎上大夫也固當見經下大夫微者也亦當如邾庶其書之何故匿其名也杜曰不書奔者潰散而來將帥微也亦非也杜惡𫝊所說不與例合又恥左氏有不𫝊春秋之名遂為之文飾爾且傳言叛不言潰潰者在下叛者在上可知也縱其微甚猶當書之何遽違例而掩叛人乎愚謂春秋書魯取邑取國者多矣豈皆叛而來者歟豈皆不用師徒歟左氏之例不可通也公羊曰其言取之何滅之也滅之則其言取之何内諱大惡也此說近之但已前見今不復録劉氏辨其非亦恐未然五年春王正月舍中軍公羊曰舍中軍者復古也然則曷為不言三卿五亦有中三亦有中榖梁曰貴復正也葉氏曰用之為施免之為舍季氏始分公室毁而作三軍三家各有其一季氏為左軍仲氏為右軍則叔孫氏為中軍矣及叔孫豹卒季氏欲復兼二氏故毁其軍四分公室季氏擇二二子各一皆盡征之而貢於公昭十年季孫意如叔弓仲孫貜復以三軍伐莒哀二年季孫斯叔孫州仇仲孫何忌復以三軍伐邾則三軍之施舍初不係其征伐其將之不必皆二家之人但分其民與賦而已故作三軍而前已見四軍舍中軍而後復見三軍公榖或以為復正或以為復古皆不知其事而妄意之也愚謂以左氏考之所謂舍中軍者乃因叔孫豹卒而四分公室季氏擇二二子各一耳非三家知魯之不可三軍而舍其中軍以復古復正也公如晉左氏曰公如晉自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎君子謂叔侯於是乎知禮此論甚佳但非本義不録夏莒牟夷以牟婁及防兹來奔左氏曰牟夷非卿而書尊地也莒人愬于晉晉侯欲止公范獻子曰不可人朝而執之誘也討以不師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公按莒大夫以邑來奔不書其人則人不知其為何人故書其名耳且小國一卿其有大夫可知也豈為尊地而始書牟夷之名乎且受莒地者季孫也晉人豈不知公之不與而欲執公乎則左氏執公之說亦未可盡信公羊曰莒牟夷者何莒大夫也莒無大夫此何以書重地也其言及防兹來奔何不以私邑累公邑也案書及者别二邑耳與城諸及防同義豈為私邑公邑而書及哉重地之說辨見左氏榖梁曰以者不以者也來奔者不言出及防兹以大及小也莒無大夫其曰牟夷何也以地來也以地來則何以書也重地也按書及别二邑耳非以大及小也辨見左氏戊辰叔弓帥師敗莒師于蚡泉左氏曰莒人來討不設備叔弓敗諸蚡泉莒未陳也按内勝外皆言敗某師魯史常法也左氏不曉其義毎以不設備未陳為言讀者亦可以少覺矣辨又見莊十年長勺或問公羊曰濆泉者何直泉也直泉者何涌泉也趙氏曰公羊有釋蚡泉之義前後地名未曾解說何獨釋此且三𫝊字又不同莫知孰是故不足取榖梁曰狄人謂賁泉失台號從中國名從主人按賁泉者魯地名耳何必多為說而舍其本義不論哉秦伯卒公羊曰何以不名秦者夷也匿嫡之名也其名何嫡得之也髙氏曰秦景公立四十年子哀公史皆失其名春秋書其卒者罪中國諸侯逺赴其喪也愚謂設使如公羊言匿嫡而不以名令于四竟亦其初生與未立之時耳及其既立則人知其名矣況其死乎況匿嫡者公羊之億辭耳冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳左氏曰楚使沈尹射待命于巢薳啓疆待命于雩婁禮也夷狄兵争使人待命何禮之有左氏妄許人以禮類如此六年春葬秦景公左氏曰大夫如秦葬景公禮也夷狄與中國同以中國㑹夷狄𦵏而以為禮豈不悖哉夏季孫宿如晉左氏曰季孫宿如晉拜莒田也按前年莒牟夷以牟婁及防兹來奔非晉之力安得如晉拜莒田也茍指元年疆鄆田則鄆田非莒田又在六年之後茍謂别有莒田則不經見楚薳罷帥師伐吳左氏曰徐儀楚聘于楚楚子執之逃歸懼其叛也使薳洩伐徐吳人救之令尹子蕩帥師伐吳師于豫章而次于乾谿吳人敗其師於房鍾獲宫廐尹棄疾子蕩歸罪於薳洩而殺之叔弓如楚聘且弔敗也劉氏曰非也若如𫝊言吳真敗楚經何以不書乎杜氏曰歸罪于薳洩不以敗告故不書亦非也若楚不赴于魯亦不弔敗矣今魯弔之是楚嘗以敗赴于魯也經何得無其事乎髙氏曰楚恃強暴雖敗猶諱之魯豈敢弔乎盖四年公不㑹申已而楚兵日盛將朝楚而不能故以叔弓先聘明年而躬繼之也齊侯伐北燕左氏曰十一月齊侯如晉請伐北燕也士匄相士鞅逆諸河禮也晉侯許之十二月齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不貳吾君賄左右諂諛作大事不以信未嘗可也按齊欲伐北燕未必請于晉且士匄相士鞅逆諸河何以為禮乎七年春王正月暨齊平左氏曰春王正月暨齊平齊求之也癸巳齊侯次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪公孫晳曰受服而退俟釁而動可也二月戊午盟于濡上燕人歸燕姬賂以瑶罋玉櫝斚耳不克而還莘老孫氏曰左氏以為暨齊平者燕也按去年齊侯伐燕左氏見其間無異事故云爾不知外國平書宋人及楚平是也襄二十四年我侵齊二十五年齊伐我北鄙齊魯之好遂絶至是和平之後叔孫婼如齊莅盟是盟齊魯為此平也黄氏曰戴氏以定十年及齊平為比木訥趙氏以下文叔孫婼如齊涖盟為證劉氏曰左氏云齊求之也杜云齊伐燕燕人賂之反從求平也予謂杜氏之說與𫝊意錯𫝊所云齊求之者似指齊求魯為平也其下乃云癸巳齊侯次于虢燕人行成若謂齊已暨燕平則齊侯無縁更進次于虢而燕乃行成也且齊侯伐燕燕人賂之則𫝊當云燕求之經當書暨燕平不當反云齊求之暨齊平也杜又注云前年冬齊伐燕間無異事故不重言燕從可知此杜欲引州公寔來為比彼州公寔來之文卓詭非常乃可爾非此之類也試復以事推之自昭公即位已來未嘗與齊通好此年三月叔孫婼如齊涖盟此則魯與齊平之驗矣亦猶定十一年冬及鄭平叔還如鄭涖盟云其文也其理也其事也三襲焉章灼不疑愚按如孫氏說則左氏誤如劉氏說則杜氏自誤縁左氏不明故也榖梁曰平者成也暨猶暨暨也暨者不得已也以内及外曰暨按釋文爾雅但訓暨曰與曰及而己未有暨暨之義不若平解而義自見也叔孫婼如齊涖盟榖梁曰涖位也内之前定之辭謂之涖外之前定之辭謂之來涖臨也内大夫往齊臨盟不可以位訓涖也外大夫來魯謂之來不可以前定訓來也夫内與外盟外與内盟有前定者焉有不前定者焉内皆曰涖外皆曰來豈可一以前定為說又豈可以前定訓涖與來乎夏四月甲辰朔日有食之左氏曰晉侯問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地於是有災魯實受之其大咎其衛君乎魯將上卿公曰詩所謂彼日而食于何不臧者何也對曰不善政之謂也國無政不用善則自取謫於日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時存耕趙氏曰日食隂干陽也當是時楚禍中國列國政在大夫士文伯謂去衛如魯衛大魯小則非也秋八月戊辰衛侯惡卒左氏曰秋八月衛襄公卒晉大夫言於范獻子曰衛事晉為睦晉不禮焉庇其賊人而取其地故諸侯貳詩曰䳭鴒在原兄弟急難又曰死喪之威兄弟孔懐兄弟之不睦於是乎不弔況逺人誰敢歸之今又不禮於衛之嗣衛必叛我是絶諸侯也獻子以告韓宣子宣子說使獻子如衛弔且反戚田衛齊惡告喪于周且請命王使成簡公如衛弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉非本義不録榖梁曰鄉曰衛齊惡今曰衛侯惡此何為君臣同名也君子不奪人名不奪人親之所名重其所以來也王父名子也榖梁不解經意但以君臣同名為辭抑末矣且君子雖不奪人名為臣者獨不可改名以避君名乎九月公至自楚左氏曰九月公至自楚孟僖子病不能相禮乃講學之茍能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也而滅於宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命兹益共故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是鬻於是以餬余口其恭也如是臧孫紇有言曰聖人有明徳者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬說與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也詩曰君子是則是傚孟僖子可則傚已矣非本義不録自仲尼以下又皆左氏自為之言也十有二月癸亥葬衛襄公左氏曰衛襄公夫人姜氏無子嬖人婤姶生孟縶孔成子夢康叔謂已立元余使羈之孫圉與史茍相之史朝亦夢康叔謂已余將命而子茍與孔烝鉏之曾孫圉相元史朝見成子告之夢夢協晉韓宣子為政聘于諸侯之嵗婤姶生子名之曰元孟縶之足不良弱行孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列于宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎故孔成子立靈公十二月癸亥葬衛襄公非本義不録八年春陳侯之弟招殺陳世子偃師榖梁曰鄉曰陳公子招今曰陳侯之弟招何也曰盡其親所以惡招也兩下相殺不志乎春秋此其志何也世子云者唯君之貳也云可以重之存焉志之也諸侯之尊弟兄不得以屬通其弟云者親之也親而殺之惡也劉氏曰鄉也陳公子者乃其常稱爾愚謂諸侯之尊弟兄不得以屬通以君臣之分言之則招皆為臣而謂之公子招以骨肉之親言之則招者陳侯之弟也故春秋常稱謂之公子招遇事而見義者則謂之陳侯之弟此皆魯史之常法孔子因之以見義者也非盡其親以惡招也亦非親之以見惡也若榖梁者意員而語滯者也且兩下相殺安有不志者乎宣十五年王札子殺召伯毛伯非兩下相殺者乎夏四月辛丑陳侯溺卒左氏曰夏四月辛亥哀公縊𫝊之日與經不合𫝊之事亦未可信叔弓如晉左氏曰石言于晉魏榆晉侯問於師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力彫盡怨讟並作莫保其性石言不亦宜乎於是晉侯方築虒祁之宫叔向曰子野之言君子哉君子之言信而有徵故怨逺於其身小人之言僣而無徵故怨咎及之詩曰哀哉不能言匪舌是出唯躬是瘁哿矣能言巧言如流俾躬處休其是之謂乎是宫也成諸侯必叛君必有咎夫子知之矣非本義不録楚人執陳行人干徵師殺之陳公子留出奔鄭榖梁曰稱人以執大夫執有罪也稱行人怨接於上也春秋凡書執殺者皆稱人豈皆有罪者邪凡書執殺行人正譏其不當執殺使者也非稱行人怨接上也秋蒐于紅左氏曰秋大蒐于紅自根牟至于商衛革車千乗按經止言蒐而不言大公榖亦同左氏乃謂大蒐自根牟至於商衛革車千乗當以經為正公羊曰蒐者何簡車徒也何以書盖以罕書也春秋書蒐于紅譏其非時非地耳豈以罕書哉榖梁曰秋蒐于紅正也因蒐狩以習用武事禮之大者也艾蘭以為防置旃以為轅門以葛覆質以為􅈏流旁握御轚者不得入車軌塵馬候蹄揜禽旅御者不失其馳然後射者能中過防弗逐不從奔之道也面傷不獻不成禽不獻禽雖多天子取三十焉其餘與士卒以習射於射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也春秋不書常事而以蒐于紅為正大義不明而議春秋其失也宜冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐左氏曰宋戴惡㑹之十一月壬午滅陳杜氏曰壬午十月十八日𫝊言十一月誤愚按宋戴惡㑹之經亦不書榖梁曰惡楚子也此說是也而未明葬陳哀公左氏曰輿嬖袁克殺馬毁玉以葬楚人將殺之請寘之既又請私私於幄加絰於顙而逃按黎氏以為楚𦵏之盖蒙上楚師滅陳之文也言至有理見之本義矣然左氏見陳既滅知魯不㑹葬故撰袁克之事以實之甚矣其善為妄辭也觀此則其他附㑹從可知矣榖梁曰不與楚滅閔之也榖梁盖不見楚子葬陳哀公故有不與楚滅閔之之說茍知蒙上文楚師滅陳之文則自無此說矣九年春叔弓㑹楚子于陳左氏曰叔弓宋華亥鄭游吉衛趙黶㑹楚子于陳與經不合未詳信否或聖人據魯史之事而左氏取諸國之史亦未可知也許遷于夷左氏曰二月庚申楚公子棄疾遷許于夷實城父取州來淮北之田以益之伍舉授許男田然丹遷城父人於陳以夷濮西田益之遷方城外人於許按經書許遷于夷乃自遷之文而𫝊云楚遷之當以經為正夏四月陳災左氏曰夏四月陳災鄭禆竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年按此等語皆不經之論公羊曰陳已滅矣其言陳火何存陳也曰存陳悕矣曷為存陳滅人之國執人之罪人殺人之賊葬人之君若是則陳存悕矣榖梁曰國曰災邑曰火火不志此何以志閔陳而存之也莘老孫氏曰公榖皆以災為火春秋火不書災則書爾又曰存陳幸而陳有災故可復見不幸無事則雖欲存之不可得也愚謂聖人未嘗不欲存滅國也然不在書陳災而見存陳也其曰邑曰火亦妄也秋仲孫貜如齊左氏曰孟僖子如齊殷聘禮也諸侯不聘天王而私相聘左氏乃以為禮冬築郎囿左氏曰冬書時也左氏謂時是得而築之也春秋奚書哉然以冬為書時亦可見左氏之用夏正也十年九月叔孫婼如晉𦵏晉平公左氏曰戊子晉平公卒鄭伯如晉及河晉人辭之游吉遂如晉九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉𦵏平公也鄭子皮將以幣行子産曰喪焉用幣用幣必百兩百兩必千人千人至將不行不行必盡用之幾千人而國不亡子皮固請以行既𦵏諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聽叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之實難將在行之夫子知之矣我則不足書曰欲敗度縱敗禮我之謂矣夫子知度與禮矣我實縱欲而不能自克也昭子至自晉大夫皆見髙彊見而退昭子語諸大夫曰為人子不可不慎也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫輦而歸君親推之其子不能任是以在此忠為令徳其子弗能任罪猶及之難不慎也喪夫人之力棄徳曠宗以及其身不亦害乎詩曰不自我先不自我後其是之謂乎非本義不録十有二月甲子宋公成卒左氏曰冬十有二月宋平公卒初元公惡寺人栁欲殺之及喪栁熾炭于位將至則去之比𦵏又有寵非本義不録十有一年夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡左氏曰景王問於萇𢎞曰今兹諸侯何實吉何實凶對曰蔡凶此蔡侯般弑其君之嵗也嵗在豕韋弗過此矣楚將有之然壅也嵗及大梁蔡復楚凶天之道也般弑君父世有人焉般即誅矣豈有嵗在豕韋而般弑君復遇豕韋而般見討之理乎與嵗及大梁蔡復楚凶等語皆不經之論公羊曰楚子䖍何以名絶曷為絶之為其誘討也此討賊也雖誘討之則曷為絶之懐惡而討不義君子不與也按蔡般弑逆十三年矣楚子有意於討則討之久矣今此誘蔡侯直欲得其國耳不特懐惡而討不義也公羊又以名楚子為絶之亦非也邾人嘗用鄫子矣楚人嘗用蔡世子矣至惡也而春秋未嘗名何獨於此名以絶之乎榖梁曰何為名之也夷狄之君誘中國之君而殺之故謹而名之也稱時稱月稱日稱地謹之也夷狄之君誘中國之君而殺之固可罪也然不以名見義名而見義一字褒貶之弊也其稱地亦非謹之也紀實事也使不稱地則殺之何所乎大蒐于比蒲左氏曰五月齊歸薨大蒐于比蒲非禮也得之公羊曰大蒐者何簡車徒也何以書盖以罕書也大蒐于夫人薨之時而公羊乃曰以罕書何其繆哉仲孫貜㑹邾子盟于祲祥左氏曰孟僖子㑹邾莊公于祲祥修好禮也趙氏曰按春秋聖㑹多矣何獨於有喪之時而稱得禮是時又無大患邾又小國何能有救患之益而汲汲云禮葉氏曰盟多矣𫝊於此特言禮盖謂齊歸薨不廢修好發例案邾魯前此未有怨而不可釋者何遽而盟若但為好是忘哀也以是為禮孰不可以為禮秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憖左氏曰楚師在蔡晉荀吳謂韓宣子曰不能救陳又不能救蔡物以無親晉之不能亦可知也已為盟主而不恤亡國將焉用之秋㑹于厥憖謀救蔡也鄭子皮將行子産曰行不遠不能救蔡也蔡小而不順楚大而不徳天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣晉人使狐父請蔡於楚弗許葉氏曰文九年公子遂㑹晉人等救鄭傳以為趙盾宋華耦衛孔達許大夫也緩不及楚師故皆書人以懲不恪襄三年晉人等㑹于澶淵宋災故傳以為叔孫豹晉趙武齊公孫蠆宋向戍衛北宫佗鄭罕虎及小邾之大夫也謀歸財而後無歸故皆書人以尤不信此果為救蔡邪則當書救而後不果邪則前緩不及師且見貶況不行乎救災捍患諸侯之義也宋災無歸財則貶蔡圍謀救不果而無貶吾莫知其說矣然則此㑹適在楚圍蔡之時故𫝊意云爾愚按三年王其有咎美惡周必復之說與公子棄疾圍蔡𫝊同為不經之論九月己亥𦵏我小君齊歸左氏曰九月𦵏齊歸公不慼晉士之送葬者歸以語史趙史趙曰必為魯郊侍者曰何故曰歸姓也不思親祖不歸也叔向曰魯公室其卑乎君有大喪國不廢蒐有三年之喪而無一日之慼國不恤喪不忌君也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國此格言也但非本義不録公羊曰齊歸者何昭公之母也以前見不録冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之公羊曰此未逾年之君也其稱世子何不君靈公不成其子也不君靈公則曷為不成其子誅君之子不立非怒也無繼也惡乎用之用之防也其用之防奈何盖以築防也康侯胡氏曰非也楚䖍殺蔡侯般棄疾圍其國凡八月而見滅世子在窮迫危懼之中國未暇立乎其位安得為未逾年之君而稱子也愚謂蔡般弑逆人所當討然僥倖在位十三年其義雖不君之然春秋亦據實書曰蔡侯般矣何至此反不成其子乎設使不成其子安得反稱世子乎且經書用之謂祭神也與邾人用鄫子同公羊又以為築防何氏又強為解釋曰持其足以頭築防可謂至為怪妄者也榖梁曰此子也其曰世子何也不與楚殺也一事注乎志所以惡楚子也按蔡有居喪已立謂之子未立謂之世子豈有不與楚殺而特稱世子之理乎稱用世子自足以惡楚子但稱世子豈足以惡楚子乎十有二年春齊髙偃帥師納北燕伯于陽左氏曰齊髙偃納北燕伯欵于唐因其衆也按經但言納北燕伯于陽左氏云因唐之衆未詳信否公羊曰伯于陽者何公子陽生也子曰我乃知之矣在側者曰子茍知之何以不革曰如爾所不知何春秋之信史也其序則齊桓晉文其㑹則主㑹者為之也其辭則丘有罪焉爾按昭三年經書北燕欵出奔齊今經又書齊髙偃納北燕伯于陽其為諸侯明矣公羊乃摘伯于陽三字而以為公子陽生不惟昧經㫖雖訓詁亦懵然也而又引孔子之言以實之使孔子既明知其為臣而非君乃以爾所不知而不敢改正而又稱春秋為信史皆妄也其惑後世甚矣榖梁曰納者内不受也燕伯之不名何也不以髙偃挈燕伯也按諸侯奔而名者别其為何君耳非貶而名之也燕伯不名出奔時已前見耳非不以髙偃挈燕伯也楚殺其大夫成熊左氏曰書曰殺其大夫成熊懐寵也凡春秋書殺其大夫譏専殺耳非謂懐寵而書殺其大夫也冬十月公子憖出奔齊左氏曰季平子立而不禮於南蒯南蒯謂子仲吾出季氏而歸其室於公子更其位我以費為公臣子仲許之南蒯語叔仲穆子且告之故季悼子之卒也叔孫昭子以再命為卿及平子伐莒克之更受三命叔仲子欲搆二家謂平子曰三命踰父兄非禮也平子曰然故使昭子昭子曰叔孫氏有家禍殺嫡立庶故婼也及此若因禍以斃之則聞命矣若不廢君命則固有著矣昭子朝而命吏曰婼將與季氏訟書辭無頗季孫懼而歸罪於叔仲子故叔仲小南蒯公子憖謀季氏憖告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊葉氏曰按魯大夫出奔未有不書於經者今但見冬十月憖出奔齊而不見如晉是未嘗往晉也杜預謂還不復命而奔故史不書盖傳言憖與叔仲小南蒯謀季氏而從公如晉南蒯以費叛憖聞亂及郊奔齊故云耳是亦不然公孫歸父亦謀季氏不克而奔者經先書公孫歸父如晉後書歸父還自晉至笙遂奔齊公孫敖以非禮而逃者經亦先書公孫敖如京師不至而復而後書奔莒何憖而獨不書乎晉伐鮮虞左氏曰晉荀吳偽㑹齊師者假道於鮮虞遂入昔陽秋八月壬午滅肥以肥子緜皋歸晉伐鮮虞因肥之役也按晉滅肥以肥子歸等事經皆不見因肥之役於經無所發明不録榖梁曰其曰晉狄之也其狄之何也不正其與夷狄交伐中國故狄稱之也莘老孫氏曰按先儒論春秋狄晉之事以為假道鮮虞還而伐之春秋惡其夷狄之行故狄之然考之於經以鮮虞為同姓則春秋伐同姓多矣以晉不能行伯與楚争諸侯則春秋可責之諸侯盖多矣何獨晉哉十有三年春叔弓帥師圍費左氏曰十四年南蒯遂奔齊侍飲酒於景公公曰叛夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉黄氏曰意此時大夫皆執國命齊大夫亦惡南蒯之言害已故非之爾戴氏曰凡叛季氏者皆以張公室為名其意雖未必然然其辭則正夏四月楚公子比自晉歸于楚弑其君䖍于乾谿左氏曰夏五月癸亥王縊杜氏曰癸亥五月二十六日皆在乙夘丙辰後經書四月誤愚按當以經為正公羊曰此弑其君其言歸何歸無惡於弑立也歸無惡於弑立者何靈王為無道作乾谿之臺三年不成楚公子棄疾脅比而立之然後令於乾谿之役曰比已立矣後歸者不得復其田里衆罷而去之靈王縊而死經書歸紀實事也非以書歸為無惡也公羊以歸謂無惡既引作臺之事以承之又引棄疾脅比之事以辨之似謂比之弑君本無惡而春秋加之弑耳豈不害名教哉榖梁曰自晉晉有奉焉爾歸而弑不言歸言歸非弑也歸一事也弑一事也而遂言之以比之歸弑比不弑也弑君者日不日比不弑也案經明書公子比弑其君䖍而榖梁乃就歸字與不書日生義謂之不弑凡例之害經㫖一至於此楚公子棄疾殺公子比公羊曰比已立矣其稱公子何其意不當也其意不當則曷為加弑焉爾比之義宜乎效死不立大夫相殺稱人此其稱名氏以弑何言將自是為君也按比已立而稱公子者陸氏所謂棄疾假立為君國人心非不服比雖立亦未如君故以兩下相殺之辭書之與貫道所謂比簒立非所君者是也非謂其意不當也又大夫兩下相殺正當書名氏非謂將自是為君而稱名氏不稱人也榖梁曰當上之辭也當上之辭者謂不稱人以殺乃以君殺之也討賊以當上之辭殺非弑也比之不弑有四取國者稱國以弑楚公子棄疾殺公子比比不嫌也春秋不以嫌代嫌棄疾主其事故嫌也按經書公子棄疾殺公子比乃兩下相殺之辭非當上之辭也此不稱人者棄疾不以討賊殺比也非不稱人以君殺之也榖梁本以比非弑故有不以嫌代嫌之說然不知失經㫖矣八月甲戌同盟于平丘左氏曰同盟于平丘齊服也令諸侯日中造于除癸酉退朝子産命外僕速張于除子大叔止之使待明日及夕子産聞其未張也使速往乃無所張矣及盟子産争承曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也敢以為請諸侯靖兵好以為事行理之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以争至于昏晉人許之既盟子大叔咎之曰諸侯若討其可瀆乎子産曰晉政多門貳偷之不暇何暇討國不競亦陵何國之為按此盟本晉昭公乗楚之亂而為之非為齊服也餘非本義不録公不與盟公羊曰公不與盟者何公不見與盟也公不見與盟大夫執何以致㑹不恥也曷為不恥諸侯遂亂反陳蔡君子不恥不與焉案左氏復陳蔡本棄疾觀從之徒欲樹黨而自復爾非因平丘之㑹楚始復之以恱諸侯也使果因此㑹以復陳蔡當有興滅繼絶之風何得以魯不與㑹為不恥且後之致㑹本别有義非以不恥而致㑹也夫魯以千乗之主出㑹而不得盟固晉之罪然魯能無取辱之譏乎特比之晉侯薄乎云爾榖梁曰同者有同也同外楚也公不與盟者可以與而不與譏在公也其日善是盟也此晉不使魯盟非魯可以與而自不與也春秋譏晉也重譏魯也輕榖梁反是不可謂知言也且平丘之盟強楚日横諸侯日離何善之有設使善之亦不在書日也同外楚之說尤淺近蔡侯廬歸于蔡陳侯呉歸于陳公羊曰此皆滅國也其言歸何不與諸侯専封也趙氏曰此本是列國今改過復其所爾愚謂使不與諸侯専封正當志其専封之事以罪楚何得改其文曰歸而為楚隠惡乎榖梁曰善其成之㑹而歸之故謹而日之此未嘗有國也使如失國辭然者不與楚滅也楚滅陳蔡經既實書之今其歸國經又實書之其滅其歸義皆可見何謂未嘗有國而使如失國辭然以見不與楚滅之義乎冬十月𦵏蔡靈公左氏曰禮也諸侯國滅身死見王政衰微夷狄肆暴弱國不能自存三十一月而始得𦵏何禮之有榖梁曰變之不𦵏有三失徳不𦵏弑君不𦵏滅國不𦵏然且𦵏之不與楚滅且成諸侯之事也莘老孫氏曰蔡侯般見殺於十年之夏至是始書其𦵏者盖蔡侯廬歸國然後舉其𦵏也榖梁以般之失徳而書𦵏為不與楚滅而成諸侯之事則失之矣辨又見後二十年吳滅州來左氏曰吳滅州來令尹子期請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可侮州來在吳猶在楚也子姑待之杜氏曰州來楚邑葉氏曰州來國也左氏以巢及州來皆楚也非也邑不言滅外相取邑則係國劉氏曰滅之名施於國非縣所得伉也十有四年春意如至自晉左氏曰意如至自晉尊晉罪已也尊晉罪已禮也劉氏曰非也此亦一事再見卒名耳魯本無罪何罪已之有且春秋假魯史以達王義非専為魯記其憂樂之情而已也假使魯當時不敢怨晉安於受辱固非春秋所特書也榖梁曰大夫執則致致則名意如惡然而致見君臣之禮也春秋不書常事若大夫執則致又可見君臣之禮則常事而已是皆因名以生義者也冬莒殺其公子意恢左氏曰秋八月莒著丘公卒郊公不慼國人弗順欲立著丘公之弟庚與蒲餘侯惡公子意恢而善於庚與郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚與許之冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚與於齊齊隰黨公子鉏送之有賂田按廢立大事也使鐸迎庚與而立之郊公奔齊春秋安得不書而獨志殺意恢之事乎且殺意恢者兹夫也則是兩下相殺也春秋又安得不書其名而書國乎又郊公奔齊則齊納之矣不意鐸又迎庚與於齊齊又使隰黨公子鉏送之也此皆事理之不然者故此𫝊未足信也榖梁曰言公子而不言大夫莒無大夫也莒無大夫而曰公子意恢意恢賢也曹莒無大夫其所以無大夫者其義異也按曹伯爵中國也莒子爵小國也大國三卿中國二卿小國一卿何云曹莒無大夫乎自莊二十五年經書曹殺其大夫則曹有大夫明矣榖梁見經書公子不書大夫遂附㑹稱莒無大夫其不知理如此十有五年二月癸酉有事于武宫籥入叔弓卒去樂卒事左氏曰春將禘于武宫戒百官二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也經言有事本常祀耳而左氏以為禘既失實矣又叔弓卒而去樂卒事左氏以為禮又失理也如其禮則春秋不書矣公羊曰其言去樂卒事者何禮也君有事于廟聞大夫之喪去樂卒事劉氏曰非也曾子問君在祭不得成禮者幾仲尼語之詳矣而不及此此所以知其非也榖梁曰君在祭樂之中聞大夫之喪則去樂卒事禮也君在祭樂之中大夫有變以聞可乎大夫國體也古之人重死君命無所不通劉氏曰非也按禮記衛侯曰栁莊死雖當祭必告然則當祭不告者禮也當祭而告者愛也其亦可知矣獻可杜氏曰春秋書有事盖起文也若宣八年有事于太廟為仲遂起文也今有事于武宫亦以叔弓卒而書明矣書之必有所譏此書籥入叔弓卒去樂卒事三傳皆以為禮茍合禮則春秋常事不書也故孫氏為羽籥既陳雖有卿佐之喪不可廢也秋晉荀吳帥師伐鮮虞左氏曰晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇奸所喪滋多使鼔人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼔人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼔人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸葉氏曰𫝊十二年言晉假道鮮虞滅肥以肥子緜歸今言伐鮮虞圍鼓杜預以肥為白狄鮮虞與鼓為其别種則二國自不同若赤狄之有潞氏甲氏也今經言伐鮮虞則安得謂之圍鼓乎或者以因伐鮮虞遂圍鼔降其君然晉既告伐不應得國而不告其不見書於經何也鮮虞燕晉之間小國如廧咎如之類昭公時寖強稍能為晉國患故昭十二年始以伐見經自是迄哀凡四伐晉卒未嘗得志左傳於十二年之前先言伐肥於此又言滅鼓皆無足據也愚謂左氏言穆子見鼓人請以城叛而殺叛人鼓人請降而使修而城疑皆裝㸃之語穆子茍能如此必使晉伯而無失楚矣且伐人之國執人之君而曰城可獲而民知義豈不悖哉十有六年春楚子誘戎蠻子殺之左氏曰遂取蠻氏既而復立其子焉禮也按經但書誘殺蠻子不書取蠻氏立其子未可信也且誘殺其父而復立其子左氏以禮許之天下有是理哉公羊曰楚子何以不名夷狄相誘君子不疾也曷為不疾若不疾乃疾之也夫獸相食且人惡之豈有夷狄相誘殺而君子不疾者乎既曰君子不疾又曰若不疾乃疾之反覆若是豈君子哉夏公至自晉左氏曰公在晉晉人止公不書諱之也又曰子服昭伯語季平子曰晉之公室其將遂卑矣君幼弱六卿強而奢傲將因是以習習實為常能無卑乎平子曰爾幼惡識國晉人止公經所不書子服昭語非本義不録九月大雩左氏曰大雩旱也鄭大旱使屠擊祝欵豎柎有事於桑山斬其木不雨子産曰有事于山蓺山林也而斬其木其罪大矣奪之官邑非本義不録季孫意如如晉冬十月𦵏晉昭公左氏曰冬十月季平子如晉𦵏昭公平子曰子服回之言猶信子服氏有子哉三傳辨疑卷十七
