body:
  text: 三傳辨疑卷二十元程端學撰哀公元年春鼷䑕食郊牛改卜牛夏四月辛巳郊榖梁曰此該郊之變而道之也於變之中又有言焉鼷䑕食郊牛角改卜牛志不敬也郊牛日展斛角而知傷展道盡矣郊自正月至于三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之末承春之始蓋不可矣九月用郊用者不宜用者也郊三卜禮也四卜非禮也五卜强也卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩全曰牲傷曰牛未牲曰牛其牛一也其所以為牛者異有變而不郊故卜免牛也已牛矣其尚卜免之何也禮與其亡也寧有嘗置之上帝矣故卜而後免之不敢專也卜之不吉則如之何不免安置之繫而待六月上甲始庀牲然後左右之子之所言者牲之變也而曰我一該郊之變而道之何也我以六月上甲始庀牲十月上甲始繫牲十一月十二月牲雖有變不道也待正月然後言牲之變此乃所以該郊郊享道也貴其時大其禮其養牲雖小不備可也子不志三月卜郊何也郊自正月至於三月郊之時也我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣此一章純疵相半如起語云該郊之變而道之也固已不然又六月始庀牲雖有變而不道待正月然後言牲之變萬無是理也又如夏之始可以承春秋之末不可承春等語皆不切之辭又如全曰牲傷曰牛等語亦不可據獨三卜郊禮也四卜非禮也與三月卜郊之説疑其有所𫝊受故附於成七年本義云秋齊侯衛侯伐晉左氏曰齊侯衛侯㑹于乾侯救范氏也師及齊師衞孔圉鮮虞人伐晉取棘蒲據經無魯師本衞侯而非孔圉又無鮮虞人又不書取邑傳不足信也杜氏謂魯師不書非公命也鮮虞狄帥賤故不書皆附㑹之辭二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田榖梁曰取漷東田漷東未盡也及沂西田沂西未盡也按漷東沂西田者指邾田之在漷東沂西者爾非謂漷東沂西更有邾田而魯取之未盡也且榖梁不責魯取邾田之辠而猶云取之未盡乎癸巳叔孫州仇仲孫何忌及邾子盟于句繹榖梁曰三人伐而二人盟何也各盟其得也師氏曰非也三子之中季孫為强豈有同伐而季孫獨不得田邪議者以季孫推二子而不取是又不然蓋季孫無意於取田則不與之同伐矣但二子要邾而盟之季孫不與故因書其實耳晉趙鞅帥師納衛世子蒯聵于戚公羊曰曷為不言入于衞父有子子不得有父也劉氏曰何休曰據弗克納而言納于邾婁非也彼以弗克納故得言于邾婁耳此但入戚未得入衞亦其理自然何以見父不得有子乎凡父得有子子不得有父豈不誠道乎然於此經則害於義故其言則是也其於説經則非也榖梁曰納者内弗受也帥師而後納者有伐也何用弗受也以輙不受也以輙不受父之命受之王父也信父而辭王父則是不尊王父也其弗受以尊王父也范氏曰寗不達此義江熙曰若靈公廢蒯聵立輙則蒯聵不復稱曩日世子也稱蒯聵為世子則靈公不命輙審矣此矛楯之喻然則從王父之言傳似失矣經云納衞世子鄭世子忽復歸于鄭稱世子明正也明正則拒之者非也葉氏曰靈公卒南子欲立公子郢為太子以為君命郢辭曰亡人之子輙在靈公未嘗立輙也安得謂受命於王父乎康侯胡氏曰輙雖嫡孫當立然非有靈公之命安得云受之王父辭父命哉故冉有謂子貢曰夫子為衞君乎子貢問之入曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷以父命為尊而讓其弟叔齊以天倫為重而讓其兄仲尼以為求仁而得仁者然則為輙者柰何宜辭於國曰若以為父有辠將從王父之命則有社稷之鎮公子在我焉得為君以為無辠則國乃世子所有也天下豈有無父之國哉而使立乎其位如此則言順而事成矣輙利其位以拒父則衞之臣子舎爵禄而去之可也焉有父不慈子不孝争利其國滅天理而可為者乎師氏曰於此復稱世子明其當復輙不當拒之明矣而榖梁以為不以父命廢王父命傷教敗義之言也嗚呼父子之道禮教之大經也聖人雖以父不父子不子為言而責子之意常重責父之義常輕故蒯聵在靈公之世可以廢之而在輙之世不可以拒書曰納于戚而輙拒父之惡不言自著矣愚謂設使靈公已廢蒯聵輙猶當返國於其父此亦叔齊以天倫為重而讓國於其兄之意也况輙處父子之間乎榖梁之説不可以訓明矣秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績左氏曰秋八月齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之遇于戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳罕駟自後隨而從之彼見吾貌必有懼心於是乎㑹之必大敗之從之卜戰龜焦樂丁曰詩曰爰始爰謀爰契我龜謀協以故兆詢可也簡子誓曰范氏中行氏反易天明斬艾百姓欲擅晋國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經徳義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車樸馬無入于兆下卿之罰也甲戌将戰郵無恤御簡子衛太子為右登鐵上望見鄭師衆太子懼自投于車下子良授太子綏而乗之曰婦人也簡子巡列曰畢萬匹夫也七戰皆獲有馬百乗死於牖下羣子勉之死不在寇繁羽御趙羅宋勇為右羅無勇麇之吏詰之御對曰痁作而伏衞太子禱曰曽孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人擊簡子中肩斃於車中獲其蠭旗太子救之以戈鄭師北獲温大夫趙羅太子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣傅傁曰雖克鄭猶有知在憂未艾也初周人與范氏田公孫尨稅焉趙氏得而獻之吏請殺之趙孟曰為其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下獻曰請報主德追鄭師姚般公孫林殿而射前列多死趙孟曰國無小既戰簡子曰吾伏弢嘔血鼓音不衰今日我上也太子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之我御之上也駕而乗材兩靷皆絶按經言鄭罕達帥師則是用大衆也而左氏以為送齊人之粟使寔送粟不應用大衆也以經考傳之偽謂此類也餘非本義不録蔡殺其大夫公子駟左氏曰吳洩庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説哭而遷墓冬蔡遷於州來葉氏曰經書遷州來在殺公子駟之上則駟之死未必以謝吳也三年春齊國夏衛石曼姑帥師圍戚左氏曰齊衛圍戚求援于中山君臣父子之道至此極矣而左氏於經全無所發亦可見其不知義也公羊曰齊國夏曷為與衛石曼姑帥師圍戚伯討也此其為伯討柰何曼姑受命乎靈公而立輙以曼姑之義為固可以拒之也輙者曷為者也蒯聵之子也然則曷為不立蒯聵而立輙蒯聵為無道靈公逐蒯聵而立輙然則輙之義可以立乎曰可其可奈何不以父命辭王父命以王父命辭父命是父之行乎子也不以家事辭王事以王事辭家事是上之行乎下也劉氏曰公羊以為可立已有能辨之者矣葉氏曰蒯聵始以南子召宋朝聞宋人之歌而醜之其歸必有正南子愧焉故欲加之辠誣以殺巳爾戲陽速附之者也公羊乃以輙為受命於靈公而為不以父命辭王父命之説靈公卒南子欲立公子郢為太子以為君命郢辭曰亡人之子輙在靈公未嘗立輙也安得為受命於王父乎愚謂使果受命於王父至此亦當如叔齊以天倫為重而讓伯夷也况處父子之間乎此又曉然而公羊昧之何足與議春秋哉髙氏曰先儒乃以輙之拒父為尊祖以齊衛圍戚為伯討嗚呼啟後世亂人倫賊父子之教者盖此言也且蒯聵不過以疑似之跡奔逃于外以待父之察耳父子之恩未絶也輙為蒯聵之子豈不知之見蒯聵出奔而遂以其父為辠人則輙之為人子已不免乎辠矣况又據國以拒其父乎以已之大夫㑹外之大夫帥師以圍其父則君臣之義父子之恩皆自此絶矣榖梁曰此衛事也其先國夏何也子不圍父也不繫戚於衞者子不有父也榖梁知子不可以圍父而許子可以拒父失其本心矣五月辛夘桓宫僖宫災左氏曰夏五月辛夘司鐸火火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟於宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乗馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬰攸從之䝉葺公屋自太廟始内外以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乗車季桓子至御公立于象魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也富公槐至曰無備而官辦者猶拾瀋也於是乎去表之稾道還公宫非本義不録公羊曰此皆毁廟也其言災何復立也曷為不言其復立春秋見者不復見也何以不言及敵也何以書記災也劉氏曰非也古之人豈無所省文哉亦不若是而省之耳且必若云襄公作三軍舍中軍曷為獨書哉石氏曰公羊非也榖梁曰言及則祖有尊卑由我言之則一也榖梁云祖有尊卑由我言之則一也固也然桓公者僖公祖也亦豈無尊卑於此亦公羊敵也之意當以本義髙氏為正四年春王二月庚戌盗殺蔡侯申左氏曰蔡昭侯將如吳諸大夫恐其又遷也承音懲公孫翩逐而射之入於家人而卒以兩矢門之衆莫敢進文之鍇音楷後至曰如墻而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫盱石氏曰史遷以盗為賊利是以左右謂為大夫公孫翩者似非愚謂公孫翩為大夫而弑其君而聖人改曰盗且不書其名則是蔽弑逆之賊也何以為春秋餘見或問公羊曰弑君賤者窮諸人此其稱盗以弑何賤乎賤者也賤乎賤者孰謂謂罪人也設使賤而稱盗亦非為辠人而稱盗也榖梁曰稱盗以弑君不以上下道道也内其君而外弑者不以弑道道也春秋有三盜微殺大夫謂之盗非所取而取之謂之盗辟中國之正道以襲利謂之盗劉氏曰非也盗即㣲者耳辟稱人故云盗也即不以上下道道曷為稱弑乎愚按范氏解公羊内其君而外弑之語指襄七年鄭伯髠頑之事當之謂鄭伯將㑹中國其臣欲從楚不勝其臣殺而死不使夷狄之民加乎中國之君故曰鄭伯髠頑如㑹未見諸侯丙戌卒于鄵是不以弑道道也其説非也鄭伯髠頑如㑹未見諸侯卒于鄵是紀實事也非不使夷狄之民加乎中國之君也愚既辨之矣晉人執戎蠻子赤歸于楚公羊曰赤者何戎曼子之名也其言歸于楚何子北宫子曰辟伯晉而京師楚也此意近似而語未瑩若據何氏説則全不可通六月辛丑亳社災公羊曰蒲社者何亡國之社也社者封也其言災何亡國之社蓋揜之揜其上而柴其下蒲社災何以書記災也莘老孫氏曰公羊以亳為蒲遂致誤也榖梁曰亳社者亳之社也亳亡國也亡國之社以為廟屏戒也其屋亡國之社不得達上也此説近之五年夏晉趙鞅帥師伐衞左氏曰夏趙鞅伐衞范氏故也遂圍中牟范氏故圍中牟俱未詳信否閏月葬齊景公公羊曰閏不書此何以書䘮以閏數也喪曷為以閏數喪數畧也春秋閏月適無事耳非閏即不書也榖梁曰不正其閏也劉氏曰非也喪以年斷者不以閏數以月斷者則以閏數葬之為事以月斷者也以閏數宜矣何謂不正乎六年春晉趙鞅帥師伐鮮虞左氏曰春晉伐鮮虞治范氏之亂也杜氏曰四年鮮虞納荀寅于柏人未詳信否吳伐陳左氏曰楚子曰吾先君與陳有盟不可以不救乃救陳師於城父楚救陳不經見秋七月庚寅楚子軫卒左氏曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讐亦不如死死一也其死讐乎命公子申為王不可則命公子結亦不可則命公子啓五辭而後許將戰王有疾庚寅昭王攻大冥卒于城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還是歲也有雲如衆赤鳥夾日以飛三日楚子使問諸周太史周太史曰其當王身乎若禜音詠之可移於令尹司馬王曰除腹心之疾而寘諸股肱何益不榖不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由已率常可矣按吳伐陳在夏楚子卒在秋非救陳而卒也且諸侯卒于他所者必地今經不地傳未可信也其引孔子曰尤妄夫楚子一不移疾于羣臣一不越望而祭孔子即許之以大道無往而不為大道也且楚知祭之不可僣越而不知王之不可僣稱所謂不三年喪而緦麻之察者也豈知類哉盖左氏楚人於楚之事必誇而大之又引孔子曰以文之而不知其不可取信於人也其引書亦無謂齊陽生入于齊齊陳乞弑其君荼公羊曰弑而立者不以當國之辭言之此其以當國之辭言之何為諼也此其為諼奈何景公謂陳乞曰吾欲立舎何如陳乞曰所樂乎為君者欲立之則立之不欲立則不立君如欲立之則臣請立之陽生謂陳乞曰吾聞子盖將不欲立我也陳乞曰夫千乗之主將廢正而立不正必殺正者吾不立子者所以生子者也走矣與之玉節而走之景公死而舎立陳乞使人迎陽生于諸其家除景公之喪諸大夫皆在朝陳乞曰常之母有魚菽之祭願諸大夫之化我也諸大夫皆曰諾於是皆之陳乞之家坐陳乞曰吾有所為甲請以示焉諸大夫皆曰諾於是使力士舉巨囊至于中霤諸大夫見之皆色然而駭開之則闖然公子陽生也陳乞曰此君也已諸大夫不得已皆逡巡北面再拜稽首而君之爾自是往弑舎劉氏曰公羊曰弑而立者不以當國之辭言之此其以當國之辭言之何為諼也非也如公羊説陽生本正與商人相似弑而代立與商人相似陽生諼而弑之商人亦諼而弑之所以諼之雖殊所以為諼則同何故陽生商人乖異若此哉公羊本欲引商人以求與之合而事同文别反更大繆乃知例苟不通者雖曲説愈偽也何休以為不舉陽生弑者諼成于乞然則是公子比之類也公子比脅於棄疾宜效死勿聴故坐弑君陽生亦宜效死勿聴者也亦當坐弑君公子比首惡陽生不䝉首惡何哉愚謂公羊叙陳乞立舎事與左氏異始從左氏者以左氏嘗見國史且其言粗近人情也榖梁曰陽生入而弑其君以陳乞主之何也不以陽生君荼也其不以陽生君荼何也陽生正荼不正不正則其曰君何也荼雖不正巳受命矣入者内弗受也荼不正何用弗受以其受命可以言弗受也陽生其以國氏何也取國于荼也劉氏曰榖梁曰陽生正荼不正然而荼受命陽生不受命如此陽生得辠於先君廢陽生為非義自可聴天子伯主治之耳今至躬弑其君春秋猶詭其辠以與陳乞何哉且令陳乞無預陽生之事春秋又將强委一卿以弑君之辠乎要之陳乞主陽生而弑荼可知也七年春宋皇瑗帥師侵鄭左氏曰宋師侵鄭鄭叛晉故也存耕趙氏曰鄭雖叛晉非宋所得討愚謂宋報定十五年罕達之役耳秋公伐邾八月己酉入邾以邾子益來公羊曰入不言伐此其言伐何内辭也若使他人然邾婁子益何以名絶曷為絶之獲也曷為不言其獲内大惡諱也劉氏曰非也入邾婁使若他人猶有不諱以邾子益來又何云他人乎又曰曷為不言其獲内大惡諱亦非也諸侯入人之國為大惡可知矣戰而獲人獲者則大惡矣獲之者豈可同其科哉又此自入而以歸不得以獲解也吾既言之矣榖梁曰以者不以者也益之名惡也春秋有臨天下之言焉有臨一國之言焉有臨一家之言焉其言來者有外魯之辭焉趙氏曰來者至内之辭何外之有如把伯姬來豈亦是外魯乎蘇氏曰在外曰以歸在内曰以來内外之别也陳岳氏曰凡書伐與入異聲罪致討曰伐弗有其地曰入斯上書公伐邾下書已酉入邾曷為内書入不言伐歟凡書獲與以異苟交陳而獲其君弗有其地及滅國而以其國君歸則曰以斯亦通内外之辭也交陳而獲如韓之戰獲晉侯是也弗地如宋公入曹以曹伯陽歸是也滅國如晉滅赤狄以潞子嬰兒歸是也曷為不言獲為内諱歟曷謂以者不以歟斯上書伐下書入無異㫖所異者唯不曰歸而曰來而已然於諸侯則曰歸於魯則曰來如奔於諸侯曰出奔於魯曰來奔杜得其㫖公榖皆短八年春王正月宋公入曹以曹伯陽歸左氏曰初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白雁獻之且言田弋之説説之因訪政事大説之有寵使為司城以聴政夢者之子乃行彊言霸説於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鍾邘八年春宋公伐曹將還禇師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之按經書入而傳言滅妄也餘見或問公羊曰曹伯陽何以名絶曷為絶之滅也曷為不言其滅諱同姓之滅也何諱乎同姓之滅力能救之而不救也劉氏曰非也當此之時魯人自救不暇豈有不救同姓之滅春秋遂書之乎且責魯之不救而諱曹之滅釋宋公之惡苟責無辠之魯甚非禮也愚謂春秋苟一一宛轉避諱將無一事可書矣甚哉其謬也吳伐我左氏曰吳為邾故將伐魯問於叔孫輙叔孫輙對曰魯有名而無情伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違不適讐國未臣而有伐之奔命焉死之可也所託也則隠且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我子張病之王問於子洩對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讐也夫魯齊晉之脣脣亡齒寒君所知也不救何為三月吳伐我子洩率故道險從武城初武城人或有因於吳竟田焉拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之王犯嘗為之宰澹臺子羽之父好焉國人懼懿子謂景伯若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉吳師克東陽而進舍於吾梧明日舍於蠶室公賔庚公甲叔子與戰于夷獲叔子與析朱鉏獻於王王曰此同車必使能國未可望也明日舍于庚宗遂次於泗上㣲虎欲宵攻王舎私屬徒七百人三踊於幕庭卒三百人有若與焉及稷門之内或謂季孫曰不足以害呉而多殺國士不如已也乃止之吳子聞之一夕三遷吳人行成將盟景伯曰吳人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久將歸矣請少待之弗從景伯負載造於萊門乃請釋子服何於吳吳人許之以王子姑曹當之而後止吳人盟而還趙氏曰若寔為城下盟則魯懼至甚何得不便歸邾子而待齊重請與吳共伐乃歸之乎經既不書盟故不取也愚謂據左氏説乃吳子畏㣲虎之勇自欲行成豈能使魯與之為城下盟乎餘非本義不録夏齊人取讙及闡左氏曰齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取讙及闡按經書公入邾以邾子益來繼書吳伐我又書齊人取讙及闡繼書歸邾子益于邾又書齊人歸讙及闡屬辭比事大義昭然左氏乃以康子妻妹之事當之此與桓公侵蔡為蔡姬蕩舟之事相類當以經為正公羊曰外取邑不書此何以書所以賂齊也曷為賂齊為以邾婁子益來也按魯入邾俘邾君故齊伐魯而取二邑經不言伐者責齊者輕而責魯者重也公羊見齊取邑不書伐遂謂以邑賂齊使賂齊也魯何以復歸邾子齊何以復歸二邑也歸邾子益于邾左氏曰齊侯使如吳請吳師將以伐我乃歸邾子葉氏曰前年以季姬之故而伐我矣今欲歸邾子再伐可也何待於請吳師吳前取我三邑獲三臣而不能歸邾子今我乃以懼齊請師而歸之亦非其情榖梁曰益之名失國也此亦近之而未及大義齊人歸讙及闡左氏曰秋及齊平九月臧賔如齊涖盟齊閭丘明來涖盟且逆季姬以歸嬖冬十二月齊人歸讙及闡季姬嬖故也葉氏曰陽生娶於季氏非内女不書則有之矣而齊以季姬故來伐我及我與齊平則不得不見經也而皆不書且季魴侯之罪使公治之而齊罷婚可也公何罪而受伐焉男女之别人倫之大也誠以有罪來討亦安可以賂而復合又從而嬖之非人情也若曰以執邾子而取邑釋邾子而歸邑則春秋之世所應有九年春宋皇瑗帥師取鄭師于雍丘左氏曰鄭武子賸之嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師毎日遷舎壘合鄭師哭子姚救之大敗二月甲戌宋取鄭師于雍丘使有能者無死以郟張與鄭羅歸趙氏曰凡悉俘之曰取某師左氏曰覆而敗之曰取某師按取者得之之稱若但敗之何名為取公羊曰其言取之何易也其易奈何詐之也以易訓取非也其曰詐近之榖梁曰取易辭也以師而易取鄭病矣辨見公羊夏楚人伐陳左氏曰夏楚人伐陳陳即吳故也未詳信否十年春王二月邾子益來奔左氏曰九年邾子又無道吳子使太宰子餘討之囚諸樓臺栫之以棘使諸大夫奉太子革以為政十年春邾隱公來奔齊甥也故遂奔齊未詳信否公㑹吳伐齊左氏曰九年春齊侯使公孟綽辭師于吳吳子曰昔歳寡人聞命今又革之不知所從將進受命於君十年春公㑹吳子邾子郯子伐齊南鄙師于鄎葉氏曰邾子郯子㑹伐而經不書杜預以為兵并屬於吳不列於諸侯尤非是且是時邾隱公方奔在齊豈能從吳反伐齊乎其妄尤可見則此叙齊吳事皆不足據愚謂以八年歸邾子于邾觀之知此傳妄矣又豈有九年請師而十年始㑹伐齊之理乎三月戊戌齊侯陽生卒左氏曰齊人弑悼公赴於師吳子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還莘老孫氏曰左氏於此記陽生之卒以為齊人弑之然經所書乃正卒耳不知左氏何從知之此當據經葉氏曰經書齊侯陽生卒又書葬齊悼公而傳言弑妄與鄭伯髠頑同杜預以為以疾赴吾固言之也且弑君之惡亦大矣自非亂臣賊子欲弑而奪其國則必强宗大家挾權專政而肆其虐今陽生左氏不言其故直曰赴於吳師而已未見陽生取弑於齊者也其赴于吳以為同好邪則兵方交非以好也將畏吳而求説邪既能敗之何懼而遽弑君乎吳子三日哭于軍門之外以為恤其災而哀之邪則宜不伐喪而返也則何為而哭乎既無當於人情則陽生固未嘗弑也姑以為從赴告則非春秋之法黄氏曰既謂吳伐齊齊人弑悼公以説于吳則吳子安得三日哭無此理也凡經傳不同者但當信經晉趙鞅帥師侵齊左氏曰夏晉趙鞅帥師伐齊大夫請卜之趙孟曰吾卜於此起兵事不再令卜不襲吉行也於是乎取犂及轅毁髙唐之郭侵及頼而還經不言取二邑吳救陳左氏曰冬楚子期伐陳吳延州來季子救陳謂子期曰二君不務徳而力争諸侯民何罪焉我請退以為子名務徳而安民乃還劉氏曰延州來季子也推騐此年季子僅百歲矣以彼之清髙不汚寧貪將辭國之兵者却似異時事傳附著為説耳十有一年夏五月公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書左氏曰將戰吳子呼叔孫曰而事何也對曰從司馬王賜之甲劒鈹曰奉爾君事敬無廢命叔孫未能對衛賜進曰州仇奉甲從君而拜公使太史固歸國子之元寘之新篋褽之以𤣥纁加組帶焉寘書于其上曰天若不識不衷何以使下國吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫諫曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種於兹邑是商所以興也今君易之將以求大不亦難乎弗聴使於齊屬其子於鮑氏為王孫氏反役王聞之使賜之屬鏤以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也非本義不録衞世叔齊出奔宋左氏曰衞人立遺使室孔姞疾臣向魋納美珠焉與之城鉏宋公求珠魋不與由是得罪及桓氏出城鉏人攻大叔疾衛莊公復之使處巢死焉殯於鄖葬於少禘初晉悼公子憖亡在衛使其女僕而田大叔懿子止而飲之酒遂聘之生悼子悼子即位故夏戊為大夫悼子亡衛人翦夏戊孔文子之將攻大叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衛國之難也將止魯人以幣召之乃歸非本義不録十有二年春用田賦公羊曰何以書譏何譏爾譏始用田賦也此説不明榖梁曰古者公田什一用田賦非正也此説亦不明夏五月甲辰孟子卒左氏曰夏五月昭公夫人孟子卒昭公娶于吳故不書姓死不赴故不稱夫人不反哭故不言葬小君孔子與弔適季氏季氏不絻放絰而拜按不稱夫人以其稱孟子故也非死不赴也不言葬小君者既見於孟子卒矣義不係於葬也非不反哭也自孔子與弔以下非本義不録榖梁曰孟子者何也昭公夫人也其不言夫人何也諱取同姓也劉氏曰非也孟子者孟姬而曰孟子則是諱同姓矣不曰夫人豈諱同姓乎愚謂亦因既稱孟子不稱夫人耳秋公㑹衛侯宋皇瑗于鄖左氏曰吳徵㑹于衛初衛人殺吳行人且姚而懼謀於行人子羽子羽曰吳方無道無乃辱吾君不如止也子木曰吳方無道國無道必棄疾于人吳雖無道猶足以患衛徃也長木之斃無不摽也國狗之瘈無不噬也而况大國乎秋衞侯㑹吳于鄖公及衛侯宋皇瑗盟而卒辭吳盟吳人藩衞侯之舎子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衛而藩其君舍以難之子盍見太宰乃請束錦以行語及衞故太宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衛君是墮黨而崇讐也夫墮子者得其志矣且合諸侯而執衞君誰敢不懼墮黨崇讐而懼諸侯或者難以霸乎太宰嚭説乃舎衛侯衛侯歸效夷言子之尚幼曰君必不免其死於夷乎執焉而又説其言從之固矣趙氏曰按上文公自㑹於橐臯不言與宋衛同㑹若實同㑹即當書之又若四國同㑹如何三國盟而獨辭吳乎吳力猶能囚衛侯三國敢拒之乎故知此傳繆甚矣冬十有二月螽左氏曰冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也樸鄉吕氏曰觀今年書十二月螽明年九月螽又十二月螽恐不專為失閏然則何以書紀災也存耕趙氏曰兩年之中書螽者三是不可專謂之厯妄也愚謂左氏欲成己意妄引孔子之言以實之使人信己而已十有三年春鄭罕達帥師取宋師于嵒左氏曰春宋向魋救其師鄭子賸使徇曰得桓魋者有賞魋也逃歸遂取宋師于嵒獲成讙郜延以六邑為虚宋鄭未接戰勝負未分子賸一徇桓魋即逃恐無是理公羊曰其言取之何易也其易奈何詐返也榖梁曰取易辭也以師而易取宋病矣辨並見九年宋取鄭師公㑹晉侯及吳子于黄池左氏曰夏公㑹單平公晉定公吳夫差于黄池六月丙子越子伐吳為二隧疇無餘謳陽自南方先及郊吳太子友王子地王孫彌庸夀於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讐而弗殺也太子曰戰而不克將亡國請待之彌庸不可屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗吳師獲王子友王孫彌庸夀於姚丁亥入吳吳人告敗于王王惡其聞也自剄七人於幕下秋七月辛丑盟吳晉争先吳人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今吳王有墨國勝乎太子死乎且夷徳輕不忍久請少待之乃先晉人吳人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見於王伯合諸侯則侯帥子男以見於伯自王以下朝聘玉帛不同故敝邑之職貢於吳有豐於晉無不及焉以為伯也今諸侯㑹而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於呉八百乘若為子男則將半邾以屬於吳而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之將囚景伯景伯曰何也立後於魯矣將以二乗與六人從遲速唯命遂囚以還及户牖謂太宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉自襄以來未之改也若不㑹祝宗將曰吳實然且謂魯不共而執其賤者七人何損焉太宰嚭言於王曰無損於魯而祗為名不如歸之乃歸景伯吳申叔儀乞粮於公孫有山氏曰佩玉繠兮余無所繫之㫖酒一盛兮余與褐之父睨之對曰梁則無矣粗則有之若登首山以呼曰庚癸乎則諾王欲伐宋殺其丈夫而囚其婦人太宰嚭曰可勝也而弗能居也乃歸冬吳及越平按經無單平公而傳有之經書㑹而傳書盟此其不足據之大端也左氏以為吳先晉人外傳以為晉先吳人是其所自書亦不得其實悉當以經為正公羊曰吳何以稱子吳主㑹也吳主㑹則曷為先言晉侯不與夷狄之主中國也其言及吳子何㑹兩伯之辭也不與夷狄之主中國也則曷為以㑹兩伯之辭言之重吳也曷為重吳吳在是則天下諸侯莫敢不至也按吳稱王而春秋書子者魯史之辭也且春秋書吳子非獨此也如吳子卒使札之類是也今公羊以吳稱子為吳主㑹是就子字生義而臆之耳非有所考也且經先書晉侯以及吳子則是晉與吳而下為㑹而已公羊乃言吳主㑹既已誤矣既而見晉序吳上而又以不與夷狄主中國言之却是魯史本書吳子及晉侯而孔子易晉侯在吳子之上也豈理也哉經之言及黎氏所謂以内及外以中國及夷狄之辭亦非㑹兩伯之辭也而公羊又就及字生義以為㑹兩伯之辭皆不然者且公羊既曰不與夷狄主中國矣而又曰重吳及其釋重吳之義乃曰吳在是則天下諸侯莫敢不至夫黄池之㑹魯晉吳三國而已天下諸侯安在哉其説之繆與僖二年齊宋江黄盟于貫相類榖梁曰黄池之㑹吳子進乎哉遂子矣吳夷狄之國也祝髪文身欲因魯之禮因晉之權而請冠端而襲其藉於成周以尊天王吳進矣吳東方之大國也累累致小國以㑹諸侯以合乎中國吳能為之則不臣乎吳進矣王尊稱也子卑稱也辭尊稱而居卑稱以㑹乎諸侯以尊天王吳王夫差曰好冠來孔子曰大矣哉夫差未能言冠而欲冠也按榖梁以吳進而稱子既而又曰王尊稱子卑稱辭尊稱而居卑稱是其自相戾者也且春秋書吳子者魯書之也吳之稱王固自若也春秋書吳子多矣豈盡吳子辭尊居卑之稱乎其曰請冠端而襲與藉于成周以尊天王皆無稽之論至其稱夫差曰好冠來孔子曰大矣哉等語尤繆舉無足辨冬十一月有星孛于東方公羊曰孛者何彗星也其言于東方何見于旦也何以書記異也東方之義董子劉向所謂不加宿者得之春秋不書晝見傳未可據也其以孛為彗辨見文十四年十有四年春西狩獲麟公羊曰何以書記異也何異爾非中國之獸也然則孰狩之薪采者也薪采者則㣲者也曷為以狩言之大之也曷為大之為獲麟大之也曷為為獲麟大之麟者仁獸也有王者則至無王者則不至有以告者曰有麏而角者孔子曰孰為來哉孰為來哉反􅃑拭面涕沾袍顔淵死子曰噫天喪予子路死子曰噫天祝予西狩獲麟孔子曰吾道窮矣春秋何以始乎隱祖之所逮聞也所見異辭所聞異辭所𫝊聞異辭何以終乎哀十四年曰備矣君子曷為為春秋撥亂世反諸正莫近乎春秋則未知其為是與其諸君子樂道堯舜之道與末不亦樂乎堯舜之知君子也劉氏曰公羊曰春秋何以始乎隠祖之所逮聞非也聖人作經為天下法不苟記祖所逮聞而已蓋不得聖人之意而言之也且如所言祖者謂鲁祖乎髙祖乎所謂曽祖孔子曽祖防叔則孔父三世之孫如髙祖孔子髙祖祁父亦孔父二世之孫孔父死於桓二年其孫不得見隱審矣計防叔祁父之時應在僖閔之間春秋則起於閔僖不宜始隱公也凡公羊之書其乖繆大體粗正之矣至於委曲細密似而非索言之則不可勝言非講學辨論者不能及也故闕焉以俟知者亦將有起予者乎云爾葉氏曰獲麟之義深矣不必辭為之大蓋實狩也左氏固言之矣春秋之義三傳皆不能言孟子謂詩亡然後春秋作故斷自隱公始也何休蓋㣲知之而不能自主其説反惑於世世之論蓋公羊之説誤之以為祖之所逮聞夫孔子祖述堯舜文武刪書本於唐陶而論易上及伏羲神農黄帝之事今立大法以遺天下後世而區區私其一家之傳不亦狹且陋哉且祖之所逮聞以孔子逮事而獲傳之以情論不過數十年事而已安得上及哉以為曽祖之逮聞非孔子所逮事則等為不親傳又何擇於曽髙乎其言之淺俚不待攻而自破也榖梁曰引取之也狩地不地不狩也非狩而曰狩大獲麟故大其適也其不言來不外麟於中國也其不言有不使麟不恒於中國也劉氏曰皆非也謂之獲麟矣則不得言來亦不得言有記事之理也何説也即以言有為使不恒有則大有年亦使不常有也故守一而廢百謂之章句之儒去道逺矣陸氏曰公榖以經不言狩人名故有薪采引取之説不知舉狩獲之義三傳辨疑卷二十
