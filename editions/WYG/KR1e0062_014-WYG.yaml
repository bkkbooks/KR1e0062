body:
  text: 三傳辨疑卷十四元程端學撰成公十有二年春周公出奔晉左氏曰十二年春王使以周公之難来告書曰周公出奔晉凡自周無出周公自出故也就左氏論之在十一年周公奔晉十二年始来告故魯史書其来告之日如其信然是魯史之愚也不書其奔晉之日而書其来告之日非愚而何今有人焉赴告其親之喪曰某年某月某日某人卒或其道阻而赴在来年聞赴者轉告其親友焉将道其死之日乎抑道其赴之日為死之日乎此不辨可見者也左氏出於仲尼之後左氏能知其為赴之日非死之日則仲尼之博學亦能和之矣今仲尼亦以赴之日為死之日則不特魯史之愚又仲尼之愚也吾不知後之君子信左氏乎信仲尼乎又天王出居于鄭尚曰出周公出奔晉何怪其為出而以出為義乎使後之傳春秋者皆捨大義而以出為義也武成曰王出郊康王之誥曰王出在應門之内夫郊在王畿之内應門為天子之宫尚曰出周公奔而言出何足為義乎夫以天子論道經邦之三公而至於出奔其罪豈難知而必待加一出字然後知周公之為自出乎此一字褒貶之弊左氏倡之諸儒和之而經㫖淪沒之由也曰然則王子瑕奔晉尹氏毛伯召伯以王子朝奔楚皆不言出何邪曰史有詳畧仲尼豈能益之使一之乎若以周公為自出則王子瑕尹氏毛伯召伯之出誰使之乎公羊曰王者無外此其言出何自其私土而出也公羊既知周公為天子三公則在朝明矣又何従知其自私土而出邪此非有所據因出之一字生義耳榖梁曰周有入無出其曰出上下一見之也言其上下之道無以存也上雖失之下孰敢有之今上下皆失之矣案左氏公羊以出為義則既鑿矣而榖梁又引天王出居鄭為上下之義則鑿之尤者不足辨也夏公㑹晉侯衛侯于𤨏澤左氏曰七年秋楚子重伐鄭師于汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉晉人以鍾儀歸囚諸軍府九年晉侯觀於軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使税之召而弔之再拜稽首問其族對曰泠人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝於嬰齊而夕於側也不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟君盍歸之使合晉楚之成公従之重為之禮使歸求成十二月楚子使公子辰如晉報鍾儀之使請修好結成十一年宋華元善於令尹子重又善於欒武子聞楚人既許晉糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成十二年宋華元克合晉楚之成夏五月晉士燮㑹楚公子罷許偃癸亥盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往来道路無壅謀其不協而討不庭有渝此盟明神殛之俾墜其師無克胙國鄭伯如晉聽成㑹于𤨏澤成故也趙氏曰案此若實事則無不告諸侯之理不應不書也又曰㑹于𤨏澤成故也案此㑹楚不與焉何以證其成乎劉氏曰𤨏澤之㑹本以合楚鄭也今楚鄭不至魯衛是盟何邪且合晉楚者宋也宋亦不與又何邪凡晉楚為平則應大合諸侯以申成好今三國㑹而已又何邪然則𫝊之言未足信也葉氏曰𤨏澤之㑹杜預謂晉既與楚成合諸侯以申成好然經書公㑹晉侯衛侯于𤨏澤見衛侯而不見鄭伯豈𫝊誤以衛侯為鄭伯歟晉誠欲與楚成既鍾儀謀之於前糴茷請之於後何與於宋而必待華元合之乎審有是盟豈𤨏澤之㑹猶告諸侯而得書西門之盟反不告諸侯而不書乎然則𤨏澤自魯衛以他事與晉為好無預於楚西門之盟未必有傳但見鄭伯嘗以貳楚執於銅鞮故謂晉楚合而聽成遂誤以衛侯為鄭伯爾繼言晉鄭至如楚聘且涖盟冬書楚公子罷如晉聘且涖盟十二月晉侯及楚公子罷盟于赤棘晉楚之成實在此晉愧其求成於楚故不以告是在傳之中而不悟也趙氏曰晉厲初立而衆諸侯自為𤨏澤之㑹然所㑹者魯衛而已左氏載合晉楚之成鄭人聽成考之於經無一毫合不知何年之事而左氏誤附於此秋晉人敗狄于交剛榖梁曰中國與夷狄不言戰皆曰敗之夷狄不日案公敗齊師于長勺公敗宋師于乗丘之類有之矣非特中國與夷狄皆曰敗之也十有三年春晉侯使郤錡来乞師左氏曰晉侯使郤錡来乞師将事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師将社稷是衛而惰棄君命也不亡何為非本義不録榖梁曰乞重辭也古之人重師故以乞言之也案晉侯若有當伐之國告於王而命諸侯伐之其誰不従今以報秦怨而私乞師榖梁反以古人重師言之豈知言也哉三月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦左氏曰三月公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之公及諸侯朝王遂従劉康公成肅公㑹晉侯伐秦成子受脤于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎夏四月戊午晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以昬姻天禍晉國文公如齊恵公如秦無禄獻公即世穆公不忘舊徳俾我恵公用能奉祀于晉又不能成大勲而為韓之師亦悔于厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊徳矣鄭人怒君之疆場我文公帥諸侯及秦圍鄭秦大夫不詢于我寡君擅及鄭盟諸侯疾之将致命于秦文公恐懼綏静諸侯秦師克還無害則是我有大造于西也無禄文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勲而懼社稷之隕是以有殽之師猶願赦罪于穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志于我穆襄即世康靈即位康公我之自出又欲闕翦我公室傾覆我社稷帥我蝥賊以來蕩揺我邊疆我是以有令狐之役康猶不悛入我河曲伐我洓川俘我王官翦我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不恵稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邊陲我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車来命我景公曰吾與汝同好棄惡復修舊徳以追念前勲言誓未就景公即世我寡君是以有令狐之㑹君又不祥背棄盟誓白狄及君同州君之仇讐而我之昬姻也君来賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其徳也亦来告我曰秦背令狐之盟而来求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余惟利是視不榖惡其無成徳是用宣之以懲不壹諸侯備聞此言斯是用痛心疾首暱就寡人寡人帥以聽命惟好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙旃將新軍郤至佐之郤毅御戎欒鍼為右孟獻子曰晉帥乗和師必有大功五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父曹宣公卒于師師遂濟涇及侯麗而還迓晉侯于新楚成肅公卒于瑕劉氏曰左氏有劉康公成肅公而經不書又云戰于麻隧秦師敗績而經不説然則皆虚也葉氏曰王卿㑹諸侯伐未有不書於經者二公誠行安得不書乎杜預謂二公不書兵不加秦既言㑹則當書况後言麻隧之勝則兵非不加秦也愚案劉子論成肅公盖格言也非左氏所自撰而前後差舛如此豈劉子他日之言而左氏誤引之歟公羊曰其言自京師何公鑿行也公鑿行奈何不敢過天子也自京師正譏其為伐秦因朝王耳而公羊乃為不敢過天子之都而更造其行是與之也豈不悖哉榖梁曰公如京師不月月非如也非如而曰如不叛京師也言受命不敢叛周也公之如京師論其跡似得禮論其情則本伐秦耳春秋正譏其似是而實非榖梁乃欲實其似是以為是又以實如為非如變亂是非日月為例之弊一至於此曹伯盧卒于師榖梁曰𫝊曰閔之也公大夫在師曰師在㑹曰㑹劉氏曰諸侯死於行則記其地死於國則不記其地所以别内外也法則如此何謂閔之冬𦵏曹宣公榖梁曰𦵏時正也十四年秋叔孫僑如如齊逆女左氏曰秋宣伯如齊逆女稱族尊君命也辨見宣元年公子遂逆女鄭公子喜帥師伐許左氏曰八月鄭子罕伐許敗焉戊戌鄭伯復伐許庚子入其郛許人平以叔申之封公子喜伐許而鄭伯又伐許至入其郛又許以叔申之封經何不書之當以經為正九月僑如以夫人婦姜氏至自齊左氏曰九月僑如以夫人婦姜氏至自齊舍族尊夫人也故君子曰春秋之稱微而顯志而晦婉而成章盡而不汙懲惡而勸善非聖人誰能修之劉氏曰非也一事而再見者卒名之此春秋之常耳非為尊命故舉氏尊夫人故舎族也何氏曰襄二十七年豹及諸侯之大夫盟復何所尊而舎族春秋之法事再見者皆名以省文榖梁曰大夫不以夫人以夫人非正也刺不親迎也僑如之挈由上致之也康侯胡氏曰然則取於他邦而道里或逺必親迎乎以封壤則有大小以爵次則有尊卑以道塗則有逺近或迎之於其國或迎之於其境上或迎之於所館中禮之節可也愚謂親迎與迎於館所於禮文不甚明白詳見隠二年紀履緰逆女然此則譏僑如以同姓之卿逆女故耳冬十月庚寅衛侯臧卒左氏曰衛侯有疾使孔成子甯恵子立敬姒之子衎以為太子冬十月衛定公卒夫人姜氏既哭而息見太子之不哀也不内酌飲歎曰是夫也将不唯衛國之敗其必始於未亡人嗚呼天禍衛國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼孫文子自是不敢舎其重器於衛盡寘諸戚而甚善晉大夫非本義不録十五年三月乙巳仲嬰齊卒公羊曰仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使于晉而未返何以後之叔仲恵伯傅子赤者也文公死子幼公子遂謂叔仲恵伯曰君幼如之何願與子慮之叔仲恵伯曰吾子相之老夫抱之何幼君之有公子遂知其不可與謀退而殺叔仲恵伯弑子赤而立宣公宣公死成公幼臧宣叔者相也君死不哭聚諸大夫而問焉曰昔者叔仲恵伯之事孰為之諸大夫皆雜然曰仲氏也其然乎於是遣歸父之家然後哭君歸父使乎晉還自晉至檉聞君薨家遣墠帷哭君成踊反命于介自是走之齊魯人徐傷歸父之無後也於是使嬰齊後之也啖氏曰二𫝊不知有叔􅆄子公孫嬰齊此故稱仲以别之故妄說耳愚案以仲嬰齊為歸父弟諸説皆然不特公羊也其是否未可辨惟以仲嬰齊似指六年如晉八年如莒者則不然耳榖梁曰此公孫也其曰仲何也子由父疏之也劉氏曰非也此公孫之子以王父字為氏非公子之子也若必云子由父疏不得稱公孫則歸父何故稱公孫乎癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師左氏曰十三年曹伯盧卒于師曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其太子而自立也諸侯乃請討之晉人以其役之勞請俟他年冬𦵏曹宣公既𦵏子臧将亡國人皆将從之成公乃懼告罪且請焉乃反而致其邑十五年㑹于戚討曹成公也執而歸諸京師書曰晉侯執曹伯不及其民也凡君不道於其民諸侯討而執之則曰某人執某侯不然則否諸侯将見子臧於王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋邦衡胡氏曰曹伯之罪於經無據左氏謂曹伯卒公子負芻殺太子而代之若然則負芻殺未踰年之君與齊商人弑舎罪均矣安得畧而不書耶又云㑹于戚討曹成公果討之安得更與同盟耶愚謂左氏載子臧将亡國人皆将從之事不可信苟國人皆從子臧何不討殺負芻而立子臧乎且一子臧非有至徳其能使國人皆從之乎其曰成公懼而告罪亦未必然夫弑君之賊何所忌憚而能告罪致邑乎其曰晉侯執曹伯不及其民至不然則否等語皆無義理以此觀之此傳都無可信也榖梁曰以晉侯而斥執曹伯惡晉侯也不言之急辭也斷在晉侯也楚子伐鄭左氏曰楚将北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民将叛之無民孰戰案經無盟晉楚事左氏以此實𤨏澤之㑹而不知其背經益甚且經僅書楚子伐鄭而不伐衛又鄭懼楚不暇来即與平故次年有侵宋戰晉之役奚敢報復使子罕侵楚取新石此皆其不然者也秋八月庚辰𦵏宋共公榖梁曰月卒日𦵏非𦵏者也此其言𦵏何也以其𦵏共姬不可不𦵏共公也𦵏共姬則其不可不𦵏共公何也夫人之義不踰君也為賢者崇也劉氏曰非也若以𦵏夫人則必𦵏其君荘二十九年𦵏紀叔姬而不𦵏紀侯何也愚謂春秋書諸侯𦵏者多矣豈皆以𦵏夫人乎不可通矣宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左氏曰秋八月𦵏宋共公於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為司冦鱗朱為少司冦向帶為大宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城荘族也六官者皆桓族也魚石将止華元魚府曰右師反必討是無桓氏也魚石曰右師苟獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戍在桓氏雖亡必偏魚石自止華元於河上請討許之及反使華喜公孫師帥國人攻蕩氏殺子山書曰宋殺其大夫山言背其族也魚石向為人鱗朱向帶魚府出舍於睢上華元使止之不可冬十月華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今将馳矣登丘而望之則馳騁而従之則决睢澨閉門登陴矣左師二司冦二宰遂出奔楚華元使向戍為左師老佐為司馬樂裔為司冦以靖國人趙氏曰案經文云奔晉又云自晉歸而傳云魚石自止華元于河上請討許之乃反殊相違矣且魚石自請討蕩澤則是處無過之地矣既討之矣復何事魚石又奔假如魚石與蕩同族慙而自去則是知恥之人後不應卻入彭城為亂考之事理無非乖謬魚石直與蕩澤同惡爾又曰國亂用兵相攻則是仇敵也如何云自止乎黄氏曰𫝊與經異但當信經凡依𫝊而生說以釋經者不必也朴鄉吕氏曰左氏所載首尾不實愚謂趙氏之辨足以破愚矣今因而衍之魚石答魚府曰右師苟獲反雖許之討必不敢何為華元一反而即討桓族乎又蕩山與五大夫皆桓族也何為殺其一而止其五乎又五族皆宋之六官非其屬也何為出奔而獨書魚石乎杜云獨魚石告無是理也夫告者宋人也豈得捐四大夫而獨告魚石之名哉又左氏見山不稱氏故附會其説以謂山背其族夫春秋不氏者多矣如無駭翬俠溺之徒豈皆背其族者哉先儒紛紛之説皆本於此誤信之弊大矣冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離公羊曰曷為殊㑹吴外吴也曷為外也春秋内其國而外諸夏内諸夏而外夷狄王者欲一乎天下曷為以外内之辭言之言自近者始也劉氏曰非也一地而再言㑹者明一㑹也吴則其君矣未可以爵通又不可稱人稱人則下從大夫之例故須云㑹吴以成其文也若實外吴者後吴人㑹戚何以不殊之又㑹于申有淮夷亦何以不外之吴豈不若淮夷哉愚謂此兩言㑹者内大夫㑹諸國大夫往㑹吴于鍾離故其文不容不然耳義見本義榖梁曰㑹又㑹外之也啖氏曰重書者既㑹士燮同往㑹吴趙氏曰案實再㑹依實書之何外吴之有徒為煩迂耳辨又見公羊許遷于葉榖梁曰遷者猶得其國家以往者也其地許復見也案榖梁言其地為許復見盖指楚人遷宿不地而言也况自遷皆書其地惟他人遷之有不地者以其義不在於地而在於遷人國故也許雖不復見亦書地也然則許之地何足為義而言之乎其曰遷者猶得其國家以往亦非所以解經也十有六年春王正月雨木冰公羊曰雨木冰者何雨而木冰也何以書記異也此說得之但不若范氏註益明耳榖梁曰雨而木冰也志異也傳曰根枝折此說得之但根枝折一語億之之辭耳甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績公羊曰晦者何冥也何以書記異也敗者稱師楚何以不稱師王痍也王痍者何傷乎矢也然則何以不言師敗績末言耳案丙寅朔日食則甲午是二十九日其為晦日明矣公羊尚未曉耳下文近之辨又見僖十五年己夘晦榖梁曰日事遇晦曰晦四體偏斷曰敗此其敗則目也案此言楚子敗績盖大略言其君傷敗耳必解曰四體偏斷曰敗此其敗則目也則拘矣其曰日事遇晦近之秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公公至自㑹公羊曰不見公者何公不見見也公不見見大夫執何以致㑹不恥也曷為不恥公幼也劉氏曰非也案公即位至於今十有六年矣豈得云幼哉上不郊不免牲等公羊輙云公怨天忿懟有不敬心也若此時尚幼彼時固甚幼幼不當恥何苦責之陳岳氏曰凡史冊舊文諱君之惡臣下之體聖人以魯為主從而諱之斯㑹以公不及鄢陵之戰故不見公實恥之大而顯書之何也苟曰公幼而不恥凡諱國之所能為也丘作甲非正也惡乎公不及鄢陵之戰見誣於宣伯晉侯不察其實而信其誣是罪不在公故書以彰晉侯之信譖明我公之無罪榖梁近之愚案此無執大夫之文安可言大夫執何以致㑹乎公㑹尹子晉侯齊國佐邾人伐鄭左氏曰七月公㑹尹武公及諸侯伐鄭将行姜又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食于鄭郊師逆以至聲伯四日不食以待之食使者而後食諸侯遷于制田知武子佐下軍以諸侯之師侵陳至鳴鹿遂侵蔡未及諸侯遷于潁上戊午鄭子罕宵軍之宋齊衛皆失軍案經但言齊邾而已無宋衛也况侵陳侵蔡事經皆無有左氏未可信也曹伯歸自京師左氏曰曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大冺曹也先君無乃有罪乎若有罪則君列諸㑹矣君惟不遺徳刑以伯諸侯豈獨遺諸敝邑敢私布之曹人復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出以十五年事考之知此傳亦左氏附㑹之辭觀先君無乃有罪若有罪則君列諸㑹矣等語可見也然曹人請於晉之事則有之公羊曰執而歸者名曹伯何以不名而不言復歸于曹何易也其易奈何公子喜時在内也公子喜時在内則何以易公子喜時者仁人也内平其國而待之外治諸京師而免之其言自京師何言甚易也舎是無難矣春秋書晉侯執曹伯歸之于京師又書曹伯歸自京師將以正天下大義為後世訓豈暇論其有公子治國而易歸哉况就不名與不言復歸生義乎榖梁曰不言所歸歸之善者也出入不名以為不失其國也歸為善自某歸次之劉氏曰歸為善自某歸次之非也衛元咺衛侯鄭何善之有乎且自某歸者明有奉焉耳本不為善不善九月晉人執季孫行父舎之于苕丘公羊曰執未有言舎之者此其言舎之何仁之也曰在招丘悕矣執未有言仁之者此其言仁之何代公執也其代公執奈何前此者晉人来乞師而不與公㑹晉侯將執公季孫行父曰此臣之罪也於是執季孫行父成公將㑹厲公㑹不當期將執公季孫行父曰臣有罪執其君子有罪執其父此聽失之大者也今此臣之罪也舎臣之身而執臣之君吾恐聽失之為宗廟羞也於是執季孫行父案公羊於沙隨之㑹言大夫執則既妄矣而此又言乞師不與而執行父盖指沙隨之㑹也而又言出師後期而執行父則是行父兩被執也然經所書者一而已此公羊之妄一也又案經言公㑹晉伐宋矣非後期而執行父也公羊之妄二也又案左氏行父之執本以僑如之譖非乞師不與也冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭左氏曰冬諸侯伐鄭十月庚午圍鄭楚公子申救鄭師于汝上十一月諸侯還案經書伐也非圍也又不書楚救鄭也杜氏乃言不書圍畏楚救不成圍而還盖牽合之論榖梁曰言公不背柯陵之盟也此説無所發明壬申公孫嬰齊卒于貍脤左氏曰初聲伯夢渉洹或與已瓊瑰食之泣而為瓊瑰盈其懐従而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懐乎懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也余衆繁而従余三年矣無傷也言之之莫而卒貫道王氏曰瓊瑰之夢怪而誣愚謂夢之怪者或有之然非本義不録公羊曰非此月日也曷為以此月日卒之待君命然後卒大夫曷為待君命然後卒大夫前此者嬰齊走之晉公㑹晉侯将執公嬰齊為公請公許之反為大夫歸至于貍軫而卒無君命不敢卒大夫公至曰吾固許之反為大夫然後卒之劉氏曰非也君之許嬰齊為大夫固在前矣君至而後明之耳然則卒嬰齊當在致公之前無疑也若以嬰齊反未至故不得以大夫卒之者嬰齊之卒竟未為大夫則嬰齊終不合卒無為但移卒於致公之後也若以公許之則成大夫矣先公未至卒之何傷乎假令國人未知公命不録其卒俟公告之乃追録其卒既追録之固應在致公之前明公之許之為大夫也固在前耳豈不可乎又公孫敖卒于齊彼不待公命何為卒之哉物有似是而非者此之謂也愚謂沙隨之㑹不見公而已公羊則曰将執公也行父争之而執行父晉執行父舎之苕丘而已公羊又曰将執公也行父争之而執行父今公㑹單子晉侯伐鄭於經傳不言後㑹也公羊又曰将執公嬰齊為公請之而許之為大夫公羊三言執公而於經無見於事無稽則既不足信矣且嬰齊於季孫之執奉使請於晉今又書其卒則其為大夫久矣觀左氏所載范文子曰嬰齊奉君無私謀國家不貳可見也至此乃言公始許之為大夫則公羊妄矣榖梁曰十一月無壬申壬申乃十月也致公而後録臣子之義也其地未踰竟也趙氏曰案春秋編年月日之書一例以先後書之且先言卿卒後言公至皆據實事何傷教乎二𫝊不達文有錯誤之理遂妄為說李氏曰經下有十二月丁巳朔則知此壬申在十月十六日也二傳見日之誤故穿鑿以成其說公羊以嬰齊當絶待君命而卒之然上無出奔之文榖梁以致公而後書夫史之載筆出必從君卿為股肱死當即録不待致而後書杜預以為日誤得之今考於經於月日則舛誤於地則左氏為貍脤公羊為貍軫榖梁為貍蜃文之差謬無甚於此簡編脱壊使然也十有八年春王正月晉殺其大夫胥童左氏曰十七年閏月乙夘晦欒書中行偃殺胥童民不與郤氏胥童道君為亂故皆書曰晉殺其大夫案經書殺胥童在十八年而傳在十七年固已違經矣又若欒書中行偃殺胥童乃自相報復也經當書曰欒書殺胥童若王札子殺召伯毛伯之類也魯史豈肯誣晉殺之而書曰晉殺其大夫胥童哉仲尼豈肯雷同書之春秋哉又春秋書曰某國殺其大夫某者大凡譏其不請于天子而専殺之而殺之與被殺者之罪則各比事以見焉其有不見其事者則但譏其専殺而已今書晉殺其大夫郤錡郤犫郤至與殺其大夫胥童據經論理不過譏晉之専殺與自折其股肱而已而胥童所以取殺之由盖莫之考若三郤之見殺據左氏所載乃晉厲多外嬖欲盡去羣大夫而立左右故胥童夷羊五長魚矯欒書之徒乗機報怨而已未見民之不與郤氏也向使民果不與郤氏胥童果道君為亂而見殺亦不在書晉殺其大夫之文見義也大抵左氏之自為辭皆不足取者以其徒博而不識道理故也庚申晉弑其君州蒲左傳曰十七年公逰于匠麗氏欒書中行偃遂執公焉召士匄士匄辭召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也十八年正月庚申晉欒書中行偃使程滑弑厲公𦵏之于翼東門之外以車一乗使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不従将安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不惟命是聽庚午盟而入館于伯子同氏辛巳朝于武宫逐不臣者七人周子有兄而無慧不能辨菽麥故不可立案實欒書中行偃使程滑弑君經當書其首惡必曰欒書弑其君州蒲今經但曰晉弑其君盖春秋闕其弑君之賊名耳然則執公之事亦不足信也辨見本義若逆周子于京師以下或可信者但非此事本義不録榖梁曰稱國以弑其君君惡甚矣榖梁但責其君惡而忘其弑君之惡非所以訓齊殺其大夫國佐左氏曰十七年齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以榖叛齊侯與之盟于徐闗而復之十二月盧降使國勝告難于晉待命于清十八年齊為慶氏之難故甲申晦齊侯使士華免以戈殺國佐於内宫之朝師逃于夫人之宫書曰齊殺其大夫國佐棄命専殺以榖叛故也使清人殺國勝國弱来奔王湫奔萊慶封為大夫慶佐為司㓂既齊侯反國弱使嗣國氏禮也案此𫝊多不可據夫齊方出兵圍盧國佐亦従諸侯圍鄭國佐棄軍歸殺慶克又以邑叛齊侯宜何如乃與盟而復之復之踰年而又殺之不近人情矣左氏又曰書曰齊殺其大夫國佐棄命専殺以榖叛故也亦非也如國佐以榖叛則是逆賦也當書曰齊人殺國佐與晉人殺欒氏同一辭可也不得言齊殺其大夫矣且叛逆而立其後使國弱嗣安得謂之禮哉其曰國弱来奔於經亦當書而不書皆其不可據者也夏楚子鄭伯伐宋宋魚石復入于彭城左氏夏六月鄭伯侵宋及曹門外遂㑹楚子伐宋取朝郏楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乗戍之而還書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入案鄭伯果先侵宋春秋當書以見其罪又楚鄭取朝郏幽丘經亦當書以見楚鄭之罪今皆不書則是無有此事也况向為人鱗朱向帶魚府四人者未嘗出奔今亦未嘗同入辨見宋魚石奔楚傳下其曰國逆而立之曰入以下皆左氏自為例也故劉氏曰今案左氏國逆之未必言入言入者未必國逆復其位者未必言復歸諸侯納之者未必言歸以惡入者或言復入或不言復入事與例合者少而與例違者多不託之従赴則誘之以従某例惟註者推言之而已不復可信也晉侯使士匄来聘左氏曰公至自晉晉范宣子来聘且拜朝也君子謂晉於是乎有禮此小禮也若大禮則當朝天子而後及鄰國况此時亦未可朝聘天子特可請命云耳左氏云有禮所謂非禮之禮也秋杞伯来朝八月邾子来朝左氏曰秋杞桓公来朝勞公且問晉故公以晉君語之杞伯於是乎驟朝于晉而請為昏非本義不録築鹿囿左氏曰築鹿囿書不時也莘老孫氏曰春秋興作皆書雖城池之固門廐之急無遺焉重其徳不及之而徒勞民力也况耳目之翫一身之娱哉左氏曰書不時盖不時猶書也東莱吕氏曰藪澤當與衆共豈諸侯所可得而藩之耶不止為書不時也榖梁曰築不志此其志何也山林藪澤之利所以與民共也虞之非正也葉氏曰囿無有不包山林藪澤者既以為非正則凡囿皆當書矣何以言築不志乎若以為築惟志囿則築邑築臺築館又何以志也案天子諸侯皆有囿此特譏其有囿而更築且以八月役民耳己丑公薨于路寝左氏曰言道也案此為僭諡起文故路寝得正雖為常事而亦書耳春秋無褒何謂言道哉榖梁曰路寝正也男子不絶婦人之手以齊終也此可謂薨于路寝之義然春秋所書則不為此紀實事以起私諡耳冬楚人鄭人侵宋左氏曰七月宋老佐華喜圍彭城老佐卒焉冬十一月楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成伯安疆自宋始矣晉侯師于台谷以救宋遇楚師于靡角之谷楚師還此傳與經絶不合宋圍彭城經既不書經書楚鄭侵宋而傳言楚救彭城經書晉圍彭城在来年而傳言今冬晉侯救鄭豈傳如此之詳且審而經如彼之畧且訛哉學春秋者以經考傳之偽可也丁未𦵏我君成公左氏曰書順也案桓公荘公文公卒𦵏之時弑逆紛紛未嘗不書曰𦵏我君桓公荘公文公也何獨於𦵏成公書順乎三傳辨疑卷十四
