body:
  text: 三傳辨疑卷九元程端學撰僖公十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都左氏曰隕石于宋五隕星也六鷁退飛過宋都風也周内史叔興聘于宋宋襄公問焉曰是何祥也吉凶焉在對曰今兹魯多大喪明年齊有亂君將得諸侯而不終退而告人曰君失問是隂陽之事非吉凶所生也吉凶由人吾不敢逆君故也胡氏曰左氏之説不通案莊七年已有星隕如雨之説且聖人所書各以其實若是星則明書之豈以星隕而言石隕乎愚謂如左氏言則叔興之心亦姦矣不可以訓又不闗本義故不録公羊曰曷為先言霣而後言石霣石記聞聞其磌然視之則石察之則五是月者何僅逮是月也何以不日晦日也晦則何以不言晦春秋不書晦也朔有事則書晦雖有事不書曷為先言六而後言鷁六鷁退飛記見也視之則六察之則鷁徐而察之則退飛五石六鷁何以書記異也外異不書此何以書為王者之後記異也啖氏曰六鷁則是同月若更不言是月則似同日公羊不達其意遂妄為此説且前後書晦多矣曷為不書晦乎孫氏曰其言是月不可再書正月也劉氏曰晦朔者天之所有取朔棄晦何當於義乎此乖偽之深者又成十六年實書晦朔晦朔之相發猶首尾也尚何言哉愚謂記聞記見僅逮是月之說皆億度想像不惟無益於經而反害經㫖夫石何必察之然後知其五鷁何必徐而察之然後知其退飛哉且齊陳鄭災皆書何必特為王者後記異哉穀梁曰先隕而後石何也隕而後石也于宋四境之内曰宋後數散辭也耳治也是月者决不日而月也六鷁退飛過宋都先數聚辭也目治也子曰石無知之物鶂㣲有知之物石無知故日之鶂㣲有知之物故月之君子之於物無所茍而已矣石鶂且猶盡其辭而况於人乎故五石六鶂之辭不設則王道不亢矣民所聚曰都劉氏曰言是月者宋不告日嫌與五石為一日故分别之耳穀梁本以日月解經因此以誣聖人欲後世信之豈實然乎愚謂耳治目治之說本承公羊記聞記見之意而又益之以散辭聚辭者也至無知而曰㣲有知而月穿鑿附㑹衍其虚誕之辭於經㫖何與哉三月壬申公子季友卒公羊曰其稱季友何賢也辨見閔元年季子來歸穀梁曰大夫日卒正也稱公弟叔仲賢也大夫不言公子公孫疏之也劉氏曰書季友云賢則書仲遂亦可謂賢乎東岳氏曰前此公子友見經者多矣悉無稱字者死何獨賢乎若以時君賢之故史字之則公子彄卒隠公曰叔父有憾於寡人寡人弗敢忘葬之加一等是隠公賢彄也何以不字之乎季文子卒大夫入歛公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉帛無重器備君子是以知季文子之忠於公室也最賢矣亦何以不字之乎愚謂史法當稱公子則稱公子當稱公孫則稱公孫當稱大夫則稱大夫何有不言公子公孫為疏之哉冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮左氏曰謀鄫且東畧也城鄫役人病有夜登丘而呼曰齊有亂不果城而還案城鄫之事經所不書故知左氏妄也謀鄫亦未可信穀梁曰兵車之㑹也十有七年夏滅項左氏曰齊人以為討而止公左氏見公在㑹而夫人㑹桓又在滅項之下又疑公至之遲故附㑹此説若公在㑹而大夫滅項齊桓討而止公則齊桓失刑矣辨又見下方公羊曰孰滅之齊滅之曷為不言齊滅之為桓公諱也春秋為賢者諱此滅人之國何賢爾君子之惡惡也疾始善善也樂終桓公嘗有繼絶存亡之功故君子為之諱也穀梁曰孰滅之桓公也何以不言桓公也為賢者諱也項國也不可滅而滅之乎桓公知項之可滅也而不知己之不可以滅也既滅人之國矣何賢乎君子惡惡疾其始善善樂其終桓公嘗有存亡繼絶之功故君子為之諱也啖氏曰案其文義乃是魯韓豈可為齊韓而魯自取惡乎齊桓雖賢滅項非合義何得為諱乎劉氏曰公羊謂桓公滅之非也桓公雖信賢豈滅人哉且桓公既已功高天下而威震主矣又戕人滅人此春秋所惡也而反為之諱是開有功者得横行天下而無忌憚也陳岳氏曰凡書外事各言其國内事不言我盖春秋魯史故也外書則齊師滅譚齊人滅遂之類是也内事則取鄟取邾之類是也未有書外事不言其國未有書内事言魯者盖言國以别内也茍書内曰魯何以為魯史也康侯胡氏曰案左氏淮之㑹公有諸侯之事未歸而取項然則滅項者魯也二傳以為桓公滅之孰信乎考於經未有書外滅而不言國者如齊師滅譚是也未有書内取而直言魯者如取鄟取邾取鄫是也由此知項為魯所滅無疑矣李氏曰春秋以示勸戒諸侯征伐苟推王命而行之可也此滅國也春秋復從而諱之又何以垂教扵後哉凡經言執者皆譏也桓執陳濤塗猶備書之况滅國而為之諱乎濟川何氏曰尋春秋為賢者諱獨出於公穀案滅譚滅遂遷陽盡桓為也則辭窮故遁為之辭秋夫人姜氏㑹齊侯于卞九月公至自㑹左氏曰秋聲姜以公故㑹齊侯于卞九月公至書曰至自㑹猶有諸侯之事焉且諱之也莘老孫氏曰考之於經無魯侯見執之迹春秋雖為魯諱亦不全没其事若齊侯實嘗執公亦當異辭以見之經無其辭則左氏未可據也愚謂夫人苟救公則當親至齊國不應呼齊侯至魯地而㑹之也其為左氏附㑹明矣冬十二月乙亥齊侯小白卒左氏曰十月乙亥齊桓公卒十二月乙亥赴辛巳夜殯經書十二月乙亥卒而左氏言十月乙亥卒十二月乙亥赴當以經為正穀梁曰此不正其日之何也其不正前見矣其不正之前見何也以不正入虚國故稱嫌焉耳劉氏曰小白不正卒不得書日以其不正前見故得書日也重耳亦不正者其不正前未嘗見則卒不當日而日之何哉十有八年夏師救齊穀梁曰善救齊也諸侯非王命擅興師安得直許善救齊乎謂之彼善於此可也五月戊寅宋師及齊師戰于甗齊師敗績左氏曰齊人將立孝公不勝四公子之徒遂與宋人戰夏五月宋敗齊師于甗立孝公而還經書宋及齊戰而傳言遂與宋戰是反經也難以據矣公羊曰戰不言伐此其言伐何宋公與伐而不與戰故言伐春秋伐者為客受伐者為主曷為不使齊主之與襄公之征齊也曷為與襄公之征齊桓公死豎刁易牙争權不葬為是故伐之也啖氏曰此戰與伐各是一事故不得連舉也又伐時曹衛邾之國同之戰則惟宋獨戰事須先書伐也公羊不知事跡故穿鑿耳劉氏曰公羊曰曷為不使齊主之與襄公之征齊也非也晉荀林父及楚子戰于邲寧可亦曰與晉林父之征楚乎所異於晉者何哉愚案孟子曰征者上伐下也敵國不相征也公羊謂之征齊亦非也且宋及齊戰正以責宋而曰與之是黨惡也况春秋無褒乎又諸侯五月而葬齊桓去年十二月卒宋襄正月即伐之未可云不葬故伐之也穀梁曰戰不言伐客不言及言及惡宋也伐而戰則言伐言戰矣客而為志乎戰則言及矣穀梁謂戰不言伐客不言及非也冬邢人狄人伐衛左氏曰冬邢人狄人伐衛圍菟圃衛侯以國讓父兄子弟及朝衆曰苟能治之燬請從焉衆不可而後師于訾婁狄師還案此事信否未可知但非本義不取穀梁曰狄其稱人何也善累而後進之伐衛所以救齊也功近而徳遠矣陸氏曰案狄加人字以成文辭耳不可謂邢人狄伐衛有何善乎劉氏曰春秋之法内諸夏而外夷狄惡其乗釁陷隙必能為患若進其功而善之吾見禍以益多憂以益長甚非仲尼意也愚謂五月宋已敗齊師冬救之無能為也况伐齊者四國何獨伐衛哉若邢狄借伐齊之辠以伐衛則或有之十有九年鄫子㑹盟于邾己酉邾人執鄫子用之左氏曰宋公使邾文公用鄫子于次睢之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄徳今一㑹而虐二國之君又用諸滛昏之鬼將以求霸不亦難乎得死為幸趙氏曰若然則宋為惡首邾雖諸侯不當受其無道之命然世卑力屈辠猶輕於宋經文當兩譏之云宋人使邾人不當獨辠邾也若宋襄以仁義為己任不重傷不禽二毛豈肯殺諸侯以祭􅁋祀乎左氏見上文盟于曹南又續云鄫子㑹盟于邾以為宋公本召鄫子鄫子來晚故宋公回至邾鄫子乃到所以怒之曽不知曹南之盟自是大夫盟耳若宋公路出於宋何得路出於邾殊為乖謬也左氏叙子魚諫云今公一㑹而虐二國之君且三月執滕子六月乃用鄫子而云一㑹其偽可知矣又云用之於次雎之社以雎水在宋故附㑹而為此説據鄫子㑹盟于邾何得至宋哉三𫝊云社億度之耳劉氏曰此大妄也六月㑹于曹南此自一㑹是時雖有邾人即非邾子今此㑹盟于邾者詳驗經文是邾國自為盟㑹鄫子徃參之因見執耳非向者曹南之盟也若即㑹向者曹南之盟應但云如㑹實未嘗盟何得言㑹盟邾又宋為伯主而使邾子用鄫之君辠乃在宋不在邾也杜氏以為不書宋使邾者南面之君善惡自専不得託之他命非也季姬使鄫子來朝鄫子亦南面之君春秋著季姬使之者兩見其惡也今春秋亦云宋公使邾人執鄫子用之亦兩見其惡豈不可乎以此推之知宋公未嘗使邾人執鄫子也若宋公使邾人執鄫子而春秋越宋理邾者是謂首惡者不誅而脅從者見討也春秋原心定辠豈若是哉公羊曰其言㑹盟何後㑹也惡乎用之用之社也其用之社奈何盖叩其鼻以血社也案經言㑹盟言來㑹而為盟耳而傳釋為後㑹經言用之言為牲耳而傳釋為用之於社而又云叩其鼻以血社既不依經為説而又益以無稽之言穀梁曰㣲國之君因邾以求與之盟人因已以求與之盟已迎而執之惡之故謹而日之也用之者叩其鼻以衈社也案此説上文近似下文亦公羊之繆衛人伐邢左氏曰秋衛人伐邢以報菟圃之役於是衛大旱卜有事於山川不吉甯莊子曰昔周饑克殷而年豐今邢方無道諸侯無伯天其或者欲使衛討邢乎從之師興而雨啖氏曰左氏甯莊之言皆飾佞之辭也莘老孫氏曰邢之惡何至於紂而衛之有道比於武王左氏之誣甚矣東萊吕氏曰衛今伐邢尋復滅之使天有道衛當益旱矣安能致雨邪甯莊繆妄諂諛之論上誤國家下誤衛主雨自偶降豈滅同姓之國能動天心邪存耕趙氏曰衛之伐邢所以報也天下無伯諸侯相為報復而已甯莊無以正救衛燬之惡反欲飾辭以助其虐旱豈為邢雨豈為衛左氏從而載之世有亢旱為乾封者皆是説導之也冬㑹陳人蔡人楚人鄭人盟于齊左氏曰陳穆公請脩好於諸侯以無忘齊桓之徳冬盟于齊脩桓公之好也存耕趙氏曰案齊桓以誤軍之故執其臣侵伐其國未嘗有徳於陳也陳穆公何為而無忘哉愚謂齊桓攘奪楚而四國與楚脩桓公之好又不于他國而于齊必無之理也梁亡穀梁曰如加力役焉湎不足道也梁亡鄭棄其師我無加損焉正名而已矣梁亡出惡正也鄭棄其師惡其長也此義不拂於經特以其複而剰之耳二十年春新作南門穀梁曰南門者法門也啖氏曰案南門者城之南門耳何用法門之説夏郜子來朝公羊曰郜子者何失地之君也何以不名兄弟辭也趙氏曰經無異文公羊無所據也劉氏曰若失地之君何得言朝朝者施於有國有家之辭耳又公羊以郜滅在春秋前案春秋以來且九十年矣郜子失地殆三世矣猶能自歸同姓躬行朝禮無乃少不近人情乎葉氏曰郜子來朝與常文同何以必其失地而不名乎傳與文十二年言盛伯來奔者類推之但見其同姓皆以為兄弟辭於經文實無據也五月乙巳西宫災公羊曰魯子曰以有西宫亦知諸侯之有三宫也理或然也然非本義穀梁曰謂之新宫則近為禰宫以諡言之則如疏之然以是為閔宫也趙氏曰案經文謂之西宫直是僖公之西宫耳何闗閔宫乎胡氏曰若是閔宫則明書新宫不得謂之西宫也此西宫盖魯之别宫也莘老孫氏曰西宫僖公所居之西宫以其在西故曰西爾僖公繼閔而立若實閔宫何妨言新宫乎為其已久何妨言閔宫乎葉氏曰公羊言諸侯三宫者是也襄九年穆姜薨于東宫為其證有東宫則有西宫穆姜成公之母宣公之妻也故居于左而杜氏誤解以為太子宫盖惑于東宫得臣之言也存耕趙氏曰天子六寢后六宫諸侯三寢夫人三宫曰東宫西宫中宫也秋齊人狄人盟于邢穀梁曰邢為主焉爾邢小其為主何也其為主乎救齊啖氏曰邢雖小國何妨為地主穀梁妄云救齊無所據冬楚人伐隨左氏曰隨以漢東諸侯叛楚冬楚鬭穀於菟帥師伐隨取成而還君子曰隨之見伐不量力也量力而動其過鮮矣善敗由已而由人乎哉詩曰豈不夙夜謂行多露邦衡胡氏曰漢東之國隨為大春秋之初已為大國非楚之與國也今楚人伐之而左氏以為叛楚非矣盖自齊桓既没中國無所統一楚吞滅諸國以隨不服故欲伐而有之自是以後隨卒屬楚矣哀公元年隨侯與楚子圍蔡是也張氏曰案楚力方彊隨欲復漢東諸侯於中國而徳不足以勝之此其所以召兵而自屈也左氏辠其不量力未若孟子師文王之論穀梁曰隨國也二十有一年夏大旱左氏曰是歲也饑而不害啖氏曰今但取臧文仲諫辭而畧是歲也饑而不害一句穀梁曰旱時正也凡此等論何益於春秋哉秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋公羊曰孰執之楚子執之曷為不言楚子執之不與夷狄之執中國也陳岳氏曰楚自屈完盟于召陵之後兵與中國敵禮與等㑹與同盟與伉初以夷狄之僭終於春秋稱子而已其所書不與中國異故執鄭良霄執齊慶封滅陳滅蔡皆書楚也奚不與夷狄執中國之有所以書執宋公以伐宋者以宋無徳服諸夏又無力以制諸侯與楚争盟為楚所執亦中國之恥也故聯諸侯之㑹書之明與楚國共執之宋既服復盟于薄以釋之則共執之義顯矣穀梁曰以重辭也以者文法當然何重之有冬公伐邾左氏曰任宿須句顓臾風姓也實司大皥與有濟之祀以服事諸侯夏邾人滅須句須句子來奔因成風也成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皞濟而脩祀紓禍也葉氏曰滅國未有不書於經者諸侯來奔亦未有不書於經者審如傳言經安得不見乎滅須句謂不告不書猶可也來奔則無不書之理案明年公伐邾取須句猶言公伐邾取訾婁則須句盖邾之邑也傳不知此而以成風為同姓故妄信所傳耳劉氏曰若然經何以不書邪杜氏曰須句雖别邑而削弱不能自通為魯私屬若顓臾之比謂之社稷之臣然受王命為魯附庸自不得經見耳須句非附庸又傳曰實司大皥與有濟之祀以服事諸夏非魯私屬明矣假令為魯私屬亦不得稱來奔今傳稱須句子來奔是非私屬也且魯亡其私屬則自宜救之又何待成風為之言哉須句非魯私屬其國滅其君來奔經不宜不書也以經不書知無有此事也朴鄉吕氏曰如左氏説則邾是一國須句是一國既是復須句之君則經不應言取書曰伐邾取須句則是伐國而取其邑明矣然則是須句前滅於邾其國已為邾之邑公伐邾而取之爾左氏之説似未足據楚人使宜申來獻捷公羊曰此楚子也其稱人何貶曷為貶為執宋公貶曷為為執宋公貶宋公與楚子期以乗車之㑹公子目夷諫曰楚夷國也彊而無義請君以兵車之㑹往宋公曰不可吾與之約以乗車之㑹自我為之自我墮之曰不可終以乗車之㑹往楚人果伏兵車執宋公以伐宋宋公謂公子目夷曰子歸守國矣國子之國也吾不從子之言以至乎此公子目夷復曰君雖不言國國固臣之國也於是歸設守械而守國楚人謂宋人曰子不與我國吾將殺子君矣宋人應之曰吾賴社稷之神靈吾國已有君矣楚人知雖殺宋公猶不得宋國於是釋宋公宋公釋乎執走之衛公子目夷復曰國為君守之君曷為不入然後逆襄公歸惡乎捷捷乎宋曷為不言捷乎宋為襄公諱也此圍辭也曷為不言其圍為公子目夷諱也啖氏曰上言伐宋此言獻㨗必知宋捷省文耳公羊言為襄公諱有何義乎愚謂經言伐宋而不言圍公羊億其為圍而又釋其為目夷諱輾轉揣摩俱無實理穀梁曰捷軍得也其不曰宋捷何也不與楚捷於宋也不曰宋杜氏啖氏得之啟後世抑揚予奪之論者穀梁氏此説之類也十有二月癸丑公㑹諸侯盟于薄釋宋公公羊曰執未有言釋之者此其言釋之何公與為爾也公與為爾奈何公與議爾也案春秋有執諸侯大夫而不釋者則不書釋執而釋之則書釋一則紀實事二則書法之常也公羊言執未有言釋既無理矣又因其言釋而云公與議爾何氏因謂善僖公能與楚議釋賢者之厄皆失其是非之心者也穀梁曰㑹者外為主焉爾外釋不志此其志何也以公之與之盟日之也不言楚不與楚専釋也以公之與之即公羊之病而外釋不志尤為無理其曰不與楚専釋即公羊上文不與楚専執之病二十有二年春公伐邾取須句左氏曰伐邾取須句反其君焉禮也莘老孫氏曰左氏謂須句為國見滅於邾而其君奔魯公為是伐邾取須句而反其君若能如此則是魯得所伐且有存亡繼絶之功然春秋書之與伐杞取訾婁伐莒取向其文無異考尋經意正是須句為邾邑公伐邾而取之耳既伐其國又取其邑盖其辠大矣葉氏曰陳世子吳復歸于陳蔡世子廬復歸于蔡楚滅其國而後能復之猶見書于經須句誠滅于邾而魯反其君此孔子所謂興滅國繼絶世而天下之民歸心焉者也而經反與伐國取邑之辭一施之猶不免于譏乎左氏盖既失之于前而因以成其説者也秋八月丁未及邾人戰于升陘左氏曰邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄氷又曰敬之敬之天惟顯思命不易哉先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒而况國乎弗聴八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門劉氏曰杜云邾人獲公胄縣之魚門故深恥之不言師敗績非也如杜所説苟不深恥不諱敗矣所以深恥者以公喪胄危辱切近也然則乾時之戰公喪戎路左右皆止反獨不恥而書敗績何哉喪胄之辱孰與喪路之深升陘之恥孰與乾時見逼脅之急是大不然者也愚謂經不言敗績而傳言敗績後人因謂諱之莊九年書我師敗績矣固其證也且檀弓曰邾婁復之以矢盖自戰於升陘始也則邾人被殺傷者多矣然則升陘之戰勝負等也况春秋不書敗績乎左氏之言未可信也穀梁曰内諱敗舉其可道者也不言其人以吾敗也不言及之者為内諱也案乾時之戰書敗績未有可道之事也不言其人安知非大夫乎辨又見左氏冬十一月己巳朔宋公及楚人戰于泓宋師敗績公羊曰偏戰者日爾此其言朔何春秋辭繁而不殺者正也何正爾宋公與楚人期戰于泓之陽楚人濟泓而來有司復曰請迨其未畢濟而撃之宋公曰不可吾聞之也君子不厄人吾雖喪國之餘寡人不忍行也既濟未畢陳有司復曰請迨其未畢陳而撃之宋公曰不可吾聞之也君子不鼔不成列已陳然後襄公鼓之宋師大敗故君子大其不鼓不成列臨大事而不忘大禮有君而無臣以為雖文王之戰亦不過此也啖氏曰文王以仁義行師不應似宋襄徒守匹夫之信不知事機也王氏曰昔文王積善累徳諸侯皆向之天子賜之弓矢以為西伯聞崇徳亂而伐之軍三旬不降退修教而復伐之因壘而降詩人道之曰文王受命有此武功既伐于崇作邑于豐今宋襄求伯不修仁義而欲力服諸侯及其戰敗乃曰不鼓不成列是不好文王之徳而好文王之戰者也宜其衆敗身死蒙恥夷狄劉氏曰如公羊意惑于泓及河曲而已泓雖水名其陸地猶可以水名之若謂必令如河曲者遇于魯濟豈真遇于水中乎敗于濆泉豈真戰于泉中乎今天下以水名者尤多不必居水中乃得以水名也且文王何容易哉徳不加焉則不以力争義不過焉則不以威制漸之以道摩之以仁而四方自服爾詩曰肆不殄厥愠亦不隕厥問如是而伐崇猶再駕而降愛民之至也今襄公退不務修文王之業而進徒守尺寸之信夫其守信誠是也則不若緩修吾徳無亟大功以殘百姓也今論其守信之節而忘其殘民之本而以比之文王其不知聖人亦深矣且夫守信而不詐戰於楚人則有惠矣無徳而求大功於己國則大有害矣未知文王獨為爾乎愚謂紀晦朔史書之常而公羊即據之以為義以見辭繁而不殺因明宋襄之正穿鑿甚矣穀梁曰日事遇朔曰朔春秋三十有四戰未有以尊敗乎卑以師敗乎人者也以尊敗乎卑以師敗乎人則驕其敵襄公以師敗乎人而不驕其敵何也責之也泓之戰以為復雩之恥也雩之恥宋襄公有以自取之伐齊之喪執滕子圍曹為雩之㑹不顧其力之不足而致楚成王成王怒而執之故曰禮人不答則反其敬愛人不親則反其仁治人不治則反其智過而不改又之是謂之過襄公之謂也古者被甲嬰胄非以興國也則以征無道也豈曰以報其恥哉宋公與楚人戰于泓水之上司馬子反曰楚衆我少鼓險而擊之勝無幸焉襄公曰君子不推人危不攻人厄須其出既出旌亂於上陳亂於下子反曰楚衆我少撃之勝無幸焉襄公曰不鼔不成列須其成列而後擊之則衆敗而身傷焉七月而死倍則攻敵則戰少則守人之所以為人者言也人而不能言何以為人言之所以為言者信也言而不信何以為言信之所以為信者道也信而不道何以為道道之貴者時其行勢也陳岳氏曰凡戰伐或日不日皆不以為義例斯日而朔盖朔日而戰書其實也二𫝊之義俱不足取以人敵公亦非外黜苟曰卑不可敵尊則文二年晉侯及秦師戰于彭衙宣十二年晉孫林父及楚子戰于邲豈敵也哉啖氏曰王師敗績于貿戎豈非尊敗于卑乎又稱人者亦常法爾皆不可為義二十有三年春齊侯伐宋圍緡左氏曰齊侯伐宋圍緡以討其不與盟于齊也案陳蔡楚鄭盟于齊在十九年今五年矣此亦左氏臆度之辭耳公羊曰邑不言圍此其言圍何疾重故也隠五年圍長葛是邑可言圍也其曰疾重故也近之穀梁曰伐國不言圍邑此其言圍何也隠五年宋人伐鄭圍長葛是伐國可言圍邑也夏五月庚寅宋公兹父卒公羊曰何以不書葬盈乎諱也何氏曰盈滿也相接足之辭也襄公本以背殯不書其父葬至襄公身書葬則嫌伯業不成所覆者薄故復使身不書葬明當以前諱除背殯以後諱加㣲封愚謂公羊何氏鑿説辨己見九年穀梁曰兹父之不葬何也失民也其失民何也以其不教民戰則是棄其師也為人君而棄其師其民孰以為君哉趙氏曰公穀見其不書葬皆以為異説案凡諸侯葬與不葬㑹與不㑹耳陳岳氏曰春秋書外國君葬㑹葬也不㑹葬不書如衛桓公陳靈公皆書葬是魯㑹葬也如晉侯夷吾衛侯燬不書葬是魯不㑹葬也苟曰伯業不及而不書葬苟曰失民不書葬則衛桓為州吁所弑陳靈為徵舒所弑何得民之有而皆書葬歟劉氏曰宋公不忍厄人於險而致敗豈不教民戰者乎審如穀梁言泓之敗何不書宋棄其師乎秋楚人伐陳左氏曰楚成得臣帥師伐陳討其貳扵宋也遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有㡬取焦夷城頓經當書之今不書未可信也冬十一月杞子卒左氏曰書曰子杞夷也不書名未同盟也凡諸侯同盟死則赴以名禮也赴以名則亦書之不然則否辟不敏也劉氏曰左氏云杞夷也杜云仲尼以文貶之非也仲尼作春秋諸侯之惡有甚於杞者仲尼無所貶盖不以匹夫侵天子之事豈若是顓亂名實哉辨又見隠七年滕侯卒二十有四年夏狄伐鄭左氏曰鄭之入滑也滑人聴命師還又即衛鄭公子士洩堵俞彌帥師伐滑王使伯服㳺孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衛滑也故不聴王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之太上以徳撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以藩屏周管蔡郕霍魯衛毛耼郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周徳之不類故糾合宗族于成周而作詩曰常棣之華鄂不韚韚凡今之人莫如兄弟其四章曰兄弟鬩于牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勲親親暱近尊賢徳之大者也即聾從昧與頑用嚚姦之大者也棄徳崇姦禍之大者也鄭有平惠之勲又有厲宣之親棄嬖寵而用三良於諸姬為近四徳具矣耳不聴五聲之和為聾目不别五色之章為昧心不則徳義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿徳也猶曰莫如兄弟故封建之其懐柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云今周徳既衰於是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聽使頽叔桃子出狄師夏狄伐鄭取櫟案襄王果使狄伐鄭經當明書之曰天王使狄伐鄭又取櫟經亦當書之豈止曰狄伐鄭哉若曰仲尼不見周史事跡而從魯史魯史又從赴告而書則春秋鹵莽不足以取信後世矣况其年冬王出居于鄭若使狄伐鄭而復依鄭亦無是理也况所引富辰諫辭曰太上以徳撫民其次親親以相及夫親親以相及乃徳也而曰其次則太上以徳者乃無親疎之謂本老荘之常談耳又謂周公弔夏商末世故封建親戚皆以私意窺聖人者也又謂常棣之詩為召穆公思周徳之不類故糾合宗族于成周而作皆非至當之論其間雖有格言而薫蕕雜植難以刪取不知何從掇拾而為此盛世之説也冬天王出居于鄭左氏曰王徳狄人将以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪惏王又啟之女徳無極婦怨無終狄必為患王又弗聽又云頽叔桃子曰我實使狄秋其怨我以上皆指王使狄伐鄭之辭故不取又云天子無出書曰天王出居于鄭辟母弟之難也此無識見之辭故不取天子凶服降名禮也此非禮之禮故不取公羊曰王者無外此其言出何不能乎母也魯子曰是王也不能乎母者其諸此之謂與公羊以王不能事母而言出鑿之甚矣穀梁曰居者居其所也雖失天下莫敢有也案此義亦鑿晉侯夷吾卒左氏曰二十三年九月惠公卒經在二十四年冬而傳云二十三年九月當以經為正餘見或問二十有五年春王正月丙午衛侯燬滅邢左氏曰衛侯燬滅邢同姓也故名楊氏辨要曰諸儒皆以滅同姓故名楚滅夔齊滅紀晉滅虞虢皆同姓也胡不名獻可杜氏曰曲禮諸侯不生名此記禮者縁春秋而為文也春秋所書亡國五十直書曰某侯滅某國未有以名稱者也其文當是衛侯滅邢盖傳寫者見癸酉下有衛侯燬卒之文而誤增演其名耳黎氏曰且書滅邢則衛侯之惡已著安用更書名邪公羊曰衛侯燬何以名絶曷為絶之滅同姓也穀梁曰燬之名何也不正其伐本而滅同姓也辨並見左氏宋蕩伯姬來逆婦公羊曰宋蕩伯姬者何蕩氏之母也其言來逆婦何兄弟辭也其稱婦何有姑之辭也趙氏曰案經文直書其事以明非禮耳公羊云兄弟辭有何義乎愚謂其曰有姑之辭得之穀梁曰婦人既嫁不踰竟宋蕩伯姬來逆婦非正也親迎非姑之事故春秋譏之不特責其既嫁不踰竟而已若經但書宋蕩伯姬來則可云是也宋殺其大夫公羊曰何以不名宋三世無大夫三世内娶也啖氏曰三世無大夫迂僻之甚劉氏曰文稱有大夫非無大夫明矣且君娶一卿而一國之内何得悉無大夫哉凡妻之父母所不臣也而其等列禮不及也何謂無大夫乎詭僻不經乃至於此可閔笑者此也穀梁曰其不稱名姓以其在祖之位尊之也啖氏曰夫子因魯史而垂訓宋大夫祖同位者書姓名有何妨乎劉氏曰春秋非孔氏家牒當為後世書法耳何得擅諱其祖名哉且傳曰臨文不諱安得諱祖之名遂不書乎獻可杜氏曰儻夫子實尊異其祖則安得明書孔父以繋於與夷乎不攻而自破也愚謂曹殺其大夫亦孔子之祖而諱之乎若曰宋之同姓則周誅管蔡其名固亦見於書也楚人圍陳納頓子于頓左氏曰秋秦晉伐鄀楚鬭克屈禦寇以申息之師戌商宻秦人過析隈入而係輿人以圍商宻昏而傅焉宵坎血加書偽與子儀子邊盟者商宻人懼曰秦取析矣戌人反矣乃降秦師秦師囚申公子儀息公子邊以歸楚令尹子玉追秦師弗及遂圍陳納頓子于頓此傳與圍陳納頓子二事無相闗故不取公羊曰何以不言遂兩之也案圍陳納頓子本是兩事故自不言遂公羊謂不言遂兩之也其意又似其初本一事而作春秋者分而兩之不可不察若何氏註又其鑿之甚者也穀梁曰納者内弗受也圍一事也納一事也而遂言之盖納頓子者陳也趙氏曰案經文楚自納之何闗陳乎胡氏曰納頓子自是楚人納之亦不干陳事其説不通冬十有二月公㑹衛子莒慶盟于洮左氏曰衛人平莒于我十二月盟于洮脩衛文公之好且及莒平也案僖元年公子友敗莒師于酈拒今二十五年矣况衛文公初卒衛成初立猶未踰年遽出脩魯好且平魯莒之怨無是理也此必别有其故而不可知左氏附㑹而為此説耳穀梁曰莒無大夫其曰莒慶何也以公之㑹目之也趙氏曰凡事接於魯雖非命卿皆書名穀梁不達故妄穿鑿也劉氏曰直云衛子莒人豈不可乎在春秋之中此類多矣何獨至於慶也而目之乎向令但㑹莒慶而無衛子謂之目猶有可諉今衛子之外又目慶也吾知穀梁之説必將窘於此而莒無大夫之説不可復恃矣二十有六年春王正月己未公㑹莒子衛甯速盟于向左氏曰尋洮之盟也案去年十二月方盟今年正月又盟必有不恊之事而不可知耳盟日未逺安得云尋洮之盟乎穀梁曰公不㑹大夫其曰甯速何也以其随莒子可以言㑹也案公㑹大夫多矣雖不隨莒子亦言㑹也夫諸侯不當與大夫㑹大夫亦不得伉諸侯今魯莒㑹大夫正當書之以見非禮而穀梁乃謂隨莒子然後可言甯速春秋豈記常事者哉齊人侵我西鄙公追齊師至酅弗及公羊曰其言至酅弗及何侈也追而弗及何侈之有穀梁曰人㣲者也侵淺事者也公之追之非正也至酅急辭也弗及者弗與也可以及而不敢及也其侵也曰人其追也曰師以公之弗及大之也弗及内辭也陳岳氏曰侵曰侵伐曰伐追曰追公禦之戰則言戰敗則言敗未有弗及者齊人侵我西鄙公帥師拒之齊師不戰而去公乗勝追之軼于西鄙而深入齊地齊師既不敵公追之弗及收兵而還斯備書其實無所含意且酅齊地追兵不出魯境則追之常出魯界則追之深穀梁曷言不敢及歟愚謂穀梁云公弗敢及而春秋改人為師以大之將大齊乎大魯乎若大齊也則下稱内辭矣魯史不應大齊也若大魯也則穀梁既云公追之非正又云弗敢及魯亦不足大也齊魯皆不可大穀梁將指孔子大之歟孔子未嘗改魯史之文也三者皆不脗合則穀梁之辭窮矣夏齊人伐我北鄙左氏曰齊孝公伐我北鄙公使展喜犒師使受命于展禽齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以糾合諸侯而謀其不恊彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓公之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還案經書齊人則大夫也而傳言齊侯又經書伐我北鄙則入境矣而傳言未入境又齊侯果以辭命而還必不再伐我北鄙魯必不乞師於楚以報怨此𫝊不合於經者也然展喜之辭則有可取者焉豈别是一事而左氏誤置此歟公子遂如楚乞師左氏曰東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也韓中父曰道楚伐宋之辭未必然亦上有乞師之文而意之耳愚謂臧文仲為魯卿既非公子遂之介當並書今經不見何也且遂之行必明告齊人伐我而乞師以報之左氏云道之伐齊宋以其不臣之説若主他事而往因之以為辭者况當時不臣周者豈特齊宋哉使楚聞之將不為異而伐之矣况魯本惡齊而乞師與宋未有釁也左氏見下有楚人伐宋之文而附㑹此説云爾公羊曰乞者何卑辭也曷為以外内同若辭重師也曷為重師師出不正反戰不正勝也案乞者直述其事耳何有内外哉此亦公羊黜周王魯之意也穀梁曰乞重辭也何重焉重人之死也非所乞也師出不必反戰不必勝故重之也趙氏曰天子在上而諸侯自相請師非禮也穀梁釋乞師之義而不言大意故辨之陸氏曰乞者深求過理之辭執謙以冀成其計穀梁意以為兵凶器戰危事用師必有死傷不可必得全歸其本不可謂之假借故皆以乞為行也愚謂如公穀説則鄭伯乞盟復何取義乎秋楚人滅夔以夔子歸穀梁曰夔國也不日㣲國也以歸猶愈乎執也執與以歸義自不同不可以猶愈言也楚滅人國不以為不義而以猶愈乎執為説何益於經冬楚人伐宋圍緡穀梁作閔公羊曰邑不言圍此其言圍何刺道用師也劉氏曰圍緡者乃楚人將卑師少耳伐齊者則楚師將卑師衆耳何以强配合之乎又何休曰稱師者順上文非也踰國而乞師是必求多非求少也若少魯亦能自辦之何苦外求乎故自楚師無疑也何休欲顧上圍緡時意故析之耳又所謂圍者非旬日所能為也設楚人道用其師於伐宋則庶幾信矣何者伐非久事也設楚人道用其師於取緡則庶幾信矣何者取邑未必久也今正圍邑久者或累年短者或累月公又安能得其衆伐齊取穀乎且由楚至魯非近地也伐宋圍緡非易也由魯至齊非一日也勝齊取穀又非一日也自齊還魯又非一日也用一冬之間往反如此此可信乎公以楚師伐齊取穀左氏曰凡師能左右之曰以桓公之子七人為七大夫於楚案以猶用也葉氏得之己見桓十四年左氏之説非正訓穀梁曰以者不以者也民者君之本也使民以其死非正也民固君之本使民以死固非正然非此事所書之旨辨又見桓十四年公至自伐齊公羊曰此已取穀矣何以致伐未得取乎穀也曷為未得乎取穀曰患之起必自此始也劉氏曰原公羊之意謂得意致㑹不得意致伐則今得意不當致伐故如此問也曰何以致伐者是問不致㑹而致伐也然伐齊取穀者獨以楚師自往耳無諸侯之㑹也無諸侯之㑹則不得致㑹此理之適然耳公羊迷忘其本末遂彊云患之興必自此始穀梁曰惡事不致此其致之何也危之也若惡事不致則春秋凡書至皆善事乎且聖人作春秋不暇為人危之也二十有七年春杞子來朝左氏曰杞桓公來朝用夷禮故曰子公卑杞杞不共也存耕趙氏曰案左氏杞桓公來朝用夷禮二十三年杞子卒左氏曰杞夷也而不言所以用夷禮之故至襄二十九年杞子來盟是年晉女叔侯治杞田曰杞夏餘也而即束夷則杞誠用夷禮之實然文十二年成四年十八年又書杞伯來朝左氏亦不言所以復稱伯之故襄二十九年稱子至昭六年又稱伯左氏又不言其故杞入春秋本侯爵僻陋在夷困於彊令而自為貶損故其稱號不常也義又見桓二年秋八月乙未葬齊孝公左氏曰有齊怨不廢喪紀禮也左氏之云固然然非本義乙巳公子遂帥師入杞左氏曰秋入杞責無禮也是年春杞子來朝矣魯反責其無禮乎無是理也直陵弱耳且入人之國其辠何如而以無禮釋之不可以訓冬楚人陳侯蔡侯鄭伯許男圍宋左氏曰冬楚子及諸侯圍宋案左氏於二十八年四月載楚子入居于申使子玉去宋無從晉師則非楚子自圍宋也故經書楚人今左氏乃謂楚子及諸侯圍宋是自相伐也先儒不察遂有人楚子所以人四國之説褒貶之謬由三傳唱之也公羊曰此楚子也其稱人何貶曷為貶為執宋公貶故終僖之篇貶也劉氏曰宋襄公死久矣春秋前貶之又終僖之篇貶何為乎陳岳氏曰苟為執宋公貶則二十一年當執宋公之時猶不曰楚人而書楚子何歟穀梁曰楚人者楚子也其曰人何也人楚子所以人諸侯也其人諸侯何也不正其信夷狄而伐中國也陳岳氏曰茍曰不正夷狄之伐中國則宣九年楚子伐陳十年楚子伐鄭十三年楚子伐宋陳鄭與宋得非中國邪不書楚人而書楚子何歟愚案信夷狄以伐中國者諸侯也乃寄人諸侯於夷狄而不正人諸侯則非正大明白之舉矣聖人之㫖如是乎二十有八年春晉侯侵曹晉侯伐衛左氏曰晉公子重耳之及於難也晉人伐諸蒲城蒲城人欲戰重耳不可曰保君父之命而享其生禄於是乎得人有人而校辠莫大焉吾其奔也遂奔狄從者狐偃趙衰顛頡魏武子司空季子狄人伐廧咎如獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉請待子處狄十二年而行過衛衛文公不禮焉出於五鹿乞食於野人野人與之塊公子怒欲鞭之子犯曰天賜也稽首受而載之及齊齊桓公妻之有馬二十乗公子安之從者以為不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懐與安實敗名公子不可姜與子犯謀醉而遣之醒以戈逐子犯及曹曹共公聞其駢脅欲觀其祼浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤自貳焉乃饋盤飱寘璧焉公子受飱反璧及宋宋襄公贈之以馬二十乗及鄭鄭文公亦不禮焉叔詹諫曰臣聞天之所啟人弗及也晉公子有三焉天其或者將建諸君其禮焉男女同姓其生不蕃晉公子姬出也而至扵今一也離外之患而天不靖晉國殆將啟之二也有三士足以上人而從之三也晉鄭同儕其過子弟固將禮焉况天之所啟乎弗聴及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇扵中原其辟君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寛忠而能力晉侯無親外内惡之吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懐嬴與焉奉匜沃盥既而揮之怒曰秦晉匹也何以卑我公子懼降服而囚他日公享之子犯曰吾不如衰之文也請使衰從公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜朴鄉吕氏曰楚自得志漢東駸駸薦食上國齊桓出攘之晉文再攘之其功偉矣此正孟子所謂彼善於此者然其所以攘楚者豈驟舉而攘之哉必先翦其手足破其黨與而後攘之易耳是故桓公將攘楚必先有事於蔡文公將攘楚必先有事於曹衛此事實也而左氏不達其故於侵蔡則曰為蔡姬故於侵曹伐衛則曰為觀祼浴與塊故此其病在推尋事由毛舉細故而二公攘夷安夏之烈皆晦而不彰愚案左氏嘗紀狐偃之言楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣則是侵曹伐衛將以致楚也而左氏又謂衛不禮與曹觀祼浴之故此其自相伐者也然其間必有一二近似者以其真偽相錯亦不得而取之矣辨又見四年齊伐楚侵蔡公羊曰曷為再言晉侯非兩之也然則何以不言遂未侵曹也未侵曹則其言侵曹何致其意也其意侵曹則曷為伐衛晉侯將侵曹假塗于衛衛曰不可得則固將伐之也劉氏曰若未侵曹者春秋豈探其情而先書之餘見本義穀梁曰再稱晉侯忌也劉氏曰即實再出何以知之韓中甫曰二傳不知其文則史之義故泥於兩晉侯而為説諸儒縁之遂美晉侯有攘夷狄尊中國之心嗚呼使春秋之㫖果若此聖人之心豈不小也哉公子買戌衛不卒戌刺之左氏曰公子買戌衛楚人救衛不克公懼於晉殺子叢以説焉謂楚人曰不卒戍也存耕趙氏曰左氏以楚人救衛不克而殺買則與經相牴牾矣愚謂刺買在前楚救衛不克在後公是時未懼晉也乃懼楚也公羊曰不卒戌者何不卒戌者内辭也不可使往也不可使往則其言戌衛何遂公意也趙氏曰案經文直書其事以見意耳有何内辭乎愚謂惟其不可使往故書其事以示義何暇遂公意而書戌衛乎若遂公意而書戌衛則春秋乃阿意之文又何以垂訓後世哉穀梁曰先名後刺殺有辠也公子啟曰不卒戌者可以卒也可以卒而不卒譏在公子也刺之可也趙氏曰案此依事實次第書之穀梁不得為先名後刺之義愚謂若先名後刺為殺有辠則先刺後名者為殺無辠也衛人殺州吁齊人殺無知皆無辠者歟不通之論也若刺之可則春秋不書矣惟其不可刺是以書之夫穀梁不責魯之不可戌衛又不責魯之不可専殺骨肉之親而但譏買之可刺夫是謂失其是非之心三月丙午晉侯入曹執曹伯畀宋人左氏曰分曹衛之田以賜宋人果分曹衛之田以畀宋人經當書之今經但言執曹伯畀宋人而已况晉文伐衛耳未嘗入衛也安能分衛田乎左氏於此言分田以售三十一年取濟西田之説而不知其先自相戾也辨又見三十一年公羊曰其言畀宋人何與使聴之也曹伯之罪何甚惡也其甚惡奈何不可以一罪言也趙氏曰宋非侯伯文非盟主何以得聴訟乎公羊不見事跡億說耳又云曹伯之罪甚惡億説耳穀梁曰入者内弗受也日入惡入者也以晉侯而厈執曹伯惡晉侯也畀與也其曰人何也不以晉侯畀宋公也劉氏曰非也向若稱晉人執曹伯則穀梁毋乃又如齊人執陳袁濤塗而譏其踰國以執乎夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績左氏曰晉侯宋公齊國歸父崔天秦小子憖次于城濮案經文齊宋秦皆稱師獨晉稱侯則宋亦遣將帥師也而左氏以為宋公未可據也今欲見其事跡姑附于本義而記其説于此公羊曰此大戰也曷為使㣲者子玉得臣也子玉得臣則其稱人何貶曷為貶大夫不敵君也劉氏曰公羊曰曷為使㣲者此自戕賊者也案公羊本云楚無大夫前年伐宋圍緡雖以師行猶自從本稱稱人而已今忽如此問則是楚有大夫也即今言之是前所言非也即前言之是今所言非也陳岳氏曰穀梁釋泓之戰則曰稱楚人以敵宋責宋公也公羊釋此之戰則曰稱楚人貶不敵也奚是非相反邪苟貶不敵君則邲之戰與鞌之戰何其敵楚子齊侯而不貶與衛侯出奔楚左氏曰衛侯欲與楚國人不欲故出其君以説於晉衛侯出居於襄牛衛侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟案衛國當時已與楚矣國人未嘗不欲也如出其君而居襄牛經當書之衛侯若適陳經亦當書之今經乃云自楚復歸于衛不知何時復自陳適楚又自楚歸于衛乎又衛侯若使元咺奉叔武以受盟則衛侯必不與元咺交訟而殺之也以經考之𫝊無足信五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如㑹左氏曰晉師甲午至于衡雍作王宫于踐土鄉役之三月鄭伯如楚致其師為楚師既敗而懼使子人九行成于晉晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未獻楚俘于王駟介百乗徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯宥王命尹氏及王子虎内史叔興父䇿命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲癸亥王子虎盟諸侯于王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而𤣥孫無有老幼君子謂是盟也信謂晉於是役也能以徳攻劉氏曰左氏曰王子虎盟諸侯于王庭今案經無子虎其所言作王宫及王子虎要言之事皆虚也愚謂春秋書變不書常所以傷世教之衰也若晉文果致天子及王子虎盟于王庭聖人當直書其事以示義可也安得使後世見傳文而後知其不書之意哉左氏見後有公朝于王所之文遂附㑹而成𫝊夫踐土去京師不逺晉侯不往朝之必作王宫而致之以朝吾恐晉侯不如是之迂也况當大戰之餘往返之勞何暇作王宫為一朝之用哉左氏亦自知不通也又為鄉役之三月之説夫晉文安能預知伐楚之必勝諸侯之必㑹于此天子之必可致而作宫以待之乎自左氏之説行諸儒承之論議蠭起使晉文蒙二千年之惡而不伸悲夫又曰晉於是役能以徳攻夫晉文雖負一時之功而侵曹伐衛執曹伯畀宋人詭譎萬端而何徳攻之有然則左氏既陷晉文於惡而又誣晉文以善者由其是非不定也或曰子之言豈知婉而成章之義乎曰春秋有婉而成章者謂屬辭比事而義自見者也然未嘗改其事實使後世測度而為義也夫臣弑君子弑父且不諱而直書之何致王而獨諱之哉公羊曰其言如㑹何後㑹也此説亦通但何氏註返生事耳穀梁曰諱㑹天王也如㑹外乎㑹也於㑹受命也劉氏曰若實㑹天王者辠亦大矣可得諱乎愚謂陳侯來後不及盟故但言如㑹紀實事也何外乎㑹之有公朝于王所公羊曰曷為不言公如京師天子在是也天子在是則曷為不言天子在是不與致天子也趙氏曰稱王所者非京師也其不地志乎朝王而已異乎盟㑹所又曰稱王所即王之所在耳無他義愚謂天子在鄭不可言如京師故但言王所猶後世言行在者製言之體然也公羊止就此生義捨本義而不之求惜哉况致天子之説不足信乎穀梁曰朝不言所言所者非其所也案穀梁言非其所近是矣何不觀一句之大體一事之大義而獨就所上生義且又曰朝不言所非善學春秋者也六月衛侯鄭自楚復歸于衛左氏曰或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衛侯甯武子與衛人盟于宛濮曰天禍衛國君臣不恊以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不恊之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不貳衛侯先期入甯子先長牂守門以為使也與之乗而入公子歂犬華仲前驅叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之歂犬走出公使殺之元咺出奔晉胡氏曰此言自楚者由楚得反也元咺出奔左氏乃言為叔武受盟案三十年惟書殺其大夫元咺及公子瑕不言叔武左氏之𫝊不可為據愚謂若晉人復衛侯元咺必不奔晉晉人必不執衛侯惟其自楚入也故元咺得以訟其君而衛侯見執於晉且經明言自楚而左氏乃言晉人復衛侯足以見其妄矣且衛侯鄭既信或者之訴而入衛不可謂公知叔武之無罪也既知其無罪而殺歂犬矣則元咺可以少安矣而又奔晉何也又衛侯殺其子角而元咺能不廢命則是守節之臣也何為與其君交訟相為出入乎此皆左氏之自相拂者也穀梁曰自楚楚有奉焉爾復者復中國也歸者歸其所也鄭之名失國也朴鄉吕氏曰案是時楚經城濮之戰膽喪氣阻又安能奉衛侯而使之反國乎衛侯自楚歸于衛著其自楚也言歸自楚則背華即夷之辠可見矣劉氏曰復者復中國也歸者歸其所也此語無理盖不足辨又曰鄭之名失國也非也諸亡國春秋尚不悉名之况鄭之國未亡乎又衛侯前出奔今復歸出時可謂失國未嘗名復歸可謂得國反名之此乃吾所不解也冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温左氏曰冬㑹于温討不服也未詳信否穀梁曰諱㑹天王也即左氏之謬辨在後天王狩于河陽左氏曰是㑹也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明徳也劉氏曰左氏迷惑此説心未能了既云晉侯使王狩矣又云仲尼為其不可以訓故書狩即實使王狩非仲尼故書也即實仲尼書之非使王狩也其言首尾相反由迷惑故也又曰言非其地且明徳亦非也使晉侯召王其禮甚悖亦何徳之明然則左氏固暗于王道而非仲尼之徒者邪愚謂三𫝊皆謂晉侯召王以諸侯見而夫子諱之諸儒踵謬同然一辭夫晉侯果召王夫子當直書其事為後世戒决無改舊史為暗晦之文使千載之下猜其意論其跡以啟紛紛之争也程子曰以經考傳之偽今據經論理似為未失若捨經求傳則一左氏足矣何必春秋哉此後世讀春秋之大病也曰孟子何以為五伯三王之罪人又邵子何以謂功之首罪之魁也曰假仁義之名濟一已之私執諸侯滅弱國奪天子之權與三王擴然大公順天應人之道如隂陽晝夜之相反其所以連諸侯以相伐建一時之功者不過彼善于此而其罪則在彼而不在此也且齊王未嘗召王亦不免為三王之罪人也何獨晉侯召王然後為三王之罪人哉夫晉文方假仁義之名㑹諸侯以尊王室豈有召王來就諸侯之理乎公羊曰狩不書此何以書不與再致天子也魯子曰温近而踐土逺也辨見左氏穀梁曰全天王之行也為若將守而遇諸侯之朝也為天王諱也水北為陽山南為陽辨見左氏壬申公朝于王所公羊曰其日何録乎内也趙氏曰言内書日何不書月乎愚案有日無月脱之也公羊因以為義鑿矣穀梁曰朝於廟禮也於外非禮也獨公朝與諸侯盡朝也其日以其再致天子故謹而日之主善以内目惡以外言曰公朝逆辭也而尊天子㑹于温言小諸侯温河北地以河陽言之大天子也日繫於月月繫於時壬申公朝于王所其不月失其所繫也以為晉文公之行事為已傎矣趙氏曰案天子巡狩諸侯㑹于方岳之下何得云朝于外即為非禮哉愚謂此事之義春秋責其常時不以時朝今因晉文之㑹適值王狩于河陽遂為一朝若不㑹不狩則亦不朝耳非謂於外即非禮也書公朝本魯史之文爾非謂逆辭也夫公朝何逆辭之有書于王所亦紀實事而自見其惡爾非謂尊天子也㑹于温言小諸侯以河陽言之大天子或有此理乃魯史之常法而春秋本義亦不主乎此也日不繫月盖偶闕耳非謂晉文行事傎倒而特闕月也公穀以日月為例固已繆矣然未有若此之甚者也晉人執衛侯歸之于京師左氏曰衛侯與元咺訟甯武子為輔鍼莊子為坐士榮為大士衛侯不勝殺士榮刖鍼莊子謂甯俞忠而免之執衛侯歸之于京師寘諸深室甯子職納橐饘焉案諸侯殺其大夫與執人之大夫春秋猶書之豈有殺士榮刖鍼莊子而春秋不書者大抵左氏好竒事得齊東野人之語往往自為説以益之夫元咺之奔晉固有告其君之惡者未必如左氏之説也故愚釋其粗可信者録之使讀者詳焉公羊曰歸之于者何歸于者何歸之于者罪已定矣歸于者罪未定也罪未定則何以得為伯討歸之于者執之于天子之側者也罪定不定已可知矣歸于者非執之于天子之側者也罪定不定未可知也衛侯之罪何殺叔武也何以不書為叔武諱也春秋為賢諱何賢乎叔武讓國也其讓國奈何文公遂衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故于是已立然後為踐土之㑹治反衛侯衛侯得反曰叔武簒我元咺争之曰叔武無罪終殺叔武元咺走而出此晉侯也其稱人何貶曷為貶衛之禍文公為之也文公為之奈何文公逐衛侯而立叔武使人兄弟相疑放乎殺母弟者文公為之也趙氏曰歸于與歸之于義一也或傳寫衍耳不煩妄辭又曰據理乃是為衛侯諱是掩惡也何名為叔武諱陸淳氏曰執諸侯皆稱人不要别生義也愚案諸侯執諸侯歸于京師則必考覈其辠而告于天子矣豈有辠未定而便執之理乎若辠定未定未可知將何辭告于天王乎又案公羊所載與左氏亦不同左氏曰歂犬前驅射殺叔武公知其無辠枕之股而哭之遂殺歂犬公羊則曰衛侯終殺叔武左氏曰衛侯聞楚敗懼出奔楚使元咺奉叔武以受盟公羊則曰文公逐衛侯而立叔武則二傳所𫝊俱未得其實也今以經考之則但曰衛殺元咺及公子瑕而已初無殺叔武之事考之史記世家亦但曰瑕而已初無叔武也衆言淆亂質諸聖人當以經為正穀梁曰此入而執其不言入何也不外王命於衛也歸之于京師緩辭也斷在京師也陸氏曰穀梁謂入而執不言入之𫝊此不知元咺之事故穿鑿耳劉氏曰正自執之爾何必入乎愚謂歸之于京師豈有緩之之意歟若言歸于者斷不在京師歟皆不通之論也衛元咺自晉復歸于衛左氏曰元咺歸于衛立公子瑕劉氏曰左氏云元咺立公子瑕然已為君當與衛剽同不當冠公子而名之也即以為國人不與諸侯不助者當與陳佗同不當仍冠公子也瑕冠公子此其不君明矣假令元咺實立瑕者猶當書云衛殺其公子瑕及其大夫元咺元咺以瑕為君瑕以元咺為臣正其君臣則辠惡明矣無為先元咺以及瑕也衛剽稱侯陳佗不氏皆出左氏義何忽至此而迷亂其説哉愚謂如公子瑕果立為君則為真衛侯矣至三十年經復書曰公子瑕何也此皆可疑之事豈元咺與瑕執國政而未嘗自立歟公羊曰自者何有力焉者也此執其君其言自何為叔武争也案公羊以自晉為叔武争則是臣可得而訟君固已昧夫三綱矣而何氏復言為伯者恥之使若無辠則是春秋黨惡也皆不可以訓穀梁曰自晉晉有奉焉爾復者復中國也歸者歸其所也趙氏曰凡大夫還釋書自無他義愚謂此下二句施之衛侯劉氏猶謂其無理况復以施之訟君之賊臣何迷惑之甚哉獨曰自晉晉有奉焉爾一語得之諸侯遂圍許左氏曰丁丑諸侯圍許經且無月左氏何從得其日哉曹伯襄復歸于曹遂㑹諸侯圍許穀梁曰復者復中國也天子免之因與之㑹其曰復通王命也劉氏曰衛侯鄭復歸于衛穀梁謂其名者失國也今如曹襄但見執耳非失國也何故亦名愚謂曹伯乃晉人執之以畀宋人今經又不書歸自京師不可謂天子免之也凡君大夫歸國者皆言復何獨此復為通王命哉二十有九年春介葛盧來左氏曰介葛盧來朝舍于昌衍之上公在㑹饋之芻米禮也案葛盧非朝啖趙辨之明矣中國不能以禮正夷狄而與之交何謂禮哉公在㑹而大夫受之尤為非禮公羊曰介葛盧者何夷狄之君也何以不言朝不能乎朝也趙氏説已見本義穀梁曰介國也葛盧㣲國之君未爵者也其曰來卑也劉氏曰牟人葛人亦可謂卑矣何以得言朝哉愚謂莊五年郳黎來亦曰朝何也夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉左氏曰公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不㑹公侯㑹伯子男可也案六國皆稱人則知魯亦使大夫㑹爾故但曰㑹某人如及宋人盟于宿之類是也考之經所書自可信矣而𫝊復云公㑹斯褒貶之徒有諱公之説矣夫卿有辠當書其名以顯示其惡而左氏以辠之不書卿劉氏盖已謂其非矣夫列國之大夫而上㑹王人又盟于天子之側瀆大典矣而左氏但為在禮卿不㑹公侯㑹伯子男可也可謂不能三年喪而緦麻之察者也况此盟實無魯侯則此論亦無所施然則其稱王子虎晉狐偃之徒皆不足信也冬介葛盧來左氏曰冬介葛盧來以未見公故復來朝禮之加燕好介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信左氏稱朝辨見前牛鳴之説齊東野人之語也三十年夏狄侵齊左氏曰晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也夏狄侵齊案圍鄭在秋左氏言侵鄭在春若然經當書晉人侵鄭今經不書則侵鄭未可信也侵鄭未可信則狄間晉有鄭虞亦未可信况其後圍鄭者秦晉耳齊何嘗與乎秋衛殺其大夫元咺及公子瑕公羊曰衛侯未至其稱國以殺何道殺也案春秋稱國以殺者多矣豈一一道殺哉穀梁曰稱國以殺罪累上也以是為訟君也衛侯在外其以累上之辭言之何也待其殺而後入也及公子瑕公子瑕累也以尊及卑也案宣九年陳殺其大夫洩冶穀梁則曰稱國以殺殺無辠也俱稱國也一以為有辠一以為無辠學穀梁者不亦難乎且公子瑕同姓之卿元咺乃異姓之卿亦不可以尊卑言也衛侯鄭歸于衛公羊曰此殺其大夫其言歸何歸惡乎元咺也曷為歸惡乎元咺元咺之事君也君出則已入君入則已出以為不臣也劉氏曰非也公羊常例以歸者出入無惡復歸者出有惡歸無惡縱春秋歸惡於元咺書衛侯復歸亦足矣又謂之出入無惡可乎又案穀梁前二十八年云鄭之名失國也然則此非失國者何以亦名之又前云復者復中國歸者歸其所然則此亦復中國此亦歸其所何不曰復歸乎愚謂春秋固惡元咺矣故書曰元咺出奔晉又曰元咺自晉復歸于衛讀春秋者不於此求之而以衛侯歸之一字求惡元咺所謂輿薪之不見而秋毫之是察者也晉人秦人圍鄭左氏曰九月甲午晉侯秦伯圍鄭以其無禮於晉且貳於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪隣隣之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯説與鄭人盟使杞子逢孫揚孫戍之乃還子犯請擊之公曰不可㣲夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之初鄭公子蘭出奔晉從於晉侯伐鄭請無與圍鄭許之使待命于東鄭石甲父侯宣多逆以為夫子以求成于晉晉人許之案經言晉人秦人而傳言晉侯秦伯當以經考傳之偽獨燭之武之言有可采者然亦無所附也冬天王使宰周公來聘左氏曰王使周公閲來聘饗有昌歜白黒形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其徳薦五味羞嘉穀鹽虎形以獻其功吾何以堪之非本義不録穀梁曰天子之宰通乎四海案天子之宰通乎四海謂其總攝之也非謂可以出聘也公子遂如京師遂如晉左氏曰東門襄仲將聘于周遂初聘于晉陳岳氏曰將命未行又命自周聘晉雖曰未行亦内事耳何命而不得顯於史䇿必不然也李氏曰左氏以東門襄仲將聘于周遂初聘于晉杜云聘周未行又受命自周聘晉故曰遂也鄭釋穀梁云遂固受命如京師如晉不専受命如周尊周不敢使並命若公遂如晉明年春書公子遂如晉則此經為並受二命明年自周如晉明矣左氏釋下經為拜曹田意以遂再使於晉且自魯至周而至晉計其地之逺近自冬至春必不能來而復往設欲謝晉豈無他卿况曹田無晉歸之經左氏之釋恐未為實公羊以為専政遂事失之愚謂經書公子遂如京師遂如晉則是襄仲當時並受二命故先如周繼如晉經旨本明而左氏自為辭以晦之讀春秋者能脱然舍傳而求經豈不明白也哉公羊曰大夫無遂事此其言遂何公不得為政爾趙氏曰此亦受君命何得罪大夫又案僖公時未失政言公不得為政亦非也穀梁曰以尊遂乎卑此言不敢叛京師也趙氏曰京師未回便如晉故言遂耳不敢叛京師有何理乎劉氏曰春秋據事先後而書本無異㫖何必彊解乎三十有一年春取濟西田左氏曰取濟西田分曹地也使臧文仲往宿于重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅于濟盡曹地也趙氏曰云使臧文仲往不合不書且二十八年執曹伯不應經四年方分其地劉氏曰若實臧文仲往不應不書注為文仲但請田非聘饗㑹同故不書亦非也告糴乞師弔葬致女皆書不獨彼四事書請田非常自應書叔孫豹鄫世子巫如晉亦書即請田之比也禮曰卿非君命不越竟越竟則書之何限請田獨不書哉又曰分曹地自洮以南東傅于濟若然當謂之取曹田自濟水不得云取濟西田而已愚謂左氏嘗於二十八年晉執曹伯時云分曹衛之田畀宋人當時經無此事也而又於此言之夫晉侯既釋曹伯襄歸于曹曹伯遂㑹諸侯圍許矣則是晉人之怒已息而好已通也無縁執曹伯時分曹衛田於宋釋曹伯後又分曹田於諸侯也且以魯國得曹田自洮以南東傅于濟以盡曹地不知分諸侯者又復幾何區區一弱曹未嘗吞併隣國前既分于宋今又廣分于魯又分于諸侯則盡曹之境有所不給也使僅存其國都亦不可以為國矣何分田以後春秋厯書曹伯之㑹盟侵伐百有餘年而不亡邪若左氏者可謂無稽之言矣公羊曰惡乎取之取之曹也曷為不言取之曹諱取同姓之田也此未有伐曹者則其言取之曹何晉侯執曹伯班其所取侵地于諸侯也晉侯執曹伯班其所取侵地于諸侯則何諱乎取同姓之田久也趙氏曰若晉人使然亦當别文不應依常法書之胡氏曰言曹田皆非今驗乎經是魯地何以知之案襄十九年公伐邾取邾田此是曹田亦當書曹田莘老孫氏曰案經書之與汶陽田相等耳無異文也高氏曰凡取田必繫於國邾田是也此不繋國本我田也嘗為隣國所奪今復取之愚謂若實曹侵魯地雖久奚諱而没曹乎公子遂如晉左氏曰襄仲如晉拜曹田也獻可杜氏曰二十八年經書晉侯執曹伯畀宋人左氏雖謂分曹衛之田而經無其文此年春書取濟西田又書公子遂如晉左氏見其文相接而以為拜曹田春秋無分曹地之文亦無晉使歸曹田之經則此濟西田非曹田也濟西田孫氏謂本魯地今復之者也成二年經書取汶陽田左氏釋云晉使齊人歸我汶陽田則魯取其侵地直書曰取汶陽田也其與此年取濟西田一類耳由此言之不可謂拜曹田而行矣傳皆曲生外文夏四月四卜郊不從乃免牲猶三望左氏曰四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜當祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也劉氏曰禮不卜常祀而卜其牲日案如此説是也所謂不從者即謂日不吉耳不吉則不敢郊故須免牲也又曰牛卜日曰牲牲成而卜郊上怠慢也非也繫者即牲牲之名久矣豈必卜日哉且魯人亦必卜牲而後卜郊卜郊者卜其日吉否也非卜其郊可否也左氏疑魯之卜卜郊可否也是以誤之耳愚案春秋非譏牲成而卜郊上怠慢也其所譏者僭天子之郊及四卜猶三望也公羊曰曷為或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛又曰山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而偏雨乎天下者唯泰山爾河海潤於千里案春秋非譏免牛非禮亦非論免牲為得禮盖所譏者僭天子之郊四卜與猶三望也公羊既得其説矣何故復言免牲為禮免牛為非禮哉其曰百里千里語亦未瑩穀梁曰四卜非禮也免牲者為之緇衣熏裳有司𤣥端奉送至於南郊免牛亦然乃者亡乎人之辭也猶者可以已之辭也案乃之為言遂也亦語助之辭未見亡乎人之辭之意也冬杞伯姬來求婦公羊曰其言來求婦何兄弟辭也其稱婦何有姑之辭也穀梁曰婦人既嫁不踰竟杞伯姬來求婦非正也辨並見二十五年蕩伯姬逆婦十有二月衛遷于帝丘左氏曰卜曰三百年衛成公夢康叔曰相奪予享公命祀相甯武子不可曰鬼神非其族類不歆其祀杞鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命非本義不録三十有三年春王二月秦人入滑左氏曰滅滑而還經書入滑傳言滅滑滅與入相去逺矣况入滑在二月晉人敗秦在四月𫝊言還時滅滑不應晉在四月後然後邀其歸路而敗之也此必入滑别是一時之兵而左氏誤合為一事耳穀梁曰滑國也夏四月辛巳晉人及姜戎敗秦師于殽左氏曰子墨衰絰梁𢎞御戎萊駒為右又曰遂墨以葬文公晉於是始墨案經書晉人則遣將也𫝊以為子墨衰絰拂經甚矣或曰晉不稱君居喪不可從戎也曰居喪不可從戎正當直書其事以示教豈有没其實而可見其義者哉公羊曰其謂之秦何夷狄之也曷為夷狄之秦伯將襲鄭百里子與蹇叔子諫曰千里而襲人未有不亡者也秦伯怒曰若爾之年者宰上之木拱矣爾曷知師出百里子與蹇叔子送其子而戒之曰爾即死必於殽之嶔巖是文王之所辟風雨者也吾將尸爾焉子揖師而行百里子與蹇叔子從其子而哭之秦伯怒曰爾曷為哭吾師對曰臣非敢哭君師哭臣之子也弦高者鄭商也遇之殽矯以鄭伯之命而犒師焉或曰往矣或曰反矣然而晉人與姜戎要之殽而擊之匹馬隻輪無反者其言及姜戎何姜戎㣲也稱人亦㣲者也何言乎姜戎之㣲先軫也或曰襄公親之襄公親之則其稱人何貶曷為貶君在乎殯而用師危不得葬也詐戰不日此何以日盡也趙氏曰若貶之反稱人是乃隠其惡也何勸懲乎愚謂文二年晉侯及秦師戰于彭衙秦怒殽之敗而復為此戰秦不悔過尤可狄之也而曰秦師何也盖秦之辠在於事而已矣豈在去師之一字乎其曰晉及姜戎猶言晉與姜戎也而何有㣲之之意乎餘見或問穀梁曰不言戰而言敗何也狄秦也其狄之何也秦越千里之險入虚國進不能守退敗其師徒亂人子女之教無男女之别秦之為狄自殽之戰始也秦伯將襲鄭百里子與蹇叔子諫曰千里而襲人未有不亡者也秦伯曰子之冢木已拱矣何知師行百里子與蹇叔子送其子而戒之曰女死必於殽之巖唫之下我將尸女於是師行百里子與蹇叔子隨其子而哭之秦伯怒曰何為哭吾師也二子曰非敢哭師也哭吾子也我老矣彼不死則我死矣晉人與姜戎要而擊之殽匹馬倚輪無反者晉人者晉子也其曰人何也㣲之也何為㣲之不正其釋殯而主乎戰也劉氏曰穀梁曰不言戰而言敗狄秦也非也此傳云晉人及姜戎要而擊之殽夫要而擊之則非戰矣春秋可得彊書戰乎且平心論之晉則有背殯厄人於險而秦反見狄不亦誤乎又云徒亂人子女之教無男女之别此吾所不知也又云秦之為狄自殽戰始也吾則知之矣此傳妄也愚謂春秋書公敗某師于某者多矣皆不言戰也豈皆狄之乎癸巳葬晉文公穀梁曰日葬危不得葬也既敗秦師而後葬何危而不得葬也晉人敗狄于箕左氏曰狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生案經無日月左氏何從知其為八月戊子白狄自是狄之别種若然經當書白狄矣不應於此但書狄也况獲白狄子經自應書夫晉既敗狄矣不應先軫死之也况先軫智士於歸秦三帥之時不顧而唾已涉數月不應復死於狄也此皆事理有可疑者况先軫之事亦非此經之正𫝊故不取隕霜不殺草李梅實穀梁曰未可殺而殺舉重也可殺而不殺舉輕也實之為言猶實也趙氏曰未可殺而殺謂定元年殺菽者此説非也定元年惟菽死故紀其災也且今百草未死豆苗先枯即知豆易凋不得云舉重也此則百草俱不死冬温故也乃書事實何舉輕之有乎愚謂實者結實也其曰實之為言猶實也尤無意味三傳辨疑卷九
