body:
  text: 三傳辨疑卷二元程端學撰隱公六年春鄭人來輸平左氏曰鄭人來渝平更成也獻可杜氏曰左氏經書曰渝蓋傳授不同而文或誤耳先儒謂之絶其成者以釋渝為變也公榖雖以為輸而又以墮成言之斯亦未達其義且諸侯或渝變不睦則必起兵交伐奚假使人告絶哉然則輸屈己之辭也今以上下經詳之則四年有翬會四國伐鄭之怨八年有歸祊之事則此年鄭欲輸以為平所以釋前怨公羊曰輸平者何輸平猶墮成也何言乎墮成敗其成也曰吾成敗矣吾與鄭人末有成也吾與鄭人則曷為末有成狐壤之戰隱公獲焉然則何以不言戰諱獲也案狐壤之戰固未可信設使有之據左氏乃在隱公未立之前則是鄭莊隱公墮成久矣何待即位六年之後復來墮成哉不言戰為諱獲語尤無謂餘見榖梁榖梁曰輸者墮也平之為言以道成也來輸平者不果成也黃氏曰左氏作渝平渝變也渝前日之平猶絶交也公榖皆作輸平公羊曰輸平猶墮成也敗其成也榖梁曰輸者墮也不果成也是公榖雖作輸義亦與左氏之渝一也然諸儒多從公榖作輸而不從其訓曰輸納也輸成於我以求平也蓋以經考之前年公子翬伐鄭是嘗有憾而未嘗有平初無平之可渝言渝平者非也鄭與齊黨魯與宋黨今宋伐鄭圍長葛懼魯從宋而鄭益殆偶鄭嘗伐宋宋求救於魯使者失辭魯怒不出兵鄭乘此隙致平於魯以離宋之黨故今年春鄭來輸平今年夏公即與齊盟已而公與齊鄭又會于中丘以謀伐宋是前乎此魯與宋後乎此魯背宋而與齊鄭皆鄭輸平所致言輸平者是也秋七月公羊曰此無事何以書春秋雖無事首時過則書首時過則何以書春秋編年四時具然後為年此説頗平然春秋非編年之書也冬宋人取長葛左氏曰秋宋人取長葛案經以秋無事而書首月矣何得取長葛復為秋乎公羊曰外取邑不書此何以書久也不責取邑之罪而但以久而書則不久而取邑者無罪乎四年莒伐杞取牟婁以為疾始取邑今又以為久然則諸侯伐人之國取人之邑皆無故可書乎辨又見五年圍長葛七年春王三月叔姬歸于紀榖梁曰其不言逆何也逆之道微無足道焉爾逆之道常事不書有非常則書非無足道也滕侯卒左氏曰不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名告終稱嗣也以繼好息民謂之禮經趙氏曰凡諸侯同盟名於載書朝會名於要約聘告名於簡牘故於卒赴可知而紀也非此則否示詳慎也左氏曰凡諸侯同盟故薨則赴以名此於理不安豈有臣子正當創巨痛深乃忍稱其君之名禮亦云寡君不祿而已春秋諸侯卒不同盟者凡五十二人九人不書名餘並書名劉氏曰常同盟者卒未必皆名未嘗同盟者卒未必皆不名而左氏又云赴以名則書之不然則否若實從例則不當從赴若實從赴則無用設例今進不必從赴退不必從例徒用是紛紛也公羊曰何以不名微國也微國則其稱侯何不嫌也春秋貴賤不嫌同號美惡不嫌同辭劉氏曰公羊説蔡侯考父卒曰卒從正葬從主人然則滕雖小國可獨不從正乎計許與滕大小猶等許爵為男在傳聞之世卒且書名僖四年新臣是也況滕侯乎愚案號所以别貴賤辭亦以見美惡既曰滕侯則貴於伯子男矣豈以其地之狹而微之不名乎榖梁曰滕侯無名少曰世子長曰君狄道也其不正者名也劉氏曰春秋諸侯卒或名或不名者多矣豈盡狄道哉不可信之語此為甚莘老孫氏曰滕侯不名或於即位不來赴或舊史所闕孔子不得加其文左氏謂不以名赴此固不通之甚公羊以為微國不名則邾薛之君尚猶書名榖梁謂狄道愈無義理昭二十八年書滕子寧卒若微國若狄道當終春秋不見其名安得其後復書名乎三傳皆非也夏城中丘左氏曰夏城中丘書不時也孫氏曰左氏謂土功興作者冬為正過與不及皆為不時此知其一不知其二也設若昏君驕主不愛民力窮極土木內崇宫室外廣城邑謂之得時此豈可乎獻可杜氏曰以佚道使民民勞而無怨春秋之世征伐四出民苦不暇至於工作之事亦靡有息夫子書之者其愛民之深旨乎今隱公城中丘而左氏但謂之不時則聖人所書之意隘矣且末世勞民之甚豈問乎時與不時哉春秋書城及築凡二十九是不重民力而務興作也詳録之皆所以謹懲戒之大義愚謂不時亦一義也特大義未盡耳故不敢盡廢榖梁曰城為保民為之也民衆城小則益城益城無極凡城之志皆譏也案榖梁以民衆城小而益城春秋之時民死於戰安得衆哉且城有定制非諸侯所得益也榖梁豈以城城為築城乎齊侯使其弟年來聘公羊曰其稱弟何母弟稱弟母兄稱兄程子曰左氏公羊皆曰年齊僖公之母弟先儒母弟之説蓋緣禮文有立嫡子同母弟之説其曰母弟蓋謂嫡爾非以同母為加親也若以同母為加親是不知人理近於禽獸也僖公愛年其子禮秩如嫡卒致篡弒之禍書弟見其以弟之愛而寵任之過也榖梁曰諸侯之尊弟兄不得以屬通其弟云者以其來接於我舉其貴者也案凡外大夫來魯皆接我者也或稱名或稱字或稱氏何獨於此舉其貴而特云弟乎榖梁妄意之耳秋公伐邾左氏曰秋宋及鄭平七月庚申盟于宿公伐邾為宋討也杜氏曰公距宋而更與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以求宋趙氏曰邾伐宋在五年不應二年方為之報左氏此例甚多故不取愚謂鄭方求魯而怨宋未必為宋盟也況不見於經乎魯十年伐宋則此伐邾未必為宋討也蓋别有其故而不可知耳戎伐凡伯于楚丘以歸公羊曰天子之大夫也此聘也其言伐之何執之也執之則其言伐之何大之也曷為大之不與夷狄之執中國也其地何大之也案經書戎伐凡伯以歸者戎以兵伐凡伯而執之以歸也經書于楚丘者將以見地主之罪也茍曰不與夷狄之執中國而大其事則是聖人惡夷狄而誣之以伐也既誣其伐又書地以大其事此豈近於人情榖梁曰國而曰伐此一人而曰伐何也天子之命也戎者衛也戎衛者為其伐天子之使貶而戎之也楚丘衛之邑也以歸猶愈乎執也陳嶽氏曰春秋茍易衛曰戎則何以别真戎以楚丘衛地因謂貶而戎之也且齊侯怒而執單伯春秋不戎之也茍謂大執而言伐凡書執或因盟會如齊人執鄭詹或因誘致如宋人執祭仲或因朝聘如晉人執季孫行父未有攻伐於路而言執也愚謂伐而以歸則執在其中矣何云猶愈乎執乎八年春宋公衛侯遇于垂左氏曰齊侯將平宋衛有會期宋公以幣請於衛請先相見衛侯許之故遇於犬丘杜氏曰犬丘垂也地有兩名張氏曰以事理觀之宋衛本無隙而與鄭為深仇必無齊欲平宋衛于鄭之事也愚謂左氏不解書遇之義凡書遇必釋之曰某國本為會以某事急改會為遇其附會類如此觀四年遇于清之傳可見矣榖梁曰不期而會曰遇遇者志相得也辨見四年遇于清三月鄭伯使宛來歸祊庚寅我入祊左氏曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也趙氏曰案鄭莊之言無所不知安肯請祀非其祖乎不近人情矣葉氏曰祊公榖作邴邑名也左氏誤作祊因以為祭名遂附益之以鄭伯釋泰山之祀而祀周公以泰山之祊易許田甚矣左氏之誣也鄭自取麥禾無復朝王之禮故桓五年以不朝王見伐則何泰山之會乎劉氏曰杜云桓元年乃卒易祊田如此入祊未肯受而有之非也經云入祊者既入之矣又何未肯受而有之乎若魯未肯受祊經書其入是仲尼誣君之惡也原杜氏之意蓋見桓元年傳云鄭伯以璧假許田為周公祊故也此自傳誤隱公時鄭人歸祊者鄭自欲與隱公也桓元年以璧假許田者桓公以許田與鄭真易璧玉也傳乃并而言之謂鄭人以祊易許而不顧隱八年已有我入祊之文且許田者魯本受封之地詩云居常與許是也地名與國同者魯多有之莊公築臺于秦築臺于薛豈真近秦近薛哉傳見許國近鄭不悟魯自地名許田因謂鄭欲得近許之田故以祊易許混合兩事并為一説杜氏遂悖經信傳扶成其偽可謂有功於左氏矣未可為知經也愚案木訥邦衡髙氏凌南皆謂祊於許田自是二事詳味經文略無易許田之意當以經為正公羊曰宛者何鄭之微者也邴者何鄭湯沐之邑也天子有事于泰山諸侯皆從泰山之下諸侯皆有湯沐之邑焉其言入何難也其日何難也其言我何言我者非獨我也齊亦欲之啖氏曰列國至衆公羊言皆有湯沐之邑泰山之下何能容之康侯胡氏曰成王以周公有大勳勞故特賜許田為朝宿之地如皆有焉盡天子之郊不足為其地矣宣王以鄭伯母弟懿親故特賜之祊田為湯沐之邑如皆有焉盡泰山之旁不足為其邑矣劉氏曰經但言我實不言齊誣齊亦欲失其真矣愚謂鄭與我祊而我入之何難之有若以為孔子難之則入字史氏之辭也我者內辭也我則専指魯矣齊亦欲之之意何從來乎榖梁曰名宛所以貶鄭伯惡與地也入者內弗受也日入惡入者也邴者鄭伯所受命於天子而祭泰山之邑胡氏曰宛者未三命大夫非謂貶也鄭詹秦術吳札之類豈皆貶乎韓中父曰案經先言歸後言入者鄭歸之而魯受之也曰我入祊者此非我有而今入之也日者史氏記事之法也二傳鑿矣愚謂鄭伯以地與人而但貶鄭宛是失刑也經言我入祊矣而曰內弗受是失義也夏六月己亥蔡侯考父卒榖梁曰諸侯日卒正也辛亥宿男卒榖梁曰宿微國也未能同盟故男卒也葉氏曰若以未同盟言之則隱書滕侯卒桓書滕子卒豈同盟者哉秋七月庚午宋公齊侯衛侯盟于瓦屋左氏曰齊人卒平宋衛于鄭秋會于溫盟于瓦屋以釋東門之役禮也葉氏曰經但書宋公齊侯衛侯盟于瓦屋若言平宋衛于鄭先會于溫而後盟瓦屋則鄭自當與宋盟安能不見乎杜預以為不告非也趙氏曰諸侯結盟本非正道有何合禮榖梁曰外盟不日此其日何也諸侯之參盟於是始故謹而日之也誥誓不及五帝盟詛不及三王交質子不及二伯案舜之時已有誓周禮已有盟然榖梁命辭之意甚善葬蔡宣公公羊曰卒何以名而葬不名卒從正而葬從主人卒者往生者繼卒而名之所以别也葬既稱諡且有别矣何以名為榖梁曰月葬故也九月辛卯公及莒人盟于浮來左氏曰以成紀好也案經未有成紀好之意公羊曰公曷為與微者盟稱人則從不疑也劉氏曰無故貶莒子為人意以為當使微者隨公不使公隨小國之君也夫公及小國君盟何不可而反欲隨微者卑稱乎欲為隱公張義其實乃損之耳榖梁曰可言公及人不可言公及大夫案春秋言公及大夫者多矣莊九年公及齊大夫盟於蔇之類是也且榖梁自言稱人為微者既不可言公及大夫反可言公及微者乎冬十有二月無駭卒左氏曰無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏劉氏曰羽父請族公命為展氏杜預云無駭公子展之孫非也若無駭真公孫之子當其繼大王父字為氏非言其死而後氏之也然則無駭固公孫也羽父請族者為無駭之子請族也子展稱公子無駭稱公孫無駭之子未有稱也此其所以請之也若公孫之子死然後賜族則無駭為終身無所氏也故曰不明於禮矣葉氏曰無駭當為公子展之子自是公孫以未三命不得見於經羽父請而公命之者無駭之子左氏不能察而誤以無駭為展之孫也公羊曰此展無駭也何以不氏疾始滅也故終其身不氏葉氏曰滅國與弒君之罪孰重翬弒隱公言終隱之篇貶無駭但滅國言終其身貶使無駭卒於桓公之世則猶當見貶於桓公是滅人之國重於弒已之君也可乎榖梁曰無駭之名未有聞焉或曰隱不爵大夫也或説曰故貶之也黃氏曰無駭即帥師入極者公孫之子未賜族卒書名或曰貶故去其族然按左傳無駭卒後羽父始請氏與族是凡例褒貶之説蓋意之也隱不爵大夫辨見五年公子彄卒九年春天王使南季來聘榖梁曰聘問也聘諸侯非正也范氏曰周禮説天子時聘以結諸侯之好許慎曰臣病君親問之天子有下聘之義傳曰聘諸侯非正寧所未詳愚謂榖梁以聘諸侯非正范氏辨之是矣然不知諸侯不朝而天子聘之為非義二説胥失之三月癸酉大雨震電庚辰大雨雪左氏曰三月癸酉大雨霖以震書始也庚辰大雨雪亦如之書時失也凡雨自三日以往為霖平地尺為大雪劉氏曰傳曰大雨霖以震凡雨自三日以往為霖杜氏云此傳解經書霖而經無霖字經誤也非也經有電無霖傳有霖無電傳不解經經反誤哉杜氏専謂經誤黨於左氏至於如此不亦惑乎且左氏之言未可信也三日之雨豈非常者乎此固經所未嘗書者若以雨三日以往而不書之是春秋二百四十二年之中三日雨者一而已葉氏曰書大雨震電不言霖傳益之以霖而不言電傳固不知經矣而杜預遂以為經誤凡杜氏黨傳而誣經類此公羊曰何以書記異也何異爾不時也榖梁曰震雷也電霆也志疏數也故謹而日之也雨月志正也劉氏曰此不著癸酉不足以見八日之間再有大變愚謂聖人記天變以為人戒豈特志疏數而已挾卒公羊曰俠者何吾大夫之未命者也葉氏曰傳前於無駭入極不氏言貶其始滅國於翬伐鄭不氏言貶其與弒公則謂大夫不氏者皆經之貶辭也今於俠與後柔溺復以為吾大夫之未命者既曰大夫矣安有未命而可名以大夫者乎且名無駭也翬也俠也柔也溺也皆不氏者也亦何以别其貶與未命之異彼特以無駭有入極之事翬有殺君之罪妄意之爾隱桓之世下成康為未逺猶有守先王之典禮卿大夫之命數不敢僣而猶當以名氏見則無駭翬俠柔溺是也榖梁曰弗大夫者隱不爵大夫也隱之不爵大夫何也曰不成為君也辨見五年公子彄卒夏城郎左氏曰書不時也辨見七年城中丘秋七月榖梁曰無事焉何以書不遺時也此義亦通冬公會齊侯于防左氏曰宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬公會齊侯于防謀伐宋也趙氏曰案此時王室已微弱豈有諸侯稟命為之討罪乎若實奉王命而討不庭明年伐宋必異其文邦衡胡氏曰若實奉王命而討不庭明年伐宋不應取二邑歸諸已也葉氏曰鄭伯莊公也為王卿士以王命討宋則鄭伯六卿出而將主兵者也經何以先齊而書齊人鄭人伐宋乎人微者也鄭伯果以王命而正天討何以不自將使微者將之乎曰鄭人以王命來告伐宋可也既以告魯則必告齊公非主兵者何由會齊侯于防而與之謀乎榖梁曰會者外為主焉爾案外為主之義可施之公會某侯盟于某公會某侯伐某今公會齊侯于防則會者相會之義若以外為主為説則內為主者將書公及齊侯于防乎文各有法不可悉以凡例求也後不再辨十年春王二月公會齊侯鄭伯于中丘左氏曰春王正月公會齊侯鄭伯于中丘癸丑盟于鄧為師期宜春宋氏曰傳載鄧之盟老桃之會經無見焉蓋傳雜諸國傳記而作也愚案經言二月傳言正月當以經為正而杜氏反疑經之誤惑矣夏翬帥師會齊人鄭人伐宋左氏曰夏五月羽父先會齊侯鄭伯伐宋案經書翬帥師會齊人鄭人伐宋翬雖不免専兵之罪然必公遣之今左氏曰羽父先會似有竟直之意而猶未顯然也至杜氏則謂翬不待公命而貪會二國之君則質其言矣此二家其見翬不氏故疑其貶而為此言耳且經言齊人鄭人必其大夫也而左氏以為齊侯鄭伯學者將信經乎信傳乎公羊曰此公子翬也何以不稱公子貶曷為貶隱之罪人也故終隱之篇貶也義見四年伐鄭六月壬戌公敗宋師于菅左氏曰六月戊申公會齊侯鄭伯于老桃壬戌公敗宋師于菅劉氏曰經無會老桃之事辛未取郜辛巳取防左氏曰庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我君子謂鄭莊於是乎可謂正矣以王命討不庭不貪其土以勞王爵正之體也劉氏曰經但書公敗宋師取郜取防曾不言鄭伯居其間者豈得如傳所言哉且如傳言春秋為縱漏鄭伯取邑之罪反移之其君也為人臣子固若此耶傳又曰君子謂鄭莊公以王命討不庭不貪其土以勞王爵亦非也鄭茍以王命討宋得其土地當歸之王鄭何得専而有之専而裂之耶専而有之専而裂之不臣甚矣反謂之正乎堯俞李氏曰左氏見此年春有中丘之會下有翬會齊鄭之文此獨言公敗宋師故於取郜取防之傳皆以鄭師入而歸于我以會于經且夫子作經非有意後之有傳也文雖隱微必使人以意求之設謂宋之二邑自鄭取之而歸我宜若宛來歸祊齊來獻捷之文也經書辛未辛巳者非二傳所謂日月為例也欲見壬戌敗之辛未辛巳又取之未逾月而三加兵於宋也愚謂亦紀其實而已公羊曰取邑不日此何以日一月而再取也何言乎一月而再取甚之也內大惡諱此其言甚之何春秋録內而略外於外大惡書小惡不書於內大惡諱小惡書陳嶽氏曰此書日者蓋聫上之壬戌上既書日下茍曰取郜則是壬戌取之何以别也凡取邑茍不合義雖十年一取亦不可茍合義一日取十邑誰曰不然豈有一取再取之甚也愚案外書大惡內書小惡等語皆不近理榖梁曰內不言戰舉其大者也取邑不日此其日何也不正其乘敗人而深為利取二邑故謹而日之也案春秋固不正其乘敗人而深為利取二邑然義在取郜取防而不在日也秋宋人衛人入鄭左氏曰蔡人衛人郕人不會王命秋七月庚寅鄭師入郊猶在郊宋人衛人入鄭案入鄭果有月日經當書之經所不書必無考也不知左氏何從知之不會王命辨見會防宋人蔡人衛人伐戴鄭伯伐取之左氏曰蔡人從之伐戴八月壬戌鄭伯圍戴癸亥克之取三師焉宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗趙氏曰三國並大於鄭鄭之兵力可知何能悉取之乎假令三國入戴城鄭總得取之則合言圍取之若不圍無由總取得三國在城外則合云伐敗之不得云取詳據經文鄭因三國伐戴之後戴巳病矣鄭乘其病而伐取之劉氏曰三國之師衆矣鄭何能悉取之耶且三國伐戴耳不入戴也鄭伯圍戴耳何以能取三師耶假令三國已擊戴則三國亦各自去何為共守此地耶愚謂經書伐取之而不言圍戴經書秋且不得其月左氏何得有癸亥固當以經為正矣又宋衛入鄭自為一事又何以伐戴召蔡人而蔡人怒乎且蔡人怒則不來矣既來則不怒矣既來而怒亦無是理也自左氏唱取三師之説而諸家從之當以公榖為正公羊曰其言伐取之何易也此語近似而未安者以其凡訓取皆以易言也榖梁曰不正其因人之力而易取之故主其事也此本因三國伐戴鄭乘戴之弊而伐取之非鄭與三國共伐而春秋獨書鄭以首其惡也冬十月齊人鄭人入郕左氏曰討違王命也康侯胡氏曰若討違王命則不書入矣木訥趙氏曰於經無所考不足據程子曰左氏曰宋公不王鄭伯以王命討之於春秋不見其為王討也愚謂諸侯為王討二則常事不書矣榖梁曰入者內弗受也日入惡入者也郕國也辨見二年莒入向十有一年春滕侯薛侯來朝左氏曰滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有禮主則擇之周之宗盟異姓為後寡人若朝于薛不敢與諸任齒君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯非本義不録公羊曰諸侯來曰朝大夫來曰聘其兼言之何微國也公羊但解朝聘字義而不明所以朝聘之非義其兼言之亦非以微國也同日朝魯耳榖梁曰天子無事諸侯相朝正也考禮修德所以尊天子也諸侯來朝時正也犆言同時也纍數皆至也范氏曰犆言謂别言也若榖伯綏來朝鄧侯離吾來朝同時來不俱至纍數總言之也若滕侯薛侯來朝同時俱至趙氏曰諸侯不事天子自以強弱相制豈有考禮修德之事哉愚謂如榖梁説則是春秋許其朝也其曰時正也亦日月之例其曰犆言同時纍數皆至得之秋七月壬午公及齊侯鄭伯入許左氏曰鄭伯將伐許五月甲辰授兵於大宫公孫閼與頴考叔爭車潁考叔挾輈以走子都拔棘以逐之及大逵弗及子都怒秋七月公會齊侯鄭伯伐許庚辰傅于許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞于許君而假手于我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使糊其口於四方其況能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子若寡人得沒于地天其以禮悔禍于許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊婚媾其能降以相從也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而況能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之吾先君新邑於此王室而既卑矣周之子孫日失其序夫許大嶽之胤也天而既厭周德矣吾其能與許爭乎君子謂鄭莊公於是乎有禮禮經國家定社稷序人民利後嗣者也許無刑而伐之服而舍之度德而處之量力而行之相時而動無纍後人可謂知禮矣趙氏曰諸侯無王命入人之國罪已大矣又使大夫守之不容誅矣而以為有禮是長亂階也劉氏曰許若有罪鄭已破其國當請之王而立君許若無罪鄭固不當妄破其國今許罪不可知而専為威福政不由王而制於己私其邉圉之固皆大罪也愚謂許莊公奔衛經不書傳未可信故今擇取其粗近似者附於本義餘不敢録冬十有一月壬辰公薨公羊曰何以不書葬隱之也何隱爾弒也弒則何以不書葬春秋君弒賊不討不書葬以為無臣子也子沈子曰君弒臣不討賊非臣也子不復讐非子也葬生者之事也春秋君弒賊不討不書葬以為不繫乎臣子也公薨何以不地不忍言也隱何以無正月隱將讓乎桓故不有其正月也榖梁曰公薨不地故也隱之不忍地也其不言葬何也君弒賊不討不書葬以罪下也隱十年無正隱不自正也元年有正所以正隱也陳洙氏曰案隱元年正月無事書王正月者端本也二傳見他年事不在正月則不書正月故有正隱之論殊不知史法固當異於他年非異隱而書也必以隱為當正而不自正春秋正之故於元年特書王正月則莊元年正月亦無事而首書王正月聖人何正也又諸公元年悉書王正月復何正也餘十年皆不書正月者闕文也非所以為褒貶也且三年四年十年皆書王二月不書正月蓋事在二月不可得而書也如桓七年春書二月莊二十四年春書王二月之比必以隱為不自正桓莊亦不自正耶七年書王三月不書正月者事在三月也如莊十二年不書正月書三月之比也二年六年八年九年十一年不書正月而書春者舊史或脫或略不知事在何月而以春目之也僖五年七年文四年惟書春不書月之比也必以為隱不自正則僖文亦不自正耶案經而言則公榖之義誣矣義又見二年春本義或問賊不討不書葬辨見五年葬衛桓公本義隱無正辨又見二年春本義或問三傳辨疑卷二
