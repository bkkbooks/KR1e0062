body:
  text: 三傳辨疑卷三元程端學撰桓公元年春王正月公即位公羊曰繼弒君不言即位此其言即位何如其意也孔子作春秋明大義於天下未嘗如人之意謂之即其事而見義則可謂之如其意則不可榖梁曰桓無王其曰王何也謹始也其曰無王何也桓弟弒兄臣弒君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉爾元年有王所以治桓也劉氏曰弟弒兄臣弒君亂矣雖盡書王獨尚可謂之有王乎愚謂元年書王既治桓矣桓二年以後無王將遂不治桓乎繆甚矣義又同隱二年春本義或問三月公㑹鄭伯于垂左氏曰春公即位修好于鄭鄭人請復祀周公卒易祊田公許之辨見隱八年鄭歸祊榖梁曰㑹者外為主焉爾辨見九年防之㑹鄭伯以璧假許田左氏曰為周公祊故也葉氏曰𫝊誤以祊為祭故謂假許田為周公祊祊地名也公榖為邴浚南趙氏曰祊與許田自是二事祊是鄭賂魯以結黨許田是魯賂鄭以自固居常與許復周公之宇復之云者豈以今與鄭至僖公而復之歟木訥趙氏曰謂假田因入祊則有之謂易祊則非也公羊曰其言以璧假之何易之也易之則其言假之何為恭也曷為為恭有天子存則諸侯不得専地也許田者何魯朝宿之邑也諸侯時朝乎天子天子之郊諸侯皆有朝宿之邑焉此魯朝宿之邑也則曷為謂之許田諱取周田也諱取周田則曷為繫之許近許也此邑也其稱田何田多邑少稱田邑多田少稱邑葉氏曰鄭伯實以璧假則自當書矣若以為有天子存諸侯不得専其地故變易為假以見其恭是經加之辭隱公入邴取郜取防雖內辭耳直書之不以専地而為假鄭伯但易許田乃為之設恭辭乎作經本以正天下之功罪若以天子存每為之辭則天下無可正之罪矣春秋正名周田而謂之許田其名亦亂矣田者各繫其邑為稱者也周之田不可謂許之田許之田不可謂周之田兼取兩國之邑不可以田而論邑田多邑少亦兩也兼取兩國之田不可以邑多而論田田少亦兩也邑者兼田與邑皆得之名田者得田而不得邑之名安得為田多邑少邑多田少者乎是亦不足為例愚案以璧假田者甘辭厚禮以藉為名而實求之也魯史安得改易為假乎公羊曰田近許又曰諱取周田而繫之許則史氏所録何以許之乎後世聖人所書何以垂訓於後人且近許而謂之許則凡近齊者皆謂之齊田近楚者皆謂之楚田乎蓋不通之論也其曰諸侯皆有朝宿之邑辨見八年歸祊榖梁曰假不言以言以非假也非假而曰假諱易地也禮天子在上諸侯不得以地相與也無田則無許可知矣不言許不與許也許田者魯朝宿之邑也邴者鄭伯所受命而祭泰山之邑也用見魯之不朝于周而鄭之不祭泰山也葉氏曰以璧假許田則知假者不以邴矣假者暫得之名也若邴與許田直言假而不言與亦足以諱易地矣何用以璧見之乎如傳言乃謂鄭伯不以璧假經為內諱而設為之辭理豈有是者哉若以鄭諱易地而託璧以隱其過則邴假亦易也以璧假亦易也何補於諱蓋𫝊誤謂邴許交相易故妄為之說愚案以璧者猶言用璧也用璧而假鄭之禮厚而辭遁也榖梁曰假不言以繆妄甚矣又曰亦公羊之失又曰邴許相易辨見左氏夏四月丁未公及鄭伯盟于越左氏曰結祊成也盟曰渝盟無享國案鄭伯既得許田因與結盟以固篡弒之位結祊成左傳臆度之辭耳榖梁曰及者內為志焉爾秋大水左氏曰凡平原出水為大水葉氏曰久雨霖潦江河決溢皆可以害物者也故魯弔宋曰天作淫雨害於粢盛不以平原出水也平原固無出水之理雖出水而不為害亦不可言大水榖梁曰髙下有水災曰大水劉氏曰非也假令大水終不能令髙下皆有但沒城邑已劇矣況山嶽不可沒則大水不必髙下皆有也冬十月榖梁曰無事焉何以書不遺時也與隱九年秋七月同二年春王正月戊申宋督弒其君與夷及其大夫孔父左氏曰元年冬宋華父督見孔父之妻於路目逆而送之曰美而豔二年春宋督攻孔氏殺孔父而取其妻公怒督懼遂弒殤公君子以督為有無君之心而後動於惡故先書弒其君葉氏曰孔父事公羊言之是已所謂義形於色者此非獨公羊之辭其𫝊之必有自左氏亦竊聞之而不能詳故誤以色為美色之色因附㑹以為督見孔父妻而萌其惡孔父宋之卿督其大夫殺卿取妻猶居位不去待君怒而後始懼其不近人情已甚愚謂左氏之言亦自相戾後言宋殤公立十年十一戰民不堪命孔父嘉為司馬督為太宰故因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召莊公于鄭而立之前後異辭矣公羊曰及者何纍也弒君多矣舍此無纍者乎曰有仇牧荀息皆纍也舍仇牧荀息無纍者乎曰有有則此何以書賢也何賢乎孔父孔父可謂義形於色矣其義形於色奈何督將弒殤公孔父生而存則殤公不可得而弒也故於是先攻孔父之家殤公知孔父死已必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣此論近似獨疑殤公趨而救之皆死一語為未安榖梁曰桓無王其曰王何也正與夷之卒也孔父之先死何也督欲弒君而恐不立於是乎先殺孔父孔父間也何以知其先殺孔父也曰子既死父不忍稱其名臣既死君不忍稱其名以是知君之纍之也孔氏父字諡也或曰其不稱名蓋為祖諱也孔子故宋也孫氏曰果以二年書王為正與夷之卒則莊文宣襄定哀之二年書王此正何人之卒也葉氏曰春秋天下後世之書實為宋設而區區為其祖諱且禮卒哭乃諱宰夫以木鐸命於宫曰舍故而諱新謂有當諱者故逮事父母則諱王父母不逮事父母則不諱王父母恩有殺也孔父若法在所當諱去孔子亦逺矣猶不得諱而況於不當諱乎此不知宋有四命之大夫而妄為之說也陸氏曰案春秋魯國之史也非夫子家𫝊安得祖諱乎愚謂先殺孔父左氏有𫝊茍不可盡信闕疑可也榖梁不知當時之事而因其稱字為不忍稱名意其先殺孔父其考事論理不亦踈哉其曰桓無王辨見元年辨疑及隱二年桓三年或問三月公㑹齊侯陳侯鄭伯于稷以成宋亂公羊曰內大惡諱此其目言之何逺也所見異辭所聞異辭所𫝊聞異辭隱亦逺矣曷為為隱諱隱賢而桓賤也葉氏曰𫝊既以惡大小論諱矣又以逺近為辨既以逺近為辨矣又以賢與賤為辨三者不得並行則何者為正乎且此以成宋亂為賤桓而不諱然戰于宋曰內不言戰言戰乃敗矣不言戰豈非諱乎狐壤之獲不言戰為賢隱而諱然公觀魚于棠何以書獻可杜氏曰聖人於春秋茍實諱之則不以公萬世也愚謂愛而知其惡憎而知其善今謂隱賢而不目其事桓賤而目之吾恐聖人大公至正之心不如是也況不目其事者十二公皆然不特隱公矣所見所聞所傳聞辨見隱元年益師卒榖梁曰以者內為志焉爾公為志乎成是亂也此成矣取不成事之辭而加之焉於內之惡而君子無遺焉爾范氏曰取不成事之辭謂以成宋亂也江熙曰春秋親尊皆諱蓋患惡之不可掩豈當取不成事之辭以加君父之惡乎案宣四年公及齊侯平莒及郯𫝊曰平者成也然則成亦平也公與齊陳鄭欲平宋亂而取其賂鼎不能平亂故書成宋亂取郜大鼎納于大廟微㫖見矣尋理推經𫝊似失之夏四月取郜大鼎于宋戊申納于大廟郜古報切左氏曰臧哀伯諌周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德東萊吕氏曰哀伯之諫取郜鼎所言周家宗廟制度固當考然桓公於弒猶忍為之哀伯乃諌其取叛臣之鼎是猶不能三年之喪而緦小功之察者也愚案哀伯之諫誠如吕氏之譏其言乃經國大典不可廢也故録之本義云公羊曰此取之宋其謂之郜鼎何器從名地從主人器何以從名地何以從主人器之與人非有即爾宋始以不義取之故謂之郜鼎至乎地之與人則不然俄而可以為其有矣然則為取可以為其有乎曰否何者若楚王之妻媦無時焉可也戊申納于大廟何以書譏何譏爾遂亂受賂納于大廟非禮也案隱十年伐宋取郜郜乃宋邑耳非國也安得有鼎郜鼎者郜邑所造之鼎耳近世吕朴鄉諸侯皆云宋以不義得蓋本於此其曰遂亂以遂訓平非也辨見或問榖梁曰桓內弒其君外成人之亂受賂而退以事其祖非禮也其道以周公為弗受也郜鼎者郜之所為也曰宋取之宋也以是為討之鼎也孔子曰名從主人物從中國故曰郜大鼎也莘老孫氏曰謂之郜大鼎者鼎之成自郜也凡物皆有以名之若和氏之璧雲和之琴瑟之類是也公榖論郜鼎之名無足取愚謂榖梁之說前一假近是但云成人之亂亦公羊遂亂之意秋七月紀侯來朝左氏曰杞侯來朝不敬把侯歸乃謀伐之劉氏曰案公榖作紀雖亂世至於兵革之事亦慎用之杞侯來朝魯少有不敬未宜便入其國左氏誤紀為把遂生不敬之說愚謂左氏見此年九月有入杞之文遂附㑹其說耳榖梁曰朝時此其月何也桓內弒君外成人之亂於是為齊侯陳侯鄭伯討數日以賂已即是事而朝之惡之故謹而月之也劉氏曰非也冬紀侯來朝猶是前紀侯爾猶是此桓公爾行不加進惡不差減而紀侯過而不改又之是謂過矣其責宜深深則宜日反書時何哉是春秋不之惡乎葉氏曰審以桓為非所當朝則前書滕子來朝蒙上文正月此始朝也何為不謹至紀侯而始謹之乎紀侯以一朝為罪則六年而再朝其罪宜又重矣反書冬紀侯來朝而不月可為正者乎蔡侯鄭伯㑹于鄧公羊曰離不言㑹此其言㑹何蓋鄧與㑹爾劉氏曰非也二國相㑹理不可言蔡侯鄭伯及于某且實行㑹禮非㑹而何承赴而書故不甚見爾乃據齊侯鄭伯如紀以為比例彼亦自妄說何可據乎九月入把左氏曰討不敬也辨見紀侯來朝冬公及戎盟于唐公至自唐左氏曰公及戎盟于唐修舊好也冬公至自唐告于廟也凡公行告于宗廟反行飲至舍爵䇿勳焉禮也特相㑹往來稱地讓事也自參以上則往稱地來稱㑹成事也黃氏曰隱嘗與戎盟戎伐凡伯矣今桓再與之盟戎何信之有而可云修舊好也趙氏曰此非征伐從君出入乃是常事何勳之有案成㑹而歸即非止於讓以㑹告廟有何不可左氏不達內外異辭之法妄為臆說爾胡氏曰左氏言反行飲至舍爵䇿勳焉禮也且桓不知有何勳乎君舉陳氏曰𫝊釋以地至蓋恆言也而作例者執以為凡案宣五年公至自齊之𫝊曰書過也則致不主一義凡例非矣榖梁曰桓無㑹而其致何也逺之也其曰逺之亦危之之意辨見或問三年夏齊侯衛侯胥命于蒲左氏曰不盟也劉氏曰非也兩君相聚必有故也雖復不盟猶應以㑹書之何忽謂胥命乎且胥命善乎不善乎若善也不見所善兩君相聚而不盟何不善也然則胥命者固常㑹也何足義而書之哉公羊曰胥命者何相命也何言乎相命近正也此其為近正奈何古者不盟結言而退劉氏曰非也先王為民之不信言之難恃故殺牲為誓以告於神明而為盟禮所以齊信也然則盟固先王之所有也春秋之惡盟者惡其瀆也非惡盟之不及結言也春秋亂世齊衛凡君㑹而相命蓋何足算公羊以謂逺國皆至桓公發禁於諸侯諸侯咸無用盟最盛矣豈非結言而退乎則何不謂之胥命哉榖梁曰胥之為言猶相也相命而信諭謹言而退以是為近古也是必一人先其以相言之何也不以齊侯命衛侯也趙氏曰苟爾相命㑹不以禮匹夫之事非正也三傳俱言不盟公榖又云善其約言而退㑹遇亦並不盟皆是約言而退何得異其言且二君並非賢君又無殊異之跡據經文直譏無人君之禮爾東萊吕氏曰此胥命與𫝊家所載胥命于弭者何異說者謂春秋惟一胥命而二𫝊善之遇㑹亦何嘗盟非所謂約言而退乎愚謂不以齊侯命衛侯者魯史之筆乎孔子之筆乎苟謂魯史之筆則魯史當時無抑揚豫奪之意苟為孔子之筆則孔子未嘗改魯史之文嗚呼後世論春秋為有抑揚豫奪之說者若此之類唱其始乎六月公㑹紀侯于郕左氏曰把求成也公羊劉氏程子皆作紀秋七月壬辰朔日有食之既公羊曰既者何盡也此字訓得之榖梁曰既者盡也有繼之辭也榖梁謂既者盡也是也而既之為言未有有繼之意也公子翬如齊逆女左氏曰修先君之好故曰公子劉氏曰春秋非修先君之好而稱公子者多矣何必修先君之好乃稱公子哉榖梁曰逆女親者也使大夫非正也張氏曰天子諸侯無出疆親迎之禮必使上卿往迎於其國至於館所然後親迎以入此哀公問所謂大昏既至冕而親迎也然則諸侯逆女不可親往於其國矣九月齊侯送姜氏于歡公㑹齊侯于歡左氏曰齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之此禮無所考未敢遽信公羊曰何以書譏何譏爾諸侯越竟送女非禮也此入國矣何以不稱夫人自我言齊父母之於子雖為鄰國夫人猶曰吾姜氏案越竟送女非禮之言是也但不若榖梁之詳自我言齊之言亦粗可通但不若杜氏之明其曰雖為鄰國夫人猶曰吾姜氏則恐求之太過也榖梁曰公㑹齊侯于歡無譏乎曰為禮也齊侯來也公之逆而㑹之可也葉氏曰此與前公㑹于嬴同文安知其為無譏齊侯既不得親送女則公亦不得即而為㑹其罪均矣何以為禮愚謂公不重大昏不暇親迎而㑹齊侯雖有所畏而然亦公不能以禮自處而致此反曰為禮豈不悖哉夫人姜氏至自齊公羊曰翬何以不致得見乎公矣此說得之榖梁曰不言翬之以來何也公親受於齊侯也子貢曰冕而親迎不已重乎孔子曰合二姓之好以繼萬世之後何謂已重乎案禮記作哀公問而辭少異榖梁引此而以公親受之于齊侯為得禮與前公㑹齊侯于歡為禮也之云失春秋之㫖矣冬齊侯使其弟年來聘左氏曰冬齊仲年來聘致夫人也趙氏曰案成九年季孫行父如宋致女經書以示譏此若致女亦當書之不容為隱左氏見彼有致女之文此又新昏之後而至遂附㑹妄說耳有年公羊曰有年何以書以喜書也大有年何以書亦以喜書也此其曰有年僅有年也彼其曰大有年何大豐年也僅有年亦足以當喜乎恃有年也案有年固人之所喜而春秋不以喜書也春秋所書見當時大亂因事立教為後世法者也若以喜書則春秋不書常事其曰有年為僅有年大有年為大豐年則近之四年春正月公狩于郎左氏曰書時禮也案春當搜而行冬狩之事不仁無禮甚矣左氏反曰書時又曰禮也豈不悖哉公羊曰春曰苗秋曰搜冬曰狩常事不書此何以書譏何譏爾逺也諸侯曷為必田狩一曰乾豆二曰賔客三曰充君之庖葉氏曰天子諸侯無事嵗三田禮王制以為夏時今見三時而不夏何休以為春秋制飛鳥未去於巢走獸未離於穴恐傷害幼稚二說皆非是此亦𫝊未嘗見周禮之過也愚案周禮爾雅左氏皆曰春搜夏苗秋獮冬狩公羊則曰春苗秋搜非也且田獵義不一豈止充乾豆賔客君之庖而已哉榖梁曰四時之田皆為宗廟之事也春曰田夏曰苗秋曰搜冬曰狩四時之田用三焉唯其所先得一為乾豆二為賔客三為充君之庖案公羊曰春苗秋搜冬狩榖梁又曰春田夏苗秋搜冬狩與周制不合皆擇不精語不詳之病也又案古者田獵獲禽面傷不獻踐毛不獻不成禽不獻擇取三等自左膘射之達于右腢為上殺以為乾豆奉宗廟達右耳本者次之以為賔客射左髀達于右髀為下殺以充君庖而榖梁謂唯其所先得誤矣夏天王使宰渠伯糾來聘左氏曰周宰渠伯糾來聘父在故名葉氏曰左氏以宰周公為例言宰渠伯不當言糾為父在之辭凡春秋世其爵代其政如武氏子如仍氏之子皆正其為子未嘗貶以名何為而獨名糾乎渠伯誠聘之得禮雖父在何害愚謂渠伯糾以伯稱則字也左氏以為名非也為名猶可也而曰父在故名不可也蓋父前稱名常也若朝廷之間豈以父在而稱名哉朝廷之間有大夫有士或以字或以名各有定制何必以為義哉公羊曰宰渠伯糾者何天子之大夫也其稱宰渠伯糾何下大夫也案公羊亦以伯糾為名故也五年春正月甲戌己丑陳侯鮑卒左氏曰甲戌己丑陳侯鮑卒再赴也於是陳亂文公子他殺大子免而代之公疾病而亂作國人分散故再赴趙氏曰豈有正當禍亂之時而假競使人赴告哉假令實赴告夫子亦當詳定取其實日何乃總載之乎秀巖李氏曰果以國亂而再赴乎則後赴者當眀前赴之誤不當疊書之也若後赴者不明言何日則亦當如靈王之喪問以薨日亦不當疊書之也公羊曰曷為以二日卒之㤜也甲戌之日亡己丑之日死而得君子疑焉故以二日卒之也㤜狂也孫氏曰諸侯未有二日卒者也胡氏曰國君出豈一國之人不知邪左右前後不知邪此書二日者闕文春秋之中無二日卒者趙氏得其義謂甲戌之下當有脫事秀巖李氏曰陳國雖小為之君者豈無左右侍從之人而可潜行獨出乎公榖不見古書妄意附㑹若是者非一端矣不可以為據也榖梁曰鮑卒何為以二日卒之春秋之義信以傳信疑以𫝊疑陳侯以甲戌之日出己丑之日得不知死之日故舉二日以包之也劉氏曰國君潜行獨出安所之乎若入於臣民之間則必有知者若獨死曠野是非人情且何以能歷十六日而人不覺乎依倚古事人所不見遂肆意妄說不顧道理故可怪也愚案三傳各為一說以求必通且造事實以取信於世亦何心哉然此其附㑹之顯然者也其他疑似之間人所難辨害經㫖者多矣讀春秋者亦可以少悟矣夏齊侯鄭伯如紀左氏曰夏齊侯鄭伯朝于紀欲以襲之紀人知之案春秋惟內書如他國或朝或來或如皆直書之今經言如而左氏曰朝當以經為正其曰欲襲之紀人知之亦何所據臆度之辭爾公羊曰外相如不書此何以書離不言㑹也劉氏曰非也春秋之記盟㑹者所以譏刺諸侯非善羣聚而惡離㑹也離㑹何為不可書哉何休又曰嫌外離㑹常書故變文見意以别嫌明微亦非也所謂嫌微者為其害道是以必别之不知記離㑹何害於春秋而仲尼必欲改㑹為如以亂事實哉夫盟㑹同物而春秋獨不記離㑹又何為哉春秋雖內其國而公與諸侯固等列也記內離㑹可不謂之離㑹乎而又謂離不言㑹失其類矣其何以為百二十國之實録耶天王使仍叔之子來聘左氏曰仍叔之子弱也子弟亂國政豈論其弱而已公羊曰仍叔之子者何天子之大夫也其稱仍叔之子何譏何譏爾譏父老子代從政也劉氏曰若是其世卿也何不曰仍氏之子乎愚案仍叔之子已為大夫經自當以官氏名字見若宰咺宰渠伯糾者也不應曰仍叔之子若父老未見吾不能知也榖梁曰任叔之子者録父以使子也故微其君臣而著其父子不正父在子代仕之辭也劉氏曰非也文稱天王使矣何謂録父使子乎又何為微其君臣乎又曰父在子代仕之辭亦非也告子代仕者貶任叔可矣王父使任叔可矣今又曰天王使任叔之子豈父在使子自代者也若曰天王使任叔子代父仕者則是天王已命任叔之子矣無所復譏且未得繫任叔言之也父老而使其子仕亦常事耳天王既以命之與衆卿士何殊哉而榖梁又不當言録父以使子秋蔡人衛人陳人從王伐鄭左氏曰秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人衛人為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不枝固將先奔既而萃於王卒可以集事從之曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰于繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍祝聃請從之公曰君子不欲多上人況敢陵天子乎苟自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右案成元年王師敗績于茅戎春秋猶書之而不諱豈有王師敗于鄭且中王肩而不書以掩鄭伯之罪乎以經考之必不然者也然左氏叙此頗詳不知何從得此矣公羊曰其言從王伐鄭何從王正也公羊但知從王之為正而不知三國以微者從王之非正又不知王親伐諸侯亦非正如此解經末之難矣果正也則是常事而春秋不書矣榖梁曰舉從者之辭也其舉從者之辭何也為天王諱伐鄭也鄭同姓之國也在乎冀州於是不服為天子病矣劉氏曰非也直言從王伐鄭文順事明可不煩解矣又妄云舉從者之辭何益哉且安見諱伐鄭之義哉所謂無病而自灸者也愚案舉從者史氏立言輕重之法也非為天王諱伐鄭而為舉從者之辭也其曰鄭在冀州而不服為天子病則得之但義有未盡耳大雩左氏曰大雩書不時也凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸過則書葉氏曰四者之節非是周郊以日至祈榖以正月上辛自不通於諸侯啓蟄建卯之候為周祈榖祭則已過則啓蟄非郊之節也月令蒼龍七宿以仲夏昏見周之常雩在孟夏建已龍未見龍見亦非雩之節也仲秋殺氣浸盛始殺當在孟秋嘗在仲秋乃浸盛之時則始殺亦非嘗之節也蟄蟲咸俯在內皆墐其户蒸為冬祭當以仲冬亦非蒸之節也四者無一而合此雖無與於經亦可見左氏為例初無所據大抵皆率意自為不可信類如此螽榖梁曰螽蟲災也甚則月不甚則時冬州公如曹左氏曰冬淳于公如曹度其國危遂不復杜氏曰淳于州國所都城陽淳于縣也楊氏曰州稱公與祭公同則州必畿內之地河內州縣也左氏乃云淳于公如曹度其國危遂不復辨又見六年實來公羊曰外相如不書此何以書過我也秀巖李氏曰列國相朝而假道者容有之矣未見書于䇿也榖梁曰外相如不書此其書何過我也莘老孫氏曰州公如曹三傳之解皆不同左氏以為度其國危遂不復蓋以為一國諸侯因其適曹遂不復其國故書之公榖皆以為因其過我故書惟趙子以為州公者王臣也譏其外交故書之案趙子所以知州公為王臣者蓋隱十一年左氏𫝊載王與鄭人蘇忿生之田凡十二邑其一則州也州既為畿內之邑則此州公食采于天子畿內而為三公之官故曰州公三傳之說皆非愚案三傳言過我者以六年書實來疑其為州公招故也殊不知無前稱爵後稱名之理實來為闕文無足疑者但三傳欲強其所不可通故自不知其附㑹耳六年春正月實來左氏曰春自曹來朝書曰實來不復其國也劉氏曰非也州公如曹如知其國有難必不如曹矣假令度其國危而遂不復方其來朝猶是州公爾何得不言乎盛伯來奔實太子也徒君以諸侯逆之遂以盛伯書此親左氏義豈嘗顧盛太子不復其國奪其伯爵哉則州公既行朝禮矣何以獨不書朝夫公之與州公亢朝禮猶與盛太子亢諸侯禮也盛太子以公故故書盛伯州公豈不得以公故故書朝邪且盛伯不復其國州公亦不復其國其不復國也均而一子一奪焉可以信左氏之說非也葉氏曰州公以其國危遂留於曹而不復則固已失地矣安復自曹朝我乎愚謂經凡來朝者必書曰朝所以存事實而使後世據事見義也若變亂其名實則後世何所據哉公羊曰實來者何猶曰是人來也孰謂謂州公也曷為謂之實來慢之也曷為慢之化我也劉氏曰非也君子躬自厚而薄責於人人雖無禮我可不敬乎何故慢之愚謂假令魯實慢之但見慢於交際之時史氏何得亦慢之而簡其文曰實來乎榖梁曰實來者是來也何謂是來謂州公也其謂之是來何也以其畫我故簡言之諸侯不以過相朝也案春秋惟諸侯朝天子與大夫聘天子諸侯無遂事爾若州公實如曹復過魯未可以遂事言也榖梁不責州公之秋來魯而責其畫我不知禮矣春秋豈有前年書州公如曹而次年以是來續之之義乎不惟無是書法亦不可解也秋八月壬午大閲公羊曰大閲者何簡車徒也何以書蓋以罕書也劉氏曰公羊以謂以罕書也何休曰三年簡車謂之大閲刺桓公忘武備也不知所謂罕者入春秋今始一閲邪謂桓公過其三年之期而始一閲邪若自入春秋今始一閲者則非桓公忘武備隱亦忘也如此審為桓公過其三年之期而始一閲故得以罕書也然必閲而後書之假令桓公終身不閲春秋遂不得書則是與隱公無以辨也又非必桓公終身不閲春秋不得書為可疑也假令桓公初嵗一閲終嵗又一閲春秋書之公羊必謂以書罕也則未知中間罕乎亦不罕乎若謂罕則中間無文以見若謂不罕則中間實未嘗閲此文之不通難以強合者也又何休所說簡車徒有比年三年五年之目在桓公之世獨閲以罕書是明比年五年俱不罕也桓公又非終不閲者也今已閲之矣直失其時耳如此桓公之於武備可謂忽忘乎愚謂閲而不至於大閲又閲而及時皆春秋以為常事而不書者也故春秋少見焉今大閲而又失時故書之也因以為罕不亦繆乎榖梁曰大閲者何簡兵車也修教明諭國道也平而修戎事非正也其日以為崇武故謹而日之蓋以觀婦人也劉氏曰非也但曰大閲安知觀婦人乎葉氏曰安有觀婦人而崇武者乎蔡人殺陳他公羊曰陳他者何陳君也陳君則曷為謂之陳他絶也曷為絶之賤也其賤奈何外淫也惡乎淫淫乎蔡蔡人殺之劉氏曰非也蔡人者討賊之辭也他本篡故以討賊之辭言之猶衛人殺州吁齊人殺無知楚人殺陳夏徵舒等也他雖自君內不為國人所附是以異於商人而不得以踰年例言也公羊失其事實聊為設罪端耳愚案陳他果非弒君又以為陳君以淫而見殺于蔡經猶當書曰蔡人殺陳侯他今以討賊之辭書則公羊所以淫者見前無事始造事以實之耳非有所據也榖梁曰陳他者陳君也其曰陳他何也匹夫行故匹夫稱之也其匹夫行奈何陳侯喜獵淫獵于蔡與蔡人爭禽蔡人不知其是陳君也而殺之何以不知其是陳君也兩下相殺不道其不地於蔡也榖梁謂陳侯爭禽見殺亦公羊淫于蔡之意然又謂匹夫行故匹夫稱者尤非也夫齊襄文姜之淫亂可謂匹夫行矣齊襄何以稱侯而不名乎及其被弒何以曰弒其君諸兒乎又陳侯鄭伯逃盟𫝊謂其有匹夫之行矣又何以稱陳侯鄭伯而不名乎榖梁及兩下相殺不道而因知蔡人不知其是陳君則凡榖梁之考事皆非有據而揣摩臆度可知矣秋九月丁卯子同生左氏曰九月丁卯子同生以大子生之禮舉之接以大牢卜士負之士妻食之公與文姜宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公日是其生也與吾同物命之曰同案申繻之對非春秋本義不録其曰以大子生之禮舉之接以大牢卜士負之士妻食之公與文姜宗婦命之本諸侯生子之常禮讀春秋者因以為子同生之本義則誤矣辨見或問公羊曰子同生者孰謂謂莊公也何言乎子同生喜有正也未有言喜有正者此其言喜有正何久無正也子公羊子曰其諸以病桓歟劉氏曰以為感隱桓之禍故以喜書不亦淺近乎榖梁曰時曰同乎人也據左氏名同之意則不然榖梁又於名上生義當桓公之命名也豈預知文姜之亂而為此名以待之乎設使莊公時有此語亦里巷之辭孔子安得緣此而書之乎冬紀侯來朝左氏曰冬紀侯來朝請王命以求成于齊公告不能葉氏曰八年祭公來遂逆王后于紀則魯蓋與謀矣魯謀納紀女於王正齊之故以為公不能者誤也七年春焚咸丘公羊曰焚之者何樵之也樵之者何以火攻也何以言乎火攻疾始以火攻也咸丘者何邾婁之邑也曷為不繫乎邾婁國之也曷為國之君存焉爾劉氏曰非也案公羊凡書內取邑苟不繫乎國釋歸之邾婁今此亦其比也又案邾人執鄫子用之蔡人衛人伐戴鄭伯伐取之諸若此類不仁之甚者春秋明書之不使文亂實若誠火攻人君應書曰伐咸丘焚之與伐戴之文相符矣今但曰焚咸丘而無兵戈之意安知不為火田乎又公羊解取邿等曰諱亟也然則彼為亟故不繫國此為君存亦不繫國亟於取邑惡之小也焚人之邑惡之大也文不足以相起而實相亂未可謂善為春秋榖梁曰其不言邾咸丘何也疾其以火攻也果疾火攻乃疾魯耳何得不言邾乎繆與公羊同而其為說則異夏榖伯綏來朝鄧侯吾離來朝左氏曰榖伯鄧侯來朝名賤之也劉氏曰非也榖伯爵鄧侯爵侯伯之爵豈小哉先王制禮不敢遺小國之臣豈嘗惡其僻陋而賤之哉此非春秋之意也公羊曰皆何以名失地之君也其稱朝何貴者無後待之以初也劉氏曰非也若實失地何故稱朝且朝者施於有國者有家者春秋不以禮假人如之何其以為朝也又諸侯失地者必名溫子談子弦子是也葉氏曰失地之君凡來奔於我者皆是也何嘗以其貴而以朝禮接之獨見於二君乎朝不朝在彼其實不朝雖以貴者待之安可以言朝使其實朝雖不以貴者待之安可不言朝蓋失地之君有以奔來而不能朝者有不以奔來而能朝者各以其實爾榖梁曰其名何也失國也失國則其以朝言之何也嘗以諸侯與之接矣雖失國弗損吾異日也君舉陳氏曰案左氏桓九年巴子告于楚請與鄧通好莊六年楚子伐申過鄧鄧侯享之十六年滅鄧今不見滅鄧事跡公榖失地之君非是八年春正月己卯蒸公羊曰疏則怠怠則忘士不及兹四者則冬不裘夏不葛此說近理但無所屬不録冬十月雨雪公羊曰何以書記異也何異爾不時也公羊亦多用夏正但不明言耳此謂不時不知其指建亥之月與建酉之月故不録祭公來遂逆王后于紀左氏曰禮也大夫無遂事而左氏以為禮公羊曰何以不稱使婚禮不稱主人遂者何生事也大夫無遂事此其言遂何成使乎我也其成使乎我奈何使我為媒可則因用是往逆矣女在其國稱女此其稱王后何王者無外其辭成矣劉氏曰公羊謂不稱使婚禮不稱主人非也祭公來魯魯非婚家也稱使何傷又不稱主人者豈確論乎愚案此為遂事立辭非以婚禮不稱主人而不稱使也其曰成使乎我而稱遂則是遂事為當然也經稱王后亦文法當然使不稱王后則不知所逆者為誰王者固無外經稱王后未有無外之意也榖梁曰其不言使焉何也不正其以宗廟之大事即謀於我故弗與使也遂繼事之辭也其曰遂逆王后故略之也或曰天子無外王命之則成矣案宗廟大事固不可謀於我而遂往逆然不以此而弗與使也弗與使抑揚豫奪之說也天子雖無外然娶后之禮亦有漸豈有王命則成之理乎三傳辨疑卷三
