body:
  text: 三傳辨疑卷十三元程端學撰成公元年春無冰穀梁曰終時無冰則志此未終時而言無冰何也終無冰矣加之寒之辭也按榖梁於桓八年正月烝有曰烝冬事也春興之不時以夏正言也今又似以春為冬豈不自相戾哉其加之寒之辭不可曉范氏解曰於寒之中又如加甚亦不可曉要之本無義理强為之辭耳蓋無冰者冬行春令而温燠耳安有甚寒而無冰之理三月作丘甲公羊曰何以書譏何譏爾譏始丘使也劉氏曰公羊云譏始丘使也何休云使丘民作甲非也若如此經自當言丘作甲非作丘甲也且如何休所譏春秋當為惡其使農為工亂田民之業爾然則當言農作甲或言民作甲何故云丘乎丘者井邑之類若丘民作甲井民獨不作甲乎春秋但曰井作甲豈不甚明而度邑指丘其意何哉榖梁曰作為也丘為甲也丘甲國之事也丘作甲非正也丘作甲之為非正何也古者立國家百官具農工皆有職以事上古者有四民有士民有商民有農民有工民夫甲非人人之所能為也作丘甲非正也陳岳氏曰榖梁謂士農工商為一丘作甲是使世人皆作甲以為非正奚見之淺歟劉氏曰審為使民作甲者春秋何不云井作甲邑作甲農作甲乎吾於公羊既言之矣愚謂榖梁得公羊之說而衍之者也秋王師敗績于茅戎左氏曰三月癸未敗績于徐吾氏秋王人来告敗經書在秋當以經為正其以徐吾氏為茅戎亦未必然公羊曰孰敗之盖晉敗之或曰貿戎敗之然則曷為不言晉敗之王者無敵莫敢當也啖氏曰若晉敗王師而改曰貿戎是掩惡也如何懲勸乎陳岳氏曰安可謂嫌晉之敗王師是以代之設獨曰戎猶不可也今曰茅戎則戎之别種明矣所以書茅戎者别其姜戎山戎也苟曰改而諱之則茅戎敗王師其辱甚於晉矣榖梁曰不言戰莫之敢敵也為尊者諱敵不諱敗為親者諱敗不諱敵尊尊親親之義也然則孰敗之晉也按不言戰製言之體當如此耳非為尊者諱也春秋有曰我師敗績者此魯史之辭也亦非為親者諱也其曰晉敗之辨見公羊二年春齊侯伐我北鄙左氏曰齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊侯親鼔士陵城三日取龍遂南侵及巢丘春秋凡取邑必書今經無見杜氏亦曰取龍侵巢丘不書其義未聞夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績左氏曰既衛人賞之以邑辭諸曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑惟器與名不可以假人君之所司也名以出信信以守器器以蔵禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家従之弗可止也已多與之邑非仲尼之言也大夫之邑有制豈可以多與哉六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊師戰于鞌齊師敗績秋七月齊侯使國佐如師己酉及國佐盟于袁婁公羊曰曹無大夫公子手何以書憂内也君不使乎大夫此其行使乎大夫何佚獲也其佚獲奈何師還齊侯晉郤克投㦸逡廵再拜稽首馬前逢丑父者頃公之車右也面目與頃公相似衣服與頃公相似代頃公當左使頃公取飲頃公操飲而至曰革取清者頃公用是佚而不反逢丑父曰吾賴社稷之神靈吾君已免矣卻克曰欺三軍者其法奈何曰法斮於是斮逢丑父曷為不盟于師而盟于袁婁前此者晉郤克與臧孫許同時而聘於齊蕭同姪子者齊君之母也踊於棓而闚客則客或跛或眇於是使跛者迓跛者使眇者迓眇者二大夫出相與踦閭而語移日然後相去齊人皆曰患之起必自此始二大夫歸相與帥師為鞌之戰齊師大敗齊侯使國佐如師郤克曰與我紀侯之甗及魯衛之侵地使耕者東畝且以蕭同姪子為質則吾舎子矣國佐曰與我紀侯之甗請諾反魯衛之侵地請諾使耕者東畝是則土齊也蕭同姪子者齊君之母也齊君之母猶晉君之母也不可請戰臺戰不勝請再再戰不勝請三三戰不勝則齊國盡子之有也何必以蕭同姪子為質揖而去之郤克眣魯衛之使使以其辭而為之請然後許之逮于袁婁而與之盟劉氏曰公羊曰曹無大夫公子手何以書憂内也非也春秋不王魯吾既言之矣且曹何以獨無大夫若曹以小國故無大夫鄭亦伯也亦無大夫乎且春秋之正諸侯也以王爵不以土地廣狭也曹鄭同儕一有大夫一無大夫何哉公羊又有云君不使乎大夫此其行使乎大夫何佚獲也非也盖君不使乎大夫者謂安平無事耳今兩國治戎将在軍君命有所不受茍君命有所不受其重且専也可知矣即使何傷又諸侯㑹晉師于棐師實趙盾之師言晉使者君不㑹大夫也君不㑹大夫故可言晉師不可言趙盾師今此亦言晉師足矣乃其常文何以為其不使大夫乎愚謂公羊言曹無大夫與君不使乎大夫言既謬矣又以謂憂内而升曹為大夫佚獲而行使乎大夫又謬之尤者若其事之信否則不能必也案左氏云郤克徴㑹于齊齊侯幃婦人使觀之郤克登而婦人笑公羊則以為蕭同姪子使跛迓跛眇迓眇者左氏又云臧宣叔謂齊楚結好我新與晉盟晉楚争盟齊師必至而具守備公羊則以為前此晉郤克與臧孫許同時聘齊被蕭同姪子跛迓跛眇迓眇故相與帥師為鞌之戰左氏又云齊侯使國佐賂晉以紀甗玉磬與地而公羊以為郤克求之左氏又云郤克免丑父而公羊謂斮之其傳聞固不同矣然左氏嘗見國史叙事稍實於公羊故多取左氏云榖梁曰其日或曰日其戰也或曰日其悉也曹無大夫其曰公子何也以吾之四大夫在焉舉其貴者也鞌去國五百里爰婁去國五十里一戰綿地五百里焚雍門之茨侵車東至海君子聞之曰夫甚甚之辭焉齊有以取之也齊之有以取之何也敗衛師于新築侵我北鄙敖郤獻子齊有以取之也爰婁在師之外郤克曰反魯衛之侵地以紀侯之甗来以蕭同姪子之母為質使耕者皆東其畝然後與子盟國佐曰反魯衛之侵地以紀侯之甗来則諾以蕭同姪子之母為質則是齊侯之母也齊侯之母猶晉君之母也晉君之母猶齊侯之母也使耕者盡東其畝則是終土齊也不可請一戰一戰不勝請再再不克請三三不克請四四不克請五五不克舉國而授於是而與之盟趙氏曰春秋之作所以辨邪正明是非豈獨當於内哉據稱公子即為命卿但以國小之故請命於王者少耳惟此與昭二十年公孫㑹凡二人爾其他無事不見於經不得謂之無大夫也愚謂榖梁曰日其悉也無理之甚者春秋一大夫帥師者未嘗不日也豈悉然後日哉其曰以吾之四大夫在焉舉其貴者尤無理之甚者使魯侯往将舉曹伯以當之乎其曰曹無大夫辨見公羊八月壬午宋公鮑卒左氏曰八月宋文公卒始厚𦵏用蜃炭益車馬始用殉重器備槨有四阿棺有翰檜君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君於惡也何臣之為案宋七月而𦵏僭天子之禮則此事或有之然非本義不録庚寅衛侯速卒左氏曰衛穆公卒晉三子自役弔焉哭於大門之外衛人逆之婦人哭於門内送亦如之遂常以𦵏非本義不録十有一月公㑹楚公子嬰齊于蜀左氏曰彭名御戎蔡景公為左許靈公為右二君弱皆强冠之冬楚師侵衛遂侵我師于蜀使臧孫往辭曰楚逺而久固将退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斵執鍼織紝皆百人公衡為質以請盟楚人許平案楚師侵蜀魯人賂楚公衡為質皆與經意不合丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀左氏曰十一月公及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寜衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乗楚車也謂之失位君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯况其下乎詩曰不解于位民之攸暨其是之謂矣楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴以棄魯國國将若之何誰居後之人必有任是夫國棄矣是行也晉辟楚畏其衆也君子曰衆之不可以己也大夫為政猶以衆克况明君而善用其衆乎泰誓所謂商兆民離周十人同者衆也王氏曰左氏以為卿不書畏晉而竊盟者非也何則魯衛陳鄭誠畏於晉矣然楚人秦人孰晉之畏哉况下文云是行也晉辟楚畏其衆也豈可謂反畏乎晉哉此乃自相矛盾之說愚謂蔡景許靈果従楚伐衛經當書曰楚蔡陳鄭侵衛不應獨稱鄭師也又如蔡許預盟經亦當列舉蔡許之君左氏謂乗楚車而不書又引君子曰以證之何足據哉夷狄猾夏君子所惡况公子嬰齊専兵哉而左氏又引君子曰以賛之其附㑹至此公羊曰此楚公子嬰齊也其稱人何得一貶焉爾劉氏曰吾不識此語得貶云者竟何事也吾欲聞之榖梁曰楚無大夫其曰公子何也嬰齊亢也楚其稱人何也於是而後公得其所也㑹與盟同月則地㑹不地盟不同月則地㑹地盟此其地㑹地盟何也以公得其所申其事也今之屈向之驕也劉氏曰榖梁曰其曰公子何也亢也非也向者及處父盟去處父之氏以明亢今此更益嬰齊之氏亦以明亢二者孰能别之乎且榖梁以楚無大夫其有大夫者進也狄雖見經尚未得氏以明許夷狄者不一而足今反以驕亢之人而進之有氏是褒貶亂矣何以為春秋又曰㑹時一國盟時十一國十一月公㑹楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀此乃兩㑹各自書地乃其理矣何申之有愚謂榖梁意謂前書公子嬰齊為驕則為公不得其所後書楚人為屈則為公得其所以此地㑹地盟附㑹穿鑿反亂經㫖以迷後學罪孰甚焉三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭左氏曰諸侯伐鄭次于伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戍如楚獻㨗葉氏曰邲之役在宣十二年晉本以救鄭而師自敗非鄭之罪也盖晉敗而鄭復從楚故十四年書晉侯伐鄭𫝊曰為邲故也安有更七年而復討乎此盖為二年冬楚師鄭師侵衛故爾非討邲也愚案鄭敗諸侯之師經當有見知左氏妄也甲子新宫災三日哭公羊曰宣宫則曷為謂之新宫不忍言也其言三日哭何廟災三日哭禮也新宫災何以書記災也案宣公初入廟故當時謂之新宫魯史因而書之要之謂之宣宫亦可也夫人子既稱其諡矣何必不忍言哉杜氏崔氏得其㫖矣又三日哭如得禮則春秋以為常事在所不書今書之以其反常也獻可得其㫖矣又新宫災不特記災而已見天誅焉髙氏得其㫖矣榖梁曰新宫者禰宫也三日哭哀也其哀禮也迫近不敢稱諡恭也其辭恭且哀以成公為無譏矣成公無譏則春秋不書以其常事故也今書則成公亦不免於譏矣豈可謂無譏乎大抵榖梁之說即公羊之意而衍之者歟夏公如晉左氏曰夏公如晉拜汶陽之田公始除喪事伯主以天子之禮而一往朝焉左氏以為拜汶陽之田豈其意之而為此言歟秋叔孫僑如帥師圍棘公羊曰棘者何汶陽之不服邑也其言圍之何不聽也此訓詁或然但不言其義冬十有一月晉侯使荀庚来聘衛侯使孫良夫来聘丙午及荀庚盟丁未及孫良夫盟左氏曰十一月晉侯使荀庚来聘且尋盟衛侯使孫良夫来聘且尋盟丙午盟晉丁未盟衛禮也存耕趙氏曰晉衛之卿同時而至乃從而二之畏晉卑衛也左氏以為禮不已過乎愚謂左氏曰且尋盟非也盖左氏見聘而盟故自謂此言耳春秋所書盖責其専耳公羊曰此聘也其言盟何聘而言盟者尋舊盟也此有何義而以解經乎榖梁曰其日公也来聘而求盟不言及者以國與之也不言其人亦以國與之也不言求兩欲之也案盟有君及之者臣及之者君及之則君為主臣及之則臣為主榖梁乃謂不言及為以國與之非義也徐邈謂不言及謂凡書来盟者也然則何闗於晉衛之盟而附其說於此乎凡盟有彼欲之者有我欲之者有兩欲之者春秋未有書求者也何必發此例乎四年夏公如晉左氏曰公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天維顯思命不易哉夫晉侯之命在諸侯矣可不敬乎非本義不録秋公至自晉左氏曰公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聽焉未可以貳史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止非本義不録鄭伯伐許左氏曰鄭公孫申帥師疆許田許人敗諸辰陂鄭伯伐許取鉏任泠敦之田案許人敗鄭師鄭取鉏任泠敦之田於經無見且鄭三伐許此未必因許敗鄭師也五年春王正月杞叔姬来歸榖梁曰婦人之義嫁曰歸反曰来歸榖梁言反曰来歸不知以反為出耶為歸寜耶夏叔孫僑如㑹晉荀首于榖左氏曰晉荀首如齊逆女故宣伯餫諸榖此謂大夫専政别有所謀耳逆女而㑹未可信也梁山崩左氏曰梁山崩晉侯以傳召伯宗伯宗辟重曰辟𫝊重人曰待我不如㨗之速也問其所曰絳人也問絳事焉曰梁山崩将召伯宗謀之問将若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而従之康侯胡氏曰左氏載絳人之語於禮文備矣而未紀其實夫降服乗縵徹樂出次祝幣史辭六者禮之文也古之遭變異而外為此文者必有恐懼修省欲銷去之實也徒舉其文而無實以先之何足以弭灾變乎公羊曰梁山者何河上之山也梁山崩何以書記異也何異爾大也何大爾梁山崩壅河三日不㳅外異不書此何以書為天下記異也劉氏曰外異不書非也迷於百二十國寳書不知據魯史爾愚案河三日不㳅妄也其言為天下記異則然矣已見沙麓崩兹不再録榖梁曰不日何也髙者有崩道也有崩道則何以書也梁山崩壅遏河三日不流晉君召伯尊而問焉伯尊来遇輦者輦者不避使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯尊下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯尊曰君為此召我也為之奈何輦者曰天有山天崩之天有河天壅之雖召伯尊如之何伯尊由忠問焉輦者曰君親素縞帥羣臣而哭之既而祠焉斯流矣伯尊至君問之曰梁山崩壅遏河三日不流為之奈何伯尊曰君親素縞帥羣臣而哭之既而祠焉斯流矣孔子聞之曰伯尊其無績乎攘善也劉氏曰榖梁此文似云山有崩道崩不足書今以晉侯問伯尊故獨書也是豈春秋意邪愚案河三日不流縞素哭之而祠焉斯流矣乃齊東野人之語夫山崩未必塞大河素縞哭而祠之豈有即流之理哉使實塞河經當有見然則輦者之言初非典禮初無妙理伯尊何必竊取為已善孔子何必譏伯尊為攘善哉十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢左氏曰諸侯謀復㑹宋公使向為人辭以子靈之難左氏豈以次年魯衛侵宋而為此言歟夫魯衛之侵宋安知非他故哉六年二月辛巳立武宫左氏曰季文子以鞌之功立武宫非禮也聽於人以救其難不可以立武立武由己非由人也啖氏曰傳意以為武軍之宫如楚子所立者非也宣十二年楚自邲戰回作先君宫告成事若然煬宫復何謂乎劉氏曰左氏以武宫為武軍杜氏知其謬妄因䕶曰既立武軍又作先君武公之宫然𫝊無先君武公之語要之二說皆非左氏欲解經誤以武宫為武軍杜氏欲解𫝊遂取武軍為武宫此難以通者也公羊曰立者何立者不宜立也立武宫非禮也公羊謂不宜立又謂非禮是已但少明言其故耳榖梁曰立者不宜立也此承公羊之餘而又畧者也取鄟左氏曰取鄟言易也辨見宣九年取根牟公羊曰鄟者何邾婁之邑也曷為不繫于邾婁諱亟也若諱亟則不如勿書既書之何必去邾婁為諱乎榖梁曰鄟國也衛孫良夫帥師侵宋左氏曰三月晉伯宗夏陽説衛孫良夫甯相鄭人伊雒之戎陸渾蠻氏侵宋以其辭㑹也師于鍼衛人不保說欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛惟信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止師還衛人登陴葉氏曰此事與經絶不相類經書衛而不書晉如杜預言晉不告或可也二國既同侵宋何為反自相襲據伯宗言衛惟信晉故師在其郊而不設備若然是晉侵宋師過衛境而襲之然亦不得言晉衛侵宋傳之言首尾自相戾愚案又如鄭人伊雒之戎陸渾蠻氏同侵宋經亦當書以見諸侯引夷狄猾夏矣今經但言衛左氏皆妄也冬季孫行父如晉左氏曰晉人謀去故絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬國利君樂不可失也韓獻子将新中軍且為僕大夫公揖而入獻子従公立於寝庭謂獻子曰何如對曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘於是乎有沉溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡且民従教十世之利也夫山澤林盬國之寳也國饒則民驕佚近寳公室乃貧不可為樂公説從之夏四月丁丑晉遷于新田冬季文子如晉賀遷也劉氏曰晉之遷也必告於魯魯則往賀矣使晉不告魯安得而賀之今晉告而遷經不書何邪衛遷於帝丘蔡遷於州来魯無賀者猶書於策晉為盟主魯所服事遷國而賀何以不書也意者晉實無遷事乎晉欒書帥師救鄭左氏曰楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子将許之知荘子范文子韓獻子諫曰不可吾来救鄭楚師去我吾遂至於以是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政将酌於民者也子之位十一人其不欲戰者三人而已欲戰可謂衆矣商書曰三人占從二人衆故也武子曰善均從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎杜氏曰為八年晉侵蔡傳愚案八年拒今首尾三年不應牽彼售此也夫受命救鄭而遂侵蔡豈為無罪春秋豈不可書而經無之乎此其可疑者也七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛榖梁曰不言日急辭也過有司也郊牛日展斛角而知傷展道盡矣其所以備災之道不盡也又有繼之辭也其緩辭也曰亡乎人矣非人之所能也所以免有司之過也乃者亡乎人之辭也免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然免牲不曰不郊免牛亦然劉氏曰又有繼之辭也此亦常耳何足以多解又曰其緩辭也非也前云鼷鼠食郊牛角者文不可言其角非不緩也今云其角者亦文當如此非故緩也又曰所以免有司之過也亦非也春秋記災異刺譏時君且明鬼神享徳所以鈎深致逺者微矣豈為免有司之過乎又曰免牛者為之緇衣纁裳有司奉送至於南郊未必然也雖禮典散滅不可考校至於牛衣人衣服如何襲被乎凡郊牛稷牛必皆在滌三月滌者牢也今既有傷則不復在滌是為免之其不免者是留以須後郊非禮不敬故春秋亦譏焉不如榖梁所説作𤣥衣纁裳有司送至於南郊也未訥趙氏曰改卜牛而又食其角天示譴也說者以為養牲不謹非也天豈享僭哉吴伐郯左氏曰詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣凡左氏言君子曰者皆自為之言也此其稍近理者也其引詩則無義冬大雩榖梁曰雩不月而時非之也冬無為雩也衛孫林父出奔晉左氏曰衛定公惡孫林父冬孫林父出奔晉衛侯如晉晉返戚焉案左氏言晉返戚則是林父以戚出奔也經何不書衛孫林父以戚出奔乎然則左氏妄也八年春晉侯使韓穿来言汶陽之田歸之于齊公羊曰来言者何内辭也脅我使我歸之也曷為使我歸之鞌之戰齊師大敗齊侯歸弔死視疾七年不飲酒不食肉晉侯聞之曰嘻奈何使人之君七年不飲酒不食肉請皆反其所取侵地劉氏曰此直書其事耳亦何内辭哉又云鞌之戰齊侯弔死視疾七年不飲酒不食肉亦妄也如齊侯遂能若此國人歸之諸侯畏之死何以復諡頃公乎榖梁曰于齊緩辭也不使盡我也劉氏曰此直記事以刺晉爾不使盡我了無所用也晉欒書帥師侵蔡左氏曰晉欒書侵蔡遂侵楚䕶申驪楚師之還也晉侵沈獲沈子揖初從知范韓也君子曰從善如流宜哉詩曰愷悌君子遐不作人求善也夫作人斯有功績矣是行也鄭伯将㑹晉師門于許東門大獲焉案欒書果侵楚經必書之今不書是無其事也又案左氏謂楚師還晉侵沈是指六年楚伐鄭晉救鄭之時是時左氏但言晉師還而侵蔡不書侵沈也至此又言侵沈獲沈子揖且欒書従知韓范之言何必於此追頌之乎夫不與楚戰固可取也苟侵蔡又侵沈則是畏大而弱小也何善之可頌哉公孫嬰齊如莒左氏曰聲伯如莒逆也案嬰齊如莒之後晉魯伐郯安知此如不為通好謀伐郯乎逆之言未可據也夏宋公使公孫夀来納幣左氏曰夏宋公使公孫夀来納幣禮也趙氏曰婚禮不當使公孫也陸氏曰婚禮而使公孫非也若合禮則常事不書公羊曰納幣不書此何以書録伯姬也劉氏曰非也伯姬當此時未有可賢者豈可先事褒之哉秋七月天子使召伯来錫公命榖梁曰禮有受命無来錫命錫命非正也曰天子何也曰見一稱也劉氏曰見一稱也言欲見天子與天王各為一稱不亦淺乎禮有受命無来錫命辨見文元年冬十月癸夘杞叔姬卒左氏曰杞叔姬卒來歸自杞故書葉氏曰女出則夫家之義已絶自不得以夫人書卒此齊子叔姬郯伯姬所以皆不書卒也杞何以得獨書乎盖明年復逆其喪以歸杜預謂憫其見出来歸故書若更適大夫則不書此附㑹之辭也衛人来媵左氏曰衛人来媵共姬禮也凡諸侯嫁女同姓媵之異姓則否啖氏曰若然則莒姓已邾姓曹此二國同姓至少假令嫁女孰為媵乎恐此禮難行今不取趙氏曰啖難之誠為當若實異姓則否不合媵則成十年直云齊人来媵足知非禮何假先書衛乎所以先書二國者九女既足而来媵所以為失劉氏曰諸侯三歸歸名一族自同姓耳若嬴曹䢵姒媯戈之君嫁女者必同姓媵則諸侯之媵或不能備矣公羊曰媵不書此何以書録伯姬也劉氏曰公羊説與納幣同非也榖梁曰媵淺事也不志此其志何也以伯姬之不得其所故盡其事也劉氏曰非也伯姬雖賢春秋一褒其身已足矣又何為及其媵哉凡春秋所急者禮也所制者欲也以禮制欲則治以欲敗禮則亂而諸侯娶十二女則是以欲敗禮矣故春秋備書之所以戒也非賢伯姬以亂禮也愚謂况春秋無褒伯姬未必賢乎九年春王正月杞伯来逆叔姬之喪以歸左氏曰春杞桓公来逆叔姬之喪請之也杞叔姬卒為杞故也逆叔姬為我也葉氏曰夫婦之道既絶則不可復合不為伋也妻則不為白也每豈可歸為魯女猶得為我而復為杞伯妻乎非知禮者之言也公羊曰杞伯曷為来逆叔姬之喪以歸内辭也脅而歸之也案左氏言請之公羊言脅而歸之經傳皆無所考意之之辭耳借使魯請之脅歸之杞魯之罪亦不可逃也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲左氏曰是行也将始㑹吴吴人不至未詳信否夏季孫行父如宋致女左氏曰夏季文子如宋致女復命公享之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦縁衣之卒章而入以事信否未可知以非未義不録公羊曰未有言致女者此其言致女何録伯姬也案公羊所謂録伯姬者謂其賢也使伯姬賢何必録致女之事乎致女常事耳不足以見伯姬之賢也榖梁曰致者不致者也婦人在家制於父既嫁制於夫如宋致女是以我盡之也不正故不與内稱也逆者微故致女詳其事賢伯姬也劉氏曰榖梁曰是以我盡之也非也榖梁言宋共公失徳不𦵏者以其與伯姬不相入也既我能盡之何故不相入乎又曰不正故不與内稱也說者云内稱謂稱使案内大夫受命而出無稱使者假令與内稱則曰公使季孫行父如宋致女乎又曰逆者微故致女詳其事賢伯姬也亦非也榖梁向云致者不致也譏以我盡之今又云詳其事賢伯姬若實賢伯姬則致女為伯姬發非譏魯也若實譏魯則致女為譏魯發非賢伯姬也二者孰能知之乎晉人来媵左氏曰晉人来媵禮也公羊曰媵不書此何以書録伯姬也榖梁曰媵淺事也不志此其志何也以伯姬之不得其所故盡其事也三𫝊辨並見衛人来媵晉人執鄭伯晉欒書帥師伐鄭左氏曰鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也楚子重侵陳以救鄭案晉殺伯蠲楚侵陳救鄭之事經皆可書者也而無有焉此其可疑者也榖梁曰不言戰以鄭伯也為尊者諱恥為賢者諱過為親者諱疾劉氏曰不言戰以鄭伯也非也春秋伐而不戰多矣豈伐則必戰乎且晉實不執鄭伯以伐鄭何以能必其以鄭伯乎此皆妄説也又曰為親者諱疾亦非也執其君以伐其國無道甚矣何故諱之乎楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆左氏曰君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不脩城郭浃辰之間而楚克其三都無備也夫詩曰雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃凡百君子莫不代匱言備之不可以已也凡此皆左氏自賛之詞夫不責楚之暴寡而専責莒之無備過矣榖梁曰其日莒雖夷狄猶中國也大夫潰莒而之楚是以知其上為事也惡之故謹而日之也劉氏曰其日莒雖夷狄猶中國也然則蔡亦中國蔡潰何故不日乎又曰大夫潰莒而之楚亦非也經但云莒潰不云之楚榖梁安所受此語乎且潰者非大夫所為何故専以大夫解之乎此似不曉潰之説凡潰者取其如水之决耳城中城左氏曰書時也春秋豈有與其城之之理哉但得時者其罪稍輕耳然左氏猶以夏正言也榖梁曰城中城者非外民也劉氏曰非也若不外民則都不為城郭乎則與夷狄何異哉夷狄可謂不外民乎葉氏曰蓋是時楚方伐莒莒潰楚人入鄆我無素備畏逼而恃城以為守故雖時猶書非謂時也中城者内城也外城不壊内城壊則内城可不脩乎非棄外城之民而不恤也十年夏四月五卜郊不從乃不郊榖梁曰夏四月不時也五卜强也乃者亡乎人之辭也經書五卜郊其義豈止不時而已乃者亡乎人之辭辨見宣三年如不郊五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭左氏曰鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立太子州蒲以為君而㑹諸侯伐鄭鄭子罕賂以襄鍾子然盟于脩澤子駟為質辛巳鄭伯歸葉氏曰晉侯生而立其子是禪之也厯春秋未見有為此者審有之亦大事矣經何無異文以示義乎凡諸侯出奔有二君者未嘗不書名以為别今獳一晉侯也州蒲亦一晉侯也經但書公㑹晉侯安知其為州蒲而非獳乎以𫝊蔽於大厲之妄謂晉侯先有疾不得㑹故因為是言也朴郷吕氏曰信經足矣愚謂晉果歸鄭伯經亦當書以示義如僖二十八年曹伯襄復歸於曹僖二十八年衛侯鄭歸於衛之類今經不書則不特立州蒲不可信歸鄭伯亦誣也或謂歸鄭伯不書者晉不以告鄭不告入也夫成公既㑹晉侯伐鄭而歸鄭伯矣豈有不知而不書之理而晉何必告魯鄭何必告入哉齊人来媵公羊曰媵不書此何以書録伯姬也三國来媵非禮也曷為皆以録伯姬之辭言之婦人以衆多為侈也案公羊既以三國来媵為非禮曷為又以録伯姬言之曷為又以婦人以衆多為侈言之丙午晉侯獳卒左氏曰晉侯夢大厲被髪及地摶膺而踴曰殺余孫不義余得請於帝矣壊大門及寝門而入公懼入於室又壊戸公覺召桑田巫巫言如夢公曰何如曰不食新矣公疾病求醫於秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之上若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之将食張如厠陷而卒小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉存耕趙氏曰傳言病在膏肓則有之二豎之語左氏何其誣邪愚謂景公既食麥而殺桑田巫猶可信也未食麥而即先殺之亦無是理小臣夢負公以登天事既驗矣焉得殉皆齊東野人之語而左氏雜採之以為𫝊使後人疑焉然使可信亦非本義十有一年晉侯使郤犨来聘己丑及郤犫盟左氏曰郤犫来聘且涖盟如左氏言郤犫来聘且涖盟則是晉侯使之臨盟經當書曰晉侯使郤犫来盟今經曰来聘己丑始及郤犫盟則是本来聘而自為盟也左氏不達經意妄為之辭左氏於荀庚来聘亦曰荀庚来聘且尋盟原左氏意以有聘且盟之辭然猶可謂荀庚而尋舊盟故自為盟也至此云涖盟則是明其為晉侯使也去經亦逺矣夏季孫行父如晉左氏曰夏季文子如晉報聘且涖盟也劉氏曰晉侯使郤犫来聘己丑及郤犫盟左氏曰郤犫来聘且涖盟季孫行父如晉左氏曰報聘且涖盟然則經何以不云涖盟邪杜云郤犫文子交盟晉魯之君其意一也故但書来盟舉重畧輕不識聘禮重邪盟禮重邪若聘禮重盟禮輕畧盟可也向者郤犫之盟又何故不畧乎若盟禮重聘禮輕是不得畧盟矣若盟與聘俱重書如晉涖盟豈不明白哉三傳辨疑卷十三
