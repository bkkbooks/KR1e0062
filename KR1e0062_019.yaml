body:
  text: 三傳辨疑卷十九元程端學撰定公元年春王三月晉人執宋仲幾于京師公羊曰定何以無正月正月者正即位也定無正月者即位後也即位何以後昭公在外得入不得入未可知也曷為未可知在季氏也定哀多微辭主人習其讀而問其傳則未知己有之罪焉爾仲幾之罪何不蓑城也其言于京師何伯討也伯討則其稱人何貶曷為貶不與大夫專執也曷為不與實與而文不與文曷為不與大夫之義不得專執也一公之始雖無事自當書正月觀隱公莊公可見矣今不書者以定公未立而三月有宋仲幾之事故書王三月耳初無深義學者能以王三月作一句讀之其義自悉而公羊所謂正即位者可不辨而明矣又使經言歸于京師猶可言伯討今言執于京師則晉人自京師執仲幾歸晉耳何得謂伯討哉況伯討之云亦非本意其稱人者文法然也何貶之有若實與文不與辨前見矣穀梁曰不言正月定無正也定之無正何也昭公之終非正終也定之始非正始也昭無正終故定無正始不言即位喪在外也大夫其曰人何也微之也何為微之不正其執人於尊者之所也不與大夫之伯討也昭無正終自定而正始夫亦何傷而不書正月乎且定公即位在六月理宜書於六月之下此何必問不言即位乎春秋書執無問君與大夫皆稱人如齊人執袁濤塗晉人執衛侯之類可見矣何獨於此微之是皆一字褒貶之弊夏六月癸亥公之喪至自乾侯戊辰公即位公羊曰癸亥公之喪至自乾侯則曷為以戊辰之日然後即位正棺於兩楹之間然後即位子沈子曰定君乎國然後即位即位不日何以日録乎內也季氏逐君公羊聞之熟矣嗣君廢置遲速皆在季氏公羊猶未之覺而云正棺兩楹之間然後即位乎凡公即位在正月一日故不書日今在六月戊辰故書日耳非録內也茍曰録內則凡不書日者非録內乎榖梁曰殯然後即位也定無正見無以正也踰年不言即位是有故公也言即位是無故公也即位授受之道也先君無正終則後君無正始也先君有正終則後君有正始也戊辰公即位謹之也定之即位不可不察也公即位何以日也戊辰之日然後即位也癸亥公之喪至自乾侯何為戊辰之日然後即位也正君乎國然後即位也沈子曰正棺乎兩楹之間然後即位也內之大事日即位君之大事也其不日何也以年決者不以日決也此則其日何也著之也何著焉踰年即位厲也於厲之中又有義焉未殯雖有天子之命猶不敢況臨諸臣乎周人有喪魯人有喪周人弔魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也故周人弔魯人不弔以其下成康為未久也君至尊也去父之殯而往弔猶不敢況未殯而臨諸臣乎定公在六月即位故不書正月耳非見無以正也餘見公羊九月大雩榖梁曰雩月雩之正也秋大雩非正也冬大雩非正也秋大雩雩之為非正何也毛澤未盡人力未竭未可以雩也雩月雩之正也月之為雩之正何也其時窮人力盡然後雩雩之正也何為其時窮人力盡是月不雨則無及矣是年不艾則無食矣是謂其時窮人力盡也雩之必待其時窮人力盡何也雩者為旱求者也求者請也古之人重請何重乎請人之所以為人者讓也請道去讓也則是舍其所以為人也是以重之焉請哉請乎應上公古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉夫請者非可以詒託而往也必親之者也是以重之以日月為例而論大雩反覆一二百言無一語益於經不惟無益而反害之立煬宫榖梁曰立者不宜立者也此訓詁近之冬十月隕霜殺菽公羊曰何以書記異也此災菽也曷為以異書異大乎災也按災有小大異亦有小大未可以異大乎災也榖梁曰未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也此説雖無深義亦可粗通但言未可以殺疑亦以十月為周八月為未安耳二年夏五月壬辰雉門及兩觀災公羊曰其言雉門及兩觀災何兩觀微也然則曷為不言雉門災及兩觀主災者兩觀也主災者兩觀則曷為後言之不以微及大也何以書記災也劉氏曰公羊云曷為不言雉門災及兩觀此問非也新作可序上不可序下災可序下不可序上此亦制作之常理何足致疑而問之乎榖梁曰其不曰雉門災及兩觀何也災自兩觀始也不以尊者親災也先言雉門尊尊也辨見公羊秋楚人伐吳左氏曰遂圍巢克之獲楚公子繁經不書未詳信否冬十月新作雉門及兩觀公羊曰其言新作之何修舊也修舊不書此何以書譏何譏爾不務乎公室也兩觀僣天子禮遇天災而不懼又新作之豈特譏其不務公室而已穀梁曰言新有舊也作為也有加其度也此不正其以尊者親之何也雖不正也於美猶可也自此不正以下不惟無所發明文亦不通三年春二月辛卯邾子穿卒左氏曰二月辛卯邾子在門臺臨廷閽以瓶水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于床廢于爐炭爛遂卒先葬以車五乘殉五人莊公卞急而好潔故及是此事不特非本義亦恐未必然也冬仲孫何忌及邾子盟于拔左氏曰冬盟于郯修邾好也於經無所發明四年春三月公會劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵宋左氏曰三年冬蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽焉子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗曰君以弄馬之故隱君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚四年春三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言于范獻子曰國家方危諸侯方二將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旌於鄭鄭人與之明日或斾以會晉於是乎失諸侯葉氏曰前年記蔡昭侯如楚囊瓦求佩不得止之三年如晉以其子元與大夫之子為質而請伐楚故今為召陵之會而以劉子臨之則晉為之請于王而行矣所以經書伐楚豈謀伐楚哉謀者事未成也事已成則何謀之云且繼書盟于皋鼬是侵楚未得志恐諸侯有二心而復堅之今乃傅會荀寅求貨不得言於范獻子而辭蔡侯且會而不侵為之謀而弗成辭蔡侯可矣既已言侵則安得謂之辭乎此左傳見後獨書蔡以吳子與楚戰故云爾以理考之晉以荀寅之言辭蔡當為楚人圍蔡之事而誤以為召陵也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之左氏曰沈人不會于召陵晉人使蔡伐之夏蔡滅沈葉氏曰沈本屬楚不會非晉之所得討若據左傳晉辭蔡伐楚安能復使蔡伐沈哉五月公及諸侯盟于皋鼬左氏曰將會衛子行敬子言於靈公曰會同難嘖有煩言莫之治也其使祝他從公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行祓社釁鼓祝奉以從於是乎出竟若嘉好之事君行師從卿行旅從臣無事焉公曰行也及皋鼬將長蔡於衛衛侯使祝他私於萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下於周為睦分魯公以大路大旗夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命于周是使之職事于魯以昭周公之明德分之土田陪敦祝宗卜史備物典䇿官司彛器因商奄之民命以伯禽而封於少皥之虛分康叔以大路少帛綪茷旃旌大吕殷民七族陶氏施氏繁氏錡氏樊氏飢氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以會王之東搜聃季授土陶叔授民命以康誥而封於殷虛皆啓以商政疆以周索分唐叔以大路密須之鼓闕鞏姑洗懷姓九宗職官五正命以唐誥而封於夏虛啓以夏正疆以戎索三者皆叔也而有令德故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室王於是乎殺管叔而蔡蔡叔以車七乘徒七十人其子蔡仲改行帥德周公舉之以為己卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為太宰康叔為司寇聃季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸非尚年也今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其德將如之何萇𢎞説告劉子與范獻子謀之乃長衛侯於盟非本義不録榖梁曰後而再會公志於後會也後志疑也榖梁見再書公及故為公志於後會耳非有所據劉卷卒公羊曰外大夫不卒此何以卒我主之也書卒者以劉子嘗交諸侯故以赴告而魯會其卒耳非我主其卒也然失禮矣至何氏有主魯之説則又鑿矣榖梁曰此不卒而卒者賢之也寰內諸侯也非列諸侯此何以卒也天王崩為諸侯主也劉氏曰所謂天王則昭二十二年景王矣為諸侯主則劉子單子以王猛居於皇是矣愚謂主諸侯者天子也大夫者輔天子者也王猛居皇之時劉子雖執一時之權豈可赴告諸侯而諸侯亦豈可會其卒哉如榖梁言則是春秋既許劉卷卒矣又許赴告諸侯又許諸侯會其卒也豈為三代之禮哉楚人圍蔡左氏曰秋楚為沈故圍蔡蔡同諸侯侵楚矣今楚豈為沈故圍蔡哉辨又見四月蔡滅沈葬劉文公公羊曰外大夫不書葬此何以書録我主也辨見劉卷卒冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績公羊曰吳何以稱子夷狄也而憂中國其憂中國奈何伍子胥父誅乎楚挾弓而去楚以干闔廬闔廬曰士之甚勇之甚將為之興師而復讎于楚伍子胥復曰諸侯不為匹夫興師且臣聞之事君猶事父也虧君之義復父之讎臣不為也於是止蔡昭公朝乎楚有美裘焉囊瓦求之昭公不與為是拘昭公於南郢數年然後歸之於其歸焉用事乎河曰天下諸侯苟有能伐楚者寡人請為之前列楚人聞之怒為是興師使囊瓦將而伐蔡蔡請救于吳伍子胥復曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣於是興師而救蔡曰事君猶事父也此其為可復讎奈何曰父不受誅子復讎可也父受誅子復讎推刃之道也復讎不除害朋友相衛而不相迿古之道也按夷狄雖大曰子吳本子爵今稱蔡侯以吳子紀爵耳而公羊就稱子上生義謂其有憂中國之心夫楚與吳皆夷狄也夷狄相攻強弱相勝而已豈有憂中國之心哉設使有之亦不在稱子見義是皆一字褒貶之弊也如復讎不除害等語尤不近理榖梁曰吳其稱子何也以蔡侯之以之舉其貴者也蔡侯之以之則其舉貴者何也吳信中國而攘夷狄吳進矣其信中國而攘夷狄奈何子胥父誅于楚也挾弓持矢而干闔廬闔廬曰大之甚勇之甚為是欲興師而伐楚子胥諫曰臣聞之君不為匹夫興師且事君猶事父也虧君之義復父之讎臣弗為也於是止蔡昭公朝於楚有美裘正是日囊瓦求之昭公不與為是拘昭公於南郢數年然後得歸歸乃用事乎漢曰苟諸侯有欲伐楚者寡人請為前列焉楚人聞之而怒為是興師而伐蔡蔡請救于吳子胥曰蔡非有罪楚無道也君若有憂中國之心則若此時可矣為是興師而伐楚何以不言救也救大也劉氏曰榖梁曰救大云夷狄漸進未可同於中國此妄矣狄人救齊榖梁以謂功近而德逺不唯得稱救而已又進之稱人曽謂吳不如狄乎何其賞罰之偏也愚謂榖梁亦就稱子生義其弊與公羊同其後序吳為子胥伐楚事亦同獨以蔡侯之以之舉其貴者與公羊異而其繆亦與公羊同庚辰吳入郢左氏曰子期子蒲滅唐未詳信否公羊曰吳何以不稱子反夷狄也其反夷狄奈何君舍于君室大夫舍于大夫室蓋妻楚王之母也陳嶽氏曰上書柏舉之戰楚師敗績是以乘勝入郢春秋書法因上有吳子及楚人下省其文不復曰吳子何異乎升黜哉榖梁曰日入易無楚也易無楚者壞宗廟徙陳器撻平王之墓何以不言滅也欲存楚也其欲存楚奈何昭王之軍敗而逃父老送之曰寡人不肖亡先君之邑父老反矣何憂無君寡人且用此入海矣父老曰有君如此其賢也以衆不如吳以必死不如楚相與擊之一夜而三敗吳人復立何以謂之吳也狄之也何謂狄之也君居其君之寢而妻其君之妻大夫居其大夫之寢而妻其大夫之妻蓋有欲妻楚王之母者不正乘敗人之績而深為利居人之國故反其狄道也劉氏曰欲存楚也非也楚入未滅當言入而已矣豈春秋固存之哉餘見公羊五年夏歸粟于蔡左氏曰夏歸粟于蔡以周亟矜無資左氏知歸粟為周亟矜無資而不知魯所以歸粟之意又不知聖人書此之意是不知言也公羊曰孰歸之諸侯歸之曷為不言諸侯歸之離至不可得而序故言我也雖離至不可得而序獨不可總言諸侯乎今不書諸侯魯自歸耳榖梁曰諸侯無粟諸侯相歸粟正也孰歸之諸侯也不言歸之者專辭也義邇也果義邇也言諸侯亦何傷哉蓋魯畏吳蔡而自歸耳諸侯之歸不歸吾不能知也榖梁但知歸粟之為正而不知有畏而歸之為非正於越入吳公羊曰於越者何越者何於越者未能以其名通者也越者能以其名通者也若稱於越在昭公時越在定哀時猶可如公羊説前未能以名通故稱於越後以名通故稱越今稱越在昭公時稱於越在哀公時苟如公羊説則前能以名通後反不能以名通也此何理哉若何氏釋此傳又穿鑿之尤者又不足辨也六月丙申季孫意如卒左氏曰六月季平子行東野還未至丙申卒于房陽虎將以璠璵斂仲梁懷弗與曰改步改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既葬桓子行東野及費子泄為費宰逆勞於郊桓子敬之勞仲梁懷仲梁懷弗敬子泄怒謂陽虎子行之乎九月乙亥陽虎囚季桓子及公父文伯而逐仲梁懷冬十月丁亥殺公何藐己丑盟桓子於稷門之內庚寅大詛逐公父歜及秦遄皆奔齊非本義不録六年春二月公侵鄭左氏曰二月公侵鄭取匡為晉討鄭之伐胥靡也往不假道於衛及還陽虎使季孟自南門入出自東門舍於豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎成之昭兆定之鞶鑑苟可以納之擇用一焉公子與二三臣之子諸侯苟憂之將以為之質此羣臣之所聞也今將以小忿蒙舊德無乃不可乎大姒之子唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止四月周儋翩率王子朝之徒因鄭人將作亂于周鄭於是乎伐馮滑胥靡負黍狐人闕外六月晉閻沒戍周且城胥靡冬十二月天王處于姑蕕辟儋翩之亂也葉氏曰後四月左傳記儋翩率王子朝之徒因鄭人將以作亂鄭於是伐馮滑胥靡負黍狐人闕外六月晉閻沒戌周且城胥靡則胥靡之役後此月矣安得先討之乎杜預謂鄭伐周在魯伐鄭先為戍周起故後書是不然傳記王人殺子朝于楚在去年春若儋翩因此而亂晉欲救周豈踰年而後始城胥靡乎此公侵鄭未必為晉討也愚謂取匡之事亦不經見夏季孫斯仲孫何忌如晉左氏曰夏季桓子如晉獻鄭俘也陽虎強使孟懿子往報夫人之幣晉人兼享之葉氏曰俘戰獲也前但侵鄭而已安得有俘乎禮無鄰國通夫人之幣且自定以來晉未嘗聘魯魯何幣之報乎審如左傳言獻俘報幣自是二事亦不得並書據後言孟孫立於房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君與其上二事不類此蓋欲去季氏懼不克則奔晉假公命以二卿為使先為之約故言先君猶仲遂欲立宣公與叔孫得臣如齊亦二卿魯以二卿並聘唯此兩見爾何以知其假公命以先君為辭則非陽虎之言矣蓋是時國命已在陽虎雖季孟皆為之制虎雖謀季氏而未必知之亦幸其去魯故強為之行而孟懿子獨與之致意也愚按左説非矣葉説亦未詳其必然也冬城中城榖梁曰或曰非外民也辨見成九年季孫斯仲孫忌帥師圍鄆公羊曰此仲孫何忌也曷為謂之仲孫忌譏二名二名非禮也劉氏曰譏二名其意謂二名難諱也古者蓋雖君之名臣不諱矣父之名子不諱矣及至於周臣諱君之名子諱父之名然猶諱其死不諱其生諱其同不諱其嫌二名則不偏諱也仲尼之母名徴在言徴不言在言在不言徴自仲尼不諱二名況其他乎夫已不能諱二名反譏人之二名豈理也哉石氏曰不言何闕也公羊謂之譏二名亦鑿矣陳嶽氏曰春秋書二名多矣聖人何譏焉矧書仲孫何忌非一苟譏之則宜悉譏之奚獨於是歟吕氏曰脫文無疑也而公羊以為譏二名大抵三傳解經皆據文生義不論是非無復闕疑最學者大病不可不詳矣七年秋齊人執衛行人北宫結以侵衛榖梁曰以重辭也衛人重北宫結劉氏曰非也執其使伐其國文加以則見之不加則不見也乃其理然豈為重乎齊侯衛侯盟于沙左氏曰秋齊侯鄭伯盟于鹹徴會于衛衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟于瑣恐無召人兵自伐之理蓋齊欲求衛而衛不從因執行人以伐衛耳八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊穀梁曰公如往時致月危致也往月致時危往也往月致月惡之也劉氏曰非也公如往時致月此則文公十三年冬如晉十四年正月公至自晉是也是時公未至晉而衛侯會公于沓至晉而得其君盟盟而及鄭伯又會公于棐一出而三國附何以危致也夫往月致時此則宣十七年六月同盟于斷道秋公至自會是也是則諸侯協心而外楚中國為一無有他變何以危往也夫往月致月此則僖四年正月侵蔡蔡潰遂伐楚八月公至自伐楚是也是時齊桓主諸侯榖梁以齊桓為知所侵又曰以楚伐致大伐楚最盛矣何以惡之也且榖梁欲言其危當得其危之狀欲言其惡當指其惡之形今謂之危無狀也謂之惡無形也設空文無實驗不可致詰非所以解經也故略舉三事以彰其不然夏齊國夏帥師伐我西鄙左氏曰齊國夏髙張伐我西鄙於經無所發明公會晉師于瓦左氏曰晉士鞅趙鞅荀寅救我公會晉師于瓦范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔據經但書公會晉師救與不救不可知也凡諸侯救者春秋必書何獨救魯而不書乎況瓦為衛地使晉來救安得至衛而不至魯乎晉士鞅帥師侵鄭遂侵衛左氏曰晉師將盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者涉他成何曰我能盟之衛人請執牛耳成何曰衛吾溫原也焉得視諸侯將歃涉他捘子對切衛侯之手及捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子與大夫之子為質大夫曰苟有益也公子則往羣臣之子敢不皆負羈絏以從將行王孫賈曰苟衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅會成桓公侵鄭圍蟲牢報伊闕也遂侵衛盟鄟澤圍蟲牢經不書此傳未詳信否季孫斯仲孫何忌帥師侵衛左氏曰九月帥師侵衛晉故也未詳信否冬從祀先公左氏曰季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十月順祀先公而祈焉辛卯禘于僖公劉氏曰非也虎之謀三桓宜使三桓不知今明白而祈三桓聞之虎何以能集其意邪祈則謀泄謀泄則事危虎必不為也公羊曰從祀者何順祀也文公逆祀去者三人定公順祀叛者五人榖梁曰貴復正也馮氏曰三傳皆曰順祀意以為復僖閔之逆祀故言順也是從非訓順也盤庚曰兹豫大享于先王爾祖其從與享之曽子問曰祫于太廟羣主皆從然則從祀者隨而祭之也非順也殆新主入廟之意或曰説雖善其若無據何曰春秋出于聖人之心當時羣弟子尚不能聞其意義況三傳邪彼三傳者非傳聞而苟釋之則億度而為之義夫據者止據傳也傳既多妄而不足據不若以意求聖人之心為近之盜竊寶玉大弓公羊曰盜者孰謂謂陽虎也陽虎者曷為者也季氏之宰也季氏之宰則微者也惡乎得國寶而竊之陽虎專季氏季氏專魯國陽虎拘季孫孟氏與叔孫氏迭而食之睋而鋟其板曰某月某日將殺我於蒲圃力能救我則於是至乎日若時而出臨南者陽虎之出也御之於其乘焉季孫謂臨南曰以季氏之世世有子子可以不免我死乎臨南曰有力不足臣何敢不勉陽越者陽虎之從弟也為右諸陽之從者車數十乘至于孟衢臨南投䇿而墜之陽越下取䇿臨南駷馬而由乎孟氏陽虎從而射之矢著于莊門然而甲起於琴如弒不成却反舍于郊皆説然息或曰弒千乘之主而不克舍此可乎陽虎曰夫孺子得國而已如丈夫何睋而曰彼哉彼哉趣駕既駕公斂處父帥師而至慬然後得免自是走之晉寶者何璋判白弓繡質龜青純按序事與左氏不同恐姑當從左氏榖梁曰非其所以與人而與人謂之亡非其所取而取之謂之盜此訓詁近之九年夏得寶玉大弓左氏曰書曰得器用也凡獲器用曰得得用焉曰獲劉氏曰非也向曰竊者失之也今曰得者得之也失得相對言得所以見失也若器必言得郜大鼎何以云取乎器用不專言得亦明矣公羊曰何以書國寶也喪之書得之書此義近之而未盡也榖梁曰其不地何也寶玉大弓在家則羞不目羞也惡得之得之堤下或曰陽虎以解衆也失玉得玉不羞反以不地為可掩羞乎秋齊侯衛侯次于五氏左氏曰秋齊侯伐晉夷儀敝無存之父將室之辭以與其弟曰此役也不死反必娶于髙國先登求自門出死於霤下東郭書讓登犂彌從之曰子讓而左我讓而右使登者絶而後下書左彌先下書與王猛息猛曰我先登書斂甲曰曩者之難今又難焉猛笑曰吾從子如驂之靳晉車千乘在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛禇師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師敗之齊侯致禚媚杏於衛如左氏言則齊乃伐晉不得以次書且衛與齊同次未見救齊之功齊敗之後乃致三邑衛侯必無之理也況齊伐晉與致三邑於衛經所不見皆不足據十年夏公會齊侯于夾谷左氏曰春及齊平夏公會齊侯于祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加於載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合享而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如已也乃不果享齊人來歸鄆歡龜陰之田葉氏曰夾谷之事榖梁家語與左氏略同此非聖人之事好事自為之也愚謂經但言會而傳乃言盟當以經為正榖梁曰離會不致何為致也危之也危之則以地致何也為危之也其危奈何曰頰谷之會孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子歷階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來為命司馬止之齊侯逡巡而謝曰寡人之過也退而屬其二三大夫曰夫人率其君與之行古人之道二三子獨率我而入夷狄之俗何為罷會齊人使優施舞於魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出齊人來歸鄆歡龜陰之田者蓋為此也因是以見雖有文事必有武備孔子於頰谷之會見之矣劉氏曰非也近上八年公會晉師于瓦亦致又何危乎且如榖梁所説頰谷之會聖人相齊侯震懼歸地謝過齊則危矣魯何危乎又曰其以地致何也危之也亦非也兩國會盟致皆以地此常法耳何説危哉辨又見左氏晉趙鞅帥師圍衛左氏曰晉趙鞅圍衛報夷儀也初衛侯伐邯鄲午於寒氏城其西北而守之宵熸子溍切及晉圍衛午以徒七十人門於衛西門殺人於門中曰請報寒氏之役涉他曰夫子則勇矣然我往必不敢啓門亦以徒七十人旦門焉步左右皆至而立如植日中不啓門乃退反役晉人討衛之叛故曰由涉他成何於是執涉他以求成於衛衛人不許晉人遂殺涉他成何奔燕君子曰此之謂棄禮必不鈞詩曰人而無禮胡不遄死涉他亦遄矣哉此傳既非本義又以齊侯衛侯次于五氏傳考之亦未可據也齊人來歸鄆歡龜陰田公羊曰孔子行乎季孫三月不違齊人為是來歸之按魯及齊平又為會故歸所侵三邑耳非孔子行乎季孫而齊歸之也叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈左氏曰二子及齊師復圍郈使齊師圍郈經當有見況左氏自言駟赤説侯犯事齊侯犯又請易於齊而齊有司始觀郈則是時實未嘗圍郈也十有一年秋宋樂大心自曹入於蕭左氏曰秋樂大心從之大為宋患寵向魋故也不稱臣叛君之罪而但曰寵向魋故也則亦失其輕重之權衡矣冬及鄭平左氏曰冬及鄭平始叛晉也魯六年有侵鄭之怨至此始為平耳未見叛晉之迹也十有二年夏叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費左氏曰仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費將墮成公斂處父謂孟孫墮成齊人必至於北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克葉氏曰左氏言仲由為季氏宰將墮三都然歟非也仲由季氏之隄防也夫安得墮其主邑而併二都得以治之乎哉或以為孔子為政於魯而以命仲由方是時三家猶強孔子雖為魯司寇未嘗得行其志正使為之亦有道矣何至以家臣謀其主哉自陽虎叛季氏叔孫氏皆屈家臣故南蒯不得志於意如則以費叛侯犯不得志於州仇則以郈叛墮郈墮費二氏自為計而欲去其險爾是以郈帥師主州仇費帥師主斯公山不狃叔孫輒費人襲魯蓋懼二氏之討已而先之夫何有於仲由此亦尊孔子而反卑之者也公羊曰曷為帥師墮郈帥師墮費孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是帥師墮郈帥師墮費雉者何五板而堵五堵而雉百雉而城髙氏曰魯前未有墮邑之事墮邑亂之至也傳以是時孔子為司寇行乎季孫墮郈墮費為孔子之功是不然大夫不臣諸侯陪臣不臣大夫上下循習之所致非一日矣苟欲其不叛在正其本而已何城池甲兵之患哉唯叔孫季孫不知出此故墮郈墮費所以譏也而傳反歸功孔子不思之甚矣浚南趙氏曰經書叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費而繼之曰公圍成州仇與斯果知禮制必釋兵權矣猶以帥師書則四分公室固自若也家不藏甲而以師從可乎千乘之君躬擐甲胄而攻之大旨蓋章章矣傳稱仲由為季氏宰將墮三都而史記於夾谷相禮齊歸侵地之後乃稱使仲由為季氏宰而墮於三都後人或於使之一字謂若出於夫子之命本欲推崇聖人道化之盛而不知此事正不足贊聖人也夫子嘗曰禮樂征伐自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣吁諸侯之僣天子固欲示其強大而不知大夫己效其尤大夫之僣諸侯亦將專其威柄而不知陪臣復襲其迹使三家果有識於先王之制必不自肥其家而弱公室又安有蕭牆之憂表不正則景枉源不澄則流汚侯犯以郈叛不狃以費叛始憂懼而莫知所措郈再圍而不克費共叛而圍及二叛之去乃各舉兵墮之豈真知邑無百雉之城出於王制之舊乎聖人過化存神之妙豈恃以兵威使人聽其自為從違哉沐浴之請傳載夫子謂以魯之衆加齊之半可克也先儒曰此非孔子之言也是以力不以義也傳猶不可信況敢舍經而任史乎夫聖人垂憲萬世豈虛張一二事為美哉榖梁曰墮猶取也按墮訓敗先儒有訓毁者矣未聞訓取也衛公孟彄帥師伐曹左氏曰夏衛公孟彄伐曹克郊還滑羅殿未出不退於列其御曰殿而在列其為無勇乎羅曰與其素厲寧為無勇非本義不録冬公至自圍成榖梁曰非國不言圍圍成大公也何以致危之也何危爾邊乎齊也范氏曰以公之重而伐小邑則為恥深矣故大公之事而言圍使若成是國然陳嶽氏曰凡盟會侵伐出境則書出入必告廟故悉書之苟非出境則不告廟不告則不書成者魯國之邑則非出境曷以書之天子不親征叛國諸侯不親征叛邑公以成強興兵而自圖之是以出入皆告於廟故書之苟曰若他國然則已書成矣十有三年春齊侯衛侯次於垂葭左氏曰齊侯衛侯次於垂葭實郹氏使師伐晉將濟河諸大夫皆曰不可邴意茲曰可鋭師伐河內傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河內齊侯斂諸大夫之軒唯邴意兹乘軒齊侯欲與衛侯乘與之宴而駕乘廣載甲焉使告曰晉師至矣齊侯曰比君之駕也寡人請攝乃介而與之乘驅之或告曰無晉師乃止經言次於垂葭而不言事傳乃言伐晉妄也使實伐晉經不可書齊侯衛侯伐晉乎秋晉趙鞅入於晉陽以叛冬晉荀寅士吉射入於朝歌以叛左氏曰晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄父兄皆曰不可衛是以為邯鄲而置諸晉陽絶衛之道也不如侵齊而謀之乃如之而歸之于晉陽趙孟怒召午而囚諸晉陽使其從者説劒而入涉賓不可乃使告邯鄲人曰吾私有討於午也二三子唯所欲立遂殺午趙稷涉賓以邯鄲叛夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲將作亂董安于聞之告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也安于曰與其害於民寧我獨死請以我説趙孟不可秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之范臯夷無寵於范吉射而欲為亂於范氏梁嬰父嬖於知文子文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊髙疆曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌劉氏曰傳云范氏中行氏伐趙氏之宫趙鞅奔晉陽然則鞅不叛也范中行逼之耳經何以得言其叛乎春秋原情定罪固有如此邪葉氏曰晉陽趙邑也董安于請備邯鄲午鞅畏始禍不從荀寅范吉射黨邯鄲午而伐鞅則始禍者非鞅不得言三臣始禍鞅非始禍被伐而奔其邑則經不當書趙鞅入于晉陽以叛凡左氏之言皆與經背叛反其君之辭也鞅誠被伐而奔其邑晉人何為圍之乎此蓋晉史為鞅之辭傳不能辨妄載之臧文仲以防求為後於魯孔子曰雖曰不要君吾不信也惟鞅以不勝荀寅范吉射奔其邑以叛要晉而逐二子故經與魚石入彭城欒盈入曲沃同辭穀梁曰以者不以者也叛直叛也以字豈有不以之義晉趙鞅歸于晉公羊曰此叛也其言歸何以地正國也其以地正國奈何晉趙鞅取晉陽之甲以逐荀寅與士吉射荀寅與士吉射者曷為者也君側之惡人也此逐君側之惡人曷為以叛言之無君命也康侯胡氏曰三子之叛其罪一也鞅以有援故得復寅吉射以無助故終叛春秋書鞅歸于晉非與之也以罪晉侯縱失有罪無政刑耳叛逆人臣之大惡既不能致辟于鞅奉行天罰以警亂臣又亢不衷徇韓魏之請而許之復無政刑矣其能國乎先儒或謂言歸者以地正國也鞅取晉陽之甲以逐君側之惡人則其説誤矣以地正國而可是人主可得而脅人臣擅興無罪以兵諫者真愛君也使後世賊臣稱兵向闕以誅君側惡人為名而實欲脅君取國者則此説啓之也大失春秋之意矣榖梁曰此叛也其以歸言之何也貴其以地反也貴其以地反則是大利也非大利也許悔過也許悔過則何以言叛也以地正國也以地正國則何以言叛其入無君命也石氏曰二傳以為以地正國逐君側之惡人此後世跋扈之臣得以藉口而興禍亂也聖人之意豈然哉髙氏曰叛者人臣之大惡脫使鞅所以初入晉陽本拒范中行氏而非有叛君之心然人臣無君命輒遽興士兵此豈可救乎十有四年夏五月於越敗吳于檇李左氏曰吳伐越越子勾踐禦之陳于檇李勾踐患吳之整也使死士再禽焉不動使罪人三行屬劒於頸而辭曰二君有治臣姦旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬傷將指取其一屨還卒於陘去檇李七里夫差使人立於庭苟出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越哀公元年吳王夫差敗越於夫椒報檇李也遂入越越子以甲楯五千保于會稽使大夫種因吳太宰嚭以行成吳子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡勾踐能親而務施施不失人親不棄勞與我同壤而世為仇讎於是乎克而弗取將又存之違天而長寇讎後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長寇讎以是求霸必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其為沼乎三月越及吳平石氏曰不言爵不言師不書戰皆夷狄之略之也左氏未陳之例不取愚按左氏凡書敗某師必為詐戰之説以實之愚於莊十年長勺乘丘辨疑或問既言之矣今考之經書吳子光卒略不見越所殺傷事迹而哀元年經亦不書吳入越事皆所不可據者也先儒謂夫椒之戰為復父讎非報怨春秋以為常事削而不書夫吳光之死於經既無所見未必為越所傷設使有之亦吳來伐越自取之也聖人必不許吳之報怨而不書也且王綱不振夷狄相為強弱迭為中國患聖人安得許吳之伐越而遂不書乎公會齊侯衛侯于牽左氏曰晉人圍朝歌公會齊侯衛侯于脾上梁之間謀救范中行氏析成鮒小王桃甲率狄師以襲晉戰于絳中不克而還士鮒奔周小王桃甲入于朝歌秋齊侯宋公會于洮范氏故也晉大夫率狄師襲晉事經無所見而牽與洮之會未必為救范中行氏皆不録天王使石尚來歸脤榖梁曰脤者何也俎實也祭肉也生曰脤熟曰膰其辭石尚士也何以知其士也天子之大夫不名石尚欲書春秋諫曰久矣周之不行禮於魯也請行脤貴復正也劉氏曰不知石尚欲書孔子之春秋乎魯國之春秋乎若孔子之春秋也孔子是時未作春秋石尚安得書於魯國之春秋也王人至則書之矣何足以為榮邪凡人之欲書春秋者以有殊功異德欲使後世見也石尚何有而欲書乎是殆不然十有五年春王正月邾子來朝左氏曰邾隱公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也此雖格言非本義不録鼷鼠食郊牛牛死改卜牛公羊曰曷為不言其所食漫也范氏曰漫者遍食其身災不敬也愚謂不言所食范氏近之見於本義矣未必遍食其身也榖梁曰不敬莫大焉此説近之夏五月辛亥郊公羊曰曷為以夏五月郊三卜之運也何氏曰運轉也已卜春三正不吉復轉卜夏陳嶽氏曰苟卜必書如成十五年書五卜郊襄七年書三卜郊之類是也稽其旨上書鼷鼠食郊牛而死改卜牛次書五月辛亥郊耳壬申公薨于髙寢榖梁曰髙寢非正也此説得之鄭罕達帥師伐宋左氏曰鄭罕達敗宋師于老丘經不言敗齊侯衛侯次于渠蒢左氏曰齊侯衛侯次于蘧拏謀救宋也此蓋左氏見齊衛次于伐宋之後而意之耳未必謀救宋也邾子來奔喪公羊曰奔喪非禮也此説得之榖梁曰喪急故以奔言之解字義而不解文義秋七月壬申姒氏卒左氏曰不稱夫人不赴且不祔也劉氏曰非也安有夫人卒而不書夫人者乎凡夫入始卒則史書之書之固云夫人矣不待赴祔而書其夫人也此姒氏要為哀公之母定公之妾哀公未成君故亦不敢謂其母為夫人耳石氏曰惟其君妾也故其死不薨不諡而葬不小君左氏之説不取公羊曰姒氏者何哀公之母也何以不稱夫人哀未君也不稱夫人本妾母之稱爾非以哀為君便得稱夫人也丁巳葬我君定公雨不克葬戊午日下昃乃克葬左氏曰葬定公雨不克襄事禮也雨不克襄事乃無備也失禮而為禮過矣榖梁曰葬既有日不為雨止禮也雨不克葬喪不以制也乃急辭也不足乎日之辭也此説得之獨乃為急辭少未安耳已見宣八年此不復録辛巳葬定姒左氏曰葬定姒不稱小君不成喪也劉氏曰非若姒氏實夫人固當書夫人薨已而曰葬定姒不稱小君明不成喪以責臣子可見也今曰姒氏卒此非夫人也非夫人而書定姒宜矣何足以見不成喪乎欲責不成喪而薨不稱夫人是適足以貶小君之尊而不足見臣子之罪也公羊曰何以書葬未踰年之君也有子則廟廟則書葬此亦公羊母以子貴之意非知禮者之言也三傳辨疑卷十九
