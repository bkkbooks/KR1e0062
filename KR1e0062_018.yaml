body:
  text: 三傳辨疑卷十八元程端學撰昭公十有七年春小邾子來朝左氏曰小邾穆公來朝公與之燕季平子賦采叔穆公賦菁菁者莪昭子曰不有以國其能乆乎非本義不録夏六月甲戌朔日有食之左氏曰夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼔於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼔作祝用幣史用辭故夏書曰辰不集於房瞽奏鼔嗇夫馳庶人走此月朔之謂也當夏四月謂之孟夏平子弗從昭子退曰夫子將有異志不君君矣劉氏曰𫝊曰唯正月朔慝未作日有食之於是乎有伐鼓用幣又引夏書以證之今按夏書乃季秋月朔非正陽之月詩曰十月之交朔日辛夘日有食之亦孔之醜然則古人不獨以正月日食為醜矣𫝊之所言未可信也葉氏曰昭子言天子諸侯之禮是矣而言用於正月則太史與平子皆失之夏書辰弗集於房以季秋言之則先王之禮不獨在四月凡食皆舉之矣經書日食三十六其言鼓用牲於社者三而已其二皆在六月則見襲用太史之言獨行於建已之月為非也其一在九月則見其三十三皆不舉獨此一舉為得禮以見正也左𫝊不知此而惑於太史之言故誤以莊二十五年援之東萊吕氏曰周之建子特以革命而改之爾若其行事用夏正未嘗改也周官正月之吉始和正是夏之正月正歳則是周正十一月爾鄭康成却差互説之最是凌人一官四時皆具而可考掌氷正是一句歳十有二月是一句康成註改書正為政則政字為是乃改今正字非也宜當從故書政字謂掌出入氷之政爾下言歳十二月則斬氷春則治鑑夏班而秋刷四時之具如此豈不是夏正邪秋郯子來朝左氏郯子來朝公與之宴昭子問焉少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黄帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名太皥氏以龍紀故為龍師而龍名我髙祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏厯正也𤣥鳥氏司分者也伯趙氏師至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利噐用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信葉氏曰按後蔡墨言曰少皥氏有四叔重為勾芒諸為蓐修及熈為玄冥是所謂木正金正水正者也此亦參見他書宜可信不聞其以鳥為名郯在中國既少皥氏後不得為四夷左氏之説與引仲尼之言皆近於誕不足信也冬有星孛於大辰左氏曰冬有星孛於大辰西及漢申須曰彗所以除舊布新也天事恒象今除於火火出必布焉諸侯其有火災乎梓慎曰往年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也乆矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火子産弗與按大辰社氏謂房心尾在漢之西不應云西及漢如杜氏所釋謂孛星在辰西則與經文相戾矣且日星之變人事所召災禍之來固非一端君臣但當改過修德以消天變耳必指某事以實之此漢儒之通弊左氏見後書宋齊陳鄭災而遂指以為言耳夫四國之災固在其中而其所以災不止於此公羊曰孛者何彗星也辨見文十四年楚人及吳戰於長岸公羊曰詐戰不言戰此其言戰何敵也實戰則書戰春秋無詐戰不言戰之法也榖梁曰兩夷狄曰敗中國與夷狄亦曰敗楚人及吳戰於長岸進楚子故曰戰獻可杜氏曰春秋豈有進夷狄之意邪春秋志楚貪暴乆矣今及吳師戰於長岸春秋因録其實見吳楚争強交亂中國無能制之也十有八年夏五月壬午宋衛陳鄭災左氏曰夏五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火鄭人請用之子産不可子大叔曰寳以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫於東門使司宼出新客禁舊客勿出於宫使子寛子上巡羣屏攝至於大宫使公孫登徙大龜使祝史徙主祏於周廟告於先君使府人庫人各儆其事商成公儆司宫出舊宫人寘諸火所不及司馬司宼列居火道行火所焮城下之人伍列登城明日使野司宼各保其徴郊人助祝史除於國北禳火於𤣥冥回禄祈於四鄘書焚室而寛其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔炎君子是以知陳許之先亡也朴鄉吕氏曰胡氏曰大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝厯數歳而後定至哀十三年有星孛於東方不言宿名者不加宿也當是時吳人僣亂憑陵上國日敝於兵暴骨如山其戾氣所感固將壅吳而降之罰也故氛祲所指在於東方假手越人吳國遂滅天之示人顯矣史之有占明矣愚按左氏載梓慎鄭禆竈之言則曰宋衛陳鄭將同日火何休註公羊則謂孛彗者掃故置新之象是後周分為二天下兩主較之吳氏之言則天有異故知説春秋而以某事騐某事皆失之泥也餘非本義不録榖梁曰其志以同日也其日亦以同日也或曰人有謂鄭子産曰某日有災子産曰天者神子惡知之是人也同日為四國災也六月邾人入鄅左氏曰鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舍其女按鄅子果從帑於邾經當有見此其可疑者也秋葬曹平公左氏曰秋葬曹平公往者見周原伯魯焉與之語不悦學歸以語閔子馬閔子馬曰周其亂乎夫必多有是説而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則茍而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎非本義不録冬許遷於白羽左氏曰楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不専於楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚國方城外之蔽也土不可易國不可小許不可俘讎不可啓君其圖之楚子悦冬楚子使王子勝遷許於析實白羽按成十五年許遷於葉左氏曰許靈公畏偪於鄭請遷於楚故公子申遷許當時許自欲遷𫝊與經合是故録之今則楚欲遷許雖非偪遷經亦當見意而亦以自遷為文疑𫝊不得經意也十有九年春宋公伐邾左氏曰二月宋公伐邾圍蟲三月取之乃盡歸鄅俘圍邑取邑經不書故不録夏五月戊辰許世子止弑其君買左氏曰太子奔晉書曰弑其君君子曰盡心力以事君舍藥物可也公羊曰賊未討何以書葬不成於弑也曷為不成於弑止進藥而藥殺也止進藥而藥殺則曷為加弑焉爾譏子道之不盡也其譏子道之不盡奈何曰樂正子春之視疾也復加一飯則脱然愈復損一飯則脱然愈復加一衣則脱然愈復損一衣則脱然愈止進藥而藥殺是以君子加弑焉爾曰許世子止弑其君買是君子之聴止也葬許悼公是君子之赦止也赦止者免止之罪辭也辨見榖梁及葬許悼公榖梁曰日弑正卒也正卒則止不弑也不弑而曰弑責止也止曰我與夫弑者不立乎其位以與其弟虺哭泣歠粥嗌不容粒未踰年而死故君子即止自責而責之也歐陽氏曰買病死而止不嘗藥耳學者不從孔子信為弑君而從三子信為不嘗藥其舍經而從𫝊何哉經簡而直𫝊新而竒簡直無悦耳之言新竒多可喜之論是以學者樂聞而易惑也木訥趙氏曰學者不信經而信𫝊反從為之辭若果𫝊實是春秋誣人以大逆矣西疇崔氏曰不嘗藥之過小而加弑君之大罪豈先王之法哉且聖人所以為法也向使聖王在上豈遂以弑君之罪殺止耶其不然明矣夾漈鄭氏曰臣弑君子弑父何容易加人乎君舉陳氏曰世子誠不嘗藥爾何罪而奔晉黄氏曰三傳皆以為非弑而其説亦不同左氏曰飲太子之藥卒太子奔晉公羊曰止進藥而藥殺也榖梁曰世子不知嘗藥君卒而哭泣歠粥未逾年死竊意左氏公羊之説皆是也但後説不然耳世子藥殺其君春秋故書弑榖梁晩出因二氏有藥殺之語增附不嘗藥之説凡後來為之辭者又皆惑於榖梁故因鑿之以飾義例耳本無可疑也春秋書弑而左氏公羊稱藥殺亦弑也存耕趙氏曰春秋書弑三十餘獨疑於趙盾許世子止夫趙盾封殖穿以戕君春秋誅之已詳其事今買弑君三傳俱云以藥使止之罪在於不嘗藥亦當原情而矜之豈遽因疑似而加之大惡之名然則止必藥鴆也欲速得位也聖人原情定罪必不妄加以弑愚謂左氏自許悼公瘧至藥卒事或可信自太子奔晉以下左氏自為之言也凡弑而出奔者經必書之以見臣子不討賊之罪如宋萬出奔陳之類是也今止果奔晉經豈有不書者乎此其事之不可信者也自君子以下乃無禮之言有不足辨者公羊𫝊惟止進藥而藥殺一句事或可信其餘皆無足取其以賊未討書葬為義而謂君子赦止之罪繆妄之尤者若榖梁皆言之無可取其以日弑為正卒而不弑固不足憑至論君子即止自責而責之尤不足辨天下豈有不論其事之虛實因其自責而遂誣之之理哉秋齊高發帥師伐莒左氏曰齊髙發帥師伐莒莒子奔紀障使孫書伐之初莒有婦人莒子殺其夫已為嫠婦及老託於紀障紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼔譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀按莒子奔紀障經當有見自莒有婦人至入紀非本義不録俱未詳信否冬葬許悼公公羊曰賊未討何以書葬不成於弑也石氏曰榖梁𫝊例弑君而賊不討者不書葬其書葬皆意有所見也如蔡景公以為不忍使父失民於子陳靈則以為外之討賊蔡昭則以盗名不見於經許悼則以為不使止為弑君此𫝊例也通於經則不可黎氏曰被弑之君多不書葬者或彼國方有事變雖葬我畏其亂不使往㑹之豈有賊未討則不書葬邪此二傳妄為之説也且蔡世子般弑其君何般未討而亦書葬邪觀夫許悼弑而書葬者非他盖變生於内而不及國又般止欲没其弑逆之迹具禮葬其父我又使往㑹故書葬焉歐陽公論止為弑得其㫖也榖梁曰日卒時葬不使止為弑父也曰子既生不免乎水火母之罪也羈貫成童不就師傅父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也許世子不知嘗藥累及許君也存耕趙氏曰蔡般弑固而立景公書葬止弑買而奔悼公書葬辭無别也若以葬許悼公為聴止則葬蔡景亦為聴般也信經舍𫝊可也愚按經明書止弑其君買而又不使止為弑父孔子無乃反覆不自守法乎且榖梁又以時葬而知其不使止為弑父又繆之尤者辨又見桓十八年二十年夏曹公孫㑹自鄸出奔宋公羊曰奔未有言自者此其言自何畔也畔則曷為不言其畔為公子喜時之後諱也春秋為賢者諱何賢乎公子喜時讓國也其讓國奈何曹伯廬卒於師則未知公子喜時從與公子負芻從與或為主於國或為主於師公子喜時見公子負芻之當主也逡巡而退賢公子喜時則曷為為㑹諱君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱也劉氏曰非也何有賢其祖遂諱其後子孫惡乎臣而出奔反臣子之義亂人倫之常矣而猶為之諱乎如必賢者子孫則罪皆可諱是管蔡不誅於周也貫道王氏曰經書自某出奔者宋華亥自南里宋公之弟辰自蕭及公孫㑹自鄸也華亥辰先書入書畔㑹無見焉則非據邑畔君者也鄸㑹之食邑也得罪而出由邑而奔以不言叛為喜時諱公羊之言將誰欺乎榖梁曰自夢者専乎夢也曹無大夫其曰公孫何也言其以貴取之而不以叛也趙氏曰按人臣不以邑叛適常事耳豈有褒貴之理乎劉氏曰若臣不叛君常事耳何足褒哉其曰曹無大夫辨見成二年秋盗殺衛侯之兄縶左氏曰衛公孟縶狎齊豹奪之司冦與鄄有役則反之無則取之公孟惡北宫喜禇師圃欲去之公子朝通於襄夫人宣姜懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂初齊豹見宗魯於公孟為驂乗焉將作亂而謂之曰公孟之不善子所知也勿與乗吾將殺之對曰吾由子事公孟子假吾名焉故不為吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僣子也子行事乎吾將死之以周事子而歸死於公孟其可也丙辰衛侯在平夀公孟有事於盖獲之門外齊子氏惟於門外而伏甲焉使祝鼃寘戈於車薪以當門使一乗從公孟以出使華齊御公孟宗魯驂乗及閎中齊氏用戈擊公孟宗魯以背蔽之㫁肱以中公孟之肩皆殺之琴張聞宗魯死將往弔之仲尼曰齊豹之盗而孟縶之賊女何弔焉君子不食奸不受亂不為利疚於回不以回待人不盖不義不犯非禮朴鄉吕氏曰為左氏之説者或求名而不得或欲盖而名彰齊豹為衛司冦作而不義其書為盗邾庶其莒牟夷邾黒肱以土地衣食而已不求其名賤而必書此二物者所以懲肆而去貪也夫齊豹書盗則曰求名而亡三叛人名則曰欲盖而彰一則以書名為欲盖而彰一則以不書名為求名而亡如是用法誰能曉之余以為此非春秋之㫖也按春秋書盗五襄十年盗殺鄭公子騑公子發公孫輙昭二十年盗殺衛侯之兄縶定八年盗竊寳玉大弓哀四年盗殺蔡侯申十三年盗殺陳夏區夫是也凡書盗者微者之名字不著於經也公羊曰母兄稱兄兄何以不立有疾也何疾爾惡疾也按衛侯之兄不立必有其故或庶或疾未可知也若公羊之所謂惡疾者意之之辭耳榖梁曰盗賤也其曰兄母兄也目衛侯衛侯累也然則何為不為君也曰有天疾者不得入乎宗廟輙者何也曰兩足不能相過齊謂之綦楚謂之踙衛謂之輙按輙左氏作縶衛侯兄之名也而榖梁以為足疾繆甚冬十月宋華亥向寜華定出奔陳左氏曰宋元公無信多私而惡華向華定華亥與向寜謀曰亡愈於死先諸華亥偽有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廪公如華氏請焉弗許遂刼之癸夘取太子欒與母弟辰公子地以為質公亦取華亥之子無慼向寜之子羅華定之子啓與華氏盟以為質宋華向之亂公子城公孫忌樂舍司馬強向宜向鄭楚建郳甲出奔鄭其徒與華氏戰於鬼閻敗子城子城適晉華亥與其妻必盥而食所質公子者而後食公與夫人毎日必適華氏食公子而後歸華亥患之欲歸公子向寜曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聴命公曰子死亡有命余不忍其訽冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寜欲殺太子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司冦牼以歸曰子之齒長矣不能事人以三公子為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復而所按三卿殺四公子兩公孫經何以不書既殺之而君臣交質其子又彼此親往食之皆未可信者也二十一年夏晉侯使士鞅來聘左氏曰晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢使魯果用齊鮑國歸費之禮士鞅安能知之而引以為辭魯亦未必敢怒晉也凡此皆可疑者也又非本義不録宋華亥向寜華定自陳入於宋南里以叛公羊曰宋南里者何若曰因諸者然劉氏曰非也宋南里者入宋而居南里也又何疑焉榖梁曰入者内弗受也其曰宋南里宋之南鄙也以者不以者也叛直叛也南里非南鄙也内弗受辨見隠二年莒入向秋七月壬午朔日有食之左氏曰公問於梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水於是叔輙哭日食昭子曰子叔將死非所哭也八月叔輙卒存耕趙氏曰謫見於天日食為大人君因災異之來修德以應之未始托其數於天也梓慎之對特星翁下史之言爾焉知以人占天之理乎冬蔡侯朱出奔楚左氏曰費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱愬於楚楚子將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隠太子其子與君同惡德君必甚又使立之不亦可乎且廢置在君蔡無他矣李氏曰此書蔡侯出奔二十三年書蔡侯東國卒於楚書奔而名左氏公羊名朱惟榖梁謂之東榖梁謂奔楚卒楚為一人二𫝊以為二也愚按經二十年書蔡侯廬卒次年書朱出奔其下朱無歸入卒葬之文東國無出奔之事則卒楚之東國似為奔楚之朱左氏言東國之簒始未詳備然而義與經違恐其非實榖梁曰東者東國也何為謂之東也王父誘而殺焉父執而用焉奔而又奔之曰東惡之而貶之也劉氏曰即仲尼欲如此貶東國者書東國不亦足乎徒貶其半名何為即貶其半名為法者使蔡侯正名東當復貶去其上下而云蔡侯田乎公如晉至河乃復左氏曰公如晉及河鼔叛晉晉將伐鮮虞故辭公辨見十五年晉伐鮮虞二十有二年春齊侯伐莒左氏曰莒於是乎大惡其君如其信然不可以訓宋華亥向寜華定自宋南里出奔楚榖梁曰自宋南里者専也豈特専而已大蒐於昌間榖梁曰秋而曰蒐此春也其曰蒐何也以蒐事也按禮春蒐夏苖秋獮冬狩見於周禮爾雅左氏者詳矣今榖梁乃曰秋而曰蒐不知禮矣夫榖梁豈見八年經書秋蒐於紅而遂為此言乎王室亂公羊曰何言乎王室亂言不及外也劉氏曰非也此不問可解也謂王室亂者嫡庶並爭亂在宗室者也本不得言京師亂成周亂王城亂其理曉然而何休云云皆趨文失意者也楊氏曰書王室亂者迹其本而書爾豈謂其不及外乎悼王恭王后之嫡嗣也子朝者嬖人之庶子也而景王寵子朝欲立之是夫婦之位不明也父子之道不正也兄弟之序不别也故謂之王室亂也譏景王不能正家而召亂也噫文武之教起於袵席而景王之不能法其祖也甚哉榖梁曰亂之為言事未有所成也經書王室亂本謂王室亂自内作而榖梁以亂為未有所成不特不知訓詁害教孰甚焉劉子單子以王猛居於皇公羊曰其稱王猛何當國也劉氏曰非也王猛乃王矣未逾年是以不可稱天王而又不可以諸侯例稱子也何則獨言子則似魯之子冠王於子又與他王子相亂故稱王係猛者明是乃王者在䘮之常稱可無疑也殷人作書以名名篇都不諱也周人以諱事神死則諱之生亦不諱也逾年之後臣子可稱之曰天王未逾年則以王係名通謂之小子王生名之死亦名之明尊未成也今此王猛是生名後曰王子猛是死亦名之也而公羊不達此見文稱王猛則謂與小白鄭突等矣不知文無所移易甚矣其陋也榖梁曰以者不以者也王猛嫌也李氏曰先儒言景王太子夀卒命猛代之杜預亦以猛為次正然則猛之不稱天王而名者䘮未逾年未即位爾禮王在䘮曰小童公侯曰子𫝊亦曰天子三年然後稱王諸侯於封内三年稱子此據王與諸侯之所自稱也其在史䇿之文但一年不可以二君曠年不可以無君故未逾年則謂之子逾年則皆謂之君諸侯在䘮可係國以言子若經書齊子宋子之類者多矣王不可下同於諸侯設係周而言則與列國無異存子而言則與其非君者同號然則王猛者䘮未逾年之稱也於其卒曰王子猛所以正子之也春秋王子他無書卒之例謂之王子猛不嫌其為非君也二傳見猛王而名之因以簒以嫌而為説非義甚矣秋劉子單子以王猛入於王城公羊曰王城者何西周也其言入何簒辭也劉氏曰非也向王猛居於皇亦何不言入乎必若以入為簒者下有天王入于成周亦可言簒乎愚按經書王猛則其為正嫡明矣而公羊乃以入為簒辭盖以齊小白入於齊許叔入於許鄭伯突入於櫟之例求之也不顧上文而但以入為簒凡例之弊一至於此榖梁曰以者不以者也入者内弗受也劉氏曰非也必以入為内弗受則天王入於成周亦弗受乎冬十月王子猛卒公羊曰此未逾年之君也其稱王子猛卒何不與當也不與當者不與當父死子繼兄死弟及之辭也劉氏曰非也向言王猛者以文不可係子今言王子者死當以子禮書之明是乃王之子也言卒者未逾年之君猶子赤子般皆言卒也言卒則可言薨則不可禮之次序各自有所宜不必未逾年之諸侯則當稱卒未逾年之王則當稱薨也何休云春秋簒成者皆與使當君之非也春秋視簒奪之人無可奈何爾隨其所自稱呼而書之者見其罪也豈與使君之乎若簒成則與使君之是春秋獨惡不善簒而縱所善簒也大為之防民猶踰之又開其利簒者衆矣榖梁曰此不卒者也其曰卒失嫌也劉氏曰非也猛雖未成君然謂之小子王卒固當告於諸侯諸侯之未成君之卒乃不書耳猛未逾年不可言崩又不可言薨是以通言卒耳何嫌之失二十有三年春王正月叔孫婼如晉左氏曰正月壬寅朔二師圍郊癸夘郊鄩潰丁未晉師在平隂王師在澤邑王使告閒庚戍還邾人城翼還將自離姑公孫鉏曰魯將御我欲自武城還循山而南徐鉏丘弱茅地曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師獲鉏弱地邾人愬於晉晉人來討叔孫婼如晉劉氏曰此不然也按是年正月有壬寅朔有庚戌有癸丑𫝊叙邾事在庚戌之後經紀叔孫如晉在癸丑之前夫庚戌癸丑四日耳邾人已能訴於晉晉人已能來討何其神速也故曰不然晉人執我行人叔孫婼左氏曰叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也晉人使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之叔孫聞之去衆與兵而朝士彌牟謂韓宣子曰子弗良圖而以叔孫與其讎叔孫必死之魯亡叔孫必亡邾邾君亡國將安歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館士伯聴其辭而愬諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子士伯曰以芻蕘之難從者之病將館子於都叔孫旦而立期焉乃館諸箕舍子服昭伯於他邑范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其墻屋去之如始至以上事推之知此未可盡信晉人圍郊公羊曰郊者何天子之邑也曷為不繫於周不與伐天子也趙氏曰按此實不伐天子若實伐周豈為其掩惡哉愚謂晉人圍郊本圍子朝所據之邑公羊誤以朝為正故云然戊辰吳敗頓胡沈蔡陳許之師於鷄父胡子髠沈子逞滅獲陳夏齧左氏曰楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也不言戰楚未陳也劉氏曰左氏曰楚師大奔又曰不言戰楚未陳也予謂楚未陳而吳以詭謀動之使至於大奔此乃左氏未陳而敗之例不書楚何哉杜云不書楚楚不戰也非也推騐事理疑楚本與諸侯同救州來既而令尹卒楚軍留而諸侯先至故吳得獨敗之楚師未與吳師相戰經無縁書楚左傳所云七國同役楚師大奔楚未陳之類皆不與經合似是而實非者也愚按胡子沈子書滅者死也夏齧書獲者不死也非君臣之辭也其以不言戰為楚未陳左氏自為之言也非本史也盖左氏見經但書敗而不書戰故以未陳釋之如此釋者多矣故知其為自為之言也公羊曰此偏戰也曷為以詐戰之辭言之不與夷狄之主中國也然則曷為不使中國主之中國亦新夷狄也其言滅獲何别君臣也君死於位曰滅生得曰獲大夫生死皆曰獲不與夷狄之主中國則其言獲陳夏齧何吳少進也劉氏曰非也此欲自文餙其短爾按戰者凶事非禮之事就令夷狄主之又何不得而春秋不肯乎且王室亂非蔡胡沈頓所能任其憂也何故責之為夷狄乎故於吳則没其偏戰之善而誣以詐戰之惡於中國則罔以夷狄之行而強詆以罪此弊由日月為例也誠不用日月之例則戰自戰敗自敗了然分矣愚謂滅曰滅獲曰獲義自不同左氏公羊言君臣辭非也夫秦獲晉侯豈非君乎榖梁曰中國不言敗此其言敗何也中國不敗胡子髠沈子盈其滅乎其言敗釋其滅也獲陳夏齧獲者非與之辭也上下之稱也劉氏曰中國不言敗非也敗者偏敗戰者偏戰偏敗詐也偏戰信也夫夷狄者多詐春秋自宜書以見之何有反匿其詐乎天王居於狄泉公羊曰此未三年其稱天王何著有天子也劉氏曰非也其意以為未三年不當稱天王爾王者雖諒闇三年然踰年之後臣子可以天子稱之矣而王者未可自决政事也豈謂都無天王之稱哉天王居於狄泉臣子之稱也榖梁曰始王也其曰天王因其居而王之也禮當稱王則稱王豈有因其居而王之之理哉尹氏立王子朝榖梁曰朝之不名何也别嫌乎尹氏之朝也劉氏曰非也春秋豈嫌於尹氏之朝哉愚按春秋不以去王子為貶故書王子朝非别乎尹氏之朝而稱王子朝也八月乙未地震左氏曰丁酉南宫極震萇𢎞謂劉文公曰君其勉之先君之力可濟也周之亡也其三川震今西王之大臣亦震天棄之矣東王必大克丁酉與經不合又無義不録冬公如晉至河有疾乃復公羊曰何言乎公有疾乃復殺恥也有疾則書有疾何殺耻之有榖梁曰疾不志此其志何也釋不得入乎晉也無益經二十有四年春婼至自晉左氏曰晉士彌牟逆叔孫於箕叔孫受禮而歸二月婼至自晉尊晉也婼不書氏前見耳非尊晉也榖梁曰大夫執則致致則挈由上致之也此本紀婼見執首尾非由上致之也夏五月乙未朔日有食之左氏曰夏五月乙未朔日有食之梓慎曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也日食天變也豈特水旱之應而已乎左氏盖見八月大雩而為此言耳冬吳滅巢左氏曰楚子為舟師以畧吳疆沈尹戍曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆埸無備邑能無亡乎越大夫胥犴勞王於豫章之汭越公子倉歸王乗舟倉及夀夢帥師從王王及圉陽而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戍曰亡郢之姑於此在矣王一動而亡二姓之帥幾如是而不及郢詩曰誰生厲階至今為梗其王之謂乎劉氏曰書曰巢伯來朝為諸侯審矣非楚邑也黄氏曰意古雖國而今屬楚也愚謂如左氏説則為楚伐吳且邑不言滅鍾離又不見於經未可據也二十有五年春叔孫婼如宋左氏曰叔孫婼聘於宋桐門右師見之語卑宋大夫而賤司城氏昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮今夫子卑其大夫而賤其宗是賤其身也能有禮乎無禮必亡宋公享昭子賦新宫昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆䘮心也心之精爽是謂魂魄魂魄去之何以能乆季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之公若從謂曹氏勿與魯將逐之曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣魯君䘮政四公矣無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣魯君失民矣焉得逞其志靖以待命猶可動必憂按婼果為季氏逆女經當有見今但曰如宋則聘而已自桐門右師至何以能乆又非本義不録有鸜鵒來巢左氏曰師已曰異哉吾聞文武之世童謡有之曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徴褰與𥜗鸜鵒之巢逺哉遥遥裯父䘮勞宋父以驕鸜鵒鸜鵒往歌來哭童謡有是今鸜鵒來巢其將及乎近於誣不録公羊曰何以書記異也何異爾非中國之禽也宜穴又巢也貫道王氏曰魯界濟水濟之東本無鸜鵒所謂鸜鵒不踰濟也顔師古以鸜鵒本巢居不皆穴處中國多有之公榖以為穴禽非也榖梁曰一有一亡曰有來者來中國也鸜鵒穴者而曰巢或曰増之也雍氏曰凡春秋記災異未有妄加之文或説非也秋七月上幸大雩季辛又雩公羊曰又雩者何又雩者非雩也聚衆以逐季氏也啖氏曰按雩但禮官與女巫而已何足攻季氏乎指掌異同云公以九月始遜豈以七月已與季氏戰乎若使時實不旱亦不得託雩以聚衆矣劉氏曰若七月聚衆則何九月乃出奔乎何休之説日為君辰為臣者逐季孟之意盖迂而不典榖梁曰季者有中之辭也又有繼之辭也有中之辭有繼之辭無理之甚九月己亥公孫于齊次于陽州榖梁曰孫之為言猶孫也諱奔也次止也此訓詁得之義則蔑如也齊侯唁公于野井左氏曰書曰公孫于齊次于陽州齊侯唁公于野井禮也將求於人則先下之禮之善物也臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無繾綣從公無通外内以公命示子家子子家子曰如此吾不可以盟羈也不佞不能與二三子同心而以為皆有罪或欲通外内且欲去君二三子好亡而惡定焉可同也陷君於難罪孰大焉通外内而去君君將速入弗通何為而何守焉乃不與盟昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰茍使意如得改事君所謂生死而肉骨也昭子從公於齊與公言子家子命適公館者執之公與昭子言於幄内曰將安衆而納公公徒將殺昭子伏諸道左師展告公公使昭子自鑄歸平子有異志冬十月辛酉昭子齊於其寝使祝宗祈死戊辰卒左師展將以公乗馬而歸公徒執之左氏不達春秋所書之意而以次于陽州唁于野井為禮夫禮以忠信為主昭公顛例至此齊侯又以虛文接之豈禮也哉且昭子祈死而戊辰即卒必無之理也又於經畧不見意但書叔孫婼卒而已豈可執傳以疑經哉餘非本義不録公羊曰齊侯唁公于野井曰奈何君去魯國之社稷昭公曰䘮人不佞失守魯國之社稷執事以羞再拜顙慶子家駒曰慶子免君於大難矣子家駒曰臣不佞陷君於大難君不忍加之以鈇鑕賜之以死再拜顙高子執簞食與四脡脯國子執壺漿曰吾寡君聞君在外餕饔未就敢致糗于從者昭公曰君不忘吾先君延及䘮人錫之以大禮再拜稽首以袵受髙子曰有夫不祥君無所辱大禮昭公盖祭而不嘗景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢以請昭公曰䘮人不佞失守魯國之社稷執事以羞敢辱大禮敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者昭公曰䘮人其何稱景公曰孰君而無稱昭公於是乎噭然而哭諸大夫皆哭既哭以人為菑以幦為席以鞌為几以遇禮相見孔子曰其禮與其辭足觀矣孔子書齊侯唁公于野井正譏其不能討季氏之罪而但以虛文慰安之耳公羊乃謂孔子取其禮與辭豈知言哉榖梁曰弔失國曰唁唁公不得入於魯也但如此訓詁何益於經十有一月己亥宋公佐卒于曲棘左氏曰十一月宋元公將為公故如晉夢大子欒即位於廟已與平公服而相之旦召六卿公曰寡人不佞不能事父兄以為二三子憂寡人之罪也若以羣子之靈獲保首領以沒惟是楄柎所以藉幹者請無及先君仲幾對曰君若以社稷之故私降昵宴羣臣弗敢知若夫宋國之法死生之度先君有命矣羣臣以死守之弗敢失墜臣之失職常刑不赦臣不忍其死君命祗辱宋公遂行己亥卒於曲棘考之於經畧無宋公為昭公如晉之事未可據也公羊曰曲棘者何宋之邑也諸侯卒其封内不地此何以地憂内也亦左氏之意榖梁曰邡公也亦左氏之意十有二月齊侯取鄆左氏曰十有二月庚辰齊侯圍鄆劉歆曰傳言圍未服也李氏曰劉何能知此年圍未服經何書取茍生胸臆非也公羊曰外取邑不書此何以書為公取之也雖不為公取亦當書之榖梁曰取易辭也内不言取以其為公取故易言之也雖不為公取亦書取也二十有六年春王正月葬宋元公左氏曰葬宋元公如先君禮也杜氏曰善宋人違命以合禮愚謂葬元公魯往㑹其葬因見私諡之義耳如其違命以合禮亦非本義三月公至自齊居于鄆左氏曰言魯地也雖非魯地亦曰居如天王出居於鄭是也此在魯地但不曰出耳若居之一字未見在外在内也榖梁曰公次于陽州其曰至自齊何也以齊侯之見公可以言至自齊也居于鄆者公在外也至自齊道義不外公也陽州者齊之邑也公自齊邑至於魯鄆雖不見齊侯豈不可言至自齊乎非義不外公而書至自齊也其曰居於鄆者公在外也此語粗近之而未得春秋所書之㫖夏公圍成左氏曰夏齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縳一如瑱適齊師謂子猶之人髙齮能貨子猶為髙氏後粟五千庾髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰羣臣不盡力於魯君者非不能事君也然據有異焉宋元公為魯君如晉卒於曲棘叔孫昭子求納其君無疾而死不知天之棄魯邪抑魯君有罪於鬼神故及此也君若待於曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公成大夫公孫朝謂平子曰有都以衛國也請我受師許之請納質弗許曰信女足矣告於齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩於齊齊師圍成成人伐齊師之飲馬於淄者曰將以厭衆魯成備而後告曰不勝衆師及齊師戰於炊鼻齊子淵㨗從洩聲子射之中楯瓦繇朐汰輈七入者三寸聲子射其馬斬鞅殪改駕人以為鬷戾也而助之子車曰齊人也將擊子車子車射之殪其御曰又之子車曰衆可懼也而不可怒也子囊帶從野洩叱之洩曰軍無私怒報乃私也將亢子又叱之亦叱之冉豎射陳武子中手失弓而罵以告平子曰有君子白晳鬒鬚眉甚口平子曰必子彊也無乃亢諸對曰謂之君子何敢亢之林雍羞為顔鳴右下苑何忌取其耳顔鳴去之苑子之御曰視下顧苑子刜林雍斷其足鑋而乗於他車以歸顔鳴三入齊師呼曰林雍乗經書公圍成而傳言齊侯納公而圍成既不足信且宋公為魯如晉卒於曲棘之事均未可信闕疑可也榖梁曰非國不言圍所以言圍者以大公也劉氏曰非也公失國而圍成師在封内而書之此小之甚者不可謂大愚按宋伐鄭圍長葛齊伐宋圍緡則邑亦言圍也公至自㑹居于鄆榖梁曰公在外也至自㑹道義不外公也辨見三月至自齊九月庚申楚子居卒左氏曰楚平王卒令尹子常欲立子西曰太子壬弱其母非嫡也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有嫡嗣不可亂也敗親速讎亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王非本義不録冬十月天王入于成周左氏曰四月單子如晉告急五月戊午劉人敗王城之師於尸氏戊辰王城人劉人戰於施谷劉師敗績七月己巳劉子以王出庚午次於渠王城人焚劉丙子王宿於禇氏丁丑王次於萑谷庚辰王入於胥靡辛巳王次於滑晉知躒趙鞅帥師納王使女寛守闕塞冬十月丙申王起師於滑辛丑在郊遂次於尸十一月辛酉晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚隂忌奔莒以叛召伯逆王於尸及劉子單子盟遂軍圉澤次於隄上癸酉王入於成周甲戌盟於襄宫晉師使成公般戍周而還十二月癸未王入於莊宫王子朝使告於諸侯曰昔武王克殷成王靖四方康王息民並建母弟以蕃屏周亦曰吾無専享文武之功且為後人之迷敗傾覆而溺入於難則振救之至於夷王王愆於厥身諸侯莫不並走其望以祈王身至於厲王王心戾虐萬民弗忍居王於彘諸侯釋位以間王政宣王有志而後效官至於幽王天不弔周王昏不若用愆厥位攜王奸命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力於王室也至於惠王天不靖周生頽禍心施於叔帶惠襄辟難越去王都則有晉鄭咸黜不端以綏靖王家則兄弟之能率先王之命也在定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至於靈王生而有頿王甚神聖無惡於諸侯靈王景王克終其世今王室亂單旗劉狄剥亂天下壹行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂於王室侵欲無厭規求無度貫瀆鬼神慢棄刑法倍奸齊盟傲狠威儀矯誣先王晉為不道是攝是賛思肆其罔極兹不榖震盪播越竄在荆蠻未有攸底若我一二兄弟甥舅奬順天法無助狡猾以從先王之命無速天罰赦圖不榖則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無嫡則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及太子夀早夭即世單劉賛私立少以間先王亦唯伯仲叔季圖之閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命逺晉之大以専其志無禮甚矣文辭何為劉氏曰𫝊曰召伯盈逐王子朝杜云召伯當言召氏經誤皆非也召伯既逐王子朝而歸敬王矣又何為以子朝奔乎若云召伯當作召氏者則又不與經合且召伯既自歸周則其族亦必隨之何故猶奉子朝為亂乎且召伯尊也召族卑也今召伯不奔召族自出法不當書於經而序毛伯之上也又不得以尹氏為比尹氏所以書者以有尹固也固尊自得書耳召族無盈則卑卑何故書乎愚按經先書天王入於成周而後子朝奔楚𫝊乃反之亦當以經為正公羊曰成周者何東周也其言入何不嫌也入者入於成周耳公羊以入為簒辭故何氏解云上言天王著有天子已明不嫌為簒是皆一字褒貶之弊榖梁曰周有入無出也按天王出居於鄭豈可言無出乎然則自内而出曰出自外而入曰入固命辭之常法也尹氏召伯毛伯以王子朝奔楚榖梁曰楚逺矣非也奔直奔也此辭晦而理迂二十有七年春公至自齊居于鄆左氏曰言在外也榖梁曰公在外也辨並見二十六年夏四月吳弑其君僚左氏曰吳子欲因楚䘮而伐之使公子掩餘公子燭庸帥師圍潛使延州來季子聘於上國遂聘於晉以觀諸侯楚莠尹然工尹麇帥師救潜左司馬沈尹戍帥都君子與王馬之屬以濟師與呉師遇於窮令尹子常以舟師及沙汭而還左尹郤宛工尹夀帥師至於潜吳師不能退吳公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可弑也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享王王使甲坐於道及其門門階戸席皆王親也夾之以鈹羞者獻體改服於門外執羞者坐行而入執鈹者夾承之及體以相授也光偽足疾入於堀室鱄設諸置劒於魚中以進抽劔刺王鈹交於胸遂弑王闔廬以其子為卿季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待吳公子掩餘奔徐公子燭庸奔鍾吾據左氏言是公子光使鱄設諸弑僚春秋當誅首惡書曰吳公子光弑其君僚若曰僚不當立光當立宜辨明於初立之時今僚立有年光北面事之而復弑之非弑其君而何哉使孔子以光為當立以僚為簒必不書曰弑其君既書曰弑其君必不匿光之名分惡於衆而單書曰國餘見或問楚殺其大夫郤宛左氏曰楚師聞吳亂而還郤宛直而和國人説之鄢將師為右領與費無極比而惡之令尹子常賄而信讒無極譛郤宛焉謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無徃且此役也呉可以得志子惡取賂焉而還又誤羣帥使退其師曰乗亂不祥吳乗我䘮我乗其亂不亦可乎令尹使視郤氏則有甲焉不徃召鄢將師而告之將師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨據左氏言則是令尹以私怒殺郤宛耳經何以言楚殺其大夫郤宛乎使郤宛信無極之言以五甲五兵酬令尹不應先帷諸門左且無極既招令尹飲郤宛之家矣不應又譛以甲兵在門而繼之伐吳取賂之事遂能使令尹信之也凡其所叙之事皆不近人情秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈左氏曰秋㑹於扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨於季孫謂司城子梁與北宫貞子曰季孫未知其罪而伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啟叔孫氏之心不然豈其伐人而説甲執兵以游叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之賛有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復據經未見戍周納公之事豈左氏見經書天王入於成周與公居鄆之文而意之歟二十八年左氏乃言君淹恤在外亦不使一个辱在寡人則非謀納公亦明矣何左氏之不反顧而自伐歟冬邾快來奔公羊曰邾婁快者何邾婁之大夫也邾婁無大夫此何以書以近書也陳岳氏曰小國近者多矣而獨書快邪二十八年春公如晉次於乾侯左氏曰公如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聴使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一个辱在寡人而即安於甥舅其亦使逆君使公復於竟而後逆之趙氏曰豈有客而請逆於主人乎又豈有令客郤至境而逆之乎左説不近人情愚謂公非即安其安而如乾侯也不得即造晉之都耳左氏叙子家子之言亦恐未可據二十有九年春齊侯使髙張來唁公榖梁曰唁公不得入於魯也劉氏曰唁公不得入于晉也愚謂以當時人情觀之齊之唁公口則唁公不得入於魯心則嗤公不得入於晉也夏庚子叔詣卒榖梁曰季孫意如曰叔倪無病而死此皆無公也是天命也非我罪也季孫未必有是言也冬十月鄆潰公羊曰邑不言潰此其言潰何郛之也曷為郛之君存焉爾潰者民逃其上若水之潰散也國可言潰邑亦可以言潰也豈有君存而改邑為郛之理榖梁曰潰之為言上下不相得也上下不相得則惡矣亦譏公也昭公出奔民如釋重負榖梁之責昭公是矣然季氏之罪反見釋焉是舍其重而責其輕也三十年春王正月公在乾侯左氏曰不先書鄆與乾侯非公且徴過也按鄆猶在國故不書鄆若二十九年正月不書乾侯者非告朔之始耳榖梁曰中國不存公存公故也聖人固存公也而乾侯之書非特存公而已觀本義則其意可見餘見或問秋八月葬晉頃公左氏曰夏六月晉頃公卒秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之䘮子西弔子蟜送葬今吾子無貳何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命先王之制諸侯之䘮士弔大夫送葬唯嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之閒先君有所助執紼矣若其不閒雖士大夫有所不獲數矣大國之惠亦慶其加而不討其乏明底其情取備而已以為禮也靈王之喪我先君簡公在楚我先大夫印叚實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰非本義不録三十有一年春王正月公在乾侯左氏曰言不能外内也非經所書之意夏四月丁巳薛伯榖卒左氏曰薛伯榖卒同盟故書春秋書卒必有義豈記事而已冬黒肱以濫來奔左氏曰冬邾黒肱以濫來奔賤而書名重地故也君子曰名之不可不慎也如是夫有所有名而不如其己以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回不為義疚或求名而不得或欲盖而名章懲不義也齊豹為衛司㓂守嗣大夫作而不義其書為盗邾庶其莒牟夷邾黒肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以徼大利而無名貪冒之民將寘力焉是以春秋書齊豹曰盗三叛人名以懲不義數惡無禮其善志也故曰春秋之稱㣲而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之趙氏曰左氏若以齊豹是大夫但為其求名故書為盗不與其名者則諸侯相殺而書名者是與其名乎又云三叛人欲盖而名章言其賤必不書其名矣夫子矯其心而書爾若如此則三人預知修春秋賤者不書其名乎為是將以賂魯而屬夫子令不書乎何言欲盖也皆妄為曲説殊可怪也愚謂為人臣而以邑奔罪孰大焉左氏但反覆辨論有名無名豈知本哉惟不知本故反覆論議數十百言無一語可采者春秋微而顯豈在名與不名乎公羊曰文何以無邾婁通濫也曷為通濫賢者子孫宜有地也賢者孰謂謂叔術也何賢乎叔術讓國也其讓國奈何當邾婁顔之時邾婁女有為魯夫人者則未知其為武公與懿公與孝公幼顔淫九公子於宫中因以納賊則未知其為魯公子與邾婁公子與臧氏之母養公者也君幼則宜有養者大夫之妾士之妻則未知臧氏之母者曷為者也養公者必以其子入養臧氏之母聞有賊以其子易公抱公以逃賊至凑公寢而弑之臣有鮑廣父與梁買子者聞有賊趨而至臧氏之母曰公不死也在是吾以吾子易公矣於是負孝公之周訴天子天子為之誅顔而立叔術反孝公於魯顔夫人者嫗盈女也國色也其言曰有能為我殺殺顔者吾為其妻叔術為之殺殺顔者而以為妻有子焉謂之盱夏父者其所為有於顔者也盱㓜而皆愛之食必坐二子於其側而食之有珍怪之食盱必先取足焉夏父曰以來人未足而盱有餘叔術覺焉曰嘻此誠爾國也夫起而致國於夏父夏父受而中分之叔術曰不可三分之叔術曰不可四分之叔術曰不可五分之然後受之公扈子者邾婁之父兄也習乎邾婁之故其言曰惡有言人之國賢若此者乎誅顔之時天子死叔術起而致國于夏父當此之時邾婁人常被兵於周曰何故死吾天子通濫則文何以無邾婁天下未有濫也天下未有濫則其言以濫來奔何叔術者賢大夫也絶之則為叔術不欲絶不絶則世大夫也大夫之義不得世故於是推而通之也劉氏曰公羊云通濫也非也以叔術為賢賢既不足又懸隔數十世外而通叛君之黒弓使當有國誰能信之乎漢諸儒辨此多矣是非紛拏者惑於辭也不若以大義格之使在度外且仲尼稱出門如見大賔使民如承大祭有如叔術之為者乎其非聖人意亦可知也矣榖梁曰其不言邾黒肱何也别乎邾也其不言濫子何也非天子所封也來奔内不言叛也李氏曰公榖亦以濫為邾邑而𫝊解其無邾字之意言邾人以濫封此黒肱使為别國故不係於邾釋曰不書邾闕文也二傳不可通陳岳氏曰春秋凡書外大夫來奔未有不言國者外大夫以地來奔亦未有不係於國者如衛北宫結來奔邾庶其以漆閭丘來奔莒牟夷以牟婁及防兹來奔是也斯黒肱以濫來奔亦莒慶庶其莒牟夷一類也不曰國闕文明矣二傳不原其闕互相穿鑿皆狂瞽之言也其言通濫為國茍通為國則當書濫子黒肱以濫來奔安可謂黒肱以濫來奔哉又謂不言邾以别乎邾皆不足取三十有二年春王正月公在乾侯左氏曰言不能外内又不能用其人也案公固不能内外不能用人而至此但此書公在乾侯非此之謂觀本義可見取闞公羊曰闞者何邾婁之邑也曷為不繫乎邾婁諱亟也公榖凡書邑不繫國者悉付之邾甚可笑也夏吳伐越左氏曰史墨曰不及四十年越其有吳乎越得歳而吳伐之必受其凶孟子曰天時不如地利地利不如人和左氏不辨其理但論得歳末矣冬仲孫何忌㑹晉韓不信齊高張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周左氏曰魏子南面衛彪傒曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅况干位以作大事乎使魏舒同如京師合諸侯之大夫經何不書之而獨書韓不信乎榖梁曰天子微諸侯不享覲天子之在者唯祭與號故諸侯之大夫相率以城之此變之正也榖梁知城成周為變之正而不知成周非京師之舊又不知諸侯不親而大夫城之為非正可謂知言乎十有二月己未公薨于乾侯左氏曰十二月公疾偏賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜己未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有倍貳故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日乆矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓於今為庶主所知也在易卦雷乘乾曰大壯天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功於魯受費以為上卿至於文子武子世增其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人案史墨之言乃鄙夫之常談非臣事君之義也不可以則餘非本義不録三傳辨疑卷十八
