body:
  text: 三傳辨疑卷十元程端學撰文公元年春王正月公即位榖梁曰繼正即位正也案繼正即位雖為正也然不請命于天王則不論也二月癸亥日有食之天王使叔服來㑹葬左氏曰王使內史叔服來㑹葬公孫敖聞其能相人也見其二子焉叔服曰榖也食子難也收子穀也豐下必有後於魯國非本義不録公羊曰其言㑹葬何㑹葬禮也陸氏曰㑹僖公葬記是以著非也胡氏曰若為得禮孔子何以書書之者非禮也穀梁曰葬曰㑹其志重天子之禮也趙氏曰夫子意在辨是非豈唯重之而已乎夏四月丁巳葬我君僖公榖梁曰薨稱公舉上也葬我君接上下也僖公葬而後舉諡諡所以成德也於卒事乎加之矣公雖僣辭然當時史法之常其曰葬我君亦史法之常豈獨僖公哉其曰諡所以成德於卒事乎加之又諡法之常若夫臣子不請於王而私諡則不言焉其於春秋何所發明哉天王使毛伯來錫公命公羊曰錫者何賜也命者何加我服也劉氏曰非也命為諸侯榖梁曰禮有受命無來錫命錫命非正也趙氏曰錫命者功德之由茍而至非禮也穀梁說非也案秦漢以後郡縣天下天子益尊不比三代猶近郡國加守宰秩何得無錫命乎蓋不知賞其無功而遂妄為義也晉侯伐衛左氏曰晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭伐綿訾及匡晉襄公既祥使告于諸侯而伐衛及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王於溫先且居胥臣伐衛五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子劉氏曰按傳實伐衛者先且居也衛人伐晉按傳實伐晉者孔達也杜氏曰先且居而稱晉侯者從告辭也孔達而稱衛人者貶之也安知衛人非當時之告乎一則云告一則云貶茍便其說而已何經之有葉氏曰經言晉侯伐衛則非先且居胥臣矣文公以僖三十二年十二月卒至今年四月方練後四月不得言既祥溫㑹在僖二十八年文公之為也亦不得言朝王于溫三者皆誤愚謂晉果圍邑取邑獲大夫經當詳書之經所不書則左氏誣也衛人伐晉左氏曰衛人使告於陳陳共公曰更伐之我辭之衛孔達帥師伐晉君子以為古古者越國而謀劉氏曰古者雖越國而謀必義事也今陳與衛何謀哉謀畔命侵小者也謀畔命侵小是非古矣何以謂之古存耕趙氏曰無瑕可以律人晉之伐未為是也然古無伯無私交左氏以為古者越國而謀杜預謂之合古之道失今事伯之禮豈不悖哉未知今焉知古公孫敖㑹晉侯于戚左氏曰秋晉侯疆戚田故公孫敖㑹之杜氏曰晉取衛田正其疆界愚謂左氏嘗於晉侯伐衛之下云圍戚取之其病蓋原於公孫敖㑹晉侯於戚之一語而妄以疆戚田之事實之皆當以經為正冬十月丁未楚世子商臣弒其君頵左氏曰諡之曰靈不瞑曰成乃瞑東萊吕氏曰諡靈不瞑與荀偃視不可含相類人死而氣未散猶未瞑也久而氣散則瞑矣未必以惡諡與未嗣事於齊之故愚謂諡在葬時斂時豈有諡哉左氏蓋得齊東野人之語而不察也榖梁曰日髠之卒所以謹商臣之弒也夷狄不言正不正劉氏曰非也即不日者乃不謹商臣之弒乎日之何當葉氏曰商臣之弒不待日卒而謹也蔡世子般弒其君同此宜亦當日何為而獨不日乎楚子卒見經者六皆非弒也而未有不日者公孫敖如齊左氏曰穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也趙氏曰此據春秋時事言之非禮經本意去左氏禮也二字劉氏曰左氏曰始聘禮也杜云明諸侯諒暗則國事皆用吉禮非也左氏見當時諸侯廢喪而聘故推以為禮杜氏見左氏有得禮之言遂推以為當喪而吉皆反經越禮不可以教後世者也此又明丘明不聞道於仲尼矣仲尼不云乎三年之喪自天子達二月春王二月甲子晉侯及秦師戰于彭衙秦師敗績左氏曰戰于殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣非本義不録丁丑作僖公主左氏曰葬僖公緩作主非禮也凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟丁丑作僖公主書不時也劉氏曰杜氏讀緩字以上為一句作字下為一句非也僖公以十二月薨以明年四月葬凡五月也不得云緩杜氏本欲遷僖公之薨在十一月僖公之薨在十一月則除喪在文二年十一月因以文納幣為十二月則與傳合矣而不顧理乖也𫝊云葬僖公緩作主者緩以下乃當為一句言葬僖公而作主緩即文二年經書作僖公主是也今欲屬緩於葬僖公以明僖公為十一月薨獨不顧作主非禮也之語無所繫是傳譏葬緩又譏不當作主乎茍欲遂已之說黨其所附不求諸道真可怪也哉趙氏曰左氏云蒸嘗禘于廟彼傳意者見前後經文唯有蒸嘗禘三名以為祭名盡於此殊不知春秋所記祭祀唯記其失禮者於禴祠無失禮所以不記左氏不尋此意遂云蒸嘗禘於廟愚謂左氏謂凡君薨卒哭而祔祔而作主亦非禮也禮既葬作主於墓不終日而虞豈待祔而作主乎夫殷禮練而祔周禮卒哭而祔若如左氏說則用殷禮者一年無主用周禮者自葬至虞與卒哭無主乎不通之論也且作主之期自天子達于庶人亦不可言凡君也公羊曰其不時奈何欲久喪而後不能也劉氏曰文公自惰緩不作主耳何以知其欲久喪穀梁曰作為也為僖公主也立主喪主於虞吉主於練作僖公主譏其後也作主壞廟有時日於練焉壞廟壞廟之道易檐可也改塗可也案殷既練而祔周卒哭而祔而所謂祔者不過以新主合祭於祖考之廟告以祔廟之事既祭之後其新舊主各歸其所而未遷也祖考舊主仍歸祖廟新主仍居靈座至大祥然後以新主入居祖考之廟而祖考遷于髙祖之廟髙祖為五世祖為親盡之主於是始祧所謂壞廟者也其見於儀禮喪禮注文甚悉而大戴禮諸侯遷廟篇亦云君及從者皆𤣥服則是三年之後既除喪而遷矣若依周禮卒哭而祔則卒哭之後即除靈座不識孝子之心安乎否也此理之決不然者今榖梁謂於練焉壞廟則是小祥之時即不奉靈座此非小失也三月乙巳及晉處父盟左氏曰晉人以公不朝來討公如晉夏四月己巳晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也案經凡公如他國必書至河而復且書之不見公且書之何獨於此諱之而不書乎此必不然者也且公在喪服中如晉來討我亦有辭何為遽朝晉乎使得罪於晉晉將别有以責之不必故使大夫與盟以恥之也此皆左氏妄為之辭公羊曰此晉陽處父也何以不氏諱與大夫盟也劉氏曰非也諱與大夫盟沒公足矣何為去其氏即內微者及晉處父盟何以辨乎陳嶽氏曰茍諱之沒其盟而不書矣安有止去其族而為諱也榖梁曰不言公處父伉也為公諱也何以知其與公盟以其日也何以不言公之如晉所恥也出不書反不致也以書日而知其與公盟尤臆度之甚者辨見左氏公羊夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴左氏曰公未至六月穆伯㑹諸侯及晉司空士縠盟于垂隴晉討衛故也書士縠堪其事也陳侯為衛請成于晉執孔達以說啖氏曰一命之大夫例皆書名不論堪與不堪存耕趙氏曰晉相繼伯方求諸侯乃使士縠尸其盟開後世不可救之禍左氏謂書士縠堪其事不亦誣乎愚謂公未嘗如晉左氏何得言公未至乎如執孔達又何為不經見乎凡此類者徒足以亂經耳何益於本義哉榖梁曰內大夫可以㑹外諸侯不知制此禮者誰歟其非周公孔子明矣自十有二月不雨至於秋七月公羊曰何以書記異也大旱以災書此亦旱也曷為以異書大旱之日短而云災故以災書此不雨之日長而無災故以異書也案大旱日短既為災矣不雨即旱也豈有不雨之日長而不為災者乎雖婦人女子皆知其不然者也何足辨哉榖梁曰厯時而言不雨文不憂雨也不憂雨者無志乎民也獻可杜氏曰僖公書不雨者三文公亦書不雨者三而榖梁解之特異夫春秋書年必具四時一時無事則書首月是以僖二年冬十月不雨三年春正月不雨夏四月不雨春秋所以析而言之者蓋不可闕首月以備四時也今文公書十有二月不雨至於秋七月者蓋春夏自有異事以備四時也十年十三年正月不雨至於秋七月者其年之夏亦有異事不復出首月而書不雨也榖梁以二公所書之異曲生外意謂僖公得雨為有志於民以文公不憂雨為無志乎民穀梁蓋賢僖公而為此說也夫文公為人之君豈獨無憂旱之心邪八月丁卯大事于太廟躋僖公左氏曰故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也仲尼曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虛器縱逆祀祀爰居三不知也啖氏曰案宋當祖湯鄭又諸侯不敢祖天子故知此左傳謬也愚謂左氏此意甚善然自湯不先契以下與其所引詩而又引君子曰以解之疏闊不切故略之公羊曰五年而再殷祭何氏曰殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也禮諸侯禘則不礿愚謂以何氏說推公羊意則與不王不禘之義大相戾矣夫王者推其祖所自出之帝祀之于始祖之廟而以始祖配之若當時功臣皆祭之則何氏謂殷祭為禘者非也夫禮雖有諸侯禘而不礿之文乃漢儒見春秋有禘而無礿故自言之耳蓋春秋常事不書故偶無礿非常乃書故有禘漢儒不識春秋之㫖遂謂諸侯禘而不礿嗚呼陋哉但恐公羊之所謂殷祭者非何氏所說耳榖梁曰大事者何大是事也著祫嘗祫祭者毁廟之主陳於太祖未毁廟之主皆升合祭于太祖案大事者祫祭耳故劉氏曰時祭曰有事祫祭曰大事榖梁謂大是事豈訓詁哉且嘗是秋祭祫是合祭著祫嘗之說亦無理冬晉人宋人陳人鄭人伐秦左氏曰晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役卿不書為穆公故尊秦也謂之崇德劉氏曰卿不書為穆公故尊秦也非也於經何以知其非微者稱人乎葉氏曰凡王之下士外小國之卿與大國之士皆一命書人公羊所謂微者春秋常法也其名例固不可亂此春秋别嫌明微之道而傳每於諸國以人見者皆為貶卿之辭必列其姓氏而曲為之說以義考之悉無所據且此伐秦之人謂之崇德春秋伐國而非其罪多矣未嘗皆見貶秦穆公雖悔過有用孟明之善何為而遽尊之乎存耕趙氏曰聖人固不以秦人之悔過而卑中國也愚謂穆公悔過雖見於書然再伐晉以報怨則是有悔過之言而無悔過之實聖人不以人廢言故録之於書其實何德之可崇乎晉雖不道而秦亦有以取之蓋亦無有優劣矣以爵氏為褒貶豈特公穀之過哉其取汪及彭衙經所不書則傳亦未有可信者也公子遂如齊納幣左氏曰襄仲如齊納幣禮也凡君即位好舅甥修婚姻娶元妃以奉粢盛孝也孝禮之始也啖氏曰魯往他國納幣事皆不書凡書者譏也他國來則書之左氏不達此例云襄仲如齊納幣為合禮誣亦甚矣胡氏曰左氏謂禮固非今考其嵗月是三年內圖婚可謂之禮乎更以公羊辨之譏喪娶也娶在三年之外則何譏乎喪娶三年之內不圖婚言僖公以十二月薨至此未滿二十五月是喪娶此說最詳范寧曰喪制未畢而納幣非禮也左氏以為得禮是居喪可得而婚矣葉氏曰僖公以十二月薨杜預以為月誤當為十一月今以冬納幣固未知其十二月與否審十二月猶在禫則納采在三年之內矣反以為禮乎諸侯娶元妃固自有時而左氏以即位為節尤見為妄三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐洗沈潰左氏曰凡民逃其上曰潰在上曰逃凡曰逃者不分上下何訓詁近似夏五月王子虎卒左氏曰夏四月乙亥王叔文公卒來赴弔如同盟禮也案王臣無外交赴弔如同盟豈禮也哉公羊曰外大夫不卒此何以卒新使乎我也陳嶽氏曰苟以使于我則書則祭伯凡伯南季毛伯叔服王季子皆使于我胡不書之茍為㑹葬而書則諸㑹葬胡不書之愚案左氏謂王子虎即盟翟泉稱王人者也公羊穀梁則指來㑹葬稱叔服者也於經皆無所考而意之云爾穀梁曰叔服也此不卒者也何以卒之以其來㑹葬我卒之也或曰以其嘗執重以守也啖氏曰叔服若是王子則㑹葬之時何得不書王子乎愚謂使嘗執重以守國亦天子之大夫耳尤不可交政於諸侯守國而交政於諸侯是無天子也辨又見公羊秦人伐晉左氏曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之一也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪懈以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉經言秦人而傳言秦伯經不書取邑而傳言取王官及郊凡此類皆所當刪者也且其言莫非功利之謀而非春秋本義其所引詩又無理趣故不録雨螽于宋左氏曰雨螽于宋墜而死也季氏曰凡言雨者著于上見于下者也其言雨則衆多可知今言雨螽于宋者若書隕石所以記鄰國之異也愚謂據經但言雨螽焉知其死左氏蓋以螽者飛動之物今言雨螽則疑其墜而死耳然則左氏於其訓詁猶有未知也公羊曰雨螽者何死而墜也何以書記異也外異不書此何以書為王者之後記異也李氏曰春秋書鄰國之災若襄三十年齊大災昭九年陳大災十八年宋衛陳鄭災莊十一年宋大水之類是也公羊以為王者之後記異榖梁以為志災甚杜預以為宋人喜獲天祐而來告皆非也愚謂經但言雨螽而左氏謂墜而死何足辨哉榖梁曰外災不志此何以志也曰災甚也其甚奈何茅茨盡矣著于上見于下謂之雨案經但言雨螽安知茅茨盡哉亦非以甚而書也冬公如晉十有二月己巳公及晉侯盟左氏曰晉人懼其無禮於公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂案二年處父之盟公實不如晉左氏既妄為之辭故此又有晉懼無禮於公請改盟之說蓋此本魯朝晉既朝而遂為盟耳晉豈懼無禮於魯者哉晉陽處父帥師伐楚以救江左氏曰楚師圍江晉先僕伐楚以救江冬晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還葉氏曰救未有言伐者經書伐楚蓋不直救為緩故明年楚卒滅江若王叔桓公實同伐則何以不書於經愚謂經但書冬晉陽處父帥師伐楚以救江而已而左氏謂冬以前晉先僕伐楚以救江至冬而又告于周故王叔桓公陽處父復伐楚以救江則是先僕自為一人伐楚處父自為一人伐楚一事而為兩事豈足據哉公羊曰此伐楚也其言救江何為緩也其為緩奈何伐楚為救江也公穀解其文而不解其義何益於經哉榖梁曰此伐楚其言救江何也江逺楚近伐楚所以救江也榖梁言江逺楚近非也乃江近楚逺耳四年春公至自晉夏逆婦姜于齊左氏曰逆婦姜于齊卿不行非禮也君子是以知出姜之不允於魯也曰貴聘而賤逆之君而卑之立而廢之棄信而壞其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也劉氏曰假令卿行遂可謂之禮乎愚謂使不使卿春秋當書大夫之名以見義如紀履繻來逆女之類可也今經不書大夫之名讀者何所據而見義哉公羊曰其謂之逆婦姜于齊何略之也髙子曰娶乎大夫者略之也啖氏曰傳無事跡焉知娶乎大夫劉氏曰此雖孤經無他證據然魯初納幣乃用上卿審娶大夫者禮豈如此崇乎愚謂若娶大夫之女經當書曰逆某女于齊亦不得言婦姜也穀梁曰其曰婦姜為其禮成乎齊也其逆者誰也親逆而稱婦或者公與何其速婦之也曰公也其不言公何也非成禮於齊也曰婦有姑之辭也其不言氏何也貶之也何為貶之也夫人與有貶也劉氏曰且令非禮成於齊者云公如齊逆婦姜足矣文不當沒公刺譏之事未有沒公也此似不識春秋不但失解而已愚謂穀梁謂成禮乎齊以其稱婦故也復曰婦有姑之辭何其自返之速也若宋蕩伯姬來逆婦杞伯姬來求婦遂以夫人婦姜至自齊僑如以夫人婦姜至自齊皆有姑之辭榖梁亦嘗自言之矣何獨於此解婦姜為禮成乎齊哉秋楚人滅江左氏曰君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣此等處引詩皆左氏自為之所以多無理趣衛侯使寧俞來聘左氏曰衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾非本義不録五年春王正月王使榮叔歸含且賵左氏曰春王使榮叔來含且賵召昭公來㑹葬禮也何氏曰禮尊不含卑又不兼二禮左氏以為禮於義為短劉氏曰庶子為君為其母無服不敢二尊者也妾母稱夫人王不能正而又使公卿㑹之何禮之有獻可杜氏曰妾母之薨天王既歸含賵今又使卿㑹葬而左氏以為禮杜氏以為不及事穀梁以為鄙上之辭皆非也公羊曰其言歸含且賵何兼之兼之非禮也趙氏曰公榖又云譏一人兼行二禮殊乖禮意據禮含賵禭止一人兼行耳若每事須一人則罄王朝之臣不足以充喪禮之使也榖梁曰含一事也賵一事也兼歸之非正也其曰且志兼也其不言來不周事之用也賵以早而含已晚胡氏曰二傳皆言兼之成風僖公之妾母也妾母不得上僣夫人既僣稱夫人天王不能正又使榮叔歸含且賵故經書之譏天王厚禮諸侯之妾母也非譏兼也何休謂去天字以貶亦非且春秋尊王安得貶乎劉氏曰春秋惡歸之云乎豈曰惡兼之云乎又曰其不言來不周事之用亦非也宰咺豈周事之用乎何以言來啖氏曰承上言成風薨不言來可知也愚謂不言來文勢不可言來也若曰天王使榮叔來歸含且賵則其文支矣故不言來耳何有别義哉其曰賵早含晚固然然有大害理者賵早含晚非所論矣若但論早晚則無異不能三年喪而緦麻之察而已三月辛亥葬我小君成風公羊曰成風者何僖公之母也公羊謂僖公母嫡母邪妾母邪嫡妾不辨是無義也何以解經哉王使召伯來㑹葬榖梁曰㑹葬之禮於鄙上榖梁不解春秋所書之㫖而論㑹葬之禮況鄙上之談全無禮乎秋楚人滅六左氏曰冬楚公子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉案楚若滅蓼經當書之若曰不赴滅六何以赴若曰聞其事而史書之則臧文仲兩聞之矣魯史安得不書魯史既書其事既同孔子安得削一筆一哉皆所不解者也六年秋季孫行父如晉左氏曰季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害非本義不録冬十月晉殺其大夫陽處父晉狐射姑出奔狄左氏曰晉搜于夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自溫改搜于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政制事典正法罪辟獄刑董逋逃由質要治舊汙本秩禮續常職出滯淹既成以授太傅陽子與太師賈他使行諸晉國以為常法賈季怨陽子之易其班也而知其無援於晉也九月賈季使續鞫居殺陽處父書曰晉殺其大夫侵官也十一月丙寅晉殺續簡伯賈季奔狄宣子使臾駢送其帑劉氏曰左氏曰侵官也案左氏此事始末罪處父獨有稱趙宣子為能耳改搜易將皆出晉侯何以為處父侵官邪人君任賢不稱必將致敗茍食祿者舉當諫君況處父晉國太傅邪事有不便言之宜矣以此為侵官是教大臣拱默也左氏又曰陽子成季之屬也故黨於趙氏此欲致其法必於侵官以塗汚處父耳凡言黨者以其陰私比周不以正舉者也若舉不失人亦何謂黨乎如處父之舉趙盾趙盾卒為良大夫其退賈季賈季卒為亂而奔皆可謂當矣非故有所厚薄也春秋豈忽於此貶之耶如使大臣見賢而舉謂之侵官見賢而不舉乃其職矣不亦謬乎康侯胡氏曰人君用人失當則其國必危凡立於朝者舉當諫君況身為晉國太傅邪若以為侵官將相大臣非其人百官有司失其職在位者常拱默自全陰聽人主之所為至於顛危而不救則將焉用彼相乎率天下臣子為持祿容身不忠之行以誤國家事者必此侵官之說夫許氏曰處父賢趙盾而不可姑射為國忠謀豈曰黨哉使處父於此從容不言以免為智者是使國不用賢而用亂人也非蹇蹇匪躬臣道之訓也傳又罪其改搜為侵官當襄公時晉政未亂卿帥之重孰能擅改使謀出處父而公行之又何咎焉愚謂使賈季以私意使殺處父經必不書曰晉殺其大夫使趙盾為處父所薦安得不殺賈季而容其奔狄又使臾駢送其帑哉大凡左氏造事遷就類如此讀者以理求之其僞自不能隱矣公羊曰晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也其漏言奈何君將使射姑將陽處父諫曰射姑民衆不說不可使將於是廢將陽處父出射姑入君謂射姑曰陽處父言曰射姑民衆不說不可使將射姑怒出刺陽處父於朝而走陳嶽氏曰春秋書殺多矣君殺則稱君臣殺則稱臣盜殺則稱盜斯謂之君漏言稱國誤矣劉氏曰處父見殺射姑出奔有何可疑而明射姑殺處父乎成十五年宋殺其大夫山宋華元出奔晉然則殺山者亦華元乎愚謂審射姑聞襄公言出刺處父於朝而走當在襄公時何為在襄公既葬之後乎三傳上欲解稱國以殺下欲解既殺處父而射姑出奔既不知事實又不知春秋大義故其穿鑿如此穀梁曰稱國以殺罪纍上也襄公已葬其以纍上之辭言之何也君漏言也上泄則下暗下暗則上聾且暗且聾無以相通夜姑殺者也夜姑之殺奈何曰晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者君之使臣也使仁者佐賢者不使賢者佐仁者今趙盾賢夜姑仁其不可乎襄公曰諾謂夜姑曰吾始使盾佐女今女佐盾矣夜姑曰敬諾襄公死處父主竟上事夜姑使人殺之君漏言也故士造辟而言詭辭而出曰用我則可不用我則無亂其德邦衡胡氏曰案經稱國以殺君殺之也豈有臣下相殺而稱國乎又是襄公已葬方書殺處父安得謂襄公漏言哉閏月不告月猶朝于廟公羊曰不告月者何不告朔也曷為不告朔天無是月也閏月矣何以謂之天無是月非常月也猶者何通可以已也劉氏曰公羊謂不告朔禮也猶朝于廟非禮也非也閏雖無常而政有常安得不告假令閏在十二月者必有立春立春之政所當告也若就前月告之則先時若就後月告之則不及時由是觀之閏自當告也榖梁曰不告月者何也不告朔也不告朔則何為不言朔也閏月者附月之餘日也積分而成於月者也天子不以告朔而喪事不數也猶之為言可以已也劉氏曰閏月亦有政可得勿告乎吾於公羊既言之矣朴卿吕氏曰置閏非人之私意也以日月之行一合朔而一置月則閏月之置亦以其合朔置之也閏月雖無中氣而有朔望孰謂閏月而非朔乎公羊以為天無是月誤矣榖梁以為天子不以告朔而喪事不數也亦誤矣夫喪事之不數者以年計不以月計也告朔則以月計也孰謂天子不以告朔乎七年春公伐邾三月甲戌取須句遂城郚左氏曰春公伐邾間晉難也三月甲戌取須句置文公子焉非禮也趙氏曰若實如左氏則經文當書以示譏經既不書何憑為實且書取皆譏之葉氏曰文公子審叛其父我取其邑而封之辭不應無所貶此理必不然者蓋傳誤須句以為國也使實有此絶大皥之祀以與鄰國叛臣其罪又大於取邑亦不應無異文也公羊曰取邑不日此何以日內辭也使若他人然劉氏曰非也僖公時亦嘗伐邾取須句矣何不為內辭哉何休曰所以深諱者扈之盟不見序并為敢邑故案僖公取須句之年與邾戰于升陘敗內之師理亦可諱而何故不曰以為內辭哉又僖二十六年伐齊取穀書公至自伐齊者公羊以為雖得意且有後患故從不得意之例以致公也然僖公之後卒無患今此緣取邑之故故扈之盟不見序可謂後有患何不書公至自伐邾婁以起不得意乎夫取穀無患也書公至取須句有患不書公至何二三哉陳嶽氏曰外事多從赴告內事多從舊史日即日不日即不日公羊謂諱之不足取穀梁曰取邑不日此其日何也不正其再取故謹而日之也劉氏曰非也設不日則聽其取乎諸取邑不日者皆聽之矣葉氏曰僖公既取須句又取訾婁一公而連取邾二邑不謹而日文公與僖公異世而再取乃謹而日乎其輕重不倫矣此乃見內取邑十一不日而此獨日故妄意之也宋人殺其大夫左氏曰書曰宋人殺其大夫不稱名衆也且言非其罪也趙氏曰若殺大夫衆而不書名則晉殺三郤鄭盜殺大夫何乃悉書乎故知妄也公羊曰何以不名宋三世無大夫三世內娶也啖氏曰公羊以三世內娶便云三世無大夫不近人理榖梁曰稱人以殺誅有罪也此非盜賊之辭安得稱人便為有罪乎戊子晉人及秦人戰于令狐左氏曰晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長若有此四德者難必抒矣賈季曰不如立公子樂辰嬴嬖於二君立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖淫也為先君子不能求大而出在小國辟也毋淫子辟無威陳小而逺無援將何安焉杜祁以君故讓逼姞而上之以狄故讓季隗而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士㑹如秦逆公子雍賈季亦使召公子樂于陳趙孟使殺諸郫秦康公送公子雍于晉曰文公之入也無衛故有吕郤之難乃多與之徒衛穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之步招御戎戎津為右及堇陰宣子曰我若受秦秦則賔也不受寇也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潜師夜起戊子敗秦師于令狐至于刳首啖氏曰上言背先蔑立靈公明蔑在秦也次言先蔑將下軍則是在晉也何其自相背乎經言先蔑奔秦不言出明在外矣言背可也言將下軍非也蓋先蔑時為下軍將而身在秦故知誤言也木訥趙氏曰晉襄公之卒於是期年襄公之葬久矣豈晉至是始謀立君左氏之說不然也且左氏初言先蔑如秦則蔑在秦次言先蔑將下軍則蔑在晉蔑既迎雍于秦則必不肯將兵以拒秦茍已將兵拒秦豈容復奔秦邪理無可通者皆失之誣也黃氏曰據經文之次第則傳文誠不足憑蓋全與經文相背也愚謂經不言敗而傳言敗秦師亦與經異也夫左固多誣然不應如此之詳蓋别是一時事而誤凑合於此故不倫歟晉先蔑奔秦左氏曰己丑先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽為賦板之三章又不聽及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也士㑹在秦三年不見士伯其人曰能亡人於國不能見於此焉用之士季曰吾與之同罪非義之也將何見焉及歸遂不見邦衡胡氏曰晉襄卒於六年豈有至此尚未立君者則是靈公已立明矣左氏求君之說未為合理案六年傳云先蔑如秦逆公子雍不見先蔑之歸而此戰序為下軍之將則謂先蔑在秦亦非也此蓋晉秦戰而先蔑遂奔爾不言出奔自軍中而去也公羊曰此晉先昧也其稱人何貶曷為貶外也其外奈何以師外也何以不言出遂在外也案公羊見戰後書先蔑奔秦故以令狐之役為先蔑而貶稱之耳他無所考也榖梁曰不言出在外也此說得之但未若孫氏之說尤明白狄侵我西鄙左氏曰狄侵我西鄙公使告于晉趙宣子使因賈問酆舒且讓之酆舒問于賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也非本義不取秋八月公㑹諸侯晉大夫盟于扈左氏曰秋八月齊侯宋公衛侯陳侯鄭伯許男曹伯㑹晉趙盾盟于扈晉侯立故也公後至故不書所㑹凡㑹諸侯不書所㑹後也後至不書其國辟不敏也趙氏曰案公雖後至豈有不知其列㑹之詮次乎左氏殊失之矣劉氏曰公後至不書所㑹非也案經與公盟矣何謂後㑹乎杜云公後其㑹而及其盟此飾非之言耳㑹盟同地㑹所以為盟也今與盟不得云後㑹且盟重㑹輕不當稍責其輕又已稱公㑹諸侯矣豈不及其㑹者乎若實不及其㑹而及其盟者書公及諸侯晉大夫盟乃可耳左氏又曰凡㑹諸侯不書所㑹後也案十五年㑹于扈亦不序諸侯寧復魯侯後㑹邪未可以類推也黃氏曰諸家皆祖左氏以為公後至而諱之殊不可曉且夫子明書公㑹後世安得自以公為後至邪惟許氏崔氏據經為說然此時靈公尚幼皆趙盾之為二氏以責靈公未審耳是嵗中國始無伯主公羊曰諸侯何以不序大夫何以不名公失序也公失序奈何諸侯不可使與公盟眣晉大夫使與公盟也劉氏曰非也在㑹者皆諸侯也既與公盟矣又何云眣晉大夫乎且諸侯不欲與魯侯盟乃敢眣晉大夫使之盟乎皆事之不然者也陳嶽氏曰公榖傳注以文公喪取不得列於㑹故諸侯不序大夫不名噫宣公亦喪取文公即位二十五月方納幣宣公即位三月而逆婦則文過淺宣過深凡傳俱不可列則新城之㑹文公復列之黑壤之㑹宣公皆列之何邪榖梁曰其曰諸侯略之也劉氏曰不知略之者何故哉直強言之耳公孫敖如莒涖盟榖梁曰涖位也其曰位何也前定也其不日前定之盟不日也臨也不訓位也八年秋八月戊申天王崩左氏曰襄王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴左氏曰晉人以扈之盟來討冬襄仲㑹晉趙孟盟于衡雍報扈之盟也遂㑹伊雒之戎書曰公子遂珍之也劉氏曰左氏云珍之也言遂權與戎盟得事之宜故褒稱公子遂非也若稱公子為褒者僖三十年公子遂如京師遂如晉則貶矣彼不謂貶何也葉氏曰扈非後至書討者誤也遂本以二事出故以壬午盟趙盾乙酉盟雒戎相去四日非一事再見自不應去族何珍之云使戎果欲伐魯而遂專盟之經與其遂事則當於衡戎之後書遂與雒戎盟于暴亦不得再見名字為美若經不與之去族不書則與一事而再見者何以辨經不言遂而傳言遂其妄可知獻可杜氏曰左氏所謂報扈之盟者解經之實也而又曲生來討之文以合上傳後至之解既曰報盟而又曰來討是自相背也公孫敖如京師不至而復丙戌奔莒公羊曰不至而復者何不至而復者內辭也不可使往也不可使往則其言如京師何遂公意也何以不言出遂在外也內辭者臣子之辭不敢昭君之惡故有以婉其辭者也然過之大者亦未嘗不存其實故曰公如晉至河乃復之類是也國君且不得諱曾謂為大夫為內辭乎公羊既曰內辭矣而又曰遂在外也是自相戾也榖梁曰不言所至未如也未如則未復也未如而曰如不廢君命也未復而曰復不專君命也其如非如也其復非復也唯奔莒之為信故謹而日之也葉氏曰言日者别其復而後奔也故經不言出謂已出其國中自境上奔也與晉先蔑奔秦而不言出同若未如而言如不復而言復不惟春秋虛加之文乃使掩敖之惡反為不廢君命不專君命乎僑如奔齊紇奔邾皆書日此非嫌於不信者亦何為而謹也宋人殺其大夫司馬宋司城來奔左氏曰夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸來奔效節於府人而出公以其官逆之皆復之亦書以官皆貴之也啖氏曰傳言此二人不失節故致誤節義為節非符節也如孔父義形於色而誤為女色也劉氏曰左氏云司馬握節以死司城效節以出公以其官逆之故皆書官非也司馬握節未如仇牧之手劍司成奉身以退不及荀息之死之左氏摧彼二人為貶申此二人為賢輕重貿易賞罰昏錯莫甚於此且身居亂兵之中茍棄節偷生則為大罪握節而死大臣之常事耳既無智力以禦亂又欲負節而私逃亦大罪也效節而出自求免罪而已未見可貴之美魯公庸人不識大義妄以其官逆之春秋何為珍之邪存耕趙氏曰大夫二卿無罪死亡此殺昭公之漸也四人者忠於公室者也而左氏謂之黨何謬邪案周官惟守邦國都鄙及出使有節六卿居官者未聞其有節也宋有六卿以王者後即周制也司馬司城何節之云其死其亡自當書官左氏昧其義而妄為之辭公羊曰司馬者何司城者何皆官舉也曷為皆官舉宋三世無大夫三世內娶也啖氏曰案此見以官稱是有大夫公羊曷言無乎劉氏曰傳二十五年宋殺其大夫不舉名氏以謂宋無大夫也今此舉官亦云無大夫若實內娶無大夫者都無所舉或官舉或不舉何哉愚謂宋無大夫則何以為國今見殺者出奔者誰邪公羊之謬如此其何以解經哉穀梁曰司馬官也其以官稱無君之辭也司城官也其以官稱無君之辭也來奔者不言出舉其接我也孫氏曰不書名者三傳之義皆所未安何者僖二十五年宋殺其大夫以官舉也此不書名以官脫可知矣劉氏曰榖梁曰其以官稱無君之辭也鄭𤣥解云謂無人君之德皆非也既有其大夫矣何謂無君又晉殺其大夫卻錡卻犨郤至並尸三卿傳曰自禍於是起矣亦可謂無君德者則曷為不以官稱之三傳辨疑卷十
