body:
  text: 三傳辨疑卷八元程端學撰僖公元年春王正月左氏曰不稱即位公出故也公出復入不書諱之也諱國惡禮也啖氏曰若君出諱不書昭公何以書乎假如實出亦非當時即位如定公矣故知左氏解僖公不稱即位妄也劉氏曰不稱即位公出故也非也去年八月閔公遭弑僖公自邾入為君至此久矣國内已粗定不應猶以出奔之故不行即位禮也即位與朝廟相較何如朝廟則得即位則不得皆非春秋本意妄釋之者也公羊曰公何以不言即位繼弑君子不言即位此非子也其稱子何臣子一也此説近之但臣子一也一語未安盖為之後者為之子非諸侯得臣諸父兄弟而謂之子也榖梁曰繼弑君不言即位正也此說近之而義未足齊師宋師曹師次于聶北救邢夏六月邢遷于夷儀齊師宋師曹師城邢左氏曰諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之救患也凡侯伯救患分災討罪禮也經書齊宋曹師次于聶北救邢左氏求其義而不得遂意其潰而奔師師逐狄人焉如左氏言經當明書其事不得匿之而遂案三國不救邢之罪也經言自遷而左氏言具邢器用而遷之則似齊遷邢矣且左氏知救患分災之說而不知救患分災之道故謂之禮耳公羊曰救不言次此其言次何不及事也不及事者何邢已亡矣孰亡之蓋狄滅之曷為不言狄滅之為桓公諱也曷為為桓公諱上無天子下無方伯天下諸侯有相滅亡者桓公不能救則桓公耻之曷為先言次而後言救君也君則其稱師何不與諸侯專封也曷為不與實與而文不與文曷為不與諸侯之義不得專封也諸侯之義不得專封則其曰實與之何上無天子下無方伯天下諸侯有相滅亡者力能救之則救之可也遷者何其意也遷之者何非其意也此一事也曷為復言齊師宋師曹師不復言師則無以知其為一事也劉氏曰公羊曰救不言次言次不及之事也邢已亡矣非也有救而次者有救而不次者有次而救者有次而不救者事自如此春秋明書之耳何足以起邢亡乎又曰曷為不言狄滅之為桓公諱非也文先次後救即譏其怠惰矣何諱之有公羊以百二十國寳書為據故如此說耳又曰曷為先言次而後言救君也亦非也向謂救言次者不及事也今謂先次後救者君也若令救時及事春秋自不書其次不書其次遂無以見其是君此語自相伐也又春秋所書救正欲其急病拯危耳若屯師安次則失救國之義理不得不書所次以見之理既當書不得云救不言次也救不言次以道仲尼作經見救國及事者則不言次見救國不及事者則加言次如此是率已作經非復傳信也又公羊說伐楚救江云為諼也夫伐楚之與次于聶北其文不同而勢同也為諼之與舒緩其意不同而㫖同也為諼者不直赴所急而更伐他國舒緩者亦不直赴所急而淹止他邑文為事生非為辨君臣也又次于聶北救邢者惡其不直赴所急乃遥為邢援而已叔孫豹帥師救晉次于雍榆者言其本當救晉中有難故止于雍榆也論二者之文則有相似論二者之情則終始不同情變而文異亦其宜也且謂大夫將必先通君命乎則晉陽處父帥師伐楚救江亦何不先救後伐哉又曰不與諸侯専封亦非也經有救邢又有邢遷救邢則邢未滅之辭也邢遷則邢自遷之辭也邢能自遷諸侯城之而已非邢亡又非専封也又曰此一事也亦非也三國以春救邢以夏城之同事異時何謂一事乎榖梁曰救不言次言次非救也非救而曰救何也遂齊侯之意也是齊侯與齊侯也何用見其是齊侯也曹無師曹師者曹伯也其不言曹伯何也以其不言齊侯不可言曹伯也其不言齊侯何也以其不足乎揚不言齊侯也遷者猶得其國家以往者也其地邢復見也齊師宋師曹師城邢是向之師也使之如改事然美齊侯之功也劉氏曰榖梁曰救不言次言次非救也非救而曰救何也遂齊侯之意也非也此若當貶則春秋方貶之又何遂其意乎此若當襃則次非救者乃非所襃亦不可遂其意也吾欲問襃貶之意決何若哉又曰何用見其是齊侯也曹無師曹師者曹伯也其不言曹伯以其不言齊侯不可言曹伯也亦非也曰次于聶北救邢者其刺桓公之意己見矣何至又更齊侯曰齊師哉即實齊侯又何以明哉且齊侯自以過貶稱師爾曹伯非有過也何乃亦貶從師乎且直言齊師曹伯者有何不可乎且曹何以無師先王之制大國三軍其次二軍小國一軍軍即師也曹又次國不宜獨無師又曰以其不足乎揚不言齊侯也亦非也如榖梁之意宜曰以其貶之不言齊侯乃可耳如不足乎揚未可便貶也言齊侯適中矣然則榖梁於此都失襃貶之所在又曰是向之師也使之如改事然美齊侯之功也亦非也審如榖梁言者齊侯乃足揚矣猶曰齊師何也且使之如改事何故見其美即不改事反不美乎秋七月戊辰夫人姜氏薨于夷齊人以歸公羊曰齊地則其言齊人以歸何夫人薨于夷則齊人以歸夫人薨于夷則齊人曷為以歸桓公召而縊殺之此事實近之但不言其義耳榖梁曰夫人薨不地地故也不言以喪歸非以喪歸也加喪焉諱以夫人歸也其以歸薨之也啖氏曰但云薨則知喪歸者文耳何用曲為說乎趙氏曰若薨于外則書地記事實也云夫人薨不地地故也非也假如夫人死于外豈可不地乎愚謂後書夫人之喪至自齊則榖梁又何說乎八月公㑹齊侯宋公鄭伯曹伯邾人于檉左氏曰盟于犖謀救鄭也木訥趙氏曰鄭今在㑹何救之有孔氏曰犖即檉也未詳是否愚謂經書㑹傳作盟可以經考傳之偽矣而杜氏孔氏曲為之說可謂忠於左氏而不知其得罪於聖人也九月公敗邾師于偃左氏曰公敗邾師于偃虚丘之戍將歸者也案左氏前既為詐戰曰敗之例於是每遇公敗某師必曲為之說以實之愚既辨之矣若此之類皆其證也讀者察之榖梁曰不日疑戰也疑戰而曰敗勝内也冬十月壬午公子友帥師敗莒師于酈獲莒挐左氏曰獲莒子之弟挐非卿也嘉獲之也劉氏曰非地莒挐與鄭詹二者何異哉何以必其非卿耶就令非卿但是主將亦當書也若非卿又非主將徒一賤者亦何可嘉而春秋詭正法書之乎愚謂獲主將在當時僖公嘉之耳猶後世戰勝而行賞也春秋正義不謀利明道不計功何嘉之有公羊曰莒挐者何莒大夫也莒無大夫此何以書大季子之獲也何大乎季子之獲季子治内難以正禦外難以正其禦外難以正奈何公子慶父弑閔公走而之莒莒人逐之將由乎齊齊人不納却反舍于汶水之上使公子奚斯入請季子曰公子不可入入則殺矣奚斯不忍反命于慶父自南涘北面而哭慶父聞之曰嘻此奚斯之聲也諾已曰吾不得入矣於是抗輈經而死莒人聞之曰吾已得子之賊矣以求賂乎魯魯人不與為是興師而伐魯季子待之以偏戰趙氏曰三傳皆云挐非卿以魯獲故案凡不命卿以事接於魯及執殺奔放皆書莒慶鄭宛之類是也何乃於獲别生義乎愚謂季子治内禦外公羊皆以正許之而大其獲夫大夫帥師而獲大夫此豈治世之事而公羊大之無是非之心矣榖梁曰莒無大夫其曰莒挐何也以吾獲之目之也内不言獲此其言獲何也惡公子之紿紿者奈何公子友謂莒挐曰吾二人不相恱士卒何罪屏左右而相摶公子友處下左右曰孟勞孟勞者魯之寳刀也公子友以殺之然則何以惡乎紿也曰棄師之道也江熙氏曰經書敗莒師而傳云二人相摶則師不戰何以得敗理自不通也季友豈屏三軍之整挑身獨鬭潜刀相害以決勝負者哉此不經之論齊東野人之言歟十有二月夫人氏之喪至自齊左氏曰君子以齊人之殺哀姜也為已甚矣女子從人者也姜氏淫亂致弑其君幾亡其國齊侯殺之是也特未知其事之信然耳此不可以女子從人之法律之矣公羊曰夫人何以不稱姜氏貶曷為貶與弑公也然則曷為不於弑焉貶貶必於重者莫重乎其以喪至也孔氏曰公羊曰云云榖梁曰云云賈逵云殺子輕故但貶姜然則姜氏者夫人之姓二字共為一義不得去姜存氏去氏存姜若其必有所貶自可替其尊號去一姜字復何所明於薨於葬未嘗有貶何故喪至獨去一姜公羊又曰曷為不於弑焉貶貶必於重者莫重乎其以喪至也案禮之成否在於薨葬何故於喪至獨得為重喪至已加貶責於𦵏不應備文何故𦵏我小君復得成禮公榖見其文闕妄為之說耳榖梁曰其不言姜以其殺二子貶之也或曰為齊桓諱殺同姓也趙氏曰為齊桓諱殺同姓文姜不言姜亦是為齊桓諱乎劉氏曰向者孫于邾何以不去姜乎夫人挾小君之尊而殺二子魯人終不敢討也桓公為伯主疾禍亂之所自生豈得顧同姓哉此非春秋所恥也非春秋所恥則亦非春秋所諱矣二年春王正月城楚丘左氏曰諸侯城楚丘而封衛焉不書所㑹後也案左氏常以諸侯序於下為後至今又以俱不書為後自相戾矣盖左氏疑經不書諸侯而自以為諸侯城之故為此說以售已意耳其曰城楚丘而封衛辨見本義公羊曰孰城城衛也曷為不言城衛滅也孰滅之盖狄滅之曷為不言狄滅之為桓公諱也曷為為桓公諱上無天子下無方伯天下諸侯有相滅亡者桓公不能殺則桓公恥之也然則孰城之桓公城之曷為不言桓公城之不與諸侯専封也曷為不與實與而文不與文曷為不與諸侯之義不得専封諸侯之義不得専封則其曰實與之何上無天子下無方伯天下諸侯有相滅亡者力能救之則救之可也榖梁曰楚丘者何衛邑也國而曰城此邑也其曰城何也封衛也則其不言城衛何也衛未遷也其不言衛之遷何也不與齊侯専封也其言城之者専辭也故非天子不得専封諸侯諸侯不得専封諸侯雖通其仁以義而不與也故曰仁不勝道劉氏曰邑亦謂之城耳若不謂之城當謂之何哉吕氏曰先儒以為諸侯之義不得専封夫所謂専封者以此地封人也此謂之専封固不可也愚謂如齊桓果城衛亦不可以専封誣之也但楚丘非齊桓城之耳三傳皆以楚丘為衛邑齊桓城之而衛國忘亡後世和之同然一辭皆舍經而信𫝊者也惟趙氏莘老之說為有據見於本義此不復出夏五月辛巳𦵏我小君哀姜公羊曰哀姜者何莊公之夫人也於經畧無發明虞師晉師滅下陽左氏曰先書虞賄故也案左氏虞請先伐虢則是虞主兵也虞主兵則魯史當先書虞非以賄故而先書虞此即公羊使虞首惡之弊公羊曰虞微國也曷為序乎大國之上使虞首惡也曷為使虞首惡虞受賂假滅國者道以取亡焉其受賂奈何獻公朝諸大夫而問焉曰寡人夜者寢而不寐其意也何諸大夫有進對者曰寢不安與其諸侍御有不在側者與獻公不應荀息進曰虞郭見與獻公揖而進之遂與之入而謀曰吾欲攻郭則虞救之攻虞則郭救之如之何願與子慮之荀息對曰君若用臣之謀則今日取郭而明日取虞爾君何憂焉獻公曰然則奈何荀息曰請以屈産之乗與垂棘之白璧往必可得也則寳出之内藏藏之外府馬出之内廐繫之外廐爾君何喪焉獻公曰諾雖然宫之竒存焉如之何荀息曰宫之竒知則知矣雖然虞公貪而好寳見寳必不從其言請終以徃於是終以徃虞公見寳許諾宫之竒果諫記曰脣亡則齒寒虞郭之相救非相為賜則晉今日取郭而明日虞從而亡爾君請勿許也虞公不從其言終假之道以取郭還四年反取虞虞公抱寳牽馬而至荀息曰臣之謀何如獻公曰子之謀則已行矣寳則吾寳也雖然吾馬之齒亦已長矣盖戲之也夏陽者何郭之邑也曷為不繋于郭國之也曷為國之君存焉爾劉氏曰公羊曰使虞首惡非也春秋主兵者序上盖惡兵也虞實主兵矣又何使之首惡乎愚謂邑曰邑國曰國以君存而國之豈理也哉榖梁曰非國而曰滅重夏陽也虞無師其曰師何也以其先晉不可以不言師也其先晉何也為主乎滅夏陽也夏陽者虞虢之塞邑也滅夏陽而虞虢舉矣虞之為主乎滅夏陽何也晉獻公欲伐虢荀息曰君何不以屈産之乗垂棘之璧而借道乎虞也公曰此晉國之寳也如受吾幣而不借吾道則如之何荀息曰此小國之所以事大國也彼不借吾道必不敢受吾幣如受吾幣而借吾道則是我取之中府而藏之外府取之中廐而置之外廐也公曰宫之竒存焉必不使受之也荀息曰宫之竒之為人也達心而懦又少長於君達心則其言略懦則不能彊諫少長於君則君輕之且夫玩好在耳目之前而患在一國之後此中智以上乃能慮之臣料虞君中智以下也公遂借道而伐虢宫之竒諫曰晉國之使者其辭卑而幣重必不便於虞虞公弗聽遂受其幣而借之道宫之竒諌曰語曰脣亡則齒寒其斯之謂與挈其妻子以奔曹獻公亡虢五年而後舉虞荀息牽馬操璧而前曰璧則猶是也而馬齒加長矣劉氏曰榖梁曰虞無師其曰師何也以其先晉不可以不言師也非地假令書虞人晉師者豈不益見其罪乎春秋之例主兵者序上盖惡用兵也豈曰以國大小為序乎若誠以國大小為序者如榖梁說可矣如不以國大小為序又何必妄解哉秋九月齊侯宋公江人黄人盟于貫公羊曰江人黄人者何逺國之辭也逺國至矣則中國曷為獨言齊宋至爾大國言齊宋逺國言江黄則以其餘為莫敢不至也劉氏曰非也即實四國㑹豈可辨哉且四國㑹盟多矣難以類推為襃又江黄者何必極逺之國乎周末時諸侯分争水絶壤斷不相往來齊魯之儒未嘗渉江黄之境周之諸侯千八百餘其後稍稍相併猶應千餘若貫之盟皆來至則江黄之外尚有逺國不獨江黄而已榖梁曰貫之盟不期而至者江人黄人也江人黄人者逺國之辭也中國稱齊宋逺國稱江黄以為諸侯皆來至也啖氏曰春秋盟㑹皆據實書之亦無舉逺以包近之例愚謂春秋之盟豈有不期而至者哉辨見公羊不雨公羊曰何以書記異也越八月不雨民被災甚矣豈特記異哉榖梁曰不雨者勤雨也趙氏曰不指事而言何以明勤雨之意乎楚人侵鄭左氏曰冬楚人伐鄭鬭章囚鄭聃伯經書侵而𫝊書伐當以經為正而囚鄭聃伯之事亦未可信三年春王正月不雨夏四月不雨左氏曰不曰旱不為災也左氏見經不書旱遂言不為災豈有八月不雨而不為災之理乎公羊曰何以書記異也辨見前榖梁曰不雨者勤雨也一時言不雨者閔雨也閔雨者有志乎民者也趙氏曰榖梁安知其閔也又諸公豈無憂旱之心乎齊氏曰文二年書曰自十有二月不雨至于秋七月兩書異文故榖梁曰閔雨者有志乎民也文公歴時而總書是無志乎民者也然志民之事經無所見榖梁以兩書之異即以為異當是史之異辭非義例可推也徐人取舒公羊曰其言取之何易也豈有取人之國而有易者哉六月雨公羊曰其言六月雨何上雨而不甚也不甚之意何所據而云乎榖梁曰雨云者喜雨也喜雨者有志乎民者也聖人固喜雨也而此非為喜雨書盖書其實以見前乎此之不雨至此而始雨也榖梁云喜雨既失聖人之所指而又移此喜雨為僖公之有志乎民則失指之中又失指矣秋齊侯宋公江人黄人㑹于陽榖左氏曰秋㑹于陽榖謀伐楚也趙氏曰據明年伐楚江黄不與左氏說非公羊曰此大㑹也曷為末言爾桓公曰無障谷無貯粟無易樹子無以妾為妻劉氏曰公羊曰此大㑹曷為末言爾此非問也春秋㑹而不盟可勝言乎其能必令此盟乎且謂末言爾者仲尼之意乎桓公之意乎若仲尼之意者是其本盟而今隠之欲以成就桓公仲尼豈樹私黨者乎若桓公之意者是本自不盟春秋直據事而書無所獨異也愚謂經止言四國而公羊謂大㑹者即貫之盟𫝊云大國言齊宋小國言江黄其餘莫敢不至者也劉氏辨之詳矣其桓公曰以下等語乃葵丘盟誓之辭掇拾於此耳榖梁曰陽榖之㑹桓公端委搢笏而朝諸侯諸侯皆諭乎桓公之志案宋本公爵位齊侯上特以桓公主盟㑹而先齊後宋耳桓公固未嘗朝宋也況江黄稱人乃其大夫耳亦未嘗朝諸侯也孟子曰以力服人者非心服也力不贍也則諸侯未必皆諭乎桓公之志榖梁豈見公羊大㑹之語而想像其端委搢笏而朝諸侯諸侯皆諭乎桓公之志而不察其實歟冬公子友如齊涖盟左氏曰齊侯為陽榖之㑹來尋盟冬公子友如齊涖盟左氏此傳亦非舊史之文盖見前有陽榖之㑹而意之耳公羊曰來盟者何來盟于我也此因釋莅盟之語而并及來盟之義榖梁曰莅者位也其不日前定也不言及者以國與之也莅之訓無位字且書法自然無及字以不言及為以國與之過矣四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘左氏曰齊侯與蔡姬乗舟于囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之齊侯與諸侯之師侵蔡蔡潰遂伐楚葉氏曰小白攘夷狄而抗中國莫大於此舉茍以婦人之怨而勤七國之君夫誰肯聽之哉蔡人雖畏齊亦不遽潰矣此事之必不然者齊之侵蔡志在楚也辨又見二十八年晉侯侵曹伐衛公羊曰潰者何下叛上也國曰潰邑曰叛其言次于陘何有俟也孰俟俟屈完也劉氏曰國曰潰邑曰叛非也潰者民潰叛者臣叛非繫國邑為别也又言次于陘有俟也亦非也若實俟無為不言啖氏曰初次之時安知屈完來乎葉氏曰豈能預知屈完之來而俟之乎榖梁曰潰之為言上下不相得也侵淺事也侵蔡而蔡潰以桓公為知所侵也不土其地不分其民明正也遂繼事也次止也案侵伐各有義侵非淺事也以侵蔡而蔡潰遂以桓公為知所侵則是以成敗論事也若蔡不潰榖梁遂謂桓公不知所侵乎夏許男新臣卒左氏曰許穆公卒于師𦵏之以侯禮也凡諸侯薨于朝㑹加一等死王事加二等於是有衮斂劉氏曰非也若實卒于師經何以不記耶召陵地屬潁川潁川今許昌郡也許男歸國已明許男有疾歸其國而卒故不得書卒于師也髙氏曰案成十三年曹伯廬卒于師襄十八年曹伯負芻卒于師此二君皆明書卒於師而此不言者非卒於師也張氏曰傳言卒於師陸淳以為非蓋召陵地屬潁川潁川今之潁昌府長社縣去許密邇故許男疾而歸也存耕趙氏曰許昌即許國也師在其國故不可言卒于師也經無加辭苟有所加必有以見之也愚謂齊楚不戰許男自卒非死王事也設使加二等猶應葬以伯禮今以侯禮則是加三等矣左氏鹵葬如此榖梁曰諸侯死於國不地死於外地死於師何為不地内桓師也劉氏曰非也書卒于師不足貶桓公不書卒于師不足褒桓公諸侯之死當地不地自有常義不必詭文以申桓公也楚屈完來盟于師盟于召陵公羊曰屈完者何楚大夫也何以不稱使尊屈完也曷為尊屈完以當桓公也其言盟于師盟于召陵何師在召陵也師在召陵曷為再言盟喜服楚也何言乎喜服楚楚有王者則後服無王者則先叛夷狄也而亟病中國南夷與北狄交中國不絶若綫桓公救中國而攘夷狄卒帖荆以此為王者之事也其言來何與桓公為主也前此者有事矣後此者有事矣則曷為獨於此焉與桓公為主序績也趙氏曰若不重言盟召陵則無以知退軍乃似盟于陘也若惟言來盟于召陵又無以示退軍之實據事不得不言耳喜服楚何其小哉陳岳氏曰不稱使再稱盟者以完來盟于師師退于召陵方盟備書其實也非有異義公羊謂尊屈完以當桓公且桓公成伯業為盟主雖楚子自來猶不可伉矧屈完乎又言再盟再喜斯益疎矣茍曰以義却齊故不稱使且楚知齊強服之而受盟謂之義却不亦逺乎公榖之短劉氏曰盟于師者屈完之意也盟于召陵者齊侯之意也文為事出非虚加之也何有喜服楚哉榖梁曰楚無大夫其曰屈完何也以其來會桓成之為大夫也其不言使權在屈完也則是正乎曰非正也以其來㑹諸侯重之也來者何内桓師也于師前定也于召陵得志乎桓公也得志者不得志也以桓公得志為僅矣屈完曰大國之以兵向楚何也桓公曰昭王南征不反菁茅之貢不至故周室不祭屈完曰菁茅之貢不至則諾昭王南征不反我將問諸江案榖梁言成屈完為大夫即公羊尊屈完之意其以来為内桓師以得志為不得志反覆無理辭費而已齊人執陳袁濤塗公羊曰濤塗之罪何辟軍之道也其辟軍之道奈何濤塗謂桓公曰君既服南夷矣何不還師濵海而東服東夷且歸桓公曰諾於是還師濵海而東大陷于沛澤之中顧而執濤塗執者曷為或稱侯或稱人稱侯而執者伯討也稱人而執者非伯討也此執有罪何以不得為伯討古者周公東征則西國怨西征則東國怨桓公假途於陳而伐楚則陳人不欲其反由己者師不正故也不修其師而執濤塗古人之討不然也啖氏曰若公羊説則是軍自迷路致陷非濤塗之罪故知左氏説是愚謂桓公之師雖不及湯武然有節制也必前有㳺軍然後大軍從之豈若項羽之奔走失路哉豈公羊聞誤軍之説而不得其實歟且或稱人或稱侯本史氏記事有詳略豈在人侯一字分伯討哉榖梁曰齊人者齊侯也其人之何也於是哆然外齊侯也不正其踰國而執也劉氏曰若然齊人執鄭詹何以謂之與執乎秋及江人黄人伐陳左氏曰秋伐陳討不忠也如左氏言則濤塗可謂忠於陳矣特申侯賣之耳齊侯能以人各為其主之義而推絜矩之心則不至於疾濤塗之深而伐及其君也左氏謂其討不忠非義也榖梁曰不言其人及之者何内師也果内師不在不言其人也榖梁於執濤塗則云人齊侯以外齊侯今因濤塗而至於伐陳乃其甚者而榖梁則曰不言其人以内師何一事之間而反覆相戾如此哉八月公至自伐楚公羊曰楚已服矣何以致伐楚叛盟也趙氏曰案楚雖已服何妨告廟云伐還豈可云公至自服楚乎劉氏曰案諸至例有可通者有不可通者其歸多妄不得守其一遂信其二榖梁曰有二事偶則以後事致後事小則以先事致其以伐楚致大伐楚也劉氏曰非也凡榖梁所說致君之義苟取臨時而無通理不足語者也豈知致者歸格告致之事乎獻可杜氏曰伐楚之功齊桓之功也僖公止從伯主耳不足為美愚謂春秋亦有二事偶則以後事致者亦有後事小則以先事致者但其言大伐楚則非也伐楚固大事而云大伐楚是就襃貶生義者也非紀實事而善惡自見者也五年春晉侯殺其世子申生公羊曰曷為直稱晉侯以殺殺世子母弟直稱君者甚之地案晉侯殺則稱晉侯晉人殺則稱晉人皆隨事立言自然之法非獨母弟稱君而已榖梁曰目晉侯厈殺惡晉侯也聖人固惡晉侯矣然非惡晉侯而斥其殺乃惡晉侯殺其世子耳杞伯姬來朝其子公羊曰其言來朝其子何内辭也與其子俱來朝也趙氏曰案此文直書以示譏有何内辭劉氏曰此實自朝其子耳譬如曹伯使世子射姑來朝之類文理不疑何謂内辭愚謂公羊誤兼來朝讀之故有與其子俱來朝之說榖梁曰婦人既嫁不踰竟踰竟非正也此非特譏其踰竟而已夏公孫兹如牟左氏曰公孫兹如牟娶焉趙氏曰大夫越境而娶非禮也經文不應無譏公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止秋八月諸侯盟于首止公羊曰世子猶世世子也於經何所發明榖梁曰及以㑹尊之也何尊焉王世子云者唯王之貳也云可以重之存焉尊之也何重焉天子世子世天下也盟者不相信也故謹信也不敢以所不信而加之尊者桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王世子不子則其所善焉何也是則變之正也天子微諸侯不享覲桓控大國扶小國統諸侯不能朝天子亦不敢致天王尊王世子于首戴乃所以尊天王之命也世子含王命㑹齊桓亦所以尊天王之命也世子受之可乎是亦變之正也天子微諸侯不享覲世子受諸侯之尊已而天王尊矣世子受之可也案春秋書法有稱及為内為主者矣有稱㑹為外為主者矣此以下有㑹字故不得不言及則此稱及非内為主也乃齊為主耳益知凡例之不可以一律拘也榖梁就及以㑹生義遂節節乖舛至謂桓不臣世子不子為變之正夫不臣不子矣而謂變之正是失其是非之心而不自知其為春秋之讒賊矣其曰諸侯不能朝天子亦不敢致天王如此等語皆不識君臣之大義者也而可以語春秋乎鄭伯逃歸不盟公羊曰其言逃歸不盟者何不可使盟也不可使盟則其言逃歸何魯子曰盖不以寡犯衆也劉氏曰非也公羊嫌上㑹實有鄭伯中云諸侯盟于首止若鄭伯實逃歸者當在首止之前故云耳不知鄭伯本自當盟及盟之日更自逃去所以文先序諸侯盟後言鄭伯逃也又但書逃歸則嫌以盟而逃故出不盟者在盟前逃也亦猶沙隨之㑹不見公平丘之㑹公不與盟尋其先文如皆已盟復得後語乃知不與耳與此相類無多疑也而以謂不使寡犯衆可謂義甚髙而理不要榖梁曰以其去諸侯故逃之也案逃歸叙實是也非魯史加逃之之字也亦非孔子加逃之之字也楚人滅弦弦子奔黄榖梁曰弦國也其不日微國也日月例辨見綱領冬晉人執虞公左氏曰遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢于王故書曰晉人執虞公罪虞且言易也劉氏曰虞晉同姓滅之大罪也雖其自欲文飾修祀歸貢不足以掩其大惡春秋曷為聽之邪滅人之國廢王者所封絶先祖之體苟能修祀歸貢者可無譏矣天下之強誰不暴弱天下之衆誰不暴寡哉此無他左氏本不受經不知其義怪其文理異常因雕琢遷就為此爾愚謂經但言執虞公不言滅虞不知虞滅在何時也公羊曰虞已滅矣其言執之何不與滅也曷為不與滅滅者亡國之善辭也滅者上下之同力者也啖氏曰以滅為善辭則何者為不善愚謂聖人茍不與滅當明書其滅以示戒若從而隠之則後世何從知之而晉獻公之惡得以匿矣滅人之國罪之大者何待虞之君臣同力然後不與其滅哉且上下同力則虞公不見執矣經言齊滅譚滅遂楚滅弦滅江之類甚多未嘗改滅為執也榖梁曰執不言所於地緼於晉也其曰公何也猶曰其下執之之辭也其猶下執之之辭何也晉命行乎虞民矣虞虢之相救非相為賜也今日亡虢而明日亡虞矣劉氏曰五等之爵有尊卑矣假使襃貶進退宜以其類豈有貶之而反崇其爵哉且仲尼欲以見虞公不仁猶其民執之者則宜若梁亡之例書虞執其公則可謂之云爾已今春秋乃曰晉人執虞公非其下矣何謂其下執之邪愚謂虞本公爵故稱公執不言所執於虞耳是時虞猶為虞豈有虞未亡而先緼於晉之理乎六年夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城左氏曰圍新密鄭所以不時城也劉氏曰非也齊桓㑹諸侯于首止諸侯莫不盟鄭伯逃歸伐之不為無辭豈强取新城然後足聲其罪哉盖疑伐不言圍横出此說公羊曰邑不言圍此其言圍何彊也陳岳氏曰茍曰邑不言圍則隠五年何以書宋人伐鄭圍長葛僖二十三年何以書齊侯伐宋圍緡果圍無國邑之别明矣榖梁曰伐國不言圍邑此言圍邑何也病鄭也著鄭伯之罪也案鄭伯之罪在逃盟不在言圍邑也辨又見公羊秋楚人圍許諸侯遂救許左氏曰冬蔡穆侯將許僖公以見楚子於武城許男面縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所楚子從之劉氏曰左氏云許男降楚楚子赦之實無此事皆妄言也何以言之諸侯救許許圍已解何苦自辱追降于楚哉此非人情是後許男常與諸侯㑹亦足以知其初不降楚也貫道王氏曰遂救許則許圍解安得面縳見楚之事哉左氏楚人辭多右楚失之誣矣榖梁曰善救許也辨見救鄭冬公至自伐鄭榖梁曰其不以救許致何也大伐鄭也案伐鄭若可大則救許亦可大矣盖皆齊桓僣征伐之辠皆齊桓攘夷狄之功也何以獨大伐鄭也七年鄭殺其大夫申侯左氏曰五年陳轅宣仲怨鄭申侯之反己於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂譛諸鄭伯曰美城其賜邑將以叛也申侯由是得罪七年夏鄭殺申侯以說於齊且用陳轅濤塗之譛也張氏曰陳轅濤塗譛申侯之事盖未可信而言申侯出自楚奔鄭理或有之惟申侯不忘故國所以道鄭伯背伯從楚以啓伯主討鄭致殺身之禍歟戴氏曰若然則申侯盖忠於齊者殺之是怒齊也何名為説愚謂鄭之大夫無請於諸侯而城之之理設使請於諸侯鄭伯必知之若又從而譛之則譛亦不行矣左氏此𫝊反復不可據公羊曰其稱國以殺何稱國以殺者君殺大夫之辭也案不稱國則無以見其為何國殺大夫故稱國也公羊以此為義固哉又見莊二十六年曹殺大夫榖梁曰稱國以殺大夫殺無辠也獻可杜氏曰文六年晉殺陽處父宣十四年殺先縠皆以其辠討之則無罪之說未安秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寗毋左氏曰鄭伯使太子華聽命於㑹言於齊侯曰洩氏孔氏子人氏三族實違君命若君去之以為成我以鄭為内臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今茍有釁從之不亦可乎對曰君若綏之以徳加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇徳也㑹而列姦何以示後嗣夫諸侯之㑹其徳刑禮義無國不記記姦之位君盟替矣作而不記非盛徳也君其勿許鄭必受盟夫子華既為大子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭東萊吕氏曰此一事見得管仲猶有三代氣象其曰君若綏之以徳云云此等語言盖聞先生長者之餘論惜其急於功利俯首以就桓公自小其規模劉氏曰案鄭伯使太子華聽命於㑹言於齊侯齊侯辭焉子華由是得罪於鄭尋此諸文則齊侯為用管仲之言不與子華盟也今寗毋之盟實有子華與有子華與傳異矣是何故哉愚謂齊桓但不從子華去三族而使子華與盟亦未可知左氏之言在可信未可信之間也但陸氏云公榖無鄭世子華左氏有之誤加之也而今本公榖皆有之則可疑耳然子華之請與桓公管仲之言皆非本義故不録云榖梁曰衣裳之㑹也八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子款盟于洮左氏曰七年閏月惠王崩襄王惡大叔帶之難懼不立不發喪而告難于齊春盟于洮謀王室也襄王定位而後發喪葉氏曰惠王果以七年崩襄王懼叔帶秘不發喪在前世或有之矣然不過數日之間豈有經年無君而子帶不知者乎以經考之諸侯為襄王謀己見首止洮但尋前盟而已惠王實以八年冬崩王人來告喪而畏子帶作亂所謂告難于齊者近之故諸侯復為葵丘之㑹以修好而襄王以宰周公臨之無秘不發喪之事傳以洮盟為謀王室故差一年何以知之洮之盟在春傳言襄王即位而後發喪則諸侯已知惠王之崩何為更待十二月以一乗告乎榖梁曰王人之先諸侯何也貴王室也朝服雖敝必加於上弁冕雖舊必加於首周室雖衰必先諸侯兵車之㑹也王人序諸侯上本魯史之常法此盟本義在王人就㑹諸侯盟耳榖梁以王人先諸侯而衍其辭可謂不知春秋之所指矣鄭伯乞盟公羊曰乞盟者何處其所而請與也其處其所而請與奈何盖酌之也榖梁曰以向之逃歸而乞之也乞者重辭也重是盟也乞者處其所而請與也盖汋之也胡氏曰二𫝊謂使人求盟非也鄭伯逃首止之盟齊人伐鄭七年雖使太子華受盟于寗毋有懼見討故自來乞盟乞盟者卑請之辭也且以齊人之強鄭之弱豈敢使人來盟乎愚謂鄭懼齊而乞盟亦非重是盟而乞之也夏狄伐晉左氏曰晉里克帥師梁由靡御虢射為右以敗狄于采桑梁由靡曰狄無恥從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣夏狄伐晉報采桑之役也復期月案左氏所載信否未可知所不録者不可以訓也夫待夷狄之道驅之而已若快其殺戮豈一視同仁之心哉且晉之致狄乃在家國之不正豈采桑不大克哉啓後世人主驅中國赤子快志於夷狄者必梁虢之云然則里克固君子之言歟秋七月禘于太廟用致夫人左氏曰秋禘而致哀姜焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也陸氏曰案元年哀姜稱夫人以薨明用夫人喪禮已乆矣何乃八年始致之乎劉氏曰左氏曰致哀姜也哀姜之死以夫人之禮舉之諸侯莫不聞焉曷為更八年乃致于廟哉又曰凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也案哀姜于此四者唯不薨于寢耳其餘皆備矣則是凡國君夫人於四者一不備則不致于廟也設令夫人歸寧而死亦將不致乎公羊曰用者何用者不宜用也致者何致者不宜致也禘用致夫人非禮也夫人何以不稱姜氏貶曷為貶譏以妾為妻也其言以妾為妻奈何盖脅于齊媵女之先至者也陸氏曰案若娶于齊不當媵先至若娶于他國而公親徃未還則夫人受脅而立齊媵劉氏曰僖公賢君桓公亦賢君僖公豈受脅於齊者桓公亦豈必脅魯者且於文無以見齊脅魯之意異於取子糾歸公孫敖不可為若說榖梁曰用者不宜用者也致者不宜致者也言夫人必以其氏姓言夫人而不以氏姓非夫人也立妾之辭也非正也夫人之我可以不夫人之乎夫人卒𦵏之我可以不卒𦵏之乎一則以宗廟臨之而後貶焉一則以外之弗夫人而見正焉趙氏曰案僖公若致其母即當云夫人風氏不當但云夫人愚謂若立妾正當書氏姓使後世知其為妾而後立為夫人也若天王使宰咺來歸惠公仲子之賵考仲子之宫秦人來歸僖公成風之襚則其義自見矣苟但言夫人則後世何自知春秋意乎冬十有二月丁未天王崩左氏曰冬王人來告喪難故也是以緩劉氏曰前年傳曰惠王崩襄王惡大叔帶之難懼不立不發喪而告難于齊今年盟于洮謀王室也然則盟于洮之時諸侯已知王崩矣不應練而告諸侯也假使當時有難亦不能匿喪彌年況實無難但欲假外援者乎然則洮之㑹本不謀王室也左氏既誤謂王以前年閏月崩則遂謂洮之㑹謀王室見經書王崩在今年十二月則謂襄王定位而後發喪皆不可信髙氏曰春秋據實而書宜以經為正辠諸侯致宰周公㑹于葵丘而不㑹天王之喪不臣之甚也九年春王三月丁丑宋公御說卒公羊曰何以不書𦵏為襄公諱也何氏曰襄公背殯出㑹宰周公有不子之惡後有從齊憂中國尊周室之心功足以除惡故諱不書葬使若非背葬也愚謂五刑之罪莫大於不孝此雖有功在弗赦者也況葵丘之㑹不㑹王喪而致天子之冢宰又何罪而無功乎且經既書宋公卒則天下後世皆知之也又諱襄公之𦵏使若非背葬殯者然所謂掩耳盜鈴者也公羊繆矣何氏又為之辭此漢儒専門之弊縱知其不然必曲為之䕶皆此類也夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘左氏曰凡在喪王曰小童公侯曰子夏㑹于葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受趙氏曰案王猛在喪不曰小童故知非也又伯子男在喪亦當稱子獨言公侯亦誤也葉氏曰案是時襄王初立以月計之惠王猶未葬不得有事於宗廟何賜胙之有且脤膰之禮以親兄弟之國非齊所得賜或以小白而特賜之亦疑在終喪之後而誤記於此愚謂左氏無善惡皆以禮許之豈知禮哉公羊曰宰周公者何天子之為政者也此訓詁近之榖梁曰天子之宰通乎四海宋其稱子何也未𦵏之辭也案榖梁謂天子之宰通乎四海則可以出㑹諸侯乎甚無義也國君喪未踰年皆稱子恐不特未𦵏也謂未𦵏者其見春秋中有居喪未踰年而稱爵者乎恐不若趙氏謂諸侯在喪以吉禮行者稱爵以凶禮行者稱子者為近理也秋七月乙酉伯姬卒公羊曰此未適人何以卒許嫁矣榖梁曰内女也未適人不卒此何以卒許嫁笄而字之死則以成人之喪治之如二傳之言則常事耳何必書哉予謂使後無葵丘之盟伯姬之卒斷不書也今姑借下二句附于本義云九月戊辰諸侯盟于葵丘左氏曰凡我同盟之人既盟之後言歸于好公羊曰桓之盟不日此何以日危之也何危爾貫澤之㑹桓公有憂中國之心不召而至者江人黄人也葵丘之㑹桓公震而矜之叛者九國震之者何猶曰振振然矜之者何猶曰莫若我也劉氏曰桓之盟不日此何以日危之也非也葵丘桓之盛也孟子嘗言之矣唯以日月為例遂亂於安危嗚呼慎言哉愚案貫澤之㑹不召而至者江人黄人辨見二年盟于貫然此以為不召而至則又誤之甚矣榖梁曰桓盟不日此何以日美之也為見天子之禁故備之也葵丘之盟陳牲而不殺讀書加于牲上壹明天子之禁曰毋雍泉毋訖糴毋易樹子毋以妾為妻毋使婦人與國事葵丘之盟固可美也亦可辠也其可美者亦不在日也冬晉里克殺其君之子奚齊左氏曰書曰殺其君之子未𦵏也又曰君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也案未𦵏之說即公羊未踰年之意父未𦵏而子已承重則固一國之君矣百官子庶即其臣也安有未𦵏而臣殺之曰非弑君者也若但曰殺其君之子而非弑君則是臣殺世子於未𦵏之時者罪可減等難以為訓矣其所引詩意亦相反大凡左氏據國史書者近是自立論者紕繆無他學雖博而理不明也公羊曰此未踰年之君其言弑其君之子奚齊何殺未踰年君之號也案文十四年五月齊侯潘卒九月齊公子商臣弑其君舍亦是未踰年之君何以稱君夫未踰年稱子者人子之心不敢即代君位又一年不二君故稱子耳然非一國之君而何於此時臣有殺之者書曰弑君固其宜也今經曰君之子則是未立為君也不得與未踰年稱子者同義矣榖梁曰其君之子云者國人不子也國人不子何也不正其殺世子申生而立之也榖梁之言彌近理而實非也夫奚齊雖庶孽獻公雖殺申生奚齊非獻公之子乎且經書曰里克殺其君之子正責其殺其君之子也若曰國人不子而曰其君之子則是聖人賞其殺而與之辨也且卓亦庶孽亦國人之所不子者經書曰弑其君何也十年狄滅温温子奔衛左氏曰狄滅温蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衛案蘇子無信一語左氏自言也蘇子若叛王即狄豈特無信而已又曰王不救既叛王矣何以救為由此觀之皆不然也晉里克弑其君卓及其大夫荀息公羊曰及者何累也弑君多矣舍此無累者乎曰有孔父仇牧皆累也舍孔父仇牧無累者乎曰有有則此何以書賢也何賢乎荀息荀息可謂不食其言矣其不食其言奈何奚齊卓子者驪姬之子也荀息傅焉驪姬者國色也獻公愛之甚欲立其子於是殺世子申生申生者里克傅之獻公病將死謂荀息曰士何如則可謂之信矣荀息對曰使死者反生生者不愧乎其言則可謂信矣獻公死奚齊立里克謂荀息曰君殺正而立不正廢長而立幼如之何願與子慮之荀息曰君嘗訊臣矣臣對曰使死者反生生者不愧乎其言則可謂信矣里克知其不可與謀退弑奚齊荀息立卓子里克弑卓子荀息死之荀息可謂不食其言矣案公羊所載事大畧與左氏同故不録但以卓子為驪姬子與左氏異則未知其孰是其以及為累辨見桓二年宋督事榖梁曰以尊及卑也荀息閑也於經畧無發明晉殺其大夫里克公羊曰里克弑二君則曷為不以討賊之辭言之惠公之大夫也然則孰立惠公里克也里克弑奚齊卓子逆惠公而入里克立惠公則惠公曷為殺之惠公曰爾既殺夫二孺子矣又將圖寡人為爾君者不亦病乎於是殺之然則曷為不言惠公之入晉之不言出入者踊為文公諱也齊小白入于齊則曷為不為桓公諱桓公之享國也長見美乎天下故不為之諱本惡也文公之享國也短美未見乎天下故為之諱本惡也趙氏曰案公羊不知有不告則不書之義故生穿鑿劉氏曰重耳之美未見而為之探情諱過不亦誣哉愚謂里克為惠公大夫惠公能正其弑君之罪而殺之何妨書曰晉人殺里克乎使為文公諱入不應并諱惠公也桓文長短之說尤其繆之尤者不必辨也榖梁曰稱國以殺罪累上也又曰其為重耳弑奈何晉獻公伐虢得麗姬獻公私之有二子長曰奚齊稚曰卓子麗姬欲為亂故謂君曰吾夜者夢夫人趨而來曰吾苦畏胡不使大夫將衛士而衛冢乎公曰孰可使曰臣莫尊於世子則世子可君謂世子曰麗姬夢夫人趨而來曰吾苦畏女其將衛士而往衛冢乎世子曰敬諾築宫宮成麗姬又曰吾夜者夢夫人趨而來曰吾苦飢世子之宫已成則何為不使祠也故獻公謂世子曰其祠世子祠已祠致福於君君田而不在麗姬以酖為酒藥脯以毒獻公田來麗姬曰世子已祠故致福於君君將食麗姬跪曰食自外來者不可不試也覆酒於地而地賁以脯與犬犬死麗姬下堂而啼呼曰天乎天乎國子之國也子何遲於為君君喟然歎曰吾與女未有過切是何與我之深也使人謂世子曰爾其圖之世子之傅里克謂世子曰入自明入自明則可以生不入自明則不可以生世子曰吾君已老矣已昏矣吾若此而入自明則麗姬必死麗姬死則吾君不安所以使吾君不安者吾不若自死吾寧自殺以安吾君以重耳為寄矣刎脰而死故里克所為弑者為重耳也夷吾曰是又將殺我也案榖梁叙事與左氏大同小異盖是傳聞異辭但云稱國以殺罪累上也非也夫叙事而不稱國則人莫知其為何國大夫也而以稱國為累上豈知言哉以後凡說稱國累上者皆不取十有一年春晉殺其大夫㔻鄭父左氏曰遂殺㔻鄭祁舉及七輿大夫左行共華右行賈華叔堅騅顓纍虎特宫山祁皆里㔻之黨也㔻豹奔秦言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君案晉一殺九人經不應無見此可疑者又非本義不録榖梁曰稱國以殺罪累上也辨見前秋八月大雩榖梁曰雩月正也雩得雨曰雩雩不得雨曰旱案雩者旱而祭旱者旱而已雩而得雨不得雨未可知也使雩而不得雨遂不書雩乎使旱而不雩遂不書旱乎十有三年夏公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹左氏曰淮夷病杞故且謀王室也案謀杞與王室既不經見而後有諸侯城縁陵事前目後凡則此為謀城縁陵耳謀杞與王室豈左氏意之邪榖梁曰兵車之㑹也經書㑹盟皆一法榖梁或謂衣裳之㑹兵車之㑹不知何所據也十有四年春諸侯城縁陵左氏曰諸侯城縁陵而遷杞焉不書其人有闕也存耕趙氏曰左氏於鹹之㑹云淮夷病杞故城杞而遷之也淮夷若能病杞當深入魯衛過宋而後至魯有淮夷之難矣其近也安得病杞趙氏曰案此稱諸侯即上㑹鹹之諸侯前目後凡耳左氏謂其人有闕亦誤莘老孫氏曰不序諸侯而凡言之者㑹鹹之諸侯於是復合而城之前目後凡春秋之簡辭公羊曰孰城之城杞也曷為城杞滅也孰滅之盖徐莒脅之曷為不言徐莒脅之為桓公諱也曷為為桓公諱上無天子下無方伯天下諸侯有相滅亡者桓公不能救則桓公恥之也然則孰城之桓公城之曷為不言桓公城之不與諸侯専封也曷為不與實與而文不與文曷為不與諸侯之義不得専封也諸侯之義不得専封則其曰實與之何上無天子下無方伯天下諸侯有相滅亡者力能救之則救之可也案經不言城杞縁陵又不言徐莒滅杞公羊妄自生義若曰為桓公諱則滅弦滅黄滅下陽皆所不諱何獨於此諱滅杞城邢既不諱何獨於此諱城縁陵且為桓公諱而復言諸侯則是欲隠桓罪而施之諸侯也非恕矣又義不得専封則達於文以見之安有心與而文不與之理哉果心與而文不與則是心口相違小人之姦也而可以加之聖人乎榖梁曰其曰諸侯散辭也聚而曰散何也諸侯城有散辭也桓徳衰矣案春秋前目後凡者多矣皆散辭乎桓徳固衰春秋所書之事固自可見不在稱諸侯為散辭然後知桓徳之衰也夏六月季姬及鄫子遇于防使鄫子來朝左氏曰鄫季姬來寧公怒止之以鄫子之不朝也趙氏曰案稱季姬明魯未嫁女也若是鄫夫人不當言與鄫子遇又明年歸于鄫此時鄫子請娶之胡氏曰内女嫁曰歸案隠二年伯姬歸于紀莊二十五年伯姬歸于杞成九年伯姬歸于宋是也出曰來歸見棄也宣十六年郯伯姬來歸成五年杞叔姬來歸是也無事而直來曰來莊二十七年杞伯姬來僖二十八年杞伯姬來是也今觀季姬上無鄫之文則是未嫁者也劉氏曰案經季姬不繋鄫此未嫁之文也又是後有季姬歸于鄫始嫁之文也若實來寧何故再書其歸乎杞伯姬來亦來寧也何以不書歸乎愚謂於此見左氏解經附㑹處多矣不必皆國史之文也讀者可不明察真偽而遽信之哉公羊曰鄫子曷為使乎季姬來朝内辭也解經者所以使人易曉也經難而解易則人易曉矣若經易曉則有不必解者矣今經書季姬及鄫子遇于防使鄫子來朝可謂易曉而不必解矣而公羊乃曰鄫子使乎季姬來朝驟而觀之若鄫子使季姬來朝非季姬使鄫子也及徐尋公羊之意乃鄫子為季姬之使者而來朝則是經易而解者反難也既無益於經又造疑於人焉用解公榖如此類多矣榖梁曰來朝者來請己也朝不言使言使非正也以病鄫子也啖氏曰參詳之不特病鄫子而已諸侯不朝天子而朝諸侯皆非正也鄫子為女子所使而朝又不正之甚者非朝本正而言使然後非正也且朝不言使義安在乎秋八月辛夘沙鹿崩左氏曰晉卜偃曰期年將有大咎幾亡國卜偃之言義未盡也沙鹿崩豈止晉應之哉公羊曰沙鹿者何河上之邑也此邑也其言崩何襲邑也沙鹿崩何以書記異也外異不書此何以書為天下記異也公羊見梁山言山此不言山故意其為邑豈知梁一字故言山沙鹿二字故不言山省文之法何足疑乎果邑也當言陷不當言崩崩者上墜之形惟山可言崩耳其曰外異不書亦非也春秋書外異者多矣獨言為天下記異者得之故取之本義云榖梁曰無崩道而崩故志之也其日重其變也日月例見綱領冬蔡侯肸卒榖梁曰諸侯時卒惡之也劉氏曰非也君薨臣赴以日月此禮之常也若必以惡此君書時者鄭厲公衛惠公内則簒國外則叛王何為春秋不惡之哉十有五年三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐榖梁曰兵車之㑹也遂繼事也次止也有畏也善救徐也案榖梁不原上文之意而槩以善救徐為辭宜其昧經㫖也八月螽榖梁曰螽蟲災也甚則月不甚則時韓中甫曰案螽月有之則史氏必以月書非有甚不甚之謂也九月公至自㑹公羊曰桓之㑹不致此何以致乆也案公羊見桓公時魯書致者少故為此言爾非有所見也己夘晦震夷伯之廟公羊曰晦者何冥也夷伯者曷為者也季氏之孚也季氏之孚則微者其稱夷伯何大之也曷為大之天戒之故大之也何以書記異也趙氏曰晦者晦朔之晦爾據十六年戊申朔隕石于宋五成十六年甲午晦晉楚戰於鄢陵並書晦朔則知古史之體應合書日而遇晦朔必書之以為厯數之證愚謂天大雷電則自然冥晦若春秋書晦則是贅肬也魯大夫稱諡稱字者命大夫也乃常禮耳何大之有若果為季氏所孚乃其黨惡者也既曰夷伯何謂微者耶是時季氏之惡方萌夷伯當在季氏之前亦不可為季氏之孚信者也又以為天戒之而大之尤無謂也榖梁曰晦冥也震雷也夷伯魯大夫也因此以見天子至于士皆有廟天子七廟諸侯五大夫三士二故徳厚者流光徳薄者流卑是以貴始徳之本也始封必為祖春秋書震夷伯之廟義豈在於論廟制乎且士安得有二廟乎冬宋人伐曹左氏曰討舊怨也案曹人伐宋在莊十四年距今三十五年不應至此始討舊怨也楚人敗徐于婁林榖梁曰夷狄相敗志也此傳全無義十有一月壬戌晉侯及秦伯戰于韓獲晉侯公羊曰此偏戰也何以不言師敗績君獲不言師敗績也趙氏曰案左氏晉侯以戎馬還濘而止師實不敗也三傳辨疑卷八
