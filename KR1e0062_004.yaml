body:
  text: 三傳辨疑卷四元程端學撰桓公九年春紀季姜歸于京師左氏曰凡諸侯之女行唯王后書孫氏曰若諸侯之女行唯王后書則襄公十有五年劉夏逆王后于齊而不書齊姜歸于京師者豈齊女之不行哉葉氏曰周王見於魯史者凡七而書逆后者纔二祭公來以前謀於我故書傳但見此三書遂以為例然則劉夏逆王后何以不書而莊𫝊記原莊公逆王后於陳宣傳記召桓公逆王后於齊何以不書哉公羊曰其辭成矣則其稱紀季姜何自我言紀父母之於子雖為天王后猶曰吾季姜此𫝊畧近之然不過訓詁云爾其於本義無所發明榖梁曰為之中者歸之也此𫝊於經何所發明冬曹伯使其世子射姑來朝左氏曰冬曹太子來朝賔之以上卿禮也享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也劉氏曰左氏曰賔之以上卿禮也然則傳書魯之得禮非言曹也杜又云諸侯之嫡子未誓於天子而攝其君則以皮帛繼子男此周禮文也然則杜以曹世子為得禮矣非也周禮稱子男者諸侯朝天子有時不得後其期故老疾者使世子攝已事而往其位繼子男之後而見天子急述職也諸侯間於王事則相朝朝本無時曹伯雖有疾何急於朝魯而使世子攝哉是欲使其子伉諸侯之禮也審矣何可謂之禮公羊曰諸侯來曰朝此世子也其言朝何春秋有譏父老子代從政者則未知其在齊與曹與何氏曰在齊者世子光也愚謂齊世子光出㑹與曹世子來朝事雖不同其代父從政則一而曹世子尤無義春秋譏曹世子則譏齊世子譏齊世子則譏曹世子豈有未知其在齊在曹之理哉榖梁曰朝不言使言使非正也尸子曰夫已多乎道案當時曹伯實使其子來朝故春秋據實書之不言使之例安在哉其引尸子之說據范氏解似不悖理然則辭晦莫甚焉十年秋公㑹衛侯于桃丘弗遇衛侯期㑹而不至非公羊曰其言弗遇何公不見要也既至而不見要也榖梁曰弗遇者何志不相得也弗内辭也弗與不一義何得為内辭也冬十有二月丙午齊侯衛侯鄭伯來戰于郎左氏曰冬齊衛鄭來戰于郎我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐先書齊衛王爵也趙氏曰據左氏魯以周班後鄭既是正禮鄭雖小恨豈至興師即合當年結禍豈有經五年之後方合諸侯報此怨乎愚謂左氏見來戰之文與其他所書伐我者異辭求其說而不得故附㑹鄭忽之事耳然三國來戰必有其故不可考矣公羊曰郎者何吾近邑也吾近邑則其言來戰于郎何近也惡乎近近乎圍也此偏戰也何以不言師敗績内不言戰言戰乃敗績矣劉氏曰近乎圍豈實圍哉聖人豈探其近乎圍之意而書之哉且春秋惡戰耳不分别逺近逺近何當於義乎李氏曰謂内不言戰則言戰者多矣如十七年戰于奚之類是也謂言戰乃敗經書敗績者有之如莊十九年乾時之役是也葉氏曰戰于奚戰于升陘未嘗不地郎何獨言近邑愚謂公羊亦見來戰于郎之文異求其說而不得故有近地近乎圍之說而不知理之不可通也榖梁曰來戰者前定之戰也内不言戰言戰則敗也不言其人以吾敗也不言及者為内諱也趙氏曰前定之說非也言來者責二國不當來耳劉氏曰若來戰為前定之辭自無縁復言其人且言及也豈可曰某人及齊侯衛侯鄭伯來戰于郎乎又豈可曰齊侯衛侯鄭伯及某人來戰于郎乎且凡結日偏戰皆前定之戰也何不一一言來戰乎然則不言其人不言及者非以吾敗也來戰者又非以前定也皆妄說矣葉氏曰凡内書自外至皆言來來非前定之辭别内外也此言來戰正以不期而至故不言及而傳反之盖其例以疑戰不日而此日故云爾愚謂他國兵至不得已而應之豈如㑹盟之事期日來我近邑而一戰乎此亦求來戰之說不得而為之辭者也春秋但責來戰者而不言勝負豈知内敗乎既曰來戰自然不言及何得為内諱而不言及哉十有一年春正月齊人衛人鄭人盟于惡曹左氏曰春齊衛鄭宋盟于惡曹杜氏曰宋不言經闕愚謂經不言宋而傳言宋據經舍傳可也杜氏信傳疑經過矣九月宋人執鄭祭仲突歸于鄭鄭忽出奔衛公羊曰祭仲者何鄭相也何以不名賢也何賢乎祭仲以為知權也其為知權奈何古者鄭國處于留先鄭伯有善於鄶公者通乎夫人以取其國而遷鄭焉而野留莊公死已葬祭仲將往省于留塗出于宋宋人執之謂之曰為我出忽而立突祭仲不從其言則君必死國必亡從其言則君可以生易死國可以存易亡少遼緩之則突可故出而忽可故反是不可得則病然後有鄭國古人之有權者祭仲之權是也權者何權者反於經然後有善者也權之所設捨死亡無所設行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不為也突何以名挈乎祭仲也其言歸何順祭仲也鄭忽出奔衛忽何以名春秋伯子男一也辭無所貶范氏曰公羊以祭仲廢君為行權是人主可得而脅也啖氏曰公羊以廢君為賢不可以訓趙氏曰公羊意解不言子案春秋前後伯子男皆殊稱非一也又鄭伯爵也若稱子何闗爵乎劉氏曰若祭仲知權者宜效死勿聽使宋人知雖殺祭仲猶不得鄭國乃可矣且祭仲謂宋誠能以力殺鄭忽而滅鄭國乎則必不待執祭仲而刼之矣如力不能而夸為大言何故聽之且祭仲死焉足矣又不能是則若強許焉還至其國而背之執突而殺之可矣何故黜正而立不正以為行權亂臣賊子孰不能為此者乎公羊曰突何以名問之非也突之名猶小白許叔矣何故問乎又曰言其歸何順祭仲也非也若仲之為者春秋之亂臣也如何順之又曰忽何以名春秋伯子男一也辭無所貶非也變周之文從商之質非聖人意也吾既言之矣且在喪稱子者嗣也公侯伯子男者爵也文同而義異聖人豈以為嫌而避之且避成君而稱名無義之甚以為辭無所貶則孰與稱子哉南軒張子曰權者權其輕重而適平之謂乃以反經合道為權非也夫經者道之所常也權者所以權其變而求合乎經也既反經矣尚何道之合乎真氏曰公羊此言盖聖經之稂莠人心之蟊賊學者不可不察然則董仲舒所謂守經事而不知其權遭變事而不知其宜者何也曰此為不知春秋而言也盖春秋王道之權衡處常則用經遭變則用權其用權乃所以合乎經也漢儒之論經權此論為最粹大抵為學必先知經知經而後可以語權不知經而遽語權未有不流于變詐者也故張子以學未至而語變為操術之不正信矣夫葉氏曰書武成言列爵惟五分土惟三武王以為反商政政由舊則商爵未嘗不列五等也西漢諸儒未見孔氏書傳皆為商爵三等之論謂商止有鬼侯梅伯而無子男武王初定天下後増此二等盖妄矣漢儒亦以為春秋變周從商合伯子男以為一鄭自伯爵春秋何嘗合以為一乎所謂變周之文從商之質者皆非經本意傳自為說爾愚謂宋鄭皆諸侯國各有備禦祭仲不從其言鄭未必亡君未必死祭仲相鄭無故被執其人可知矣為祭仲者當曰臣可死世子不可易使人致意於忽曰臣不任托孤寄命死有餘罪臣今死矣君其備之正其身和其民人以守社稷則祭仲之義庶矣今懼死而易其君公羊乃曰權也賢也昧君臣大義而議春秋宜其反害名教也榖梁曰宋人者何宋公也其曰人何也貶之也曰突賤之也曰歸易辭也祭仲易其事權在祭仲也鄭忽者世子忽也其名失國也劉氏曰此非榖梁例也榖梁之例常以稱人執之為是稱侯執之為非向令書宋公執者得無云斥宋公以執祭仲乎且齊人執鄭詹何以獨不曰貶乎文同而義異何哉陳岳氏曰春秋國君出奔多矣然出之之㫖不在乎名愚謂執祭仲者固宋公也然史氏之法皆以人書非貶而人之也突固可賤也然不稱名則不知其為誰非賤而名之也忽固失國者也然史氏之法凡稱者皆名以别其人非以失國而責之也柔㑹宋公陳侯蔡叔盟于折公羊曰柔者何吾大夫之未命者也榖梁曰柔者何吾大夫之未命者也劉氏曰非也再命爾十有二年夏六月公㑹紀侯莒子盟于曲池左氏曰平把莒也案左氏誤作把故曰平把莒耳秋七月丁亥公㑹宋公燕人盟于榖丘左氏曰公欲平宋鄭秋公及宋公盟于句瀆之丘公如欲平宋鄭當盟宋鄭之人燕人不知何故而來盟冬十有一月公㑹宋公于龜左氏曰宋成未可知也故又㑹于虚冬又㑹于龜案左氏見魯桓㑹宋之亟而又與鄭伐宋求其說而不得故附㑹平宋鄭而宋公辭平之事以聫屬之而不知魯桓信義之不立喜怒之無恒固如此未必為平宋鄭而宋辭平也丙戌公㑹鄭伯盟于武父左氏曰宋公辭平故與鄭伯盟于武父遂帥師而伐宋戰焉宋無信也君子曰茍信不繼盟無益也詩云君子屢盟亂是用長無信也案宋既與魯㑹矣未必辭平也必别有其故而交盟耳然不可知矣今據經而論乃魯之無信也傳謂宋無信豈其然歟丙戌衛侯晉卒榖梁曰再稱日決日義也劉氏曰非也此飾說耳十有二月及鄭師伐宋丁未戰于宋公羊曰戰不言伐此其言伐何辟嫌也惡乎嫌嫌與鄭人戰也此偏戰也何以不言師敗績内不言戰言戰乃敗矣劉氏曰公羊曰内不言戰戰乃敗矣非也若偏戰而内勝何得不言戰乎愚謂公羊云辟嫌者其意若曰經若書及鄭師戰于宋則是與鄭戰而不與宋戰也故書伐宋又書戰于宋殊不知伐而言戰正蘇氏所謂伐而又戰見無故殘民之甚盖紀其實耳非辟嫌於文辭之間而為此言也夫伐曰伐戰曰戰敗績曰敗績此春秋所以為實録也若曰言戰乃敗則戰而不敗者如何命辭乎榖梁曰非與所與伐戰也不言與鄭戰恥不和也於伐與戰敗也内諱敗舉其可道者也啖氏曰榖梁不知省文之義故爾案自此後魯常與鄭和而同伐宋故知榖梁誤矣陳岳氏曰二𫝊謂内不言戰戰乃敗績若然則莊九年乾時之戰何書敗績愚謂經文明書及鄭師伐宋矣榖梁乃曰不言與鄭戰則是文義且不通其何以𫝊經哉十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績鄭人來請修好左氏曰宋多責賂於鄭鄭不堪命故以紀魯及齊與宋衛燕戰不書所戰後也趙氏曰據經文内兵以紀為主外兵以齊為主若實為宋鄭而戰即當以宋鄭為兵主何得主齊紀乎莘老孫氏曰案經書公㑹紀侯鄭伯則是紀侯主兵若如左氏之文乃鄭主矣趙氏亦曰若紀侯助鄭則當戰于宋鄭之境不當在紀也劉氏曰在宋鄭相怨鄭為此戰者鄭當序紀上宋當序齊上何故反顛倒之乎雖不及其㑹期而及其戰期自當沒㑹地而舉戰地今何故反沒戰地乎又曰魯鄭同好未嘗有隙何故忽修之是見明年㑹于曹因說此爾愚謂以經考傳之偽趙氏得之因知宋責賂而鄭不堪命之說亦未可信也左氏唱之杜氏和之服䖍劉炫孔穎達衍之輾轉訛謬而本義乖矣公羊曰曷為後日恃外也其恃外奈何得紀侯鄭伯然後能為日也内不言戰此其言戰何從外也曷為從外恃外故從外也何以不地近也惡乎近近乎圍郎亦近矣郎何以地郎猶可以地也趙氏曰案先㑹後戰成㑹而後戰也公羊恃外有何義乎愚案公羊不知春秋書法乃謂魯主兵而戰于魯國故以郎為言殊不知齊以三國伐紀主此戰者紀也榖梁曰其言及者由内及之也其曰戰者由外言之也戰稱人敗稱師重衆也劉氏曰齊人伐衛衛人及齊人戰衛人敗績何以不重衆乎愚案紀主兵與齊戰也榖梁謂魯主兵故有由内及外之云則既誤矣而又以戰為由外言之則誤之甚矣十有四年春正月公㑹鄭伯于曹左氏曰春㑹于曹曹人致餼禮也存耕趙氏曰武父之盟軌既與鄭兩戰之役軌遂黨鄭突欲軌之終為紀也請為㑹焉地于曹曹亦與也軌殺隠而簒魯突逐忽而奪鄭曹而知禮則拒亦不與之接矣乃致餼焉尚足為知禮乎無氷公羊曰何以書記異也近之夏五鄭伯使其弟語來盟左氏曰鄭子人來尋盟且修曹之㑹杜氏曰子人即弟語也愚謂左氏凡此等語皆非錄魯史之文見前有曹之㑹故云爾公羊曰夏五者何無聞焉爾無聞即榖梁傳疑之意榖梁曰諸侯之尊弟兄不得以屬通其弟云者以其來我舉其貴者也來盟前定也不日前定之盟不日孔子曰聽遠音者聞其疾而不聞其舒望遠者察其貎而不察其形立乎定哀以指隠桓隠桓之日遠矣夏五𫝊疑也趙氏曰案但以來魯即曰來盟何必前定乎孫氏曰孔子作春秋専其筆削豈其日月舊史之闕者不隨而刋正之哉此夏五無月者後人傳之脫誤也髙氏曰聖人作春秋為萬世法豈有𫝊疑者乎後之𫝊者或脫月字或加五字耳愚謂果以來我而舉其貴者則是聖人與其弟之來盟也豈春秋之㫖乎且前定則有期日矣豈有前定而無日之理乎榖梁乃曰前定不日過矣若使其弟語來盟之文則有前定之意矣秋八月壬申御廩災乙亥嘗左氏曰秋八月壬申御廩災乙亥嘗書不害也杜氏曰災其屋救之則息不及榖故曰書不害劉氏曰非也記災而書其不害何益於教乎火不害粟此亦物之不為災者於例當不書何故自書於上又自解釋於下乎苟令御廩災在乙亥之後當不復見不害矣齊氏曰左氏謂災不害榖乙亥日嘗則壬申為致齋之初日既我日而齋雖災不害榖然天災警懼改卜可也愚謂豈有火災其屋而不害其榖之理使能救其餘榖亦汚穢臭惡而不可以祭左氏但見壬申災而乙亥嘗遂以不害釋之難以語乎理矣公羊曰御廩災何以書記災也乙亥嘗常事不書此何以書譏何譏爾譏嘗也曰猶嘗乎御廩災不如勿嘗而已矣趙氏曰公羊云不如勿嘗而已案在災當警懼修飭而改卜何得更闕先君之祀乎陳岳氏曰災由天嘗由人天以災警乎人欲人君修徳正禮以迴天意勿嘗可乎榖梁曰御廩之災不志此其志何也以為唯未易災之餘而嘗可也志不敬也天子親耕以供粢盛王后親蠶以供祭服國非無良農工女也以為人之所盡事其祖彌不若以己所自親者也何用見其未易災之餘而嘗也曰甸粟而納之三宫三宫米而蔵之御廩夫嘗必有兼甸之事焉壬申御廩災乙亥嘗以為未易災之餘而嘗也劉氏曰粢盛災焉何以不志乎其曰夫嘗必有兼甸之事焉若此者明粟非災之餘可也欲以明為災之餘則非也存耕趙氏曰嘗厭新之祭也御廩之災在致齋三日之前春秋書之盖以嘗之不謹而災於齋之日也非謂其以廩災之餘而施之嘗祭也嘗必以新不以陳魯禮雖亡必不以災餘之陳而嘗也宋人以齊人蔡人衛人陳人伐鄭左氏曰宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門之椽果取牛首經當書取邑果以大宫之椽歸經當書入鄭今經止曰伐鄭且經言人則微者也而左氏以為諸侯俱未可信也公羊曰以者何行其意也以固行其意然以行其意釋以之意義則踈矣榖梁曰以者不以者也民者君之本也使人以其死非正也趙氏曰左氏云凡師能左右之曰以且齊桓晉文用諸侯之師悉能左右之何以不言以榖梁之說則諸處用兵悉不死乎范寗註云本非所得制今得制之則莊十五年宋人齊人邾人伐郳何以不言以又定四年蔡侯以吳子豈能制之哉十有五年春二月天王使家父來求車左氏曰天王使家父來求車非禮也諸侯不共車服天子不私求財存耕趙氏曰周官有九貢有器貢服貢謂諸侯不貢車服則失之矣榖梁曰古者諸侯時獻于天子以其國之所有故有辭讓而無徵求求車非禮也求金甚矣案諸侯有常貢辭讓固天子之心其所當貢者亦所不讓也然榖梁此意善矣五月鄭伯突出奔蔡公羊曰突何以名奪正也劉氏曰突之不正明矣雖勿名之可勿奪乎愚謂突固奪正然此非因奪正而名榖梁曰譏奪正也葉氏曰經於諸侯出奔未有不名者非貶也别二君爾以突為奪正凡正而名者為可奪乎鄭世子忽復歸于鄭左氏曰六月乙亥昭公入經無日左氏何從知之公羊曰其稱世子何復正也曷為或言歸或言復歸復歸者出惡歸無惡復入者出無惡入有惡入者出入惡歸者出入無惡劉氏曰非也如忽之奔盖有不得已亦何惡乎若以為惡猶有可諉未知突之簒國亦何故出入無惡乎以謂突之言歸順祭仲也夫突親簒兄奪國以順祭仲而得言歸忽本宜為君者也方其出時亦何獨不使順祭仲乎在突之入則得順祭仲而使為入無惡在忽之出則不得順祭仲而使為出有惡如是春秋乃助突而不助忽也不亦悖乎葉氏曰四例皆非即傳而言鄭突不當為君而簒其兄忽當為君而奪於弟突者入有惡者也反從出入無惡例書歸忽出入無惡者也反從出有惡例書復歸可乎非特此也衛成公使以殺叔武為伯主所執未歸而又殺公子瑕乃從出入無惡例書歸周敬王太子之母弟王猛死而國人立之乃從出入俱惡例而書入趙鞅去晉陽本不以事欲除君側之惡人據之以叛罪不重於欒盈而書入魚石與於蕩山之亂不容於宋而出奔罪不輕於荀寅士吉射而書復入則無人可通矣榖梁曰反正也葉氏曰傳例以復為復中國歸而歸其所故誤云爾其意謂忽當稱世子故不為義於前出奔直曰鄭忽鄭世子其名失國而已不知君薨不稱子今莊公之喪已除忽為踰年之君既不可稱子又不得冒稱爵故經復以世子稱之所以見其正復歸非所正也愚謂復歸固反正然春秋書此以見天子失道而諸侯恣諸侯失道而大夫専嫡庶不辨而彊者得入之耳許叔入于許榖梁曰許叔許之貴者也莫宜乎許叔其曰入何也其歸之道非所以歸也葉氏曰此盖亦拘於内弗受之說故既謂莫宜乎許叔又以歸非其道反之輾轉成其說爾然則蔡侯廬歸于蔡陳侯吳歸于陳豈歸以其道者乎公㑹齊侯于艾左氏曰謀定許也左氏見此㑹偶在許叔入許之後因謂謀定許後既無定許之事而桓襄非定諸侯之人不可信也大凡左氏附㑹類此邾人牟人葛人來朝公羊曰皆何以稱人夷狄之也陳岳氏曰何休謂桓公行惡三人來朝故夷狄之桓公簒弑惡則惡矣然諸侯不違之天子不伐之則附庸不得不朝矣果以朝桓而稱人桓二年何以書滕子紀侯來朝乎秋九月鄭伯突入于櫟左氏曰十七年初鄭伯將以髙渠彌為卿昭公惡之固諫不聽昭公立懼其殺己也辛夘弑昭公而立公子亹君子謂昭公知所惡矣公子達曰髙伯其為戮乎復惡已甚矣十八年齊侯師于首正子亹㑹之髙渠彌相七月戊戌齊人殺子亹而轘髙渠彌祭仲逆鄭子于陳而立之莊十四年鄭厲公自櫟侵鄭及大陵獲𫝊瑕傅瑕曰苟舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公厲公入遂殺傅瑕使謂原繁曰傅瑕貳周有常刑既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先人典司宗祏社稷有主而外其心其何貳如之苟主社稷國内之民其誰不為臣臣無二心天之制也子儀在位十四年矣而謀召君者庸非貳乎莊公之子猶有八人若皆以官爵行賂勸貳而可以濟事君其若之何臣聞命矣乃縊而死又昭十一年申無宇對楚子䖍曰鄭莊公城櫟而置子元焉使昭公不立由是觀之則害于國末大必折尾大不掉君所知也案經但書突入于櫟莊二十一年但書鄭伯突卒𦵏鄭厲公突復有鄭國甚明其間忽亹儀之事皆不經見未詳信否公羊曰曷為不言入于鄭末言爾曷為末言爾祭仲亡矣然則曷為不言忽之出奔言忽為君之微也祭仲存則存矣祭仲亡則亡矣劉氏曰公羊曰曷為不言入于鄭末言爾非也實入于櫟未入于鄭豈得言鄭哉何休因據陽生為比夫陽生入陳乞之家者誠在齊也又何疑乎衛侯入于陳儀蒯聵入于戚公居于鄆皆一法爾愚謂不書忽之出奔者魯史所無孔子不能益也其後書突卒𦵏者鄭來赴魯往㑹𦵏而魯史書之耳若言忽之為君微而不書奔則十一年鄭忽出奔衛亦在不書矣冬十有一月公㑹宋公衛侯陳侯于袲伐鄭榖梁曰地而後伐疑辭也非其疑也案地而後伐左氏謂㑹于袲謀伐鄭杜氏謂先㑹後伐者得之疑之之說殊不可曉十有六年秋七月公至自伐鄭左氏曰以飲至之禮也四月之間有宗社之事焉有朝廷之政焉一切委棄而助簒伐嫡至於踰時而以不正之事告廟故書至若但以飲至之禮而書則春秋一記事之史而已榖梁曰桓無㑹其致何也危之也春秋正義明道不為危之生文冬城向左氏曰書時也春秋凡書城邑皆譏其上違王制下勞民力雖得其時亦書之非謂褒其得時而書也比之非時者其罪輕耳然因左氏之言有以正先儒論周正以冬為秋之弊則非小補也十有一月衛侯朔出奔齊公羊曰衛侯朔何以名絶曷為絶之得罪于天子也其得罪於天子奈何見使守衛朔而不能使衛小衆越在岱隂齊屬負兹舍不即罪爾何氏曰時天子使發小衆不能使行越走也𫝊著朔在岱隂者明天子當及是時未能交連五國之兵早誅之屬託也天子有疾稱不豫諸侯稱負玆舍止也託疾止不就罪愚謂諸侯凡出奔者皆書名所以别其為何君也不以名而絶也且衛朔出奔事左氏叙此頗詳公羊何從得此小衆之說且又為朔疾病舍不即討之說以救之其附㑹不經可知也榖梁曰朔之名惡也天子召而不往也啖氏曰諸侯失地則名春秋之常也左氏得其事實矣不可強生意義陳岳氏曰凡曰出奔責其不能立徳正行和其人民有其國而自奔也公榖妄自穿鑿十有七年春正月丙辰公㑹齊侯紀侯盟于黄左氏曰且謀衛故也案魯既平齊紀之怨又何暇謀衛之難此後不見謀衛事跡左氏見前有朔出奔之文而意之耳二月丙午公及邾儀父盟于趡左氏曰及邾儀父盟于趡尋蔑之盟也凡此皆左氏意為之辭安有邾魯戰爭之餘且既易世復尋三十年之盟邪夏五月丙午及齊師戰于奚左氏曰疆事也於是齊人侵魯疆疆吏來告公曰疆場之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉葉氏曰經内書戰四戰于郎𫝊以為有辭戰于宋傳以為失信戰于升陘則以公敗績為不設備今戰于奚又為疆事盖𫝊不知春秋所書之義故其辭皆莫適為主且疆吏來告而公戒之者何與於書戰哉榖梁曰内諱敗舉其可道者也不言其人以吾敗也不言及之者為内諱也獻可杜氏曰春秋公萬世者也豈茍私於魯乎愚謂榖梁狃於内不言戰言戰則敗之說故云然秋八月蔡季自陳歸于蔡左氏曰蔡桓侯卒蔡人召蔡季於陳秋蔡季自陳歸于蔡蔡人嘉之也劉氏曰案此蔡人嘉之則必蔡人逆之矣蔡人逆之於左氏例當言入不當言歸何故言歸乎愚謂如蔡人召蔡季止當書歸不當書自陳凡書自某國者皆求援而歸者也榖梁曰蔡季蔡之貴者也榖梁見季以字稱故以為貴者殊不知經凡言叔季者皆諸侯之弟也及宋人衛人伐邾左氏曰伐邾宋志也存耕趙氏曰宋若伐邾魯宜無從安有以兵從人伐其國而謂非我志邪愚謂設為宋志左氏何從知之凡此皆非魯史之文冬十月朔日有食之左氏曰不書日官失之也天子有日官諸侯有日御日官居卿以厎日禮也日御不失日以授百官于朝趙氏曰非也凡不書或史有闕或年深寫誤何闗日官日御乎邦衡胡氏曰朔者日月之㑹日者甲乙之紀不可不存其或闕者嵗乆脱爾左氏以為不書日官失之也聖人之經豈由日官之為乎榖梁曰言朔不言日食既朔也陳岳氏曰日食三十六無朔有日者六無朔無日者二有朔無日者唯是而已他皆備書何休謂公行惡懼見殺故去日茍曰行惡則桓三年之食曷以書日苟曰懼見殺則如勿書去日奚益又莊十五年十八年俱無朔日則何行惡懼殺之有榖梁謂食既朔故去日設如是則桓三年宣八年曷以别書日有食之劉氏曰何休云去日非也日之食非専為魯也春秋豈得強附著之魯哉聖人記災異欲人懼耳若眭孟京房指象求類如遇鬼神通言者也十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊公羊曰公何以不言及夫人夫人外也夫人外者何内辭也其實夫人外公也案公羊嘗曰及暨皆與也此言與何害於義哉榖梁曰濼之㑹不言及夫人何也以夫人之伉弗稱數也陸氏曰婦人從夫者也何夫人之伉夏四月丙子公薨于齊丁酉公之喪至自齊榖梁曰薨稱公舉上也案春秋十二公生皆稱公不特薨稱公為舉上也且舉上者人子之辭而非先王之制何必以是為義哉冬十有二月己丑𦵏我君桓公公羊曰賊未討何以書葬讐在外也讐在外則何以書葬君子辭也案君弑賊不討不書𦵏本公榖自為之例春秋無此義也且父之讐不與共戴天讐在外而遂不討非義也辨又見隠五年𦵏衛桓公本義榖梁曰𦵏我君接上下也君弑賊不討不書𦵏此其言葬何也不責踰國而討于是也即公羊之說三傳辨疑卷四
