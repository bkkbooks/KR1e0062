body:
  text: 三傳辨疑卷七元程端學撰閔公元年春王正月左氏曰不書即位亂故也啖氏曰國有危難豈妨行禮左氏解閔公不言即位妄也劉氏曰左氏曰不書即位亂也杜云國亂不得成禮皆非也去年十月子般卒則閔公立至今已三月亂亦定矣言亂不得成禮非也且必若云何以能朝廟乎朝廟豈非即位乎濟川何氏曰左氏所云亂者以慶父弒子般國內震懾故即位之禮有闕然公子翬殺隱襄仲弒惡彼時亦亂何桓宣獨暇而即位乎斯先君不以道終則子弟不忍即位也公羊曰公何以不言即位繼弒君不言即位孰繼繼子般也孰殺子般慶父也殺公子牙今將爾季子不免慶父弒君何以不誅將而不免遏惡也既而不可及因獄有所歸不探其情而誅焉親親之道也惡乎歸獄歸獄僕人鄧扈樂曷為歸獄僕人鄧扈樂莊公存之時樂曽淫于宫中子般執而鞭之莊公死慶父謂樂曰般之辱爾國人莫不知盍弒之矣使弒子般然後誅鄧扈樂而歸獄焉季子至而不變也劉氏曰公羊曰誅鄧扈樂而歸獄焉季子至而不變也又曰既而不可及不探其情而誅焉親親之道也非也慶父弒般欲取其國是時季子力不能誅故遁逃他國爾設令季子力䏻誅之則慶父誅矣何謂不探其情乎愚案左氏弒子般為圉人犖而其事跡與此亦不相類則二傳所載未可盡信也榖梁曰繼弒君不言即位正也親之非父也尊之非君也繼之如君父也者受國焉爾案禮為之後者為之子又人君雖未踰年一日立乎其位則固一國之君也榖梁乃曰親之非父尊之非君以受國而繼之如君父不可以訓齊人救邢榖梁曰善救邢也夏六月辛酉葬我君莊公榖梁曰莊公葬而後舉諡諡所以成德也於卒事乎加之矣榖梁知卒事加諡而不知私諡之非秋八月公及齊侯盟于落姑左氏曰請復季友也齊侯許之使召諸陳公次于郎以待之木訥趙氏曰慶父殺逆豈肯復季子左氏但以落姑之盟與季子之文相連蓋以慶父請之非也愚案慶父握兵權專國柄通乎君母將以篡位安肯復請季友以分權木訥之說是也君舉陳氏亦曰若慶父為之則閔公不弒以閔公之見弒知非慶父意榖梁曰盟納季子也亦左氏之意季子來歸左氏曰季子來歸嘉之也公羊曰其稱季子何賢也其言來歸何喜之也存耕趙氏曰國人謂季子真忠公室也故願其歸焉然患未作則奉身以出既歸而遇亂則奉僖公以奔較之叔牙慶父為賢耳榖梁曰其曰季子貴之也其曰來歸喜之也趙氏曰不言至異乎執耳春秋不為憂喜生文愚謂左氏言嘉之公羊言賢且喜之榖梁言貴且喜之皆以子與來歸字生義而不知聖人所書之㫖夫魯人懼其國之亂而喜季子之歸尊愛之而以子稱魯史亦喜之而書其來歸之始然季子之歸乃季氏僭魯之初也孔子因而不革以見季子因國人歸向而遂竊其國柄孔子曰祿之去公室五世矣政逮於大夫四世矣然則聖人果喜季子之歸乎冬齊仲孫來左氏曰書曰仲孫亦嘉之也公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間攜二覆昏亂霸王之器也案齊使仲孫雖非善意然問魯可取未必然也故葉氏亦以此為後世附益之辭公羊曰齊仲孫者何公子慶父也公子慶父則曷為謂之齊仲孫繫之齊也曷為繫之齊外之也曷為外之春秋為尊者諱為親者諱為賢者諱子女子曰以春秋為春秋齊無仲孫其諸吾仲孫與啖氏曰齊之仲孫謂魯之公子謬亦甚矣劉氏曰公羊曰公子慶父也非也孫以王父字為氏此乃慶父之身也未可以稱仲孫且經實繫之齊若之何謂魯仲孫哉此不近人情之尤者榖梁曰其曰齊仲孫外之也其不目而曰仲孫疏之也其言齊以纍桓也陳嶽氏曰凡弒君書名以懲之未有隱其名以外之也公榖不原其理但以齊無仲孫魯有仲孫哉曰慶父大夫豈有定耶豈盡著於春秋耶穿鑿甚矣二年夏五月吉禘于莊公左氏曰速也公羊曰其言吉何言吉者未可以吉也曷為未可以吉未三年也三年矣曷為謂之未三年三年之喪實以二十五月其言于莊公何未可以稱宫廟也曷為未可以稱宫廟在三年之中矣吉禘于莊公何以書譏何譏爾譏始不三年也榖梁曰吉禘者不吉者也喪事未畢而舉吉祭故非之也三傳皆得之然僅明喪未畢而吉祭之一義若不王不禘之法與于莊公之文則未及也秋八月辛丑公薨公羊曰殺公子牙今將爾季子不免慶父殺二君何以不誅將而不免遏惡也既而不可及緩追逸賊親親之道也案慶父殺君人所當討何暇緩追逸賊全親親之道哉榖梁曰不地故也其不書葬不以討母葬子也案閔公不書葬或以亂故不成禮葬而魯史不書耳榖梁不以討母葬子之說謬也母得罪於宗廟何妨自討子何妨自葬乎况討母在僖元年七月又是齊人討之與葬閔何關乎九月夫人姜氏孫于邾公子慶父出奔莒榖梁曰孫之為言猶孫也諱奔也其曰出絶之也慶父不復見矣劉氏曰非也內大夫之奔亦自多言出不必慶父爾愚案慶父之罪著矣不在出字絶之也冬齊髙子來盟公羊曰髙子者何齊大夫也何以不稱使我無君也然則何以不名喜之也何喜爾正我也其正我奈何莊公死子般弒閔公弒比三君死曠年無君設以齊取魯曽不興師徒以言而已矣桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門至于爭門者是也或曰自爭門至于吏門者是也魯人至今以為美談曰猶望髙子也劉氏曰不稱使我無君也非也齊髙子楚屈完文義一也不可復附異說矣且慶父出奔則僖公已立也髙子稱來盟則僖公之盟也何謂我無君乎公及大夫盟于蔇當是時齊無君文不沒公即魯無君何故沒齊侯哉此自相反也愚謂將南陽甲立僖公與城魯事皆傳聞之辭蓋無鄰國伐魯何故城之榖梁曰其曰來喜之也其曰髙子貴之也盟立僖公也不言使何也不以齊侯使髙子也獻可杜氏曰來者自外適我之辭不可言喜之也愚案如榖梁言喜之貴之則是賢髙子也髙子者桓公大夫也臣雖賢分內事爾何故云不以齊桓使髙子乎然則榖梁教髙子叛其主矣况髙子未必賢乎鄭棄其師榖梁曰惡其長也兼不反其衆則是棄其師也此說得之本義既詳不得再取三傳辨疑卷七
