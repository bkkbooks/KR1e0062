body:
  text: 春秋三傳辨疑春秋類提要臣等謹按春秋三傳辨疑二十卷元程端學撰是書以攻駁三傳為主凡端學以為可疑者皆摘録經文𫝊文而疏辨於下大抵先存一必欲廢𫝊之心而百計以求其瑕纇求之不得則以不可信一語概之蓋不信三傳之說創于啖助趙匡按韓愈贈盧同詩有春秋三傳束髙閣獨抱遺經究終始之句同與啖趙同時蓋亦宗二家之說者以所作春秋摘微已佚故今據現存之書惟稱啖趙其後析為三派孫復尊王發微以下棄𫝊而不駁傳者也劉敞春秋權衡以下駁三傳之義例者也葉夢得春秋讞以下駁三傳之典故者也至於端學乃兼三派而用之且併以左傳為僞撰變本加厲罔顧其安至是而橫流極矣平心而論左氏身為國史記録最真公羊榖梁去聖人未逺見聞較近必斥其一無可信世寧復有可信之書此真妄搆虛詞深誣先哲至于褒貶之義例則左氏所見原疏公榖兩家書由口授經師附益不免私增誠不及後來之精密端學此書于研求書法糾正是非亦千慮不無一得固未可惡其剛愎遂概屏其說也通志堂經解所刋有本義有或問而不及此書據納喇性德之序蓋以殘缺而置之此本為浙江吳玉墀家所藏第一卷蠧蝕最甚有每行惟存數字者然第二卷以下則尚皆完整今以永樂大典所載校補其文遂為全帙吳本於左氏所載諸軼事每條之下俱注非本義不録字疑為端學定藳之時加以簽題俾從刪削而繕寫者仍誤存之也以原本如是今亦姑仍其舊焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3b06b6a07a959f06d2f1f01a94dcff7b47d12ac9025e12ef909ec4b07f85ac03
