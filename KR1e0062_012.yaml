body:
  text: 三傳辨疑卷十三元程端學撰宣公元年春王正月公即位公羊曰繼弒君不言即位此其言即位何其意也此說近是而辭亦有未備者公子遂如齊逆女左氏曰公子遂如齊逆女尊君命也左氏見公子遂以公族上卿之尊而逆女故有是論而不知遂之弒逆而復喪娶也可謂多聞而無識矣三月遂以夫人婦姜至自齊左氏曰遂以夫人婦姜至自齊尊夫人也啖氏曰不稱公子夫人何以尊乎蓋左氏不知有一事再見卒名之義公羊曰夫人何以不稱姜氏貶曷為貶譏喪娶也喪娶者公也則曷為貶夫人內無貶于公之道也內無貶于公之道則曷為貶夫人夫人與公一體也其稱婦何有姑之辭也夫人小君也小君既與公一體不敢貶公而反敢貶夫人乎况喪娶之罪在公為重在夫人為輕舍其重而貶其輕豈理也哉且既以有姑而稱婦姜矣而又以為不稱氏豈不贅哉穀梁曰其不言氏喪未畢故略之也其曰婦緣姑言之之辭也遂之挈由上致之也李氏曰二傳以姜之去氏為貶杜氏以為缺文案經凡稱婦姜者不言氏夫人不言諡不稱婦則必以氏配之今婦而言姜加氏則繁矣亦猶文姜成風以諡稱則不以氏稱也經雖以喪娶書然言婦姜而不言氏非貶之也如成十四年書婦姜氏者蓋史辭文質之殊耳愚謂彼書氏者衍文耳晋放其大夫胥甲父于衛左氏曰晋人討不用命者放胥甲父于衛而立胥克先辛奔齊李氏曰左氏言討不用命杜氏以十二年河曲之戰言之且國之賞罰寧八年而後行耶公羊曰放之者何猶曰無去是云爾然則何言爾近正也此其為近正奈何古者大夫已去三年待放君放之非也大夫待放正也古者臣有大喪則君三年不呼其門已練可以辨冕服金革之事君使之非也臣行之禮也閔子要絰而服事既而曰若此乎古之道不即人心退而致仕孔子蓋善之也啖氏曰公羊意謂三年待放之義此乃三諌不從以禮而去者今放名雖同而實殊傳不見事迹故云爾劉氏曰公羊曰君放之非也大夫待放正也非也大夫待放者以道去其君者也君放大夫寬其死投之于逺者也若放歡兜于崇山之類也無去是云爾豈非正乎穀梁曰放猶屏也稱國以放放無罪也胥甲父之有罪無罪不可知然不稱晋國則何從知為某國大夫乎原穀梁意蓋以不書人云爾然則不書人者皆可以無罪言乎六月齊人取濟西田公羊曰外取邑不書此何以書所以賂齊也外取邑豈有不書之理穀梁曰內不言取內豈有不言取者楚子鄭人侵陳遂侵宋左氏曰宋人之弒昭公也晋荀林父以諸侯之師伐宋宋及晋平宋文公受盟于晋又㑹諸侯于扈將為魯討齊皆取賂而還鄭穆公曰晋不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晋秋楚子侵陳遂侵宋葉氏曰按文十七年春經書晋人衛人陳人鄭人伐宋不言盟安得為宋及晋平文公受盟于晋六月公及齊侯盟于穀諸侯㑹于扈傳曰晋侯搜于黃父遂復合諸侯于扈平宋也公不與㑹齊難故也則安得為魯討齊二說皆自相侵伐據十五年晋侯㑹宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊齊人賂晋侯故不克而還此在齊人侵我西鄙之後為魯討齊當是此盟而傳誤以為此㑹其記事顚錯類如此穀梁曰遂繼事也此字訓近之但已前見不得取晋趙盾帥師救陳左氏曰晋趙盾帥師救陳宋楚始侵陳陳告于晋故晋救陳當興師救陳之時楚未侵宋也故經但書救陳而傳以為救陳宋妄也穀梁曰善救陳也穀梁但知救陳之為善而不知大夫專兵之為惡宜其得一而失二也宋公陳侯衛侯曹伯㑹晋師于棐林伐鄭左氏曰㑹于棐林以伐鄭也楚蒍賈救鄭遇于北林囚晋解揚晋人乃還楚如救鄭經當書之以見夷狄之拒中國矣今經不書而傳曰救鄭未可據也且經不書晋楚交兵又不書晋敗績而傳遽云囚晋解揚欲人無疑不可得也公羊曰此晋趙盾之師也曷為不言趙盾之師君不㑹大夫之辭也趙氏曰按春秋㑹大夫者非一公羊何于此獨生義乎愚謂㑹晋師則趙盾之罪自不能逃不在沒趙盾之名然後見君不㑹大夫之義也上言趙盾帥師故此止言師耳穀梁曰列數諸侯而㑹晋趙盾大趙盾之事也其曰師何也以其大之也于棐林地而後伐鄭疑辭也此其地何則著其美也劉氏曰即大趙盾名之是已無為沒其名也且卿大夫不得㑹諸侯春秋之常也今晋侯不行趙盾専國曷為大之邪葉氏曰經書公㑹宋公衛侯陳侯于袲伐鄭傳以為地而後伐疑辭也非其疑也固已失矣此亦以棐林地而後伐為疑辭何反為著其美哉且君不㑹大夫傳例與左氏公羊同今諸侯皆㑹趙盾偃然當君之任地棐林亦以見㑹而後伐也二事正同而一以著其疑一以著其美則凡經之辭亦莫適為正矣陳嶽氏曰君㑹大夫至衆苟曰言師以大趙盾之事則春秋書師多矣如齊師宋師曹師豈可謂稱師為大其衆歟蓋上言國名則下不言國名如上言諸侯言大夫亦然此上言趙盾帥師下言㑹晋師事既不異則趙盾之師可知也茍復言趙盾則文重復矣故曰㑹晋師耳三家俱失冬晋趙穿帥師侵崇公羊曰栁者何天子之邑也曷為不繫乎周不與伐天子也啖氏曰崇小國也公羊既誤為栁故妄說也愚謂栁果天子之邑正當書周使知趙盾伐天子之邑為後世戒如沒周之實則後世孰知其故哉春秋豈為暗昧之文必待公羊然後知其為周乎晋人宋人伐鄭左氏曰晋人伐鄭以報北林之役于是晋侯侈趙宣子為政驟諌而不入故不競于楚北林之役辨見前晋侯侈以下非本義不録穀梁曰伐鄭所以救宋也按楚侵宋在秋晋至冬始伐鄭是時楚兵已去可謂救宋乎二月春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元左氏曰狂狡輅鄭人鄭人入于井倒㦸而出之獲狂狡君子曰失禮違命宜其為禽也戎昭果毅以聽之之謂禮殺敵為果致果為毅易之戮也將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民于是刑孰大焉諸所謂人之無良者非羊斟之謂乎殘民以逞宋人以兵車百乘文馬百駟以贖華元于鄭半入華元逃歸立于門外告而入見叔牂曰子之馬然也對曰非馬也其人也既合而來奔宋城華元為植巡功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡趙氏曰左氏之言皆近誣也非解經之義穀梁曰獲者不與之詞也言盡其衆以救其將也以三軍敵華元華元雖獲不病矣趙氏曰軍敗身獲而穀梁云不病非也但緣師敗身乃見獲依次第書之無煩曲說秦師伐晋左氏曰遂圍焦經不書圍焦傳未可信也夏晋人宋人衛人陳人侵鄭左氏曰夏晋趙盾救焦遂自陰地及諸侯之師侵鄭以報大棘之役楚鬬椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晋師趙盾曰彼宗競于楚殆捋斃矣姑益其疾乃去之按趙盾救焦當書也而經不書春秋稱人微者也而左氏以為趙盾楚鬬椒救鄭當書也而經亦不書經傳不同信經捨傳可也秋九月乙丑晋趙盾弒其君夷臯左氏曰孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免趙氏曰董狐謂亡不越境言出亡未逺而君被弒反不討賊狀涉同謀耳非謂越境即無罪也作傳者不達此意遂妄附㑹為此言誣何甚然則奸臣令人弒君身越境而還即無罪乎故當辨情狀之邪正不合論越境與不越境歐陽氏曰趙盾弒君大惡也盾不討賊不䏻為君復讎而失刑于天下二者輕重不較可知使盾果有弒心乎則自然罪在盾矣不得曰為法受惡而稱其賢使果為無弒心乎則當為之辨明必先正穿之惡若曰盾不討賊有幸弒之心乎非孔子忠恕春秋以王道治人之法也孔子修春秋就令舊史如是其肯從而不正之乎其肯從而稱其美又教以越境逃惡乎可知其謬傳矣劉氏曰使盾遂去晋國雖已越境不能討賊此則罪矣安在越境則君臣之義絶乎此非仲尼之言葉氏曰為大夫而許之以越境乃免此非孔子之言也弒君人之大惡也有為不為爾使與乎弒雖在四海之外無所逃則安取于越境使不與聞雖在朝如晏子其誰能責之木訥趙氏曰弒君者穿之手盾之心耳裴度當國劉克明弒敬宗度亦不討賊誰以罪度趙盾弒君之事既曰學者胡為任傳以賊為賢耶穀梁曰穿弒也盾不弒而曰盾弒何也以罪盾也其以罪盾何也曰靈公朝諸大夫而暴彈之觀其辟丸也趙盾入諌不聽出亡至于郊趙穿弒公而後反趙盾史狐書賊曰趙盾弒公盾曰天乎天乎豫無罪孰為盾而忍其弒君者乎史狐曰子為正卿入諌不聽出亡不逺君弒反不討賊則志同志同則書重非子而誰故書之曰晋趙盾弒其君夷臯者過在下也曰于盾也見忠臣之至于許世子止見孝子之至胡氏曰三傳皆為趙盾不弒今經書盾弒與經相違凡經書若襄七年鄭伯髠頑如㑹未見諸侯丙戌卒于鄵哀十年齊侯陽生卒經言卒三𫝊皆言弒此趙盾與宣四年鄭公子歸生弒其君夷經皆言弒三𫝊不言弒此若言非趙盾弒則是慿𫝊也慿𫝊則是歸生亦不當言弒矣鄭伯髠頑亦不當言卒矣棄經任𫝊豈春秋之學乎辨又見左氏及許世子弒君傳三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望左氏曰不郊而望皆非禮也望郊之屬也不郊亦無望可也此猶三望之一義也已見僖三十一年矣然僣天子之禮與天不享非禮之義皆不及也公羊曰其言之何緩也曷為不復卜養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在于滌三月于稷者唯具是視郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自內出者無匹不行自外至者無主不止趙氏曰之語助之詞耳葉氏曰先王養獸之官曰充人其祀上帝享先王之牲繫于牢芻之必三月初未有間也而公羊乃以為帝牲在滌三月于稷者唯具是視記禮者因之遂以事天神人鬼之别夫天地宗廟先王以類求之者其文或有異至于齊明之誠豈有二哉穀梁曰之口緩詞也傷自牛作也改卜牛牛死乃不郊事之變也乃者亡乎人之詞也按公羊以之為緩詞則既不解文義而趙氏助語之云足以貶其愚矣今穀梁又以乃為亡乎人之詞又不解文義之詞者也夫牛傷牛死乃不郊豈不平易而簡明世之稍通文義者皆能明之穀梁獨以乃為義豈不贅哉楚子伐陸渾之戎左氏曰楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若魑魅魍魎莫能逢之用能協于上下以承天休桀有昏德鼎遷于商載祀六百商紂暴虐鼎遷于周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也按經但言伐陸渾之戎未見觀兵問鼎等事固已可疑又非本義不録夏楚人侵鄭左氏曰春晋侯伐鄭及郔鄭及晋平士㑹入盟夏楚人侵鄭鄭即晋故也按經無此事未可據也宋師圍曹左氏曰宋文公即位三年殺母弟須及昭公子武氏之謀也使戴桓之族攻武氏于司馬子伯之館盡逐武穆之族武穆之族以曹師伐宋秋宋師圍曹報武氏之亂也按曹果伐宋而宋圍曹經當並書曹宋之事宋雖不免猶以曹為首惡而宋報之宋當從末減不應經獨罪宋也今經不書曹伐宋事則𫝊未可據也四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向公羊曰此平莒也其言不肯何辭取向也劉氏曰非也聖人作經曰諱國惡云乎豈曰文過云乎誣人甚矣穀梁曰及者內為志焉爾平者成也不肯者可以肯也伐猶可取向甚矣莒人辭不受治也伐莒義兵也取向非也乘義而為利也趙氏曰此非王命也又非霸主興兵安得稱義又稱可乎夏六月乙酉鄭公子歸生弒其君夷左氏曰楚人獻黿于鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指于鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譛子家子家懼而從之夏弒靈公書曰鄭公子歸生弒其君夷權不足也君子曰仁而不武無能達也凡弒君稱君君無道也稱臣臣之罪也朩訥趙氏曰食黿之事其迹甚誣世豈有一饌之隙而弒君哉凡弒君稱君無道也君雖不君臣不可以不臣奈何君無道而臣得弒之傷教害義之甚者也愚謂食黿之事固未可信反譛子家之言尤不近人情蓋靈公方欲殺子公不知子公尚譛誰乎靈公其暇聽子公之譛乎且子公一聞公怒而遽與子家謀先非平日同謀敢發言乎且子家為正卿久握兵權未必即懼而從之也餘見或問五年春公如齊左氏曰公如齊髙固使齊侯止公請叔姬焉按此事未詳信否疑亦左氏見公春如齊夏方至即繼之以髙固逆子叔姬事而意之耳夏公至自齊左氏曰書過也即上文之意秋九月齊髙固來逆子叔姬穀梁曰諸侯之嫁子于大夫主大夫以與之來者接內也不正其接內故不與夫婦之稱也劉氏曰非也吾于莒慶既言之矣堯俞李氏曰天子娶女則稱逆王后桓八年書祭公來逆王后于紀是也外卿為君來逆則曰逆女隱二年紀裂繻來逆女是也其卿自為逆內女稱字以别之莊二十七年莒慶來逆叔姬是也此經與莒慶同不應謂之逆女明矣穀梁以為不正其接內而不與夫婦之稱非也愚謂來者來逆叔姬耳何必生義乎冬齊髙固及子叔姬來左氏曰來反馬也何氏曰禮無反馬之法公羊曰何言乎髙固之來言叔姬之來而不言髙固之來則不可子公羊子曰其諸謂其雙雙而俱至者與劉氏曰非也昉以髙固之來故并書而譏之耳無他義也穀梁曰及者及吾子叔姬也為使來者不使得歸之意也獻可杜氏曰禮為人臣者無外交髙固于秋越境逆女既為非禮至冬又與子叔姬來魯此實大夫之私事也左氏以為反馬何休謂禮無反馬之法范氏又謂受使來聘然經不書其聘而直曰及子叔姬來譏其失禮之甚愚謂固實為使經當書曰齊侯使髙固來聘遂及子叔姬來今經不然則穀梁之妄也楚人伐鄭左氏曰楚子伐鄭陳及楚平晋荀林父救鄭伐陳按今年楚伐鄭明年晋衛方侵陳恐非為救鄭也况經言侵而傳言伐當以經為正六年春晋趙盾衛孫免侵陳公羊曰趙盾弒君此其復見何親弒君者趙穿也親弒君者趙穿則曷為加之趙盾不討賊也何以謂之不討賊晉史書賊曰晉趙盾弒其君夷嗥趙盾曰天乎無辜吾不弒君誰謂吾弒君者乎史曰爾為仁為義人弒爾君而復國不討賊此非弒君而何趙盾之復國奈何靈公為無道使諸大夫皆內朝然後處乎臺上引彈而彈之已趨而辟丸是樂而已矣趙盾已朝而出與諸大夫立于朝有人荷畚自閨而出者趙盾曰彼何也夫畚何為出乎閨呼之不至曰子大夫也欲視之則就而視之趙盾就而視之則赫然死人也趙盾曰是何也曰膳宰也熊蹯不熟公怒以斗摮而殺之支解將使我棄之趙盾曰嘻趨而入靈公望見趙盾訴而再拜趙盾逡巡北面再拜稽首趨而出靈公心怍焉欲殺之于是使勇士某者往殺之勇士入其大門則無人門焉者入其閨則無人閨焉者上其堂則無人焉俯而窺其户方食魚飱勇士曰嘻子誠仁人也吾入子之大門則無人焉入子之閨則無人焉上子之堂則無人焉是子之易也子為晋國重卿而食魚飱是子之儉也君將使我殺子吾不忍殺子也雖然吾亦不可復見吾君矣遂刎頸而死靈公聞之怒滋欲殺之甚衆莫可使往者于是伏甲于宫中召趙盾而食之趙盾之車右祁彌明者國之力士也仡然從乎趙盾而入放乎堂下而立趙盾已食靈公謂盾曰吾聞子之劍蓋利劍也子以示我吾將觀焉趙盾起捋進劍祁彌明自下呼之曰盾食飽則出何故拔劍于君所趙盾知之躇階而走靈公有周狗謂之獒呼獒而屬之獒亦躇階而從之祁彌明逆而踆之絶其頷趙盾顧曰君之獒不若臣之獒也然而宫中甲鼓而起有起于甲中者抱趙盾而乘之趙盾顔曰吾何以得此於子曰子某時所食活我於暴桑下者也趙盾曰子名為誰曰吾君孰為介子之乘矣何問吾名趙盾驅而出衆無留之者趙穿緣民衆不說起弒靈公然後迎趙盾入與之立于朝而立成公黑臀劉氏曰趙盾弒君何以復見此問之迂者其意欲發盾非弒君也不知例不可通也凡弒君復見寧止盾乎以謂盾復見則非弒君宋萬復見亦非弒君乎說者乃巧辭蔽之如此誰不能者然去道已逺矣朴鄉吕氏曰公羊蓋謂弒君之賊不復見于經其復見于經者以明趙盾之非弒也然乎曰此說誤矣按春秋弒君之賊不復見者惟宋督鄭歸生齊崔杼陳乞四子耳其他如商人世子般宋萬晋里克衛寧喜皆再見于經又有以討賊而再見于經者州吁無知是也他國之臣唯銜命來魯及預㑹盟侵伐則書無事則不書趙盾所以書者以帥師侵陳也若其事當書豈以弒君之賊而不之書若其事不當書豈以其非弒君而强書之也况其身為弒君之賊而預國之事再見于經適足以見其國之無臣子耳豈謂其非弒君而乃再見之哉愚謂凡弒君之賊其後别有非禮非義之事則復見無非禮非義之事則不復見公羊乃謂復見則不為弒君豈不謬哉其所叙事多不近人情不暇辨也穀梁曰此帥師也其不言帥師何也不正其敗前事故不與帥師也范氏曰前年救而今更侵之劉氏曰非也將尊師少稱將此通例也為穀梁者皆用之何忽昏忘乎即以命卿之將舉當言帥師者十一年公孫歸父㑹齊人伐莒不言帥師以何事貶之哉愚謂不言帥師者魯史無此二字孔子不得而加也使其帥師正當書之以懲専兵惡有敗前事而反不書其帥師哉如穀梁言則春秋凡書帥師者皆與之乎七年春衛侯使孫良夫來盟左氏曰衛孫桓子來盟始通且謀㑹晋也按此盟在春而㑹晋在冬凡諸侯㑹大國必大國有命然後㑹之衛豈預隔三時謀㑹晋晋亦預隔三時告命諸侯為㑹哉此皆左氏見其冬有㑹而附㑹之也穀梁曰來盟者前定也不言及者以國與之不言其人亦以國與之不日前定之盟不日孫氏來魯求盟故不言及與公盟故不言其人以國與之義安在夏公㑹齊侯伐萊左氏曰夏㑹齊侯伐萊不與謀也凡師出與謀曰及不與謀曰㑹劉氏曰非也古者行師初無竒術祕䇿以紿人者也諸侯相率而討罪伐叛則是與謀矣焉有連兵合衆人君親將而曰不與謀者哉且由左氏考之凡先謀而後伐者稱㑹多矣不必云及也此其自相反者吾既言之矣冬公㑹晋侯宋公衛侯鄭伯曹伯于黑壤左氏曰鄭及晋平公子宋之謀也故相鄭伯以㑹冬盟于黑壤王叔桓公臨之以謀不睦晋侯之立也公不朝焉又不使大夫聘晋人止公于㑹盟于黃父公不與盟以賂免故黑壤之盟不書諱之也啖氏曰經但言㑹𫝊作盟不與經合又說公見止亦近誣故皆不取葉氏曰諸侯盟而王臣臨之者多矣未有不書柯陵雞澤是也唯葵丘之盟宰周公不與則復書諸侯盟于葵丘此㑹王叔桓公果在焉何以不書乎既已無據矣所謂晋侯止而公不與盟故不書者尤非是誠或有之者亦當如平丘書公不與盟何諱之云朩訥趙氏曰陽穀之㑹齊不肯盟季孫行父則書齊侯弗及盟平丘之㑹公不得同㰱則書公不與盟今經無其文左氏妄生此說當以經為正戴氏曰誠如左氏言則春秋當以不與盟書豈得缺而不録八年夏六月公子遂如齊至黃乃復穀梁曰乃者亡乎人之詞也復者事畢也不専公命也劉氏曰非也遂受命而行辭疾而返此春秋之所惡也乃加事畢之文為之文過何以事君辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥左氏曰有事于太廟襄仲卒而繹非禮也此論得之特未詳耳公羊曰仲遂者何公子遂也何以不稱公子貶曷為貶為弒子赤貶然則曷為不于其弒焉貶于文則無罪于子則無年繹者何祭之明日也萬者何干舞也籥者何籥舞也其言萬入去籥何去其有聲者廢其無聲者存其心焉耳存其心焉耳者何知其不可而為之也猶者何通可以已也陳嶽氏曰二傳謂不稱公子是貶其殺子惡也茍殺子惡而貶則殺之後凡書于經即貶之何以上猶連稱公子下復稱字以卒何貶之有愚謂公羊謂于文則無罪猶可言也其曰于子則無年不可言也子赤雖無年宣公之年獨不可貶乎此蓋不知前見之義而穿鑿之耳其曰萬舞為干舞亦非也萬舞者文武二舞之總名穀梁曰為若反命而後卒也此公子也其曰仲何也疏之也何為疏之也是不卒者也不疏則無用見其不卒也則其卒之何也以譏乎宣也其譏乎宣何也聞大夫之喪則去樂卒事猶者可以已之辭也繹者祭之旦日之享賔也萬入去籥以其為之變譏之也劉氏曰其曰仲何也疏之也是不卒者也非也即春秋欲書之何不但書遂卒乎且春秋欲疏弒君之臣不書其氏反書其字何為哉愚謂公羊于季子來歸則曰其稱季子何賢也穀梁亦以為其稱季子貴之也公羊于季友卒則又曰其稱季友何賢也穀梁亦曰稱公弟叔仲賢也夫季友以字稱公穀皆以為賢且貴仲遂亦以字稱公穀皆以為貶且疏之何忽自反其說哉晋師白狄伐秦左氏曰晋人獲秦諜殺諸絳市六日而蘇此非本義又恐無人死六日而蘇之理故不取楚人滅舒蓼左氏曰楚子疆之及滑汭盟吳越而還經書楚人而𫝊謂楚子與盟吳越事俱未詳信否冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬左氏曰冬葬敬嬴旱無麻始用葛茀雨不克葬禮也禮卜葬先逺日辟不懷也雨不克葬而得禮則為常事而春秋不書矣惟其非禮也故春秋書之夫左氏豈知春秋之所由作乎餘見或問公羊曰頃熊者何宣公之母也而者何難也乃者何難也曷為或言而或言乃乃難乎而也按而者語助之詞乃之為言始也言日是而始克葬耳皆文法當然公羊不明大義而于語助生義徒見其惑人而已頃熊辨見本義穀梁曰而緩詞也足乎日之詞也而字豈有足乎日之意經言日中克葬則意不足言日中而克葬則文意兩盡何必以而為義哉城平陽左氏曰書時也若但得時則為常事不書惟其雖得時而喪葬之餘重勞民力故書之也然以冬十月為得時則左氏亦以夏正言是亦用夏正之一證也九年夏仲孫蔑如京師左氏曰王使來徵聘夏孟獻子聘于周王以為有禮厚賄之按王無召聘之理果召聘經當書曰天王使某來召聘夫豈非一義而經不書乎秋取根牟左氏曰言易也劉氏曰根牟雖小不以兵革不能取也能取其國何謂易乎不分别取滅之義而茍記其難易而已豈春秋意哉愚按取者內辭史諱滅也左氏見經無滅根牟之文而但言取故妄意之也然則取鄟取邿皆不勞而得之何魯得國如是之易也公羊曰根牟者何邾婁之邑也曷為不繫乎邾婁諱亟也劉氏曰何休曰屬有小君之喪邾婁子來加禮末期而取其邑故諱不繫邾婁也推此言也而觀之其妄可勝計乎晋荀林父帥師伐陳左氏曰㑹于扈討不睦也陳侯不㑹晋荀林父以諸侯之師伐陳晋侯卒于扈乃還經言荀林父帥師則晋師耳而𫝊言以諸侯之師凡諸侯以某師者經嘗書之矣獨此以諸侯之師而不書乎辛酉晋侯黑臀卒于扈公羊曰扈者何晋之邑也諸侯卒其封內不地此何以地卒于㑹故地也未出其地故不言㑹也按春秋記實事卒于扈書扈卒于㑹書㑹此不書㑹者髙氏所謂諸侯散而晋侯疾者近之矣公羊曰卒于㑹故地又曰未出其地故不言㑹于理不通且晋侯㑹于扈矣安得謂未出其地乎穀梁曰其地于外也其日未踰境也劉氏曰其言日未踰境非也未踰境猶在國耳何得書其地然則扈者他國之邑名非晋地也愚按鄭伯卒于鄵宋公卒于曲棘古今𫝊注皆云鄭宋之邑則劉氏之云亦未必然但公羊以日為未踰境則大害理耳晋郤缺帥師救鄭左氏曰楚子為厲之役故伐鄭晋郤缺救鄭鄭伯敗楚師于栁棼國人皆喜唯子良憂曰是國之災也吾死無日矣葉氏曰按經及傳皆無厲役之事杜預以六年楚人伐鄭取成而還當之然傳不言厲何以知其即此役十一年傳言厲之役鄭伯逃歸杜預復指前六年事皆無據特附㑹以成其說耳且既取成而還則何罪復伐此書在九月晋侯宋公衛侯鄭伯曹伯㑹于扈之後蓋既與楚成復叛而從晋故討之是以十一年辰陵之盟鄭子良曰晋楚不務德而兵爭與其來者可也乃從楚蓋橫出厲役之事以相亂愚謂鄭伯果敗楚師經當有見楚敗晋師于邲既書之鄭敗楚師獨不可書乎况十年晋人宋人衛人曹人伐鄭左氏曰鄭及楚平故諸侯之師伐鄭若果敗楚師安得又與楚平乎此其自相戾者也陳殺其大夫泄冶左氏曰孔子曰詩云民之多辟無自立辟其泄冶之謂乎石氏曰是非孔子之言也後之儒者從而和之有曰匹夫之直死而無益又曰居淫亂之邦諌不䏻行從二者之言是忠不可為義不可守也大夫見殺有罪無罪皆名陳洙氏曰𫝊引詩而罪之非聖人之言左氏之瞽言也孔子稱三仁曰比干諌而死反罪泄冶耶冶以國殺春秋常文耳穀梁曰稱國以殺其大夫殺無罪也泄冶之無罪如何陳靈公通于夏徵舒之家公孫寧儀行父亦通于其家或衣其衣或衷其𥜗以相戲于朝泄冶聞之入諌曰使國人聞之則猶可使仁人聞之則不可君愧于泄冶不䏻用其言而殺之按先儒以稱國以殺為泄冶有罪穀梁以稱國以殺為泄冶無罪然則稱國之說固無定論其為遷就明矣愚于或問已言之矣十年春齊人歸我濟西田公羊曰齊已取之矣其言我何言我者未絶于我也曷為未絶于我齊已言取之矣其實未之齊也劉氏曰非也若未絶于我經何故特書齊人取濟西田乎穀梁曰公娶齊齊由以為兄弟反之不言來公如齊受之也趙氏曰但言歸我則是知其來也省文耳哀八年歸歡及闡豈是公自受之乎齊崔氏出奔衛左氏曰齊惠公卒崔杼有寵于惠公髙國畏其逼也公卒而逐之奔衛書曰崔氏非其罪也且告以族不以名凡諸侯之大夫違告于諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使者則告不然則否劉氏曰左氏曰書曰崔氏非其罪也且告以族不以名非也齊雖告以族春秋固當正之若曰崔杼無罪又舉族出奔故春秋因舊史而書之則欒盈亦無罪亦舉族出奔向以不曰欒氏出奔邪且春秋所記大事而已故使舉上介戰舉元帥雖有衆大夫不與焉者略所微也今何為區區記崔氏之族耶崇氏曰崔舉氏與書尹氏卒之義同皆譏世卿也左氏但以髙國盡逐其族遂以為告以族而不名若以為當然故春秋録之以為非其罪其失之逺矣詩言尹氏太師此周人之詞也不名自可知其人矣若告魯之辭不名則安知其為誰乎且欒盈左氏亦謂以其族奔晋亦必以盈告而言其族矣經何不書欒氏東萊吕氏曰前書尹氏此書崔氏豈直以族告而不以名邪出奔有三義或負罪而奔或避難而奔或見逐而奔今崔氏奔而能反反而弒其宗素彊故以是書之木訥趙氏曰惠公卒而崔氏奔則崔氏寵于惠而不容于國人矣左氏謂有寵而高國畏其逼且自是至崔杼之逆凡五十一年古者四十而仕五十而爵則崔杼之弒蓋百歲矣何崔杼如是之夀邪蓋附㑹也穀梁曰氏者舉族而出之之辭也劉氏曰非也舉族而奔何足記哉且穀梁曰使舉上客而不稱介客重而介輕故也今崔氏則重崔族則輕輕重相冒書于春秋何其不憚煩乎辨又見左氏六月宋師伐滕左氏曰滕人恃晋而不事宋六月宋師伐滕朩訥趙氏曰以職方考滕越齊衛而後至晋安能越二國而事晋哉蓋事魯而不事宋晋魯有亥豕之似左氏附㑹矣秋天王使王季子來聘左氏曰劉康公來報聘劉氏曰杜云季子字也非也審季子為王之母弟字季子者宜若叔服稱季子而已即欲分别其為王母弟者宜冠以弟字不當冠王也王者尊稱非所以冠大夫之字也冠大夫者稱王子王孫以屬為重不以王為貴去屬而著王是季子王也妨于文而害于實不可為教矣愚按杜氏又曰王季子者公羊以為天王之母弟然則杜氏之誤蓋以公羊解左氏故以季子為字也又按杜氏曰劉康公即王季子也其後食采于劉不當預以此解經以亂春秋譏天王使幼子之義况左氏之說不足據乎公羊曰王季子者何天子之大夫也其稱王季子何貴也其貴奈向母弟也啖氏曰聖人設教不應于同母弟則偏貴之穀梁曰其曰王季王子也其曰子尊之也聘問也劉氏曰非也若不尊之但云王季乎意者王之尊其子不得以屬通哉王子虎何以書也今斷王季于上析子于下不可解訓皆謬說也楚子伐鄭左氏曰楚子伐鄭晋士㑹救鄭逐楚師于潁北諸侯之師伐鄭按九年楚子伐鄭晋郤缺救鄭經既備書之此士㑹救鄭而又逐楚師矣諸侯之師又伐鄭矣經豈有不書者乎若晋既勤于鄭鄭宜附晋也曽未數月而楚陳鄭為辰陵之盟何也惟晋不救鄭而鄭遂盟楚無疑也左氏何從得此事而附㑹于此哉十有一年秋晋侯㑹狄于櫕函左氏曰詩曰文王既勤止文王猶勤况寡德乎此引詩雖不甚悖理然亦左氏自為之詞穀梁曰不言及外狄也按戎與狄無爵可稱又非與為盟故但言㑹狄皆魯史之直辭春秋固外狄也然經書此事外狄之意自見豈在不書及為外狄乎茍書晋侯及狄于櫕函則其義不通書晋侯及狄㑹于櫕函則其文重復故曰㑹狄于櫕函耳凡書㑹戎㑹狄皆然苟以不言及生義則凡書公及戎盟者可謂內戎乎先儒外詞之說皆原于此其詞少婉耳冬十月楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父于陳左氏曰故書曰楚子入陳納公孫寧儀行父于陳書有禮也夷狄納中國作亂之大夫可謂有禮哉公羊曰此楚子也其稱人何貶曷為貶不與外討也不與外討者因其討乎外而不與也雖內討亦不與也曷為不與實與而文不與文曷為不與諸侯之義不得専討也諸侯之義不得専討則其曰實與之何上無天子下無方伯天下諸侯有為無道者臣弒君子弒父力能討之則討之可也此皆大夫也其言納何納公黨與也劉氏曰公羊曰此楚子也其稱人何貶也非也外討弒君之賊何不得乎假令于義少負尚未可貶稱人也田恆弒君簡公孔子沐浴請討之聖人豈不知義而欲陷其君使至于貶者如公羊意是謂仲尼不知義也又公羊曰納公黨與也案公羊例立納入皆為篡此公孫寧儀行父稱納者篡大夫耳其謂之公黨何哉愚謂諸侯不得専討謂尋常擅興兵者耳若鄰國有臣弒其君子弒其父諸侯能討之乃其義耳何謂不得専討乎夫文所以達義也義所當與則文與之若實與而文不與則聖人豈不口是心非為反覆小人之為哉此公羊之所以為妄也穀梁曰此入而殺也其不言入何也外徴舒于陳也其外徵舒于陳何也明楚之討有罪也入者內弗受也曰入惡入者也何用弗受也不使夷狄為中國也納者內弗受也輔人之不能民而討猶可入人之國制人之上下使不得其君臣之道不可劉氏曰若先言入後言殺可謂納徵舒于陳乎夫春秋記事之書也先殺而後入皆其實録矣豈紛紛然更易古事以便私意哉十有二年春葬陳靈公公羊曰討此賊者非臣子也何以書葬君子辭也楚已討之矣臣子雖欲討之而無所討也春秋凡書葬者一則見葬期緩速二則見臣子私諡三則見卿供大國之葬而忽小國之訃其見弒而不見葬者或彼不成葬或魯不㑹葬魯史所無故不得書耳君弒賊不討不書葬之說本三𫝊億度之辭何足信哉公羊以此書葬為君子之詞過矣且夏徵舒非得一國之權陳人殺之如反掌耳所以不討者見陳無臣子亦以見靈公之惡極罪大陳人不君之也三年而不討陳人無心于討矣公羊乃謂臣子雖欲討之而無所討豈不謬哉宜康侯髙氏之徒展轉生義而經㫖益晦也楚子圍鄭左氏曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫且巷出車吉國人大臨守陴者皆哭楚子退師鄭人修城進復圍之三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆曰孤不天不䏻事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福于厲宣桓武不泯其社稷使改事君夷于九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其人矣庸可幾乎退三十里而與之平潘尫入盟子良出質審如𫝊所言經當書入今但言圍此其可疑者也夏六月乙卯晋荀林父帥師及楚子戰于邲晋師敗績左氏曰夏六月晋師救鄭荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及于鄭而勦民焉用之楚歸而動不後隨武子曰善㑹聞用師觀釁而動德刑政事典禮不易不可敵也不為是征楚君討鄭怒其二而哀其卑叛而伐之服而舍之德刑成矣伐叛刑也柔服德也二者立矣昔歲入陳今兹入鄭民不罷勞君無怨讟政有經矣荆尸而舉商農工賈不敗其業而卒乘輯睦事不奸矣蒍敖為宰擇楚國之令典軍行右轅左追蓐前茅慮無中權後徑百官象物而動軍政不戒而備能用典矣其君之舉也內姓選于親外姓選于舊舉不失德賞不失勞老有加惠旅有施舍君子小人物有服章貴有常尊賤有等威禮不逆矣德立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也子姑整軍而經武乎猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也汋曰於鑠王師遵養時晦耆昧也武曰無競惟烈撫弱耆昧以務烈所可也彘子曰不可晋所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵彊而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟知莊子曰此師殆哉周易有之在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有律以如己也故曰律否藏且律竭也盈而以竭夭且不整所以凶也不行之謂臨有帥而不從臨孰甚焉此之謂矣果遇必敗彘子尸之雖免而歸必有大咎韓獻子謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也事之不捷惡有所分與其専罪六人同之不猶愈乎師遂濟楚子北師次于郔沈尹將中軍子重將左子反將右將飲馬于河而歸聞晋師既濟王欲還嬖人伍參欲戰令尹孫叔敖弗欲曰昔歲入陳今兹入鄭不無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔為無謀矣不捷參之肉將在晋軍可得食乎令尹南轅反斾伍參言于王曰晋之從政者新未䏻行令其佐先縠剛愎不仁未肯用命其三帥者専行不獲聽而無上衆誰適從此行也晋師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之次于管以待之晋師在敖鄗之間鄭皇戍使如晋師曰鄭之從楚社稷之故也未有二心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承楚師必敗彘子曰敗楚服鄭于此在矣必許之欒武子曰楚自克庸以來其君無日不討國人而訓之于民生之不易禍至之無日戒懼之不可以怠在軍無日不討軍實而申警之于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路藍縷以啓山林針之曰民生在勤勤則不匱不可謂驕先大夫子犯有言曰師直為壯曲為老我則不德而徼怨于楚我曲楚直不可謂老其君之戎分為二廣廣有一卒卒偏之兩右廣初駕𢾗及日中左則受之以至于昏內官序當其夜以待不虞不可謂無備子良鄭之良也師叔楚之崇也師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從趙括趙同曰率師以來唯敵是求克敵得屬又何俟必從彘子知季曰原屏咎之徒也趙莊子曰欒伯善哉實其言必長晋國楚少宰如晋師曰寡君少遭閔凶不䏻文聞二先君之出入此行也將鄭是訓定豈敢求罪于晋二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人敢拜君命之辱彘子以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之跡于鄭曰無辟敵羣臣無所逃命楚子又使求成于晋晋人許之盟有日矣楚許伯御樂伯攝叔為右以致晋師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下兩馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復晋人逐之左右角之樂伯左射馬而右射人角不䏻進矢一而己麋興于前射麋麗龜晋鮑癸當其後使攝叔奉麋獻焉曰以歲之非時獻禽之未至敢膳諸從者鮑癸止之曰其左善射其右有辭君子也既免晋魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還楚潘黨逐之及熒澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給于鮮敢獻於從者叔黨命去之趙旃求卿未得且怒于失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往郤獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也師無成命多備何為士季曰備之善若二子怒楚楚人乘我喪師無日矣不如備之楚之無惡除備而盟何損于好若以惡來有備不敗且雖諸侯相見軍衛不徹警也彘子不可士季使鞏朔韓穿帥七覆于敖前故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟潘黨既逐魏錡趙旃夜至于楚軍席于軍門之外使其徒入之楚子為乘廣三十乘分為左右右廣雞鳴而駕日中而說左則受之日入而說許偃御右廣養由基為右彭名御左廣屈蕩為右乙卯王乘左廣以逐趙旃趙旃棄車而走林屈蕩摶之得其甲裳晋人懼二子之怒楚師也使軘車逆之潘黨望其塵使騁而告曰晋師至矣楚人亦懼王之入晋軍也遂出陳孫叔曰進之寧我薄人無人薄我詩云元戎十乘以先啓行先人也軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乘晋軍桓子不知所為鼓于軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晋師右移上軍未動工尹齊將右拒卒以逐下軍楚子使唐狡與蔡鳩居告唐惠侯曰不穀不德而貪以遇大敵不穀之罪也然楚不克君之羞也敢藉君靈以濟楚師使潘黨率游闕四十乘從唐侯以為左拒以從上軍駒伯曰待諸乎隨季曰楚師方壯若萃于我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗王見右廣將從之乘屈蕩户之曰君以此始亦必以終自是楚之乘廣先左晋人或以廣隊不䏻進楚人惎之脫扄少進馬還又惎之拔斾投衡乃出顧曰吾不如大國之數奔也趙旃以其良馬二濟其兄與叔父以他馬反遇敵不能去棄車而走林逢大夫與其二子乘謂其二子無顧顧曰趙叟在後怒之使下指木曰尸女于是授趙旃綏以免明日以表尸之皆重獲在朩下楚熊負羈囚知罃知莊子以其族反之廚武子御下軍之士多從之每射抽矢菆納諸廚子之房廚子怒曰非子之求而蒲之愛董澤之蒲可勝既乎知季曰不以人子吾子其可得乎吾不可以茍射故也射連尹襄老獲之遂載其尸射公子榖臣囚之以二者還及昏楚師軍于邲晋之餘師不䏻軍宵濟亦終夜有聲丙辰楚重至于邲遂次于衡雍潘黨曰君盍築武軍而收晋尸以為京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之又作武其卒章曰耆定爾功其三曰鋪時繹思我徂維求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也使子孫無忘其章今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晋在焉得定功所違民欲猶多民何安焉無德而强爭諸侯何以和衆利人之幾而安人之亂以為己榮何以豐財武有七德我無一焉何以示子孫其為先君宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮于是乎有京觀以懲淫慝今罪無所而民皆盡忠以死君命又可以為京觀乎祀于河作先君宫告成事而還秋晋師歸桓子請死晋侯欲許之士貞子諌曰不可城濮之役晋師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂末歇也困獸猶鬬况國相乎及楚殺子玉公喜而後可知也曰莫豫毒也已是晋再克而楚再敗也楚是以再世不競今天或者大警晋也而又殺林父以重楚勝其毋乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損于明晋侯使復其位劉氏曰按經文晋楚為成列而戰者也今左氏以為晋人自使軘車逆趙旃而楚人疑以為晋師且至遂車馳卒奔而乘晋軍晋中軍桓子不知所為士爭渡河而遂大敗耳若此則晋軍未嘗成列何以得書戰耶杜氏雖云晋上軍成陳故得書戰按𫝊文所叙無上軍成陳之事惟云使帥七覆于敖前又云晋師右移上軍未動則是上軍深溝髙壘備不虞耳蓋未嘗出陳也且經云荀林父及楚子戰若緣上軍不動故得稱戰則經文又不應指言荀林父也荀林父實不戰隨㑹自戰戰之事當舉隨㑹不當舉荀林父也今經稱荀林父及楚子戰若林父之師初不成陳何得書戰乎又長勺之役齊魯成列唯以魯侯鼓之差後左氏謂春秋惡其機譎不以偏戰為文今此楚師乃出不意以乘晋師其譎甚矣反謂之戰何耶黃氏曰左氏以此譽楚滔滔數千言竊意此楚人之言也陳與鄭皆服楚盟于辰陵矣未幾楚先叛盟入陳而欲滅之若以為討徵舒之弒在宣十有一年之夏弒已及年此時何不討若果討賊何為因欲滅人之國楚自叛盟而行無道于陳如此陳鄭一體鄭尤新盟則鄭亦如之何不背楚歸晋是楚伐鄭非也鄭伯肉袒以逆楚既舍之晋欲退歸獨以先縠取敗晋師雖敗中國救鄭之義豈與之俱敗是晋之敗于楚不足為辱也世多以成敗論人故譽楚而貶晋耳春秋但書楚伐鄭而以晋主此戰公羊曰大夫不敵君此其稱名氏以敵楚子何不與晋而與楚子為禮也曷為不與晋而與楚子為禮也莊王伐鄭勝乎皇門放乎路衢鄭伯肉袒左執茅旌右執鸞刀以逆莊王曰寡人無良邊陲之臣以干天禍是以使君王沛焉辱到敝邑君如矜此喪人錫之不毛之地使帥一二耋老而綏焉請唯君王之命莊王曰君之不令臣交易為言是以使寡人得見君之玉面而微至乎此莊王親自手旌左右撝軍退舍七里將軍子重諌曰南郢之與鄭相去數千里諸大夫死者數人厮役扈養死者數百人今君勝鄭而不有無乃失民臣之力乎莊王曰古者杅不穿皮不蠧則不出于四方是以君子篤于禮而薄于利要其人而不要其土告從不赦不詳吾以不詳道民災及吾身何日之有既則晋師之救鄭者至曰請戰莊王許諾將軍子重諌曰晋大國也王師淹病矣君請勿許也莊王曰弱者吾威之強者吾辟之是以使寡人無以立乎天下令之還師而逆晋寇莊王鼓之晋師大敗晋衆之走者舟中之指可掬矣莊王曰嘻吾兩軍不相好百姓何罪令之還師而佚晋寇劉氏曰公羊曰大夫不敵君此其稱名氏以敵君何不與晋而與楚子為禮也非也大夫不敵君而荀林父獨得稱名氏以敵楚子此可謂與晋而不與楚子為禮而非不與晋而與楚子為禮也城濮之戰子玉得臣不見名氏公羊以為大夫不敵君也彼子玉以不見名氏為不敵君此林父以見名氏為不敵君二者孰能知之乎又城濮之戰晋文公也今邲之戰楚莊王也二君者皆公羊所賢同為設義而乖異如此雖使公羊復生吾知其必不能合也而諸傳競為文飾以惑後進豈不可怪也哉穀梁曰績功也功事也日其事敗也穀梁以功訓績是已又以事訓功則逺矣冬十有二月戊寅楚子滅蕭左氏曰冬楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊遂傅于蕭還無社與司馬卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目于眢井而拯之若為茅絰哭井則已明日蕭潰申叔視其井則茅絰存焉號而出之黃氏曰楚莊入陳伐鄭敗晋滅蕭慿陵中國甚矣左氏于滅蕭尚歸曲于蕭之殺二囚而歸美于楚之撫三軍大抵左氏楚人而左𫝊多楚人之言愚案使宋蔡救蕭經當書之晋人宋人衛人曹人同盟于清丘左氏曰晋原縠宋華椒衛孔達曹人同盟于清丘曰恤病討二于是卿不書不實其言也劉氏曰春秋之世不實其言者衆矣奚獨此耶設本微者又何以辨之且華椒無惡不宜被貶杜氏云華椒承羣僞之言以誤其國故亦不免于譏豫以為凡盟誓者所以結信也寧能早知彼將背之乎借使背盟者當貶守盟者亦可貶乎葉氏曰左氏言恤病討二則然矣而曰不實其言而不書豈以衛救陳而晋不討楚伐宋而晋不救者與大夫盟而後能實言惟向戍于宋耳外此未有不叛何獨于清丘責之韓中父曰左氏此言開後學褒貶之說是亂春秋者也十有三年夏楚子伐宋左氏曰夏楚子伐宋以其救蕭也君子曰清丘之盟惟宋可以免焉劉氏曰然則十二年不當貶華椒稱人也以為不實其言又曰惟宋可以免自相伐矣葉氏曰救蕭之役在清丘前若以是免宋則華椒猶未受盟若以宋見伐于楚而諸侯不救因以免宋則此罪在諸侯宋師伐陳討二之事安可以諸侯之罪而得免謂之君子之言亦非矣此傳急于解免華椒之說以為詞而弗悟也愚謂陳為楚與國而宋伐之故楚伐宋于經可考而左氏以為救蕭妄也冬晋殺其大夫先縠左氏曰秋赤狄伐晋及清先縠召之也冬晋人討邲之敗與清之師歸罪于先縠而殺之盡滅其族君子曰惡之來也已則取之其先縠之謂乎此𫝊義也非經之本義也經之本義在諸侯専殺大夫耳左氏凡曰君子曰非魯史本文又赤狄伐晋事于經無考餘見十二年荀林父帥師及楚子戰于邲晋師敗績十有四年春衛殺其大夫孔達左氏曰清丘之盟晋以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰茍利社稷請以我說罪我之由我則為政而亢大國之討將以誰任我則死之十四年春孔達縊而死衛人以說于晋而免遂告于諸侯曰寡君有不令之臣達搆我敝邑于大國既伏其罪矣敢告衛人以為成勞復室其子使復其位按經言衛殺孔達而傳言達自縊而死若然則經不當書殺其大夫以誣衛君之罪也當以經為正晋侯伐鄭左氏曰鄭人懼使子張代子良于楚鄭伯如楚謀晋故也鄭以子良為有禮故召之按鄭伯如楚事經無所考又左氏始以鄭懼晋而召子良復以為有禮而召之未詳信否冬公孫歸父㑹齊侯于穀左氏曰公孫歸父㑹齊侯于穀見晏桓子與之言魯樂桓子告髙宣子曰子家其亡乎懷于魯矣懷必貪貪必謀人謀人人亦謀己一國謀之何以不亡此非本義杜氏以十八年歸父奔齊𫝊十有五年夏五月宋人及楚人平公羊曰外平不書此何以書大其平乎己也何大乎其平乎已莊王圍宋軍有七日之糧耳盡此不勝將去而歸耳于是使司馬子反乘堙而窺宋城宋華元亦乘堙而出見之司馬子反曰子之國何如華元曰憊矣曰何如曰易子而食之析骸而炊之司馬子反曰嘻甚矣憊雖然吾聞之也圍者柑馬而秣之使肥者應客是何子之情也華元曰吾聞之君子見人之厄則矜之小入見人之厄則幸之吾見子之君子也是以告情于子也司馬子反曰諾勉之矣吾軍亦有七日之糧耳盡此不勝將去而歸耳揖而去之反于莊王莊王曰何如司馬子反曰憊矣曰何如曰易子而食之析骸而炊之莊王曰嘻甚矣憊雖然吾今取此然後歸耳司馬子反曰不可臣已告之矣軍有七日之糧耳莊王怒曰吾使子往視之子曷為告之司馬子反曰以區區之宋猶有不欺人之臣可以楚而無乎是以告之也莊王曰諾舍而止雖然吾猶取此然後歸耳司馬子反曰然則君請處于此臣請歸耳莊王曰子去我而歸吾孰與處于此吾亦從子而歸耳引師而去之故君子大其平乎己也此皆大夫也其稱人何貶曷為貶平者在下也劉氏曰公羊曰大其平乎已非也臣無専美古今之通義也且莊王非不賢者司馬子反何不退與其君謀而遂擅與宋平且吾觀子反既以宋情告莊王而莊王更怒者其意非必獨惡其以軍糧告宋也亦愠子反之擅平于外也故曰舍而止如使莊王素懷不仁之行必且窮國之力而甘心焉是由子反激之也而子反乃欲舍君以先歸而後僅克成其功亦幸莊王素有仁人之心耳故子反進而擅君之義退有激君之罪二者無一可而春秋乃大其平乎己可謂義乎愚謂左氏載子反與華元先自為盟而後告楚王退軍三十里而又公為盟以平若據公羊言則子反與華元真情相告而去耳又曰勉之則是宋之力守也既不私為平亦未嘗公為王也不過引師而去之耳春秋何得書宋人及楚人平乎夫平非二國之臣所可専也設如公羊言大其平乎己則不應復人而貶之既人而貶之則不應大其平乎己道固有並行而不相悖者而非此之謂也何得一大一貶乎穀梁曰平者成也善其量力而反義也人者衆詞也平稱衆上下欲之也外平不道以吾人之存焉道之也劉氏曰平稱衆上下欲之也非也暨齊平何以不曰暨齊人平乎又曰外平不道以吾人之存焉道之也非也楚人圍宋經厯三時幸而得平以告諸侯故魯史有其事耳且外盟㑹常書外平何以不可書愚按歸父㑹楚子自求免耳非為宋也其平也宋自勢窮力屈而為平耳非為魯也何得曰吾人之存之也餘見或問六月癸卯晋師滅赤狄潞氏以潞子嬰兒歸公羊曰潞何以稱子潞子之為善也躬足以亡耳雖然君子不可不記也離于夷狄而未能合于中國晋師伐之中國不救狄人不有是以亡也劉氏曰非也赤狄狄也潞氏狄之别也潞子其君也夷狄之君稱子周禮也非為善而亡也蓋迷于有爵耳愚謂天下豈有為善而亡其國之理哉穀梁曰滅國有三術中國謹日卑國月夷狄不日其日潞子嬰兒賢也劉氏曰皆非也項遂談溫梁檜蔡虢皆中國也不日潞子甲氏舒鳩陸渾皆夷狄也不時又穀梁𫝊不見說附庸滅者今學者則皆以卑國為附庸而穀梁氏乃指夔子弦子為微國按爵稱子非附庸明矣不知穀梁誤以䕫子弦子為附庸耶抑學者誤以卑國為附庸耶有卑國無附庸有附庸無卑國了不可推也又曰其日潞子賢亦非也其意以為夷狄稱子則是褒矣不知夷狄之爵正自當子非以賢故進之也豈有國滅身執而得為賢者哉王札子殺召伯毛伯左氏曰王孫蘇與召氏毛氏爭政使王子捷殺召戴公及毛伯衛卒立召襄朴鄉吕氏曰果如傳所言經當書王孫蘇以首惡此未必然公羊曰王札子者何長庶之號也莘老孫氏曰别長庶者當言伯仲叔季亦未有曰某子穀梁曰王札子者當上之詞也殺召伯毛伯不言其何也兩下相殺也兩下相殺不志乎春秋此其志何也矯王命以殺之非忿怒相殺也故曰以王命殺也以王命殺則何志焉為天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天下所以傾也劉氏曰穀梁曰不言其何也兩下相殺也非也凡殺大夫稱其者皆君也豈可云王札子殺其大夫召伯毛伯乎又曰兩下相殺不志乎春秋亦非也春秋撥亂君臣皆譏苟有兩下相殺亂孰甚焉可得勿書乎愚按經文但言王札子殺毛伯召伯耳未有矯王命之辭亦未有矯王命之意蓋穀梁自為之言耳初稅畝穀梁曰初者始也古者什一藉而不稅初稅畝非正也古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民初稅畝者非公之去公田而履畝什取一也以公之與民為已悉矣古者公田為居井竈葱非盡取焉趙氏曰蓋公田之外又履步其田十又稅其一論語云二吾猶不足若是去公田而行十一之稅所得與藉何殊穀梁云去公田而履畝此一句非也冬蝝生左氏曰冬蝝生饑幸之也趙氏曰按此類生訖便為災如蠶生而食葉也但為秋中之螽未息冬又生子重重為災故書耳劉氏曰杜氏曰幸冬生不為物害若然則有蜚不為災亦何不辛而書之乎且經之書之固為其害也而𫝊以為不害所以為害者固為其生也而以為死矣是何其戾也愚謂秋有螽而災息則不復生子災未巳則復生子于冬左氏見蝝生在冬遂謂聖人幸其生于冬豈遇災知懼之心哉杜氏為之訓曰時嵗雖饑猶喜而書之可謂有功于𫝊而不知得罪于經公羊曰未有言蝝生者此其言蝝生何蝝生不書此何以書幸之也幸之者何猶曰受之云耳受之云耳者何上變古易常應是而有天災其諸則宜于此焉變矣獻可杜氏曰左氏公羊以為幸君于民為茍幸則亦常事不書矣愚謂聖人凡遇天災必書之為後世戒豈有幸其生以警人君者哉蝝生不書之論尤不足取穀梁曰蝝非災也其曰蝝非稅畝之災也按蝝者螽子至冬而生故曰蝝生穀梁就生字敢義而謂蝝非災因稅畝而生此災又就蝝字取義而謂緣稅畝而有蝝之名鑿矣何春秋之不幸也十有六年春王正月晋人滅赤狄甲氏及留吁左氏曰晋士㑹帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘晋侯請于王戊申以黻冕命士㑹將中軍且為太傅于是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄冰善人在上也善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也按鐸辰不見于經又王以黻冕命士㑹為大傅以賞其滅狄經亦當有見又士㑹實為善人晋當復伯不出四年秦楚及諸侯大夫為蜀之盟而晋以日削何歟凡此皆不得事情而妄為之詞者也夏成周宣榭火左氏曰凡火人火曰火天火曰災天火未嘗不假人火以為災凡人之有火皆天之所為也惟雷火災物者間有之而不可以常道論也左氏分火為人災為天理似未當公穀皆作災說文亦云天火為災豈據此乎公羊曰成周者何東周也宣榭者何宣宫之榭也何言乎成周宣榭災樂器藏焉爾成周宣榭災何以書記災也外災不書此何以書新周也宋氏曰公羊穀梁云成周新周也黜而新之從為王者後是誣聖人也愚謂宣宫豈特樂器藏焉爾凡宋衛陳鄭災皆書何得謂外災不書乎穀梁曰周災不志也其曰宣榭何也以樂器之所藏目之也劉氏曰周災不志非也宋災猶志况周災乎大凡災異之發主人告災不告異諸侯弔災不弔異理當然也後世道衰災異並告春秋因而書之無擇于周獨不志也愚謂穀梁以樂器之所藏目之曰宣榭似見公羊樂器之說而又失其意故云然架漏甚矣十有七年夏六月己未公㑹晋侯衛侯曹伯邾子同盟于斷道左氏曰晋侯使郤克徵㑹于齊齊頃公帷婦人使觀之郤子登婦人笑子房獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬待命于齊曰不得齊事無復命矣郤子至請伐齊晋侯弗許請以其私屬又弗許齊侯使髙固晏弱蔡朝南郭偃㑹及斂盂髙固逃歸夏㑹于斷道討二也盟于卷楚辭齊人晋人執晏弱于野王執蔡朝于原執南郭偃于溫苖賁皇使見晏桓子歸言于晋侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮舉言羣臣不信諸侯皆有二志齊君恐不得禮故不出而使四子來左右或沮之曰君不出必執吾使故髙子及斂盂而逃夫三子者曰若絶君好寧歸死焉為是犯難而來吾若善逆彼以懷來者吾又執之以信齊沮吾不既過矣乎過而不改而又久之以成其悔何利之有焉使反者得辭而害來者以懼諸侯將安用之晋人緩之逸秋八月晋師還按晋侯弗許郤克之請則不伐齊矣今既伐齊則是從其請矣一不可信也又三子來㑹而晋人執之經當又見今不書二不可信也且徵齊㑹者為斷道之㑹也徵㑹之初齊未侮郤克安得斷道之㑹為討二乎三不可信也故愚按晋侯使郤克徵㑹至郤子請伐齊數語附于十八年伐齊之下餘皆削之辨又見或問穀梁曰同者有同也同外楚也辨見莊十六年冬十有一月壬午公弟叔肸卒左氏曰公弟叔肸卒公母弟也凡大子之母弟公在曰公子不在曰弟凡稱弟皆母弟也劉氏曰如傳所言者是謂母弟稱弟也公子友如陳不稱弟何也君舉陳氏曰凡先君之子稱公子有謂稱弟是故宋地辰兄弟也譏稱宋公之弟辰無譏則稱為公子招故不弟稱弟不友稱弟不弟稱弟傳曰陳侯之弟招殺陳世子偃師罪在招也不友稱弟𫝊曰秦伯之弟針出奔晋罪在秦伯也公穀左氏母弟稱弟例不取穀梁曰其曰公弟叔肸賢之也其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子是以為通恩也以取貴乎春秋二傳之言一字褒貶之病也豈知稱弟之義哉其稱賢之以為宣弒而非之以理推之知其妄也夫兄雖無可去之義然其兄弒逆弟或力不能討則其義亦可以去矣十有八年秋七月邾人戕鄫子于鄫左氏曰凡自虐其君曰弒自外曰戕下殺曰弒弒固自虐其君而非正訓也公羊曰戕鄫子于鄫者何殘賤而殺之也穀梁曰戕猶殘也捝殺也楊氏注捝謂捶打殘賤而殺愚按公穀字訓不如左氏之近甲戌楚子旅卒左氏曰楚莊王卒楚師不出既而用晋師楚于是乎有蜀之役非本義不録公羊曰何以不書葬吳楚之君不書葬辟其號也按是時魯雖懼楚然慶弔之事猶所未通安知非魯不往㑹而不書乎吾何能必其辟號而不書也故曰疑事無質且楚雖自稱王魯史書之豈肯從其僣號哉或曰侯伯子男僣稱公魯史何故書之曰僣稱公猶可書也僭稱王則甚矣天下豈有二王哉穀梁曰夷狄不卒卒少進也卒而不日日少進也日而不言正不正簡之也按穀梁所謂少進乃聖人進之非也夷狄猾夏聖人安得進之哉若曰夷狄進而漸入于中國聖人直書之以見義可也冬十月壬戌公薨于路寢穀梁曰路寢正寢也已見莊公薨歸父還自晋至笙遂奔齊左氏曰書曰歸父還自晋善之也歸父還自晋紀實事耳何善之有公羊曰還者何善辭也何善爾歸父使于晋還自晋至柳聞君薨家遣墠帷哭君成踊反命乎介自是走之齊韓中甫曰按歸父以君命如齊及還至笙聞公薨遂奔齊是歸父不復君命不奔君喪臣子不忠莫甚焉而左氏公羊以為善之非也愚謂還之一字魯史記其自晋還魯耳何從見其善哉茍以墠帷哭君成踊復命乎介為有禮而不責其専國忌同輕謀逃命之罪則是放飯流啜而齒决是務者也三傳辨疑卷十二
